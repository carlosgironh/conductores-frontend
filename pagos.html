<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos - Panel de Conductor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Yappy Button CDN - Según documentación oficial -->
  <script src="https://bt-cdn.yappy.cloud/v1/cdn/web-component-btn-yappy.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #ca8a04;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 520px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header p { color: var(--text-muted); margin-top: 4px; }

    .alert {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.9375rem;
      line-height: 1.5;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }
    .alert.show { display: flex; }
    .alert-error { background: rgba(220,38,38,0.12); color: #fca5a5; border: 1px solid rgba(220,38,38,0.25); }
    .alert-warn  { background: rgba(202,138,4,0.12); color: #fde047; border: 1px solid rgba(202,138,4,0.25); }
    .alert-info  { background: rgba(37,99,235,0.12); color: #93c5fd; border: 1px solid rgba(37,99,235,0.25); }
    .alert-success { background: rgba(22,163,74,0.12); color: #86efac; border: 1px solid rgba(22,163,74,0.25); }

    .status-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .status-label { color: var(--text-muted); font-size: 0.875rem; }
    .status-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge.activa { background: rgba(22,163,74,0.2); color: #4ade80; }
    .status-badge.inactiva { background: rgba(220,38,38,0.2); color: #f87171; }
    .status-badge.pendiente { background: rgba(202,138,4,0.2); color: #facc15; }

    .conductor-info {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0 0;
      border-top: 1px solid var(--border);
    }
    .conductor-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 700;
      flex-shrink: 0;
    }
    .conductor-details h3 { font-size: 1.05rem; font-weight: 600; }
    .conductor-details p { color: var(--text-muted); font-size: 0.875rem; margin-top: 2px; }

    .plan-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .plan-price {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .plan-price span { font-size: 1.1rem; font-weight: 500; -webkit-text-fill-color: #94a3b8; }
    .plan-period { color: var(--text-muted); margin-top: 10px; font-size: 0.9375rem; }
    .plan-features {
      list-style: none;
      margin: 22px 0 0;
      text-align: left;
    }
    .plan-features li {
      padding: 9px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(71,85,105,0.3);
    }
    .plan-features li:last-child { border-bottom: none; }
    .plan-features li::before {
      content: "✓";
      color: var(--success);
      font-weight: 700;
      flex-shrink: 0;
    }

    .yappy-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .yappy-section h3 { margin-bottom: 16px; font-size: 1.125rem; }
    #yappy-btn-container {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .debug-panel {
      background: #020617;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid #1e293b;
    }
    .debug-panel h4 {
      color: #64748b;
      margin-bottom: 10px;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: sticky;
      top: 0;
      background: #020617;
      padding-bottom: 6px;
    }
    .debug-line {
      padding: 2px 0;
      color: #94a3b8;
      word-break: break-all;
      line-height: 1.4;
    }
    .debug-line.error { color: #f87171; }
    .debug-line.success { color: #4ade80; }
    .debug-line.warn { color: #facc15; }
    .debug-line.info { color: #93c5fd; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .plan-price { font-size: 2.6rem; }
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💳 Pagos</h1>
      <p>Gestiona tu suscripción de conductor</p>
    </div>

    <div id="alert-box" class="alert"></div>

    <div class="status-card" id="status-card" style="display:none;">
      <div class="status-header">
        <span class="status-label">Estado de suscripción</span>
        <span id="status-badge" class="status-badge inactiva">—</span>
      </div>
      <div class="conductor-info">
        <div class="conductor-avatar" id="conductor-initial">?</div>
        <div class="conductor-details">
          <h3 id="conductor-name">Cargando...</h3>
          <p id="conductor-vehiculo">—</p>
        </div>
      </div>
    </div>

    <div class="plan-card" id="plan-card" style="display:none;">
      <div class="plan-price">$5.00 <span>/ 24h</span></div>
      <p class="plan-period">Activación por 24 horas de servicio</p>
      <ul class="plan-features">
        <li>Acceso al panel de viajes</li>
        <li>Notificaciones en tiempo real</li>
        <li>Soporte prioritario</li>
        <li>Historial de viajes</li>
      </ul>
    </div>

    <div class="yappy-section" id="yappy-section" style="display:none;">
      <h3>Pagar con Yappy</h3>
      <div id="yappy-btn-container">
        <!-- Botón Yappy oficial - Se renderiza aquí -->
      </div>
    </div>

    <div class="debug-panel">
      <h4>🐛 Debug Log</h4>
      <div id="debug-log"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const SUPABASE_URL = 'https://ugchmuhjzzyofoogprlr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const RENDER_API_URL = 'https://conductores-api.onrender.com/api/yappy';
    const YAPPY_DOMAIN = 'https://nrdesingcorp.com';

    let conductorData = null;
    let authUser = null;
    let authReady = false;

    // ============================================================
    // DEBUG
    // ============================================================
    function logDebug(msg, type = 'info') {
      const log = document.getElementById('debug-log');
      const time = new Date().toLocaleTimeString('es-PA', { hour12: false });
      const line = document.createElement('div');
      line.className = `debug-line ${type}`;
      line.textContent = `[${time}] ${msg}`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
      console.log(`[YAPPY] ${msg}`);
    }

    // ============================================================
    // ALERTAS
    // ============================================================
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.className = `alert alert-${type} show`;
      box.textContent = msg;
    }
    function hideAlert() {
      document.getElementById('alert-box').classList.remove('show');
    }

    function updateStatusBadge(status) {
      const badge = document.getElementById('status-badge');
      badge.className = 'status-badge';
      if (status === 'active' || status === 'activa') {
        badge.classList.add('activa');
        badge.textContent = 'Activa';
      } else if (status === 'pendiente') {
        badge.classList.add('pendiente');
        badge.textContent = 'Pendiente';
      } else {
        badge.classList.add('inactiva');
        badge.textContent = 'Inactiva';
      }
    }

    function showSection(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = '';
    }

    // ============================================================
    // RESTAURAR SESIÓN
    // ============================================================
    async function restaurarSesionDesdeStorage() {
      try {
        const raw = localStorage.getItem('supabase_session');
        if (!raw) return false;
        const stored = JSON.parse(raw);
        if (!stored.access_token) return false;

        logDebug('Intentando restaurar sesión desde localStorage...');
        const { data, error } = await supabaseClient.auth.setSession({
          access_token: stored.access_token,
          refresh_token: stored.refresh_token,
        });

        if (error || !data.session) {
          localStorage.removeItem('supabase_session');
          return false;
        }

        logDebug('✓ Sesión restaurada desde localStorage', 'success');
        return true;
      } catch (e) {
        localStorage.removeItem('supabase_session');
        return false;
      }
    }

    // ============================================================
    // CARGAR DATOS DEL CONDUCTOR
    // ============================================================
    async function cargarDatosConductor() {
      logDebug('Iniciando carga de página...');

      try {
        logDebug('Verificando sesión de Supabase...');
        let { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();

        if (!sessionData?.session) {
          const restored = await restaurarSesionDesdeStorage();
          if (restored) {
            const refreshed = await supabaseClient.auth.getSession();
            sessionData = refreshed.data;
            sessionError = refreshed.error;
          }
        }

        if (sessionError) {
          logDebug(`Error de sesión: ${sessionError.message}`, 'error');
          showAlert('Error al verificar sesión. Intenta recargar la página.');
          return;
        }

        if (!sessionData?.session) {
          logDebug('No hay sesión activa. Usuario no logueado.', 'warn');
          showAlert('No has iniciado sesión. Redirigiendo al login...', 'warn');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
          return;
        }

        const accessToken = sessionData.session.access_token;
        logDebug(`Sesión encontrada. Token: ${accessToken.slice(0, 16)}...`);

        const { data: userData, error: userError } = await supabaseClient.auth.getUser(accessToken);

        if (userError || !userData?.user) {
          logDebug(`Error obteniendo usuario: ${userError?.message || 'Sin usuario'}`, 'error');
          showAlert('Sesión inválida o expirada. Por favor inicia sesión de nuevo.', 'warn');
          localStorage.removeItem('supabase_session');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
          return;
        }

        authUser = userData.user;
        authReady = true;
        logDebug(`Usuario autenticado: ${authUser.id}`);
        logDebug(`Email: ${authUser.email || 'N/A'}`);

        logDebug('Buscando datos del conductor en tabla "conductores"...');
        const { data: conductor, error: condError } = await supabaseClient
          .from('conductores')
          .select('id,nombres,apellidos,status,marca,modelo,placa,color,celular,direccion,auth_user_id,payment_status,fecha_vencimiento,suscripcion_activa,fecha_ultimo_pago,proximo_pago,pago_al_dia')
          .eq('auth_user_id', authUser.id)
          .maybeSingle();

        if (condError) {
          logDebug(`Error DB conductores: ${condError.message}`, 'error');
          showAlert('Error al cargar datos del conductor desde el servidor.');
          return;
        }

        if (!conductor) {
          logDebug('No se encontró registro en tabla conductores para este usuario.', 'warn');
          showAlert('Tu cuenta no tiene perfil de conductor registrado. Contacta al administrador.', 'warn');
          return;
        }

        conductorData = conductor;
        const nombreCompleto = `${conductor.nombres || ''} ${conductor.apellidos || ''}`.trim();
        const inicial = (conductor.nombres?.[0] || '?').toUpperCase();

        const vehiculoInfo = [];
        if (conductor.marca) vehiculoInfo.push(conductor.marca);
        if (conductor.modelo) vehiculoInfo.push(conductor.modelo);
        if (conductor.placa) vehiculoInfo.push(`Placa: ${conductor.placa}`);
        if (conductor.color) vehiculoInfo.push(conductor.color);
        const vehiculo = vehiculoInfo.join(' • ') || 'Sin vehículo registrado';

        document.getElementById('conductor-name').textContent = nombreCompleto || 'Conductor';
        document.getElementById('conductor-initial').textContent = inicial;
        document.getElementById('conductor-vehiculo').textContent = vehiculo;
        updateStatusBadge(conductor.status);

        logDebug(`Conductor: ${nombreCompleto} | Status: ${conductor.status || 'inactiva'} | Vehículo: ${vehiculo}`);

        showSection('status-card');
        showSection('plan-card');
        showSection('yappy-section');
        hideAlert();

        // Inicializar botón Yappy
        inicializarBotonYappy();

      } catch (err) {
        logDebug(`Error inesperado: ${err.message}`, 'error');
        console.error(err);
        showAlert('Error inesperado. Revisa la consola (F12) para más detalles.');
      }
    }

    // ============================================================
    // YAPPY BUTTON - Según documentación oficial
    // ============================================================
    function inicializarBotonYappy() {
      logDebug('Inicializando botón Yappy...');
      const container = document.getElementById('yappy-btn-container');

      // Crear botón Yappy oficial
      const btnYappy = document.createElement('btn-yappy');
      btnYappy.setAttribute('theme', 'brand');
      btnYappy.style.width = '100%';
      btnYappy.style.setProperty('--btn-yappy-width', '100%');

      // Evento: Click en el botón
      btnYappy.addEventListener('eventClick', async (event) => {
        logDebug('=== YAPPY eventClick ===');
        logDebug('Creando orden en backend...');

        try {
          // Llamar al backend para crear la orden (Paso 1 + Paso 2)
          const response = await fetch(RENDER_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify({
              action: 'create-order',
              urlDomain: YAPPY_DOMAIN,
              total: '5.00',
            }),
          });

          const data = await response.json();
          logDebug(`Backend response: ${response.status}`);

          if (!response.ok || data.status?.code !== '0000') {
            logDebug(`ERROR: ${data.status?.description || data.error || 'Unknown'}`, 'error');
            showAlert('Error creando orden: ' + (data.status?.description || data.error || 'Error desconocido'));
            return;
          }

          logDebug('✓ Orden creada', 'success');
          logDebug(`transactionId: ${data.body?.transactionId}`);
          logDebug(`documentName: ${data.body?.documentName}`);

          // Enviar datos al botón Yappy
          btnYappy.eventPayment({
            transactionId: data.body.transactionId,
            token: data.body.token,
            documentName: data.body.documentName,
          });

        } catch (err) {
          logDebug(`ERROR: ${err.message}`, 'error');
          showAlert('Error: ' + err.message);
        }
      });

      // Evento: Pago exitoso
      btnYappy.addEventListener('eventSuccess', async (event) => {
        logDebug('🎉 Pago exitoso', 'success');
        logDebug(`OrderID: ${event.detail?.orderId || 'N/A'}`);
        showAlert('¡Pago completado! Activando tu suscripción...', 'success');
        await activarSuscripcion();
      });

      // Evento: Error en pago
      btnYappy.addEventListener('eventError', (event) => {
        logDebug(`❌ Error: ${event.detail?.message || 'Desconocido'}`, 'error');
        showAlert('El pago fue cancelado o falló. Puedes intentar de nuevo.');
      });

      container.appendChild(btnYappy);
      logDebug('✓ Botón Yappy inicializado', 'success');
    }

    // ============================================================
    // ACTIVAR SUSCRIPCIÓN
    // ============================================================
    async function activarSuscripcion() {
      if (!authUser || !conductorData) {
        logDebug('No hay authUser o conductorData', 'error');
        return;
      }

      try {
        logDebug('Activando suscripción...');
        const ahora = new Date();
        const expiracion = new Date(ahora.getTime() + 24 * 60 * 60 * 1000);

        const { error } = await supabaseClient
          .from('conductores')
          .update({
            status: 'active',
            suscripcion_activa: true,
            pago_al_dia: true,
            fecha_ultimo_pago: ahora.toISOString(),
            proximo_pago: expiracion.toISOString(),
            fecha_vencimiento: expiracion.toISOString(),
            payment_status: 'paid',
          })
          .eq('auth_user_id', authUser.id);

        if (error) {
          logDebug(`Error DB: ${error.message}`, 'error');
          showAlert('Pago recibido, pero hubo un error activando tu cuenta. Contacta soporte.');
          return;
        }

        updateStatusBadge('active');
        logDebug(`✓ Suscripción activada hasta ${expiracion.toLocaleString('es-PA')}`, 'success');
        showAlert('¡Suscripción activada! Tienes 24 horas de servicio.', 'success');

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 3000);

      } catch (err) {
        logDebug(`Error: ${err.message}`, 'error');
      }
    }

    // ============================================================
    // AUTH LISTENERS
    // ============================================================
    supabaseClient.auth.onAuthStateChange((event, session) => {
      logDebug(`Auth event: ${event}`);
      if (event === 'SIGNED_OUT') {
        localStorage.removeItem('supabase_session');
        showAlert('Sesión cerrada. Redirigiendo al login...', 'warn');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
      }
      if (event === 'SIGNED_IN' && session) {
        localStorage.setItem('supabase_session', JSON.stringify({
          access_token: session.access_token,
          refresh_token: session.refresh_token,
          expires_at: session.expires_at,
        }));
      }
    });

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      logDebug('DOM cargado. Iniciando autenticación...');
      cargarDatosConductor();
    });
  </script>
</body>
</html>
