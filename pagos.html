<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago de Suscripción - Yappy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <!-- Yappy Button CDN -->
  <script src="https://bt-cdn.yappy.cloud/v1/cdn/web-component-btn-yappy.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 480px; }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo h1 { font-size: 1.5rem; color: var(--primary); }
    .logo p { color: var(--text-muted); font-size: 0.875rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .driver-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .driver-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: bold;
    }
    .driver-details h3 { font-size: 1.125rem; margin-bottom: 0.25rem; }
    .driver-details p { font-size: 0.875rem; color: var(--text-muted); }
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.375rem 0.75rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 600;
    }
    .status-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .status-inactive { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .vehicle-info {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
      margin-top: 1rem;
    }
    .vehicle-item {
      background: rgba(255,255,255,0.03);
      padding: 0.75rem; border-radius: 0.5rem;
    }
    .vehicle-item label {
      display: block; font-size: 0.75rem;
      color: var(--text-muted); margin-bottom: 0.25rem;
    }
    .vehicle-item span { font-size: 0.875rem; font-weight: 600; }
    .payment-summary {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0; border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    .payment-amount { font-size: 1.5rem; font-weight: 700; color: var(--success); }
    .btn-yappy-custom {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white; border: none; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.2s;
      margin-top: 1rem;
    }
    .btn-yappy-custom:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3); }
    .btn-yappy-custom:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert {
      padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem;
      display: none;
    }
    .alert-show { display: block; }
    .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .alert-warning { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: #fcd34d; }
    .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; }
    .debug-panel {
      margin-top: 1rem; padding: 1rem;
      background: #0a0f1a; border: 1px solid #1e293b;
      border-radius: 0.5rem; font-family: monospace;
      font-size: 0.75rem; max-height: 300px; overflow-y: auto;
    }
    .debug-panel h4 { color: var(--text-muted); margin-bottom: 0.5rem; }
    .debug-line { padding: 0.125rem 0; color: #64748b; }
    .debug-line.error { color: #f87171; }
    .debug-line.success { color: #34d399; }
    .debug-line.warn { color: #fbbf24; }
    .hidden { display: none !important; }
    .yappy-btn-container {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
    }
    #yappy-button {
      --yappy-btn-width: 100%;
      --yappy-btn-height: 48px;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>💳 Pago de Suscripción</h1>
      <p>Activa tu cuenta por 24 horas</p>
    </div>

    <div id="alert-box" class="alert"></div>

    <!-- Loading -->
    <div id="loading-card" class="card">
      <div style="text-align:center; padding: 2rem;">
        <div class="spinner" style="margin: 0 auto 1rem;"></div>
        <p style="color: var(--text-muted);">Cargando datos del conductor...</p>
      </div>
    </div>

    <!-- Driver Info -->
    <div id="driver-card" class="card hidden">
      <div class="card-title">👤 Información del Conductor</div>
      <div class="driver-info">
        <div class="driver-avatar" id="driver-initials">--</div>
        <div class="driver-details">
          <h3 id="driver-name">Cargando...</h3>
          <p id="driver-email">...</p>
          <span id="driver-status" class="status-badge">...</span>
        </div>
      </div>
      <div class="vehicle-info" id="vehicle-info">
        <div class="vehicle-item"><label>Marca</label><span id="v-marca">-</span></div>
        <div class="vehicle-item"><label>Modelo</label><span id="v-modelo">-</span></div>
        <div class="vehicle-item"><label>Placa</label><span id="v-placa">-</span></div>
        <div class="vehicle-item"><label>Color</label><span id="v-color">-</span></div>
      </div>
    </div>

    <!-- Payment -->
    <div id="payment-card" class="card hidden">
      <div class="card-title">💰 Resumen de Pago</div>
      <div class="payment-summary">
        <div>
          <p style="color: var(--text-muted); font-size: 0.875rem;">Suscripción 24 horas</p>
          <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Incluye todos los beneficios</p>
        </div>
        <div class="payment-amount">$5.00</div>
      </div>

      <!-- Yappy Official Button Container -->
      <div class="yappy-btn-container">
        <yappy-button id="yappy-button" style="display: none;"></yappy-button>
      </div>

      <!-- Fallback button while Yappy loads or if it fails -->
      <button id="btn-fallback" class="btn-yappy-custom" onclick="iniciarPagoDirecto()">
        <span id="btn-fallback-text">Pagar con Yappy</span>
      </button>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel">
      <h4>🐛 Debug Log</h4>
      <div id="debug-log"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const SUPABASE_URL = 'https://ugchmuhjzzyofoogprlr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4';
    const RENDER_API_URL = 'https://conductores-api.onrender.com/api/yappy';
    const YAPPY_DOMAIN = 'https://nrdesingcorp.com';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let conductorData = null;
    let authUser = null;
    let yappyOrderData = null;

    // ============================================================
    // DEBUG LOG
    // ============================================================
    function logDebug(msg, data) {
      const now = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = 'debug-line';
      if (msg.includes('ERROR')) line.className += ' error';
      if (msg.includes('✓') || msg.includes('EXITO')) line.className += ' success';
      if (msg.includes('⚠️')) line.className += ' warn';
      line.textContent = `[${now}] ${msg}` + (data ? ' ' + JSON.stringify(data).substring(0, 200) : '');
      document.getElementById('debug-log').appendChild(line);
      console.log('[YAPPY]', msg, data || '');
    }

    // ============================================================
    // ALERTS
    // ============================================================
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.className = 'alert alert-show alert-' + type;
      box.textContent = msg;
      setTimeout(() => box.classList.remove('alert-show'), 8000);
    }

    // ============================================================
    // AUTH & LOAD DRIVER
    // ============================================================
    async function cargarPagina() {
      logDebug('DOM cargado. Iniciando autenticación...');
      logDebug('Iniciando carga de página...');

      try {
        logDebug('Verificando sesión de Supabase...');
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          logDebug('Error obteniendo sesión:', sessionError.message);
          showAlert('Error de sesión: ' + sessionError.message);
          return;
        }

        if (!session) {
          logDebug('No hay sesión activa. Usuario no logueado.');
          showAlert('No has iniciado sesión. Redirigiendo al login...', 'warning');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
          return;
        }

        logDebug('Sesión encontrada. Token:', session.access_token.substring(0, 20) + '...');

        const { data: { user }, error: userError } = await supabase.auth.getUser(session.access_token);

        if (userError || !user) {
          logDebug('Error obteniendo usuario:', userError?.message || 'No user');
          showAlert('Error obteniendo usuario. Redirigiendo...');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
          return;
        }

        authUser = user;
        logDebug('Usuario autenticado:', authUser.id);
        logDebug('Email:', authUser.email);

        await cargarConductor(authUser.id);

      } catch (err) {
        logDebug('ERROR general:', err.message);
        showAlert('Error inesperado: ' + err.message);
      }
    }

    async function cargarConductor(userId) {
      logDebug('Buscando datos del conductor en tabla "conductores"...');

      try {
        const { data, error } = await supabase
          .from('conductores')
          .select('*')
          .eq('auth_user_id', userId)
          .maybeSingle();

        if (error) {
          logDebug('Error DB conductores:', error.message);
          showAlert('Error cargando datos: ' + error.message);
          return;
        }

        if (!data) {
          logDebug('No se encontró conductor para auth_user_id:', userId);
          showAlert('No tienes perfil de conductor registrado.', 'warning');
          return;
        }

        conductorData = data;
        logDebug('Conductor:', data.nombres + ' ' + data.apellidos, '| Status:', data.status, '| Vehículo:', data.marca + ' • ' + data.modelo + ' • Placa: ' + data.placa + ' • ' + data.color);

        document.getElementById('loading-card').classList.add('hidden');
        document.getElementById('driver-card').classList.remove('hidden');
        document.getElementById('payment-card').classList.remove('hidden');

        const nombreCompleto = (data.nombres || '') + ' ' + (data.apellidos || '');
        document.getElementById('driver-name').textContent = nombreCompleto.trim() || 'Sin nombre';
        document.getElementById('driver-email').textContent = authUser.email;
        document.getElementById('driver-initials').textContent = (data.nombres?.[0] || '') + (data.apellidos?.[0] || '');

        const statusEl = document.getElementById('driver-status');
        if (data.status === 'active') {
          statusEl.textContent = '● Activo';
          statusEl.className = 'status-badge status-active';
        } else {
          statusEl.textContent = '● Inactivo';
          statusEl.className = 'status-badge status-inactive';
        }

        document.getElementById('v-marca').textContent = data.marca || '-';
        document.getElementById('v-modelo').textContent = data.modelo || '-';
        document.getElementById('v-placa').textContent = data.placa || '-';
        document.getElementById('v-color').textContent = data.color || '-';

        // Setup Yappy button events
        setupYappyButton();

      } catch (err) {
        logDebug('ERROR cargando conductor:', err.message);
        showAlert('Error: ' + err.message);
      }
    }

    // ============================================================
    // YAPPY BUTTON OFFICIAL INTEGRATION
    // ============================================================
    function setupYappyButton() {
      logDebug('Configurando botón oficial de Yappy...');

      const yappyBtn = document.getElementById('yappy-button');

      // Listen for Yappy button click
      yappyBtn.addEventListener('eventClick', async (event) => {
        logDebug('Yappy button clicked - creating order...');

        try {
          // Call our backend to create the order
          const orderId = 'R' + Date.now().toString(36).toUpperCase();
          const response = await fetch(RENDER_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify({
              action: 'create-order',
              urlDomain: YAPPY_DOMAIN,
              orderId: orderId,
              total: '5.00',
            }),
          });

          const data = await response.json();

          if (!response.ok || data.status?.code !== '0000') {
            logDebug('ERROR creating order:', data.error || data.status?.description);
            showAlert('Error creando orden: ' + (data.error || data.status?.description));

            // Hide Yappy button, show fallback
            yappyBtn.style.display = 'none';
            document.getElementById('btn-fallback').style.display = 'block';
            return;
          }

          logDebug('✓ Order created, sending to Yappy button...');
          logDebug('transactionId:', data.body?.transactionId);

          // Send payment data to Yappy button
          yappyBtn.eventPayment({
            transactionId: data.body.transactionId,
            token: data.body.token,
            documentName: data.body.documentName,
          });

        } catch (err) {
          logDebug('ERROR in eventClick:', err.message);
          showAlert('Error: ' + err.message);
        }
      });

      // Listen for success
      yappyBtn.addEventListener('eventSuccess', async (event) => {
        logDebug('✓ Yappy payment SUCCESS');
        logDebug('Payment data:', event.detail);

        showAlert('¡Pago exitoso! Activando suscripción...', 'success');
        await actualizarEstadoPago();

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 3000);
      });

      // Listen for errors
      yappyBtn.addEventListener('eventError', (event) => {
        logDebug('ERROR Yappy payment:', event.detail);
        showAlert('Error en el pago: ' + JSON.stringify(event.detail));
      });

      // Check if Yappy is online
      yappyBtn.addEventListener('isYappyOnline', (event) => {
        logDebug('Yappy online status:', event.detail);
        if (event.detail === true) {
          yappyBtn.style.display = 'block';
          document.getElementById('btn-fallback').style.display = 'none';
        } else {
          yappyBtn.style.display = 'none';
          document.getElementById('btn-fallback').style.display = 'block';
        }
      });
    }

    // ============================================================
    // FALLBACK: Direct API call (if button fails)
    // ============================================================
    async function iniciarPagoDirecto() {
      const btn = document.getElementById('btn-fallback');
      const btnText = document.getElementById('btn-fallback-text');
      btn.disabled = true;
      btnText.innerHTML = '<div class="spinner"></div> Procesando...';

      logDebug('=== INICIANDO PAGO DIRECTO (fallback) ===');

      try {
        const orderId = 'R' + Date.now().toString(36).toUpperCase();
        logDebug('Creando orden...');
        logDebug('POST ' + RENDER_API_URL + ' | action=create-order');

        const response = await fetch(RENDER_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          body: JSON.stringify({
            action: 'create-order',
            urlDomain: YAPPY_DOMAIN,
            orderId: orderId,
            total: '5.00',
          }),
        });

        const data = await response.json();
        logDebug('Status:', response.status);
        logDebug('Response:', JSON.stringify(data).substring(0, 300));

        if (!response.ok) {
          throw new Error(data.error || data.details?.description || 'Error creando orden');
        }

        if (data.status?.code !== '0000') {
          throw new Error(data.status?.description || 'Error en respuesta de Yappy');
        }

        logDebug('✓ Orden creada');
        logDebug('transactionId:', data.body?.transactionId);
        logDebug('documentName:', data.body?.documentName);

        // If we get here, we have a valid order but the button didn't work
        // Try to redirect to Yappy payment URL or show QR
        if (data.body?.documentName) {
          // Open Yappy payment URL
          window.open(data.body.documentName, '_blank');
          showAlert('Se abrió Yappy en una nueva pestaña. Completa el pago allí.', 'warning');
        } else {
          await actualizarEstadoPago();
          showAlert('¡Pago exitoso!', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
        }

      } catch (err) {
        logDebug('ERROR:', err.message);
        showAlert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Pagar con Yappy';
      }
    }

    // ============================================================
    // UPDATE PAYMENT STATUS
    // ============================================================
    async function actualizarEstadoPago() {
      if (!conductorData || !authUser) return;

      logDebug('Actualizando estado de pago en Supabase...');

      const ahora = new Date();
      const proximoPago = new Date(ahora.getTime() + 24 * 60 * 60 * 1000);

      try {
        const { error } = await supabase
          .from('conductores')
          .update({
            status: 'active',
            suscripcion_activa: true,
            pago_al_dia: true,
            fecha_ultimo_pago: ahora.toISOString(),
            proximo_pago: proximoPago.toISOString(),
            fecha_vencimiento: proximoPago.toISOString(),
            payment_status: 'paid',
          })
          .eq('auth_user_id', authUser.id);

        if (error) {
          logDebug('Error actualizando estado:', error.message);
        } else {
          logDebug('✓ Estado actualizado. Suscripción activa hasta:', proximoPago.toLocaleString());
        }
      } catch (err) {
        logDebug('ERROR actualizando estado:', err.message);
      }
    }

    // ============================================================
    // LISTENERS
    // ============================================================
    supabase.auth.onAuthStateChange((event, session) => {
      logDebug('Auth event:', event);
      if (event === 'SIGNED_OUT') {
        window.location.href = 'dashboard.html';
      }
    });

    document.addEventListener('DOMContentLoaded', cargarPagina);
  </script>
</body>
</html>
