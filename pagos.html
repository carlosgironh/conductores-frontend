<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos - Panel de Conductor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #ca8a04;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 520px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header p { color: var(--text-muted); margin-top: 4px; }

    /* ─── Alertas ─── */
    .alert {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.9375rem;
      line-height: 1.5;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }
    .alert.show { display: flex; }
    .alert-error { background: rgba(220,38,38,0.12); color: #fca5a5; border: 1px solid rgba(220,38,38,0.25); }
    .alert-warn  { background: rgba(202,138,4,0.12); color: #fde047; border: 1px solid rgba(202,138,4,0.25); }
    .alert-info  { background: rgba(37,99,235,0.12); color: #93c5fd; border: 1px solid rgba(37,99,235,0.25); }
    .alert-success { background: rgba(22,163,74,0.12); color: #86efac; border: 1px solid rgba(22,163,74,0.25); }

    /* ─── Tarjeta de estado ─── */
    .status-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .status-label { color: var(--text-muted); font-size: 0.875rem; }
    .status-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge.activa { background: rgba(22,163,74,0.2); color: #4ade80; }
    .status-badge.inactiva { background: rgba(220,38,38,0.2); color: #f87171; }
    .status-badge.pendiente { background: rgba(202,138,4,0.2); color: #facc15; }

    .conductor-info {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0 0;
      border-top: 1px solid var(--border);
    }
    .conductor-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 700;
      flex-shrink: 0;
    }
    .conductor-details h3 { font-size: 1.05rem; font-weight: 600; }
    .conductor-details p { color: var(--text-muted); font-size: 0.875rem; margin-top: 2px; }

    /* ─── Plan de pago ─── */
    .plan-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .plan-price {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .plan-price span { font-size: 1.1rem; font-weight: 500; -webkit-text-fill-color: #94a3b8; }
    .plan-period { color: var(--text-muted); margin-top: 10px; font-size: 0.9375rem; }
    .plan-features {
      list-style: none;
      margin: 22px 0 0;
      text-align: left;
    }
    .plan-features li {
      padding: 9px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(71,85,105,0.3);
    }
    .plan-features li:last-child { border-bottom: none; }
    .plan-features li::before {
      content: "✓";
      color: var(--success);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ─── Botón Yappy ─── */
    .yappy-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .yappy-section h3 { margin-bottom: 16px; font-size: 1.125rem; }
    #yappy-btn-container {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-yappy-fallback {
      background: linear-gradient(135deg, #00a3e0, #0077b6);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      justify-content: center;
    }
    .btn-yappy-fallback:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,163,224,0.3);
    }
    .btn-yappy-fallback:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ─── Debug Panel ─── */
    .debug-panel {
      background: #020617;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid #1e293b;
    }
    .debug-panel h4 {
      color: #64748b;
      margin-bottom: 10px;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: sticky;
      top: 0;
      background: #020617;
      padding-bottom: 6px;
    }
    .debug-line {
      padding: 2px 0;
      color: #94a3b8;
      word-break: break-all;
      line-height: 1.4;
    }
    .debug-line.error { color: #f87171; }
    .debug-line.success { color: #4ade80; }
    .debug-line.warn { color: #facc15; }
    .debug-line.info { color: #93c5fd; }

    /* ─── Loading / Spinner ─── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      body { padding: 12px; }
      .plan-price { font-size: 2.6rem; }
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>💳 Pagos</h1>
      <p>Gestiona tu suscripción de conductor</p>
    </div>

    <!-- Alertas -->
    <div id="alert-box" class="alert"></div>

    <!-- Estado de suscripción -->
    <div class="status-card" id="status-card" style="display:none;">
      <div class="status-header">
        <span class="status-label">Estado de suscripción</span>
        <span id="status-badge" class="status-badge inactiva">—</span>
      </div>
      <div class="conductor-info">
        <div class="conductor-avatar" id="conductor-initial">?</div>
        <div class="conductor-details">
          <h3 id="conductor-name">Cargando...</h3>
          <p id="conductor-vehiculo">—</p>
        </div>
      </div>
    </div>

    <!-- Plan -->
    <div class="plan-card" id="plan-card" style="display:none;">
      <div class="plan-price">$5.00 <span>/ 24h</span></div>
      <p class="plan-period">Activación por 24 horas de servicio</p>
      <ul class="plan-features">
        <li>Acceso al panel de viajes</li>
        <li>Notificaciones en tiempo real</li>
        <li>Soporte prioritario</li>
        <li>Historial de viajes</li>
      </ul>
    </div>

    <!-- Botón Yappy -->
    <div class="yappy-section" id="yappy-section" style="display:none;">
      <h3>Pagar con Yappy</h3>
      <div id="yappy-btn-container">
        <button id="btn-pagar-yappy" class="btn-yappy-fallback" onclick="iniciarFlujoYappy()">
          <span id="btn-text">Pagar $5.00 con Yappy</span>
        </button>
      </div>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel">
      <h4>🐛 Debug Log</h4>
      <div id="debug-log"></div>
    </div>
  </div>

  <!-- ============================================================
       CONFIGURACIÓN Y LÓGICA
       ============================================================ -->
  <script>
    // ─── Supabase ───
    const SUPABASE_URL = 'https://ugchmuhjzzyofoogprlr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY0MTEyNjUsImV4cCI6MjA1MTk4NzI2NX0.0t3L5I3n9k2v3v4v5v6v7v8v9v0v1v2v3v4v5v6v7v8v9v0v1v2v3v4v5';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── API de Render (reemplaza Edge Function de Supabase) ───
    const RENDER_API_URL = 'https://conductores-api.onrender.com/api/yappy';

    // ─── Configuración Yappy ───
    const YAPPY_DOMAIN = 'https://nrdesingcorp.com';

    // ─── Estado global ───
    let conductorData = null;
    let authUser = null;
    let authReady = false;
    let yappyToken = null;
    let yappyEpochTime = null;

    // ============================================================
    // DEBUG
    // ============================================================
    function logDebug(msg, type = 'info') {
      const log = document.getElementById('debug-log');
      const time = new Date().toLocaleTimeString('es-PA', { hour12: false });
      const line = document.createElement('div');
      line.className = `debug-line ${type}`;
      line.textContent = `[${time}] ${msg}`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
      console.log(`[YAPPY] ${msg}`);
    }

    // ============================================================
    // ALERTAS UI
    // ============================================================
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.className = `alert alert-${type} show`;
      box.textContent = msg;
    }
    function hideAlert() {
      document.getElementById('alert-box').classList.remove('show');
    }

    // ============================================================
    // UI HELPERS
    // ============================================================
    function setBtnLoading(loading) {
      const btn = document.getElementById('btn-pagar-yappy');
      const text = document.getElementById('btn-text');
      if (loading) {
        btn.disabled = true;
        text.innerHTML = '<span class="spinner"></span> Procesando...';
      } else {
        btn.disabled = false;
        text.textContent = 'Pagar $5.00 con Yappy';
      }
    }

    function updateStatusBadge(status) {
      const badge = document.getElementById('status-badge');
      badge.className = 'status-badge';
      if (status === 'activa') {
        badge.classList.add('activa');
        badge.textContent = 'Activa';
      } else if (status === 'pendiente') {
        badge.classList.add('pendiente');
        badge.textContent = 'Pendiente';
      } else {
        badge.classList.add('inactiva');
        badge.textContent = 'Inactiva';
      }
    }

    function showSection(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = '';
    }

    // ============================================================
    // AUTH & DATOS DEL CONDUCTOR
    // ============================================================
    async function restaurarSesionDesdeStorage() {
      try {
        const raw = localStorage.getItem('supabase_session');
        if (!raw) return false;
        const stored = JSON.parse(raw);
        if (!stored.access_token) return false;

        logDebug('Intentando restaurar sesión desde localStorage...');
        const { data, error } = await supabaseClient.auth.setSession({
          access_token: stored.access_token,
          refresh_token: stored.refresh_token,
        });

        if (error || !data.session) {
          localStorage.removeItem('supabase_session');
          return false;
        }

        logDebug('✓ Sesión restaurada desde localStorage');
        return true;
      } catch (e) {
        localStorage.removeItem('supabase_session');
        return false;
      }
    }

    async function cargarDatosConductor() {
      logDebug('Iniciando carga de página...');

      try {
        // ─── PASO 1: Obtener sesión ───
        logDebug('Verificando sesión de Supabase...');
        let { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();

        // Si no hay sesión en cookies, intentar restaurar desde localStorage
        if (!sessionData?.session) {
          const restored = await restaurarSesionDesdeStorage();
          if (restored) {
            const refreshed = await supabaseClient.auth.getSession();
            sessionData = refreshed.data;
            sessionError = refreshed.error;
          }
        }

        if (sessionError) {
          logDebug(`Error de sesión: ${sessionError.message}`, 'error');
          showAlert('Error al verificar sesión. Intenta recargar la página.');
          return;
        }

        if (!sessionData?.session) {
          logDebug('No hay sesión activa. Usuario no logueado.', 'warn');
          showAlert('No has iniciado sesión. Redirigiendo al login...', 'warn');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
          return;
        }

        const accessToken = sessionData.session.access_token;
        logDebug(`Sesión encontrada. Token: ${accessToken.slice(0, 16)}...`);

        // ─── PASO 2: Obtener usuario ───
        const { data: userData, error: userError } = await supabaseClient.auth.getUser(accessToken);

        if (userError || !userData?.user) {
          logDebug(`Error obteniendo usuario: ${userError?.message || 'Sin usuario'}`, 'error');
          showAlert('Sesión inválida o expirada. Por favor inicia sesión de nuevo.', 'warn');
          localStorage.removeItem('supabase_session');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
          return;
        }

        authUser = userData.user;
        authReady = true;
        logDebug(`Usuario autenticado: ${authUser.id}`);
        logDebug(`Email: ${authUser.email || 'N/A'}`);

        // ─── PASO 3: Buscar conductor ───
        logDebug('Buscando datos del conductor en tabla "conductores"...');
        const { data: conductor, error: condError } = await supabaseClient
          .from('conductores')
          .select('nombres, apellidos, status, vehiculo, modelo, marca, celular, auth_user_id')
          .eq('auth_user_id', authUser.id)
          .maybeSingle();

        if (condError) {
          logDebug(`Error DB conductores: ${condError.message}`, 'error');
          showAlert('Error al cargar datos del conductor desde el servidor.');
          return;
        }

        if (!conductor) {
          logDebug('No se encontró registro en tabla conductores para este usuario.', 'warn');
          showAlert('Tu cuenta no tiene perfil de conductor registrado. Contacta al administrador.', 'warn');
          return;
        }

        conductorData = conductor;
        const nombreCompleto = `${conductor.nombres || ''} ${conductor.apellidos || ''}`.trim();
        const inicial = (conductor.nombres?.[0] || '?').toUpperCase();
        const vehiculo = `${conductor.marca || ''} ${conductor.modelo || ''} ${conductor.vehiculo || ''}`.trim() || 'Sin vehículo registrado';

        document.getElementById('conductor-name').textContent = nombreCompleto || 'Conductor';
        document.getElementById('conductor-initial').textContent = inicial;
        document.getElementById('conductor-vehiculo').textContent = vehiculo;
        updateStatusBadge(conductor.status);

        logDebug(`Conductor: ${nombreCompleto} | Status: ${conductor.status || 'inactiva'} | Vehículo: ${vehiculo}`);

        // Mostrar secciones
        showSection('status-card');
        showSection('plan-card');
        showSection('yappy-section');
        hideAlert();

      } catch (err) {
        logDebug(`Error inesperado en cargarDatosConductor: ${err.message}`, 'error');
        console.error(err);
        showAlert('Error inesperado. Revisa la consola (F12) para más detalles.');
      }
    }

    // ============================================================
    // YAPPY API v2 — Usando Render (NO Supabase Edge Functions)
    // ============================================================

    // ─── PASO 1: Validar comercio ───
    async function yappyValidarComercio() {
      logDebug('=== INICIANDO FLUJO YAPPY V2 ===', 'info');
      logDebug('Paso 1/3: Validando comercio...');
      logDebug(`POST ${RENDER_API_URL} | action=validate`);

      const response = await fetch(RENDER_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({
          action: 'validate',
          urlDomain: YAPPY_DOMAIN,
        }),
      });

      const data = await response.json();
      logDebug(`HTTP ${response.status} | Respuesta: ${JSON.stringify(data).slice(0, 200)}...`);

      if (!response.ok) {
        throw new Error(data.error || data.message || `Error HTTP ${response.status}`);
      }

      if (data.status?.code !== '0000') {
        throw new Error(data.status?.description || 'Yappy rechazó la validación del comercio');
      }

      const token = data.body?.token;
      const epochTime = data.epochTime;

      if (!token) {
        throw new Error('No se recibió token de Yappy en la respuesta');
      }

      logDebug(`✓ Token obtenido | epochTime: ${epochTime}`, 'success');
      return { token, epochTime };
    }

    // ─── PASO 2: Crear orden ───
    async function yappyCrearOrden(token, epochTime) {
      logDebug('Paso 2/3: Creando orden de pago...');

      const orderId = `R${Date.now().toString(36).toUpperCase()}`;
      const paymentDate = String(epochTime);

      logDebug(`orderId: ${orderId} (len=${orderId.length})`);
      logDebug(`paymentDate: ${paymentDate}`);

      const response = await fetch(RENDER_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({
          action: 'payment',
          yappyToken: token,
          orderId: orderId,
          domain: YAPPY_DOMAIN,
          paymentDate: paymentDate,
          aliasYappy: '',
          ipnUrl: `${YAPPY_DOMAIN}/yappy-ipn`,
          discount: '0.00',
          taxes: '0.00',
          subtotal: '5.00',
          total: '5.00',
        }),
      });

      const data = await response.json();
      logDebug(`HTTP ${response.status} | Respuesta: ${JSON.stringify(data).slice(0, 300)}...`);

      if (!response.ok) {
        throw new Error(data.error || data.message || `Error HTTP ${response.status}`);
      }

      if (data.status?.code !== '0000') {
        throw new Error(data.status?.description || 'Yappy rechazó la creación de la orden');
      }

      logDebug('✓ Orden creada exitosamente', 'success');
      return {
        transactionId: data.body?.transactionId,
        token: data.body?.token,
        documentName: data.body?.documentName,
      };
    }

    // ─── PASO 3: Renderizar botón Yappy ───
    async function renderizarBotonYappy({ transactionId, token, documentName }) {
      logDebug('Paso 3/3: Renderizando botón Yappy...');
      const container = document.getElementById('yappy-btn-container');

      try {
        await import('https://bt-cdn.yappy.cloud/v1/cdn/web-component-btn-yappy.js');

        container.innerHTML = `
          <btn-yappy
            id="btn-yappy-wc"
            data-order-id="${transactionId}"
            data-token="${token}"
            data-document-name="${documentName || ''}"
            style="--btn-yappy-width: 100%;"
          ></btn-yappy>
        `;

        const btnYappy = document.getElementById('btn-yappy-wc');

        btnYappy.addEventListener('payment', (e) => {
          logDebug('🎉 Evento payment recibido del botón Yappy', 'success');
          logDebug(`OrderID: ${e.detail?.orderId || 'N/A'}`, 'success');
          showAlert('¡Pago completado! Activando tu suscripción...', 'success');
          activarSuscripcion(e.detail);
        });

        btnYappy.addEventListener('error', (e) => {
          logDebug(`❌ Evento error del botón Yappy: ${e.detail?.message || 'Desconocido'}`, 'error');
          showAlert('El pago fue cancelado o falló. Puedes intentar de nuevo.');
          setBtnLoading(false);
        });

        logDebug('✓ Botón Yappy renderizado correctamente', 'success');

      } catch (err) {
        logDebug(`Error cargando Web Component Yappy: ${err.message}`, 'error');
        // Fallback: dejar el botón original pero con mensaje
        container.innerHTML = `
          <button class="btn-yappy-fallback" onclick="window.open('https://yappy.com.pa','_blank')">
            ⚠️ Abrir Yappy manualmente
          </button>
        `;
        showAlert('No se pudo cargar el botón Yappy. Usa la app manualmente.', 'warn');
      }
    }

    // ─── Activar suscripción tras pago exitoso ───
    async function activarSuscripcion(paymentDetail) {
      if (!authUser || !conductorData) {
        logDebug('No hay authUser o conductorData para activar suscripción', 'error');
        return;
      }

      try {
        logDebug('Activando suscripción en base de datos...');

        const ahora = new Date();
        const expiracion = new Date(ahora.getTime() + 24 * 60 * 60 * 1000);

        const { error } = await supabaseClient
          .from('conductores')
          .update({
            status: 'activa',
            fecha_activacion: ahora.toISOString(),
            fecha_expiracion: expiracion.toISOString(),
            yappy_order_id: paymentDetail?.orderId || null,
            yappy_transaction_id: paymentDetail?.transactionId || null,
          })
          .eq('auth_user_id', authUser.id);

        if (error) {
          logDebug(`Error DB al activar: ${error.message}`, 'error');
          showAlert('Pago recibido, pero hubo un error activando tu cuenta. Contacta soporte.');
          return;
        }

        updateStatusBadge('activa');
        logDebug(`✓ Suscripción activada hasta ${expiracion.toLocaleString('es-PA')}`, 'success');
        showAlert('¡Suscripción activada! Tienes 24 horas de servicio.', 'success');

      } catch (err) {
        logDebug(`Error inesperado activando: ${err.message}`, 'error');
      }
    }

    // ─── Flujo completo Yappy ───
    async function iniciarFlujoYappy() {
      if (!authReady || !conductorData) {
        showAlert('Datos del conductor no cargados. Espera un momento o recarga la página.');
        return;
      }

      setBtnLoading(true);
      hideAlert();

      try {
        // Paso 1
        const { token, epochTime } = await yappyValidarComercio();
        yappyToken = token;
        yappyEpochTime = epochTime;

        // Paso 2
        const orden = await yappyCrearOrden(token, epochTime);

        // Paso 3
        await renderizarBotonYappy(orden);

      } catch (err) {
        logDebug(`ERROR FLUJO YAPPY: ${err.message}`, 'error');
        showAlert(err.message || 'Error en el proceso de pago. Intenta de nuevo.');
        setBtnLoading(false);
      }
    }

    // ============================================================
    // LISTENER DE CAMBIOS DE AUTH
    // ============================================================
    supabaseClient.auth.onAuthStateChange((event, session) => {
      logDebug(`Auth event: ${event}`);
      if (event === 'SIGNED_OUT') {
        localStorage.removeItem('supabase_session');
        showAlert('Sesión cerrada. Redirigiendo al login...', 'warn');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      }
      if (event === 'SIGNED_IN' && session) {
        localStorage.setItem('supabase_session', JSON.stringify({
          access_token: session.access_token,
          refresh_token: session.refresh_token,
          expires_at: session.expires_at,
        }));
      }
    });

    // ============================================================
    // INICIALIZACIÓN SEGURA
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      logDebug('DOM cargado. Iniciando autenticación...');
      cargarDatosConductor();
    });
  </script>
</body>
</html>
