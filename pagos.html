<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos - Panel de Conductor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #ca8a04;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header p { color: var(--text-muted); margin-top: 4px; }

    /* ─── Tarjeta de estado ─── */
    .status-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .status-label { color: var(--text-muted); font-size: 0.875rem; }
    .status-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge.activa { background: rgba(22,163,74,0.2); color: #4ade80; }
    .status-badge.inactiva { background: rgba(220,38,38,0.2); color: #f87171; }
    .status-badge.pendiente { background: rgba(202,138,4,0.2); color: #facc15; }

    .conductor-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .conductor-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 700;
    }
    .conductor-details h3 { font-size: 1rem; font-weight: 600; }
    .conductor-details p { color: var(--text-muted); font-size: 0.875rem; }

    /* ─── Plan de pago ─── */
    .plan-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .plan-price {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .plan-price span { font-size: 1rem; font-weight: 500; }
    .plan-period { color: var(--text-muted); margin-top: 8px; font-size: 0.9375rem; }
    .plan-features {
      list-style: none;
      margin: 20px 0;
      text-align: left;
    }
    .plan-features li {
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .plan-features li::before {
      content: "✓";
      color: var(--success);
      font-weight: 700;
    }

    /* ─── Botón Yappy ─── */
    .yappy-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .yappy-section h3 { margin-bottom: 16px; font-size: 1.125rem; }
    #yappy-btn-container {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-yappy-fallback {
      background: linear-gradient(135deg, #00a3e0, #0077b6);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-yappy-fallback:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,163,224,0.3);
    }
    .btn-yappy-fallback:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Debug Panel ─── */
    .debug-panel {
      background: #020617;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.75rem;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #1e293b;
    }
    .debug-panel h4 {
      color: #64748b;
      margin-bottom: 8px;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .debug-line {
      padding: 2px 0;
      color: #94a3b8;
      word-break: break-all;
    }
    .debug-line.error { color: #f87171; }
    .debug-line.success { color: #4ade80; }
    .debug-line.warn { color: #facc15; }

    /* ─── Loading / Spinner ─── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Alertas ─── */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.875rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
    .alert-success { background: rgba(22,163,74,0.15); color: #4ade80; border: 1px solid rgba(22,163,74,0.3); }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      body { padding: 12px; }
      .plan-price { font-size: 2.5rem; }
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>💳 Pagos</h1>
      <p>Gestiona tu suscripción del conductor</p>
    </div>

    <!-- Alertas -->
    <div id="alert-box" class="alert"></div>

    <!-- Estado de suscripción -->
    <div class="status-card">
      <div class="status-header">
        <span class="status-label">Estado de suscripción</span>
        <span id="status-badge" class="status-badge inactiva">Cargando...</span>
      </div>
      <div class="conductor-info">
        <div class="conductor-avatar" id="conductor-initial">?</div>
        <div class="conductor-details">
          <h3 id="conductor-name">Cargando...</h3>
          <p id="conductor-vehiculo">—</p>
        </div>
      </div>
    </div>

    <!-- Plan -->
    <div class="plan-card">
      <div class="plan-price">$5.00 <span>/ 24h</span></div>
      <p class="plan-period">Activación por 24 horas de servicio</p>
      <ul class="plan-features">
        <li>Acceso al panel de viajes</li>
        <li>Notificaciones en tiempo real</li>
        <li>Soporte prioritario</li>
        <li>Historial de viajes</li>
      </ul>
    </div>

    <!-- Botón Yappy -->
    <div class="yappy-section">
      <h3>Pagar con Yappy</h3>
      <div id="yappy-btn-container">
        <button id="btn-pagar-yappy" class="btn-yappy-fallback" onclick="iniciarFlujoYappy()">
          <span id="btn-text">Pagar $5.00 con Yappy</span>
        </button>
      </div>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel">
      <h4>🐛 Debug Log</h4>
      <div id="debug-log"></div>
    </div>
  </div>

  <!-- ============================================================
       CONFIGURACIÓN
       ============================================================ -->
  <script>
    // ─── Supabase ───
    const SUPABASE_URL = 'https://ugchmuhjzzyofoogprlr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY0MTEyNjUsImV4cCI6MjA1MTk4NzI2NX0.0t3L5I3n9k2v3v4v5v6v7v8v9v0v1v2v3v4v5v6v7v8v9v0v1v2v3v4v5';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── API de Render (reemplaza Edge Function de Supabase) ───
    const RENDER_API_URL = 'https://conductores-api.onrender.com/api/yappy';

    // ─── Configuración Yappy ───
    const YAPPY_DOMAIN = 'https://nrdesingcorp.com';

    // ─── Estado ───
    let conductorData = null;
    let authUser = null;
    let yappyToken = null;
    let yappyEpochTime = null;

    // ============================================================
    // DEBUG
    // ============================================================
    function logDebug(msg, type = 'info') {
      const log = document.getElementById('debug-log');
      const time = new Date().toLocaleTimeString('es-PA', { hour12: false });
      const line = document.createElement('div');
      line.className = `debug-line ${type}`;
      line.textContent = `[${time}] ${msg}`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
      console.log(`[YAPPY] ${msg}`);
    }

    // ============================================================
    // ALERTAS
    // ============================================================
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.className = `alert alert-${type} show`;
      box.textContent = msg;
      setTimeout(() => box.classList.remove('show'), 5000);
    }

    // ============================================================
    // UI HELPERS
    // ============================================================
    function setBtnLoading(loading) {
      const btn = document.getElementById('btn-pagar-yappy');
      const text = document.getElementById('btn-text');
      if (loading) {
        btn.disabled = true;
        text.innerHTML = '<div class="spinner" style="display:inline-block;margin-right:8px;"></div> Procesando...';
      } else {
        btn.disabled = false;
        text.textContent = 'Pagar $5.00 con Yappy';
      }
    }

    function updateStatusBadge(status) {
      const badge = document.getElementById('status-badge');
      badge.className = 'status-badge';
      if (status === 'activa') {
        badge.classList.add('activa');
        badge.textContent = 'Activa';
      } else if (status === 'pendiente') {
        badge.classList.add('pendiente');
        badge.textContent = 'Pendiente';
      } else {
        badge.classList.add('inactiva');
        badge.textContent = 'Inactiva';
      }
    }

    // ============================================================
    // AUTH & DATOS DEL CONDUCTOR
    // ============================================================
    async function cargarDatosConductor() {
      logDebug('Página de pagos cargada');

      try {
        const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
        if (authError || !user) {
          logDebug('Usuario no autenticado', 'error');
          showAlert('Debes iniciar sesión para acceder a pagos');
          setTimeout(() => window.location.href = 'login.html', 2000);
          return;
        }

        authUser = user;
        logDebug(`Usuario autenticado: ${user.id.slice(0, 12)}...`);

        logDebug('Cargando datos del conductor...');
        const { data: conductor, error: condError } = await supabaseClient
          .from('conductores')
          .select('nombres, apellidos, status, vehiculo, modelo, marca, celular')
          .eq('auth_user_id', user.id)
          .single();

        if (condError) {
          logDebug(`Error cargando conductor: ${condError.message}`, 'error');
          showAlert('Error cargando datos del conductor');
          return;
        }

        conductorData = conductor;
        const nombreCompleto = `${conductor.nombres || ''} ${conductor.apellidos || ''}`.trim();
        const inicial = (conductor.nombres?.[0] || '?').toUpperCase();
        const vehiculo = `${conductor.marca || ''} ${conductor.modelo || ''} ${conductor.vehiculo || ''}`.trim() || 'Sin vehículo registrado';

        document.getElementById('conductor-name').textContent = nombreCompleto || 'Conductor';
        document.getElementById('conductor-initial').textContent = inicial;
        document.getElementById('conductor-vehiculo').textContent = vehiculo;
        updateStatusBadge(conductor.status);

        logDebug(`Conductor: ${nombreCompleto}, Suscripción: ${conductor.status || 'inactiva'}`);

      } catch (err) {
        logDebug(`Error inesperado: ${err.message}`, 'error');
        showAlert('Error inesperado al cargar datos');
      }
    }

    // ============================================================
    // YAPPY API v2 — Usando Render (NO Supabase Edge Functions)
    // ============================================================

    // ─── PASO 1: Validar comercio ───
    async function yappyValidarComercio() {
      logDebug('=== INICIANDO FLUJO YAPPY V2 ===');
      logDebug('Paso 1/3: Validando comercio...');
      logDebug(`POST ${RENDER_API_URL} (action=validate)`);

      const response = await fetch(RENDER_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({
          action: 'validate',
          urlDomain: YAPPY_DOMAIN,
        }),
      });

      const data = await response.json();
      logDebug(`Status: ${response.status}`);
      logDebug(`Raw: ${JSON.stringify(data)}`);

      if (!response.ok || data.status?.code !== '0000') {
        throw new Error(data.status?.description || data.error || 'Error validando comercio');
      }

      const token = data.body?.token;
      const epochTime = data.epochTime;

      if (!token) {
        throw new Error('No se recibió token de Yappy');
      }

      logDebug(`✓ Token obtenido, epochTime: ${epochTime}`, 'success');
      return { token, epochTime };
    }

    // ─── PASO 2: Crear orden ───
    async function yappyCrearOrden(token, epochTime) {
      logDebug('Paso 2/3: Creando orden...');

      const orderId = `R${Date.now().toString(36).toUpperCase()}`;
      const paymentDate = String(epochTime);

      logDebug(`POST ${RENDER_API_URL} (action=payment)`);
      logDebug(`orderId: ${orderId} (len=${orderId.length})`);
      logDebug(`paymentDate: ${paymentDate} (from epochTime)`);

      const response = await fetch(RENDER_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({
          action: 'payment',
          yappyToken: token,
          orderId: orderId,
          domain: YAPPY_DOMAIN,
          paymentDate: paymentDate,
          aliasYappy: '',
          ipnUrl: `${YAPPY_DOMAIN}/yappy-ipn`,
          discount: '0.00',
          taxes: '0.00',
          subtotal: '5.00',
          total: '5.00',
        }),
      });

      const data = await response.json();
      logDebug(`Status: ${response.status}`);
      logDebug(`Raw: ${JSON.stringify(data)}`);

      if (!response.ok || data.status?.code !== '0000') {
        throw new Error(data.status?.description || data.error || 'Error creando orden');
      }

      logDebug('✓ Orden creada exitosamente', 'success');
      return {
        transactionId: data.body?.transactionId,
        token: data.body?.token,
        documentName: data.body?.documentName,
      };
    }

    // ─── PASO 3: Renderizar botón Yappy ───
    async function renderizarBotonYappy({ transactionId, token, documentName }) {
      logDebug('Paso 3/3: Renderizando botón Yappy...');

      const container = document.getElementById('yappy-btn-container');

      try {
        // Cargar el Web Component de Yappy dinámicamente
        await import('https://bt-cdn.yappy.cloud/v1/cdn/web-component-btn-yappy.js');

        container.innerHTML = `
          <btn-yappy
            id="btn-yappy-wc"
            data-order-id="${transactionId}"
            data-token="${token}"
            data-document-name="${documentName || ''}"
            style="--btn-yappy-width: 100%;"
          ></btn-yappy>
        `;

        const btnYappy = document.getElementById('btn-yappy-wc');

        btnYappy.addEventListener('payment', (e) => {
          logDebug('🎉 Pago completado exitosamente', 'success');
          logDebug(`OrderID: ${e.detail?.orderId || 'N/A'}`);
          showAlert('¡Pago completado! Tu suscripción está siendo activada.', 'success');
          // Aquí puedes llamar a tu backend para activar la suscripción
          activarSuscripcion(e.detail);
        });

        btnYappy.addEventListener('error', (e) => {
          logDebug(`❌ Error en pago Yappy: ${e.detail?.message || 'Desconocido'}`, 'error');
          showAlert('El pago fue cancelado o falló. Intenta de nuevo.');
        });

        logDebug('✓ Botón Yappy renderizado', 'success');

      } catch (err) {
        logDebug(`Error cargando Web Component: ${err.message}`, 'error');
        // Fallback: mantener el botón manual
        container.innerHTML = `
          <button class="btn-yappy-fallback" onclick="window.open('https://yappy.com.pa','_blank')">
            Abrir Yappy App
          </button>
        `;
      }
    }

    // ─── Activar suscripción tras pago exitoso ───
    async function activarSuscripcion(paymentDetail) {
      try {
        logDebug('Activando suscripción en base de datos...');

        const { error } = await supabaseClient
          .from('conductores')
          .update({
            status: 'activa',
            fecha_activacion: new Date().toISOString(),
            fecha_expiracion: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
            yappy_order_id: paymentDetail?.orderId || null,
          })
          .eq('auth_user_id', authUser.id);

        if (error) {
          logDebug(`Error activando: ${error.message}`, 'error');
          showAlert('Pago recibido pero error activando. Contacta soporte.');
          return;
        }

        updateStatusBadge('activa');
        logDebug('✓ Suscripción activada por 24h', 'success');
        showAlert('¡Suscripción activada! Tienes 24h de servicio.', 'success');

      } catch (err) {
        logDebug(`Error activando suscripción: ${err.message}`, 'error');
      }
    }

    // ─── Flujo completo ───
    async function iniciarFlujoYappy() {
      if (!conductorData || !authUser) {
        showAlert('Datos del conductor no cargados. Recarga la página.');
        return;
      }

      setBtnLoading(true);

      try {
        // Paso 1: Validar
        const { token, epochTime } = await yappyValidarComercio();
        yappyToken = token;
        yappyEpochTime = epochTime;

        // Paso 2: Crear orden
        const orden = await yappyCrearOrden(token, epochTime);

        // Paso 3: Renderizar botón
        await renderizarBotonYappy(orden);

      } catch (err) {
        logDebug(`ERROR: ${err.message}`, 'error');
        showAlert(err.message);
        setBtnLoading(false);
      }
    }

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    document.addEventListener('DOMContentLoaded', cargarDatosConductor);
  </script>
</body>
</html>
