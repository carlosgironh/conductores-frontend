<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Viajes - Conductor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --success: #34a853;
    --warning: #fbbc04;
    --danger: #ea4335;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--card);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 1.25rem; color: var(--text); }
  .header .user-info { display: flex; align-items: center; gap: 12px; }
  .header .user-info span { color: var(--text-muted); font-size: 0.875rem; }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-warning { background: var(--warning); color: #1a1a1a; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--text); }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .status-active { background: rgba(52,168,83,0.15); color: #34a853; }
  .status-inactive { background: rgba(234,67,53,0.15); color: #ea4335; }
  .status-pending { background: rgba(251,188,4,0.15); color: #fbbc04; }
  .subscription-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .subscription-info h3 { font-size: 1rem; margin-bottom: 4px; }
  .subscription-info p { color: var(--text-muted); font-size: 0.875rem; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .stat-box { text-align: center; padding: 20px; }
  .stat-box .number { font-size: 2rem; font-weight: 700; color: var(--primary); }
  .stat-box .label { color: var(--text-muted); font-size: 0.875rem; margin-top: 4px; }
  .viajes-list { margin-top: 16px; }
  .viaje-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .viaje-item .info h4 { font-size: 0.95rem; margin-bottom: 4px; }
  .viaje-item .info p { color: var(--text-muted); font-size: 0.8rem; }
  .viaje-item .price { font-size: 1.1rem; font-weight: 700; color: var(--success); }
  .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
  .loading { text-align: center; padding: 48px; color: var(--text-muted); }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.875rem;
  }
  .alert-warning { background: rgba(251,188,4,0.1); border: 1px solid rgba(251,188,4,0.3); color: #fbbc04; }
  .alert-danger { background: rgba(234,67,53,0.1); border: 1px solid rgba(234,67,53,0.3); color: #ea4335; }
  .alert-success { background: rgba(52,168,83,0.1); border: 1px solid rgba(52,168,83,0.3); color: #34a853; }
  .btn-pago {
    background: linear-gradient(135deg, #1a73e8, #1557b0);
    color: white;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
  }
  .btn-pago:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(26,115,232,0.3);
  }
  .btn-pago svg { width: 24px; height: 24px; }
  .conductor-info { display: flex; align-items: center; gap: 16px; }
  .conductor-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem; font-weight: 700;
  }
  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 12px; text-align: center; }
    .subscription-box { flex-direction: column; text-align: center; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
<base target="_blank">
</head>
<body>

<div class="header">
  <h1>🚕 Panel de Viajes</h1>
  <div class="user-info">
    <span id="conductor-nombre">Cargando...</span>
    <button class="btn btn-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>
</div>

<div class="container">

  <!-- Alerta de suscripción -->
  <div id="alerta-suscripcion" style="display:none;"></div>

  <!-- Info del conductor -->
  <div class="card">
    <div class="conductor-info">
      <div class="conductor-avatar" id="avatar-inicial">?</div>
      <div>
        <h3 id="nombre-completo">Cargando...</h3>
        <p style="color:var(--text-muted);font-size:0.875rem;" id="vehiculo-info">Cargando...</p>
      </div>
    </div>
  </div>

  <!-- Estado de suscripción -->
  <div class="card">
    <div class="subscription-box">
      <div class="subscription-info">
        <h3>Estado de Suscripción</h3>
        <p id="estado-suscripcion-texto">Verificando...</p>
      </div>
      <div id="estado-badge-container">
        <span class="status-badge status-pending">⏳ Verificando</span>
      </div>
    </div>
    <div id="accion-suscripcion" style="margin-top:20px;text-align:center;">
      <!-- El botón de pago aparece aquí si no está activa -->
    </div>
  </div>

  <!-- Estadísticas -->
  <div class="grid-2">
    <div class="card stat-box">
      <div class="number" id="total-viajes">0</div>
      <div class="label">Viajes Completados</div>
    </div>
    <div class="card stat-box">
      <div class="number" id="total-ganado">$0.00</div>
      <div class="label">Total Ganado</div>
    </div>
  </div>

  <!-- Viajes disponibles -->
  <div class="card">
    <h2>📋 Viajes Disponibles</h2>
    <div id="viajes-container">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando viajes...</p>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================
// CONFIGURACIÓN
// ============================================
const SUPABASE_URL = 'https://ugchmuhjzzyofoogprlr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA4MDA1MjUsImV4cCI6MjA1NjM3NjUyNX0.0k1Zf8Y2V1eC1zLk9pQrStUvWxYzAbCdEfGhIjKlMnO';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let conductorData = null;
let currentUser = null;

// ============================================
// INICIALIZACIÓN
// ============================================
document.addEventListener('DOMContentLoaded', async () => {
  console.log('[INIT] Cargando panel de viajes...');
  await verificarAuth();
});

async function verificarAuth() {
  try {
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error || !session) {
      console.log('[AUTH] No hay sesión, redirigiendo a login...');
      window.location.href = 'login.html';
      return;
    }
    currentUser = session.user;
    console.log('[AUTH] auth.uid():', currentUser.id);
    await cargarConductor();
    await cargarViajes();
  } catch (err) {
    console.error('[AUTH] Error:', err);
    mostrarAlerta('danger', 'Error de autenticación. Por favor inicia sesión nuevamente.');
  }
}

// ============================================
// CARGAR DATOS DEL CONDUCTOR
// ============================================
async function cargarConductor() {
  try {
    // Primero intentamos con todas las columnas
    let { data, error } = await supabase
      .from('conductores')
      .select('id,auth_user_id,status,nombres,apellidos,vehiculo,modelo,marca,suscripcion_activa,payment_status,fecha_ultimo_pago,fecha_vencimiento,plan,pago_al_dia')
      .eq('auth_user_id', currentUser.id)
      .single();

    // Si falla por columna status, reintentamos sin ella
    if (error && error.message && error.message.includes('status')) {
      console.log('[CONDUCTOR] Columna status no existe, reintentando sin ella...');
      const result = await supabase
        .from('conductores')
        .select('id,auth_user_id,nombres,apellidos,vehiculo,modelo,marca,suscripcion_activa,payment_status,fecha_ultimo_pago,fecha_vencimiento,plan,pago_al_dia')
        .eq('auth_user_id', currentUser.id)
        .single();
      data = result.data;
      error = result.error;
    }

    if (error) {
      console.error('[CONDUCTOR] Error:', error);
      mostrarAlerta('danger', 'Error al cargar datos del conductor.');
      return;
    }

    conductorData = data;
    console.log('[CONDUCTOR] Encontrado:', data);
    renderizarConductor(data);
    renderizarEstadoSuscripcion(data);
  } catch (err) {
    console.error('[CONDUCTOR] Error catch:', err);
    mostrarAlerta('danger', 'Error al cargar conductor.');
  }
}

function renderizarConductor(data) {
  const nombreCompleto = `${data.nombres || ''} ${data.apellidos || ''}`.trim();
  document.getElementById('conductor-nombre').textContent = nombreCompleto;
  document.getElementById('nombre-completo').textContent = nombreCompleto;
  document.getElementById('avatar-inicial').textContent = (data.nombres || '?')[0].toUpperCase();

  const vehiculoInfo = [];
  if (data.marca) vehiculoInfo.push(data.marca);
  if (data.modelo) vehiculoInfo.push(data.modelo);
  if (data.vehiculo) vehiculoInfo.push(data.vehiculo);
  document.getElementById('vehiculo-info').textContent = vehiculoInfo.length > 0
    ? vehiculoInfo.join(' · ')
    : 'Vehículo no registrado';
}

// ============================================
// ESTADO DE SUSCRIPCIÓN
// ============================================
function renderizarEstadoSuscripcion(data) {
  const estaActiva = data.suscripcion_activa === true;
  const pagoAlDia = data.pago_al_dia === true;
  const vencimiento = data.fecha_vencimiento ? new Date(data.fecha_vencimiento) : null;
  const ahora = new Date();
  const vencio = vencimiento && vencimiento < ahora;

  const badgeContainer = document.getElementById('estado-badge-container');
  const textoContainer = document.getElementById('estado-suscripcion-texto');
  const accionContainer = document.getElementById('accion-suscripcion');
  const alertaContainer = document.getElementById('alerta-suscripcion');

  if (estaActiva && pagoAlDia && !vencio) {
    badgeContainer.innerHTML = '<span class="status-badge status-active">✅ Suscripción Activa</span>';
    textoContainer.textContent = vencimiento
      ? `Tu suscripción está activa hasta el ${vencimiento.toLocaleDateString('es-PA')}`
      : 'Tu suscripción está activa';
    accionContainer.innerHTML = '';
    alertaContainer.style.display = 'none';
  } else {
    badgeContainer.innerHTML = '<span class="status-badge status-inactive">❌ Suscripción Inactiva</span>';
    textoContainer.textContent = 'Tu suscripción ha vencido o no está activa. Actívala para recibir viajes.';

    // Botón que lleva a la página de pagos
    accionContainer.innerHTML = `
      <a href="pagos.html" class="btn-pago">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        💳 Activar Suscripción - $5.00 / 24h
      </a>
      <p style="color:var(--text-muted);font-size:0.8rem;margin-top:12px;">
        Serás redirigido a la página de pagos segura
      </p>
    `;

    alertaContainer.style.display = 'block';
    alertaContainer.innerHTML = `
      <div class="alert alert-warning">
        ⚠️ Tu suscripción está inactiva. No puedes recibir viajes hasta activarla.
      </div>
    `;
  }
}

// ============================================
// CARGAR VIAJES
// ============================================
async function cargarViajes() {
  try {
    const { data: viajes, error } = await supabase
      .from('viajes_reservados')
      .select('*')
      .eq('estado', 'pendiente')
      .order('fecha_solicitud', { ascending: false })
      .limit(20);

    if (error) {
      console.error('[VIAJES] Error:', error);
      document.getElementById('viajes-container').innerHTML = `
        <div class="empty-state">
          <p>Error al cargar viajes. Intenta de nuevo.</p>
        </div>
      `;
      return;
    }

    // Actualizar estadísticas
    const { data: historial } = await supabase
      .from('viajes_reservados')
      .select('precio')
      .eq('conductor_asignado_id', currentUser.id)
      .eq('estado', 'completado');

    const totalViajes = historial ? historial.length : 0;
    const totalGanado = historial ? historial.reduce((sum, v) => sum + (v.precio || 0), 0) : 0;

    document.getElementById('total-viajes').textContent = totalViajes;
    document.getElementById('total-ganado').textContent = `$${totalGanado.toFixed(2)}`;

    renderizarViajes(viajes || []);
  } catch (err) {
    console.error('[VIAJES] Error:', err);
    document.getElementById('viajes-container').innerHTML = `
      <div class="empty-state">
        <p>Error al cargar viajes.</p>
      </div>
    `;
  }
}

function renderizarViajes(viajes) {
  const container = document.getElementById('viajes-container');

  if (!viajes || viajes.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
          <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/>
        </svg>
        <p>No hay viajes disponibles en este momento.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = viajes.map(v => `
    <div class="viaje-item">
      <div class="info">
        <h4>📍 ${v.origen || 'Origen no especificado'} → ${v.destino || 'Destino no especificado'}</h4>
        <p>🕐 ${v.fecha_solicitud ? new Date(v.fecha_solicitud).toLocaleString('es-PA') : 'Fecha no disponible'}</p>
      </div>
      <div class="price">$${(v.precio || 0).toFixed(2)}</div>
    </div>
  `).join('');
}

// ============================================
// UTILIDADES
// ============================================
function mostrarAlerta(tipo, mensaje) {
  const container = document.getElementById('alerta-suscripcion');
  container.style.display = 'block';
  container.innerHTML = `<div class="alert alert-${tipo}">${mensaje}</div>`;
}

async function cerrarSesion() {
  await supabase.auth.signOut();
  window.location.href = 'login.html';
}
</script>

</body>
</html>
