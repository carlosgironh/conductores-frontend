<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - NRDesignCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  
  * { 
    box-sizing: border-box; 
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  
  :root {
    --safe-area-top: env(safe-area-inset-top);
    --safe-area-bottom: env(safe-area-inset-bottom);
    --safe-area-left: env(safe-area-inset-left);
    --safe-area-right: env(safe-area-inset-right);
  }
  
  body { 
    font-family: 'Inter', -apple-system, sans-serif; 
    min-height: 100vh; 
    min-height: -webkit-fill-available;
    padding: calc(20px + var(--safe-area-top)) 20px calc(40px + var(--safe-area-bottom)); 
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    color: #f8fafc; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }
  
  .card { 
    max-width: 1200px; 
    width: 100%; 
    background: rgba(30, 41, 59, 0.4); 
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px); 
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px; 
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px; 
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
    margin-top: var(--safe-area-top);
  }

  @keyframes cardEntry {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
    transition: left 0.7s;
    pointer-events: none;
    border-radius: 32px;
  }

  .card:hover::before {
    left: 100%;
  }
  
  h2 { 
    text-align: center; 
    font-weight: 800; 
    font-size: 32px; 
    letter-spacing: -0.5px; 
    margin-bottom: 35px;
    background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding: 20px 25px;
    background: rgba(15, 23, 42, 0.5);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    flex-wrap: wrap;
    gap: 15px;
  }

  #correoAdmin {
    font-weight: 600;
    color: #e2e8f0;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #correoAdmin::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
  }

  .header-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-create-admin, .btn-logout {
    padding: 12px 24px;
    border: none;
    border-radius: 14px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-touch-callout: none;
    user-select: none;
  }

  .btn-create-admin {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
  }

  .btn-create-admin:hover, .btn-create-admin:active {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
  }

  .btn-create-admin svg {
    width: 18px;
    height: 18px;
  }

  .btn-logout {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .btn-logout:hover, .btn-logout:active {
    background: #ef4444;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
  }
  
  table { 
    width: 100%; 
    border-collapse: separate; 
    border-spacing: 0 10px; 
    margin-top: 20px; 
  }
  
  th { 
    text-transform: uppercase; 
    font-size: 11px; 
    font-weight: 700; 
    letter-spacing: 1.5px; 
    color: #94a3b8; 
    padding: 15px; 
    text-align: left; 
  }
  
  td { 
    padding: 18px 15px; 
    background: rgba(15, 23, 42, 0.4); 
    color: #f1f5f9; 
    font-size: 14px; 
    border-top: 1px solid rgba(255, 255, 255, 0.05); 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    transition: all 0.3s ease;
  }
  
  td:first-child { 
    border-left: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 14px 0 0 14px; 
    font-weight: 600;
  }
  
  td:last-child { 
    border-right: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 0 14px 14px 0; 
  }
  
  tr:hover td { 
    background: rgba(255, 255, 255, 0.07); 
    transform: translateX(5px);
  }

  .btn-action {
    padding: 8px 16px; 
    border: none; 
    border-radius: 10px; 
    font-weight: 600; 
    font-size: 12px; 
    cursor: pointer; 
    transition: all 0.3s ease; 
    margin-right: 8px;
    margin-bottom: 5px;
    display: inline-block;
    -webkit-touch-callout: none;
    user-select: none;
    touch-action: manipulation;
  }

  .btn-action:hover, .btn-action:active { 
    transform: translateY(-2px); 
  }

  .btn-action.view {
    background: rgba(59, 130, 246, 0.1); 
    color: #60a5fa; 
    border: 1px solid rgba(59, 130, 246, 0.2);
  }

  .btn-action.view:hover, .btn-action.view:active {
    background: #3b82f6; 
    color: white; 
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); 
  }

  .btn-action.toggle {
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.2);
  }

  .btn-action.toggle:hover, .btn-action.toggle:active {
    background: #22c55e;
    color: white;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
  }

  .btn-action.toggle.inactive {
    background: rgba(245, 158, 11, 0.1);
    color: #fbbf24;
    border-color: rgba(245, 158, 11, 0.2);
  }

  .btn-action.toggle.inactive:hover, .btn-action.toggle.inactive:active {
    background: #f59e0b;
    color: white;
    box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
  }

  .btn-action.danger {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .btn-action.danger:hover, .btn-action.danger:active {
    background: #ef4444;
    color: white;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
  }
  
  .table-container { 
    overflow-x: auto; 
    border-radius: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .status-indicator.active {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
  }

  .status-indicator.inactive {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  .status-indicator.active .status-dot {
    background: #4ade80;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
  }

  .status-indicator.inactive .status-dot {
    background: #f87171;
    animation: none;
  }

  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
    70% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  td .email-cell {
    font-size: 12px;
    color: #94a3b8;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  td .email-cell:hover {
    color: #60a5fa;
    cursor: pointer;
  }

  .aviso-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .aviso-badge.si {
    background: rgba(139, 92, 246, 0.2);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  .aviso-badge.no {
    display: none;
  }
  
  #modalEdit { 
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left:0; 
    top:0; 
    width:100%; 
    height:100%; 
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    justify-content: center; 
    align-items: flex-end;
    animation: fadeIn 0.3s ease;
    padding-bottom: env(safe-area-inset-bottom);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  #modalEdit .modal-content { 
    background: rgba(30, 41, 59, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 24px 24px 0 0; 
    padding: 35px 25px calc(35px + var(--safe-area-bottom)); 
    width: 100%; 
    max-width: 650px; 
    max-height: 85vh; 
    box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.8);
    display: flex; 
    flex-direction: column; 
    overflow-y: auto;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: none;
    animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(100%);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .btn-close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 10;
    -webkit-touch-callout: none;
  }

  .btn-close-modal:hover, .btn-close-modal:active {
    background: #ef4444;
    color: white;
    transform: rotate(90deg);
  }

  .btn-close-modal svg {
    width: 20px;
    height: 20px;
  }

  #modalEdit h3 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    margin-top: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    padding-right: 50px;
  }

  #modalEdit h4 {
    font-size: 16px;
    font-weight: 600;
    color: #60a5fa;
    margin: 25px 0 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  #modalEdit input, #modalEdit select { 
    margin-bottom: 15px; 
    padding: 14px 18px; 
    border-radius: 12px; 
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(15, 23, 42, 0.6);
    color: white;
    font-size: 14px; 
    width: 100%;
    font-family: inherit;
    transition: all 0.3s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  #modalEdit input:focus {
    border-color: #6366f1;
    background: rgba(15, 23, 42, 0.8);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    outline: none;
  }

  #modalEdit input[readonly] {
    background: rgba(255, 255, 255, 0.05);
    color: #94a3b8;
    cursor: not-allowed;
  }
  
  #modalEdit .modal-buttons { 
    display: flex; 
    justify-content: flex-end; 
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  #modalEdit .modal-buttons button {
    margin: 0;
  }
  
  #modalEdit label { 
    margin-bottom: 8px; 
    display: block; 
    color: #cbd5e1; 
    font-size: 13px; 
    font-weight: 600; 
  }

  #modalEdit hr {
    border: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 25px 0;
  }
  
  .doc-container { 
    margin-bottom: 15px; 
    position: relative; 
    background: rgba(15, 23, 42, 0.4);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .doc-container.aviso-doc {
    border-color: rgba(139, 92, 246, 0.3);
    background: rgba(139, 92, 246, 0.05);
  }

  .doc-container strong {
    color: #60a5fa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 10px;
  }

  .doc-container.aviso-doc strong {
    color: #a78bfa;
  }

  .doc-preview {
    margin-top: 10px;
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
  }

  .doc-preview img {
    max-width: 100%;
    max-height: 200px;
    display: block;
    margin: 0 auto;
  }

  .doc-preview iframe {
    width: 100%;
    height: 250px;
    border: none;
  }

  .doc-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(99, 102, 241, 0.15);
    color: #818cf8;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    border: 1px solid rgba(99, 102, 241, 0.2);
    -webkit-touch-callout: none;
  }

  .doc-container.aviso-doc .doc-link {
    background: rgba(139, 92, 246, 0.15);
    color: #a78bfa;
    border-color: rgba(139, 92, 246, 0.2);
  }

  .doc-link:hover, .doc-link:active {
    background: #6366f1;
    color: white;
  }

  .doc-container.aviso-doc .doc-link:hover, .doc-container.aviso-doc .doc-link:active {
    background: #8b5cf6;
    color: white;
  }

  .doc-container button { 
    position: absolute; 
    right: 10px; 
    top: 10px; 
    font-size: 11px; 
    padding: 6px 12px;
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-touch-callout: none;
  }

  .doc-container button:hover, .doc-container button:active {
    background: #ef4444;
    color: white;
  }

  .no-docs {
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    padding: 20px;
    background: rgba(15, 23, 42, 0.3);
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.1);
  }

  .file-input-group {
    margin-bottom: 15px;
  }

  .file-input-group label {
    display: block;
    margin-bottom: 8px;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
  }

  .file-input-group input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.2);
    background: rgba(15, 23, 42, 0.4);
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .file-input-group input[type="file"]:hover, .file-input-group input[type="file"]:active {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
  }

  .file-input-group.aviso-group label {
    color: #a78bfa;
  }

  .file-input-group.aviso-group input[type="file"]:hover, .file-input-group.aviso-group input[type="file"]:active {
    border-color: #8b5cf6;
    background: rgba(139, 92, 246, 0.1);
  }

  .toast {
    position: fixed;
    bottom: calc(30px + var(--safe-area-bottom));
    right: 30px;
    left: 30px;
    padding: 16px 24px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    z-index: 2000;
    transform: translateY(200%);
    transition: transform 0.3s ease;
    text-align: center;
  }

  .toast.show {
    transform: translateY(0);
  }

  .toast.success {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
  }

  .toast.error {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
  }

  .aviso-toggle-modal {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 12px;
    border: 1px solid rgba(139, 92, 246, 0.2);
    margin-bottom: 15px;
  }

  .aviso-toggle-modal label {
    color: #a78bfa;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .switch-modal {
    position: relative;
    width: 44px;
    height: 24px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .switch-modal.active {
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
    border-color: rgba(139, 92, 246, 0.5);
  }

  .switch-modal-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
  }

  .switch-modal.active .switch-modal-thumb {
    transform: translateX(20px);
  }

  /* Loading overlay for Capacitor */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.9);
    z-index: 3000;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
  }

  .loading-overlay.show {
    display: flex;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(99, 102, 241, 0.3);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    color: #94a3b8;
    font-size: 14px;
    font-weight: 500;
  }

  /* Pull to refresh indicator */
  .ptr-indicator {
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    background: rgba(99, 102, 241, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;

<script>
// Capacitor Detection - Plugins se cargan automáticamente en apps Capacitor
const isCapacitor = typeof window !== 'undefined' && window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();

// Plugins de Capacitor (disponibles automáticamente en apps nativas)
let App, SplashScreen, StatusBar, Keyboard, Network, Dialog, Browser, Haptics, Preferences;

// Inicializar plugins solo si estamos en Capacitor nativo
if (isCapacitor) {
  const { Plugins } = window.Capacitor;
  App = Plugins.App;
  SplashScreen = Plugins.SplashScreen;
  StatusBar = Plugins.StatusBar;
  Keyboard = Plugins.Keyboard;
  Network = Plugins.Network;
  Dialog = Plugins.Dialog;
  Browser = Plugins.Browser;
  Haptics = Plugins.Haptics;
  Preferences = Plugins.Preferences;
  
  // Configurar StatusBar
  if (StatusBar) {
    StatusBar.setStyle({ style: 'Dark' });
    StatusBar.setBackgroundColor({ color: '#0f172a' });
  }
  
  // Manejar botón atrás
  if (App) {
    App.addListener('backButton', ({ canGoBack }) => {
      if (document.getElementById('modalEdit').style.display === 'flex') {
        cerrarModal();
      } else if (canGoBack) {
        window.history.back();
      } else {
        App.exitApp();
      }
    });
    
    // Recargar cuando la app vuelve a primer plano
    App.addListener('appStateChange', ({ isActive }) => {
      if (isActive) {
        cargarConductores();
      }
    });
  }
}

// URLs de Supabase - ELIMINADOS ESPACIOS EN BLANCO
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

// Crear cliente Supabase usando el objeto global de la librería UMD
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let conductorEditId = null;
let conductorEditActivo = null;
let conductorEditAviso = false;
const emailCache = new Map();
let isRefreshing = false;
let touchStartY = 0;

// Pull to refresh implementation (solo en Capacitor)
const mainCard = document.getElementById('mainCard');
const ptrIndicator = document.getElementById('ptrIndicator');

if (isCapacitor && mainCard) {
  mainCard.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  
  mainCard.addEventListener('touchmove', (e) => {
    if (mainCard.scrollTop === 0 && !isRefreshing) {
      const touchY = e.touches[0].clientY;
      const diff = touchY - touchStartY;
      
      if (diff > 0 && diff < 100) {
        ptrIndicator.style.transform = `translateX(-50%) translateY(${diff * 0.5}px)`;
        ptrIndicator.classList.add('show');
      }
    }
  }, { passive: true });
  
  mainCard.addEventListener('touchend', (e) => {
    const touchY = e.changedTouches[0].clientY;
    const diff = touchY - touchStartY;
    
    if (diff > 80 && mainCard.scrollTop === 0 && !isRefreshing) {
      triggerRefresh();
    } else {
      ptrIndicator.classList.remove('show');
      ptrIndicator.style.transform = 'translateX(-50%)';
    }
  });
}

function triggerRefresh() {
  isRefreshing = true;
  ptrIndicator.classList.add('show');
  showLoading('Actualizando...');
  
  cargarConductores().then(() => {
    isRefreshing = false;
    ptrIndicator.classList.remove('show');
    hideLoading();
    showToast('Lista actualizada', 'success');
  }).catch(err => {
    isRefreshing = false;
    ptrIndicator.classList.remove('show');
    hideLoading();
    showToast('Error al actualizar', 'error');
  });
}

function showLoading(text = 'Cargando...') {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) {
    overlay.querySelector('.loading-text').textContent = text;
    overlay.classList.add('show');
  }
}

function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) {
    overlay.classList.remove('show');
  }
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.classList.add('show');
  
  // Haptic feedback para Capacitor
  if (isCapacitor && Haptics) {
    if (type === 'error') {
      Haptics.impact({ style: 'Heavy' }).catch(() => {});
    } else {
      Haptics.impact({ style: 'Light' }).catch(() => {});
    }
  }
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

  showLoading('Verificando acceso...');
  
  try {
    const { data } = await supabaseClient.auth.getUser();
    const user = data?.user;
    
    if(!user){ 
      window.location.href="dashboard.html"; 
      return; 
    }
    
    const correoAdmin = document.getElementById("correoAdmin");
    if (correoAdmin) {
      correoAdmin.textContent = user.email;
    }

    const { data: perfil, error: perfilError } = await supabaseClient
      .from("admins")
      .select("*")
      .eq("email", user.email)
      .single();
      
    if(perfilError || !perfil){ 
      showToast("Acceso denegado", "error");
      setTimeout(() => {
        window.location.href="dashboard.html";

    await cargarConductores();

function irACrearAdmin() {
  window.location.href = 'admin.html';
}

async function cerrarSesion(){ 
  showLoading('Cerrando sesión...');
  await supabaseClient.auth.signOut();
  
  if (isCapacitor && Preferences) {
    await Preferences.clear().catch(() => {});
  }
  
  window.location.href="dashboard.html"; 
}

async function obtenerEmailDesdeAuth(authUserId) {
  if (!authUserId) return "No registrado";
  
  if (emailCache.has(authUserId)) {
    return emailCache.get(authUserId);
  }

  try {
    const { data, error } = await supabaseClient.rpc('get_user_email', {
      user_id: authUserId
    });
    
    if (error) {
      const { data: conductorData } = await supabaseClient
        .from("conductores")
        .select("email")
        .eq("auth_user_id", authUserId)
        .single();
      
      const email = conductorData?.email || "No disponible";
      emailCache.set(authUserId, email);
      return email;
    }
    
    const email = data || "No disponible";
    emailCache.set(authUserId, email);
    return email;
    
  } catch (e) {
    return "Error al obtener";
  }
}

function obtenerEstadoConductor(c) {
  return c.estado !== false;
}

async function cargarConductores(){
  try {
    const { data, error } = await supabaseClient.from("conductores").select("*");
    if(error){ 
      console.error("Error cargando conductores:", error); 
      showToast("Error cargando conductores", "error");
      return; 
    }

    const tbody = document.querySelector("#tabla tbody");
    if (!tbody) return;
    
    tbody.innerHTML = "";

    for (const c of data) {
      let email = "Cargando...";
      
      if (c.auth_user_id) {
        email = await obtenerEmailDesdeAuth(c.auth_user_id);
      } else {
        email = c.email || "No registrado";
      }

      const tr = document.createElement("tr");
      const isActive = obtenerEstadoConductor(c);
      const tieneAviso = c.tiene_aviso_operaciones === true;
      
      const statusClass = isActive ? 'active' : 'inactive';
      const statusText = isActive ? 'Activo' : 'Inactivo';
      
      tr.innerHTML = `
        <td>
          <span class="status-indicator ${statusClass}">
            <span class="status-dot"></span>
            ${statusText}
          </span>
        </td>
        <td style="font-weight:600;">
          ${c.nombres || ''} ${c.apellidos || ''}
          ${tieneAviso ? '<span class="aviso-badge si" title="Tiene Aviso de Operaciones">📋 Aviso</span>' : ''}
        </td>
        <td>
          <div class="email-cell" title="${email}">${email}</div>
        </td>
        <td>${c.cedula || ''}</td>
        <td style="font-family: monospace; letter-spacing:1px; color: #60a5fa;">${c.placa || ''}</td>
        <td>
          <button class="btn-action view" onclick="abrirModal('${c.id}')">Ver/Editar</button>
          <button class="btn-action toggle ${!isActive ? 'inactive' : ''}" onclick="toggleActivo('${c.id}')">
            ${isActive ? 'Deshabilitar' : 'Habilitar'}
          </button>
          <button class="btn-action danger" onclick="eliminar('${c.id}')">Eliminar</button>
        </td>
      `;
      tbody.appendChild(tr);
    }
  } catch (err) {
    console.error("Error en cargarConductores:", err);
    showToast("Error al cargar datos", "error");
  }
}

function toggleAvisoModal() {
  const switchEl = document.getElementById('modalAvisoSwitch');
  conductorEditAviso = !conductorEditAviso;
  
  if (conductorEditAviso) {
    switchEl.classList.add('active');
  } else {
    switchEl.classList.remove('active');
  }
}

async function abrirModal(id){
  conductorEditId = id;
  showLoading('Cargando datos...');
  
  try {
    const { data: c, error } = await supabaseClient.from("conductores").select("*").eq("id", id).single();
    
    if(error || !c) {
      hideLoading();
      showToast("Error cargando conductor", "error");
      return;
    }

    conductorEditActivo = obtenerEstadoConductor(c);
    conductorEditAviso = c.tiene_aviso_operaciones === true;

    let email = "No disponible";
    if (c.auth_user_id) {
      email = await obtenerEmailDesdeAuth(c.auth_user_id);
    } else {
      email = c.email || "No registrado";
    }

    // Set form values
    const setValue = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.value = val || "";
    };

    setValue("editEmail", email);
    setValue("editNombres", c.nombres);
    setValue("editApellidos", c.apellidos);
    setValue("editDireccion", c.direccion);
    setValue("editCelular", c.celular);
    setValue("editCedula", c.cedula);
    setValue("editLicencia", c.licencia);
    setValue("editPlaca", c.placa);
    setValue("editModelo", c.modelo);
    setValue("editMarca", c.marca);
    setValue("editColor", c.color);
    setValue("editPoliza", c.poliza_numero);
    setValue("editMotivo", c.motivo_desactivacion);

    const avisoSwitch = document.getElementById("modalAvisoSwitch");
    if (avisoSwitch) {
      if (conductorEditAviso) {
        avisoSwitch.classList.add('active');
      } else {
        avisoSwitch.classList.remove('active');
      }
    }

    const btnToggle = document.getElementById("btnToggleModal");
    if (btnToggle) {
      btnToggle.textContent = conductorEditActivo ? "Deshabilitar" : "Habilitar";
      btnToggle.className = `btn-action toggle ${!conductorEditActivo ? 'inactive' : ''}`;
    }

    await cargarDocumentos(id);
    hideLoading();
    
    const modal = document.getElementById("modalEdit");
    if (modal) {
      modal.style.display = "flex";
      document.body.style.overflow = 'hidden';
    }
    
    if (isCapacitor && Keyboard) {
      Keyboard.hide().catch(() => {});
    }
  } catch (err) {
    hideLoading();
    showToast("Error al abrir modal", "error");
    console.error(err);
  }
}

async function toggleDesdeModal() {
  if (!conductorEditId) return;
  await toggleActivo(conductorEditId, conductorEditActivo);
}

async function toggleActivo(id, estadoDesdeModal = null){
  if (!id) {
    showToast("Error: ID no válido", "error");
    return;
  }

  try {
    let estadoActual;
    
    if (estadoDesdeModal !== null) {
      estadoActual = estadoDesdeModal;
    } else {
      const { data: conductor, error: fetchError } = await supabaseClient
        .from("conductores")
        .select("estado")
        .eq("id", id)
        .single();
      
      if (fetchError) {
        showToast("Error al verificar estado actual", "error");
        return;
      }
      
      estadoActual = obtenerEstadoConductor(conductor);
    }

    let motivo = "";
    if(estadoActual){
      // Usar Dialog nativo en Capacitor, prompt en web
      if (isCapacitor && Dialog) {
        const { value } = await Dialog.prompt({
          title: 'Desactivar Conductor',
          message: 'Ingrese motivo de desactivación:',
          inputPlaceholder: 'Motivo...'
        });
        motivo = value;
      } else {
        motivo = prompt("Ingrese motivo de desactivación:");
      }
      
      if(!motivo || motivo.trim() === ""){ 
        showToast("Debe ingresar un motivo para desactivar", "error"); 
        return; 
      }
    }
    
    const nuevoEstado = !estadoActual;
    
    const updateData = {
      estado: nuevoEstado,
      motivo_desactivacion: estadoActual ? motivo.trim() : null
    };
    
    const { error } = await supabaseClient
      .from("conductores")
      .update(updateData)
      .eq("id", id);
      
    if(error){ 
      showToast("Error: " + error.message, "error"); 
      return; 
    }
    
    showToast(estadoActual ? "Conductor deshabilitado" : "Conductor habilitado", "success");
    
    await cargarConductores();
    
    if (conductorEditId === id) {
      conductorEditActivo = nuevoEstado;
      const btnToggle = document.getElementById("btnToggleModal");
      if (btnToggle) {
        btnToggle.textContent = nuevoEstado ? "Deshabilitar" : "Habilitar";
        btnToggle.className = `btn-action toggle ${!nuevoEstado ? 'inactive' : ''}`;
      }
    }
    
  } catch (err) {
    console.error("Error inesperado en toggle:", err);
    showToast("Error inesperado: " + err.message, "error");
  }
}

async function eliminar(id){
  if(!id) {
    showToast("Error: ID no válido", "error");
    return;
  }

  let confirmado = false;
  
  if (isCapacitor && Dialog) {
    const { value } = await Dialog.confirm({
      title: 'Eliminar Conductor',
      message: '¿Seguro de eliminar este conductor permanentemente? Esta acción no se puede deshacer.',
      okButtonTitle: 'Eliminar',
      cancelButtonTitle: 'Cancelar'
    });
    confirmado = value;
  } else {
    confirmado = confirm("¿Seguro de eliminar este conductor permanentemente? Esta acción no se puede deshacer.");
  }
  
  if(!confirmado) return;
  
  showLoading("Eliminando...");
  
  try {
    const { data: docs } = await supabaseClient
      .from("documentos")
      .select("url_archivo")
      .eq("conductor_id", id);
      
    if (docs && docs.length > 0) {
      const filesToRemove = docs
        .filter(d => d.url_archivo)
        .map(d => d.url_archivo);
        
      if (filesToRemove.length > 0) {
        await supabaseClient.storage
          .from("documentos-conductores")
          .remove(filesToRemove);
      }
    }
    
    await supabaseClient.from("documentos").delete().eq("conductor_id", id);
    
    const { error } = await supabaseClient
      .from("conductores")
      .delete()
      .eq("id", id);
    
    if(error){ 
      throw error;
    }
    
    showToast("Conductor eliminado correctamente", "success");
    
    if (conductorEditId === id) {
      cerrarModal();
    }
    
    await cargarConductores();
    
  } catch (error) {
    console.error("Error eliminando:", error);
    showToast("Error al eliminar: " + error.message, "error");
  } finally {
    hideLoading();
  }
}

async function cargarDocumentos(conductorId) {
  try {
    const { data: docs, error } = await supabaseClient
      .from("documentos")
      .select("*")
      .eq("conductor_id", conductorId);
      
    const divDocs = document.getElementById("documentosExistentes");
    if (!divDocs) return;
    
    divDocs.innerHTML = "";

    if(error || !docs || docs.length === 0){
      divDocs.innerHTML = '<div class="no-docs">No hay documentos cargados</div>';
      return;
    }

    for (const d of docs) {
      const container = document.createElement("div");
      container.className = "doc-container";
      
      if (d.tipo === 'AVISO_OPERACIONES') {
        container.classList.add('aviso-doc');
      }

      const title = document.createElement("strong");
      title.textContent = d.tipo.replace(/_/g, ' ');
      container.appendChild(title);

      if(d.url_archivo){
        const { data: signedUrl } = await supabaseClient.storage
          .from("documentos-conductores")
          .createSignedUrl(d.url_archivo, 3600);

        const url = signedUrl?.signedUrl || d.url_archivo;
        const ext = d.url_archivo.split('.').pop().toLowerCase();
        
        const previewDiv = document.createElement("div");
        previewDiv.className = "doc-preview";

        if(["png","jpg","jpeg","gif","webp"].includes(ext)){
          const img = document.createElement("img");
          img.src = url;
          img.alt = d.tipo;
          img.loading = "lazy";
          previewDiv.appendChild(img);
        } else if(ext === "pdf"){
          const link = document.createElement("a");
          link.href = url;
          link.textContent = "Ver PDF";
          link.className = "doc-link";
          link.target = "_blank";
          previewDiv.appendChild(link);
        }
        
        if (previewDiv.children.length > 0) {
          container.appendChild(previewDiv);
        }

        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.className = "doc-link";
        link.innerHTML = `
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
          </svg>
          Ver / Descargar
        `;
        
        // Usar Browser nativo en Capacitor
        if (isCapacitor && Browser) {
          link.onclick = (e) => {
            e.preventDefault();
            Browser.open({ url: url }).catch(() => {
              window.open(url, '_blank');
            });
          };
        }
        
        container.appendChild(link);
      }

      const btnDel = document.createElement("button");
      btnDel.textContent = "Eliminar";
      btnDel.onclick = async () => {
        let confirmado = false;
        
        if (isCapacitor && Dialog) {
          const { value } = await Dialog.confirm({
            title: 'Eliminar Documento',
            message: `¿Eliminar documento ${d.tipo}?`,
            okButtonTitle: 'Eliminar',
            cancelButtonTitle: 'Cancelar'
          });
          confirmado = value;
        } else {
          confirmado = confirm(`¿Eliminar documento ${d.tipo}?`);
        }
        
        if(!confirmado) return;
        
        if (d.url_archivo) {
          await supabaseClient.storage
            .from("documentos-conductores")
            .remove([d.url_archivo]);
        }
        
        const { error } = await supabaseClient
          .from("documentos")
          .delete()
          .eq("id", d.id);
          
        if(error){ 
          showToast("Error eliminando: " + error.message, "error"); 
          return; 
        }
        
        await cargarDocumentos(conductorEditId);
        showToast("Documento eliminado", "success");
      };
      container.appendChild(btnDel);
      divDocs.appendChild(container);
    }
  } catch (err) {
    console.error("Error cargando documentos:", err);
  }
}

async function guardarEdicion(){
  if(!conductorEditId) {
    showToast("Error: No hay conductor seleccionado", "error");
    return;
  }

  showLoading("Guardando cambios...");

  try {
    const campos = {
      nombres: document.getElementById("editNombres")?.value.trim() || "",
      apellidos: document.getElementById("editApellidos")?.value.trim() || "",
      direccion: document.getElementById("editDireccion")?.value.trim() || "",
      celular: document.getElementById("editCelular")?.value.trim() || "",
      cedula: document.getElementById("editCedula")?.value.trim() || "",
      licencia: document.getElementById("editLicencia")?.value.trim() || "",
      placa: document.getElementById("editPlaca")?.value.trim() || "",
      modelo: document.getElementById("editModelo")?.value.trim() || "",
      marca: document.getElementById("editMarca")?.value.trim() || "",
      color: document.getElementById("editColor")?.value.trim() || "",
      poliza_numero: document.getElementById("editPoliza")?.value.trim() || "",
      tiene_aviso_operaciones: conductorEditAviso
    };
    
    const motivo = document.getElementById("editMotivo")?.value.trim();
    campos.motivo_desactivacion = motivo || null;
    
    const { error } = await supabaseClient
      .from("conductores")
      .update(campos)
      .eq("id", conductorEditId);
      
    if(error){ 
      hideLoading();
      showToast("Error al guardar: " + error.message, "error"); 
      return; 
    }
    
    await subirNuevosDocumentos();
    
    hideLoading();
    showToast("Cambios guardados correctamente", "success");
    cerrarModal();
    await cargarConductores();
  } catch (err) {
    hideLoading();
    showToast("Error al guardar", "error");
    console.error(err);
  }
}

async function subirNuevosDocumentos() {
  const documentos = [
    { id: 'editCedulaDoc', tipo: 'CEDULA' },
    { id: 'editLicenciaDoc', tipo: 'LICENCIA' },
    { id: 'editRegistroDoc', tipo: 'REGISTRO' },
    { id: 'editPolizaDoc', tipo: 'POLIZA' },
    { id: 'editFotoVehiculo', tipo: 'FOTO_VEHICULO' },
    { id: 'editFotoConductor', tipo: 'FOTO_CONDUCTOR' },
    { id: 'editAuthPropietario', tipo: 'AUTH_PROPIETARIO' },
    { id: 'editAvisoOperaciones', tipo: 'AVISO_OPERACIONES' }
  ];

  for (const doc of documentos) {
    const input = document.getElementById(doc.id);
    if (input && input.files && input.files[0]) {
      const file = input.files[0];
      const path = `${conductorEditId}/${doc.tipo}_${Date.now()}_${file.name}`;
      
      const { error: uploadError } = await supabaseClient.storage
        .from("documentos-conductores")
        .upload(path, file);
        
      if (uploadError) {
        console.error("Error subiendo " + doc.tipo + ":", uploadError);
        continue;
      }
      
      const { data: existing } = await supabaseClient
        .from("documentos")
        .select("id")
        .eq("conductor_id", conductorEditId)
        .eq("tipo", doc.tipo)
        .single();
        
      if (existing) {
        await supabaseClient
          .from("documentos")
          .update({ url_archivo: path })
          .eq("id", existing.id);
      } else {
        await supabaseClient
          .from("documentos")
          .insert([{
            conductor_id: conductorEditId,
            tipo: doc.tipo,
            url_archivo: path
          }]);
      }
    }
  }
}

function cerrarModal(){ 
  conductorEditId = null; 
  conductorEditActivo = null;
  conductorEditAviso = false;
  const modal = document.getElementById("modalEdit");
  if (modal) {
    modal.style.display = "none";
  }
  document.body.style.overflow = '';
  
  // Limpiar inputs de archivo
  document.querySelectorAll('#modalEdit input[type="file"]').forEach(input => {
    input.value = '';
  });
  
  const avisoSwitch = document.getElementById('modalAvisoSwitch');
  if (avisoSwitch) {
    avisoSwitch.classList.remove('active');
  }
  
  if (isCapacitor && Keyboard) {
    Keyboard.hide().catch(() => {});
  }
}

// Event listeners
document.addEventListener("DOMContentLoaded", function() {
  const modal = document.getElementById("modalEdit");
  if (modal) {
    modal.addEventListener("click", function(e) {
      if(e.target === this) cerrarModal();
    });
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") cerrarModal();
  });

  // Monitoreo de red
  if (isCapacitor && Network) {
    Network.addListener('networkStatusChange', status => {
      if (!status.connected) {
        showToast('Sin conexión a internet', 'error');
      } else {
        showToast('Conexión restaurada', 'success');
        cargarConductores();
      }
    });
  }
});
