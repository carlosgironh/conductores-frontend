<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    /* Safe areas para Capacitor */
    padding: 40px 20px;
    padding-top: max(40px, env(safe-area-inset-top));
    padding-bottom: max(40px, env(safe-area-inset-bottom));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),

    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
    /* Prevenir bounce en iOS */
    overscroll-behavior-y: none;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  .card {
    max-width: 720px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px;
    padding-top: max(50px, env(safe-area-inset-top));
    margin-bottom: 50px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
    touch-action: pan-y;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Banner de estado con safe area */
  .status-banner {
    position: relative;
    margin: calc(-1 * max(50px, env(safe-area-inset-top))) -45px 30px -45px;
    padding: 20px 45px;
    padding-top: max(20px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    animation: slideDown 0.6s ease-out backwards;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status-banner.active {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(21, 128, 61, 0.3) 100%);
    border-bottom: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .status-banner.inactive {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(185, 28, 28, 0.3) 100%);
    border-bottom: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .status-banner.pending {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(180, 83, 9, 0.3) 100%);
    border-bottom: 1px solid rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .status-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .status-content { flex: 1; }

  .status-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-message {
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.5;
  }

  .status-check {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
  }

  .status-banner.active .status-check {
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
  }

  .status-banner.inactive .status-check {
    background: rgba(239, 68, 68, 0.2);
    color: #f87171;
  }

  .status-banner.pending .status-check {
    background: rgba(245, 158, 11, 0.2);
    color: #fbbf24;
  }

  .status-banner.active::after {
    content: '';
    position: absolute;
    right: 45px;
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
  }

  @keyframes pulse-dot {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #contenido {
    background: rgba(15, 23, 42, 0.5);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 25px;
    position: relative;
    overflow: hidden;

  #contenido::before {

    top: 0;
    left: 0;

  .campo:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .campo:active {

  }

  .campo strong {
    color: #60a5fa;
    width: 140px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .campo span {
    color: #e2e8f0;
    font-weight: 500;

  }

  .aviso-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;

    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;

  .aviso-badge.si {

  .aviso-badge.no {
    background: rgba(148, 163, 184, 0.1);

  .fotos-container {
    display: grid;
    grid-template-columns: 1fr 1fr;

    margin: 30px 0;
  }

  .foto-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    touch-action: manipulation;

  .foto-wrapper:active {

  }

  .foto {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
    -webkit-user-select: none;

  .foto-label {

  .btn-doc {

    border-radius: 14px;

  .btn-doc:hover {
    background: #6366f1;

    border-color: transparent;
  }

  .btn-doc.aviso-operaciones {
    background: rgba(139, 92, 246, 0.1);
    border-color: rgba(139, 92, 246, 0.3);
    color: #a78bfa;
  }

  .btn-doc.aviso-operaciones:hover {
    background: #8b5cf6;
    color: white;
    box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
  }

  #qr-container {
    margin-top: 40px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 24px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    position: relative;
    border: 1px solid rgba(0,0,0,0.05);
    max-width: 100%;
  }

  #qr-container::after {
    content: "ESCANEAR PARA VALIDAR";
    display: block;
    margin-top: 15px;
    color: #1e293b;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
  }

  .error-message {
    text-align: center;
    padding: 40px;
    color: #f87171;
  }

  .error-message svg {
    width: 48px;
    height: 48px;
    margin: 0 auto 15px;
    opacity: 0.5;
  }

  /* Offline indicator */
  .offline-indicator {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    display: none;
    backdrop-filter: blur(10px);
    animation: slideDown 0.3s ease;
  }

  .offline-indicator.show {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(30, 41, 59, 0.95);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    z-index: 10000;
    opacity: 0;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media(max-width: 640px){
    .card {
      padding: 30px 20px;
      padding-top: max(30px, env(safe-area-inset-top));
      border-radius: 24px;
    }
    
    .status-banner {
      margin: calc(-1 * max(30px, env(safe-area-inset-top))) -20px 25px -20px;
      padding: 15px 20px;
      padding-top: max(15px, env(safe-area-inset-top));
      flex-direction: column;
      text-align: center;
      gap: 10px;
    }
    
    .status-banner.active::after { display: none; }
    
    h2 { font-size: 26px; }
    
    #contenido { padding: 20px; }
    
    .campo {
      flex-direction: column;
      gap: 5px;
    }
    
    .campo strong { width: 100%; }

    .fotos-container { grid-template-columns: 1fr; }

    #qr-container { padding: 20px; }
  }
</style>
</head>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Cache para offline
let perfilCache = null;

// Detectar conectividad
function initConnectivity() {
  const indicator = document.getElementById('offlineIndicator');
  
  function updateOnlineStatus() {
    if (navigator.onLine) {
      indicator.classList.remove('show');
      showToast('Conexión restaurada');
    } else {
      indicator.classList.add('show');
      showToast('Modo offline');
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  
  if (!navigator.onLine) {
    indicator.classList.add('show');
  }
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function renderStatusBanner(estado, motivoDeshabilitado = '') {
  const card = document.getElementById('mainCard');
  const existingBanner = document.querySelector('.status-banner');
  
  if (existingBanner) {
    existingBanner.remove();
  }
  
  let bannerHTML = '';
  const estadoStr = String(estado).toLowerCase();
  
  if (estadoStr === 'true' || estadoStr === 'activo') {
    bannerHTML = `
      <div class="status-banner active">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Conductor Verificado
            <span class="status-check">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
              </svg>
              Activo
            </span>
          </div>
          <div class="status-message">Este conductor está habilitado y autorizado para prestar servicios.</div>
        </div>
      </div>
    `;
  } else if (estadoStr === 'pendiente' || estadoStr === 'revision') {
    bannerHTML = `
      <div class="status-banner pending">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Verificación Pendiente
            <span class="status-check">En Revisión</span>
          </div>
          <div class="status-message">Este perfil está pendiente de verificación por parte del equipo administrativo.</div>
        </div>
      </div>
    `;
  } else {
    bannerHTML = `
      <div class="status-banner inactive">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Conductor No Disponible
            <span class="status-check">Inactivo</span>
          </div>
          <div class="status-message">${motivoDeshabilitado || 'Este conductor no está disponible actualmente.'}</div>
        </div>
      </div>
    `;
  }
  
  card.insertAdjacentHTML('afterbegin', bannerHTML);
}

async function cargarPerfilPublico() {
  try {
    const params = new URLSearchParams(window.location.search);
    const conductorId = params.get("id");

    if (!conductorId) {
      throw new Error('ID de conductor no proporcionado');
    }

    // Si hay caché y estamos offline, usarla
    if (!navigator.onLine && perfilCache && perfilCache.id === conductorId) {
      renderPerfil(perfilCache.conductor, perfilCache.documentos, conductorId);
      return;
    }

    const { data: conductor, error } = await supabaseClient
      .from("conductores")
      .select("*")
      .eq("id", conductorId)
      .single();

    if (error || !conductor) {
      throw new Error('Perfil no encontrado');
    }

    const { data: documentos } = await supabaseClient
      .from("documentos")
      .select("*")
      .eq("conductor_id", conductor.id);

    // Guardar en caché
    perfilCache = { id: conductorId, conductor, documentos };

    renderPerfil(conductor, documentos || [], conductorId);

  } catch (error) {
    console.error('Error:', error);
    
    if (perfilCache) {
      showToast('Mostrando datos guardados');
      renderPerfil(perfilCache.conductor, perfilCache.documentos, perfilCache.id);
      return;
    }
    
    document.getElementById("contenido").innerHTML = `
      <div class="error-message">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p>${error.message}</p>
        <button onclick="cargarPerfilPublico()" style="margin-top: 20px; padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer;">Reintentar</button>
      </div>
    `;
  }
}

function renderPerfil(conductor, documentos, conductorId) {
  // Renderizar banner
  renderStatusBanner(conductor.estado, conductor.motivo_deshabilitado || conductor.motivo_desactivacion);

  // Helper para URLs
  function docUrl(tipo) {
    const doc = documentos.find(d => d.tipo === tipo);
    if (!doc) return null;
    return supabaseClient.storage.from("documentos-conductores").getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  const tieneAviso = conductor.tiene_aviso_operaciones === true;
  const avisoUrl = docUrl("AVISO_OPERACIONES");

  // Renderizar datos
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre</strong> <span>${conductor.nombres} ${conductor.apellidos}</span></div>
    <div class="campo"><strong>Cédula</strong> <span>${conductor.cedula}</span></div>
    <div class="campo"><strong>Licencia</strong> <span>${conductor.licencia}</span></div>
    <div class="campo"><strong>Vehículo</strong> <span>${conductor.marca} ${conductor.modelo}</span></div>
    <div class="campo"><strong>Placa</strong> <span>${conductor.placa}</span></div>
    <div class="campo"><strong>Color</strong> <span>${conductor.color}</span></div>
    <div class="campo"><strong>Póliza</strong> <span>${conductor.poliza_numero}</span></div>
    <div class="campo">
      <strong>Aviso Operaciones</strong> 
      <span>
        ${tieneAviso ? 
          `<span class="aviso-badge si">✓ Sí</span>` : 
          `<span class="aviso-badge no">✕ No</span>`
        }
      </span>
    </div>
  `;

  // Renderizar fotos
  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if (fotoCond) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper">
        <img src="${fotoCond}" class="foto" alt="Conductor" loading="lazy">
        <div class="foto-label">Conductor</div>
      </div>
    `;
  }

  if (fotoVeh) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper">
        <img src="${fotoVeh}" class="foto" alt="Vehículo" loading="lazy">
        <div class="foto-label">Vehículo</div>
      </div>
    `;
  }

  // Renderizar documentos
  const docsDiv = document.getElementById("documentos");
  docsDiv.innerHTML = "";

  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula", icon: "📄" },
    { tipo: "LICENCIA", label: "Licencia", icon: "🪪" },
    { tipo: "REGISTRO", label: "Registro", icon: "🚗" },
    { tipo: "POLIZA", label: "Seguro", icon: "🛡️" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización", icon: "✉️" }
  ];

  documentosConfig.forEach(doc => {
    const url = docUrl(doc.tipo);
    if (url) {
      docsDiv.innerHTML += `
        <button class="btn-doc" onclick="window.open('${url}', '_blank')">
          ${doc.icon} ${doc.label}
        </button>
      `;
    }
  });

  if (tieneAviso && avisoUrl) {
    docsDiv.innerHTML += `
      <button class="btn-doc aviso-operaciones" onclick="window.open('${avisoUrl}', '_blank')">
        📋 Aviso de Operaciones
      </button>
    `;
  }

  // Generar QR
  generarQR(conductorId);
}

async function generarQR(conductorId) {
  try {
    const currentUrl = window.location.href;
    const qrContainer = document.getElementById("qr-container");
    qrContainer.innerHTML = ""; // Limpiar anterior

    const canvas = document.createElement("canvas");
    qrContainer.appendChild(canvas);

    await QRCode.toCanvas(canvas, currentUrl, {
      width: 220,
      margin: 2,
      color: { dark: '#1e293b', light: '#ffffff' },
      errorCorrectionLevel: 'H'
    });

    // Logo centrado
    const ctx = canvas.getContext("2d");
    const logo = new Image();
    logo.src = "logo.png";
    logo.crossOrigin = "anonymous";

    logo.onload = () => {
      const size = canvas.width * 0.22;
      const x = (canvas.width - size) / 2;
      const y = (canvas.height - size) / 2;
      
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(canvas.width/2, canvas.height/2, size/2 + 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.drawImage(logo, x, y, size, size);
    };
  } catch (error) {
    console.error('Error QR:', error);
  }
}

// Prevenir zoom en double-tap
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);

// Inicializar
document.addEventListener("DOMContentLoaded", () => {
  initConnectivity();
  cargarPerfilPublico();
});
</script>
