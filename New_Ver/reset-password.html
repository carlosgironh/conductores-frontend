<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restablecer Contraseña - ROAD TO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --primary: #3b82f6;
    --accent: #8b5cf6;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    padding-top: calc(80px + var(--safe-top));
    padding-bottom: calc(20px + var(--safe-bottom));
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  /* Header con navegación */
  .app-header {
    position: fixed;
    top: calc(10px + var(--safe-top));
    left: calc(10px + env(safe-area-inset-left));
    right: calc(10px + env(safe-area-inset-right));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    padding: 10px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .brand-small {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 14px;
    color: #f8fafc;
    text-decoration: none;
  }

  .brand-small svg {
    width: 24px;
    height: 24px;
    color: var(--primary);
  }

  .nav-buttons {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  .nav-btn svg {
    width: 20px;
    height: 20px;
  }

  .card {
    max-width: 420px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 40px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
    transition: left 0.7s;
    pointer-events: none;
    border-radius: 32px;
  }

  .card:hover::before { left: 100%; }

  .header-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 25px;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(217, 119, 6, 0.1) 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(245, 158, 11, 0.3);
    box-shadow: 0 10px 30px rgba(217, 119, 6, 0.2);
    animation: iconPulse 3s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(217, 119, 6, 0.2); }
    50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(217, 119, 6, 0.3); }
  }

  .header-icon svg {
    width: 35px;
    height: 35px;
    color: #fbbf24;
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 30px;
  }

  .input-group {
    position: relative;
    margin-bottom: 20px;
  }

  .input-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    transition: color 0.3s;
    pointer-events: none;
  }

  input {
    width: 100%;
    padding: 16px 20px 16px 50px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    color: #ffffff;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  input::placeholder { color: #64748b; }

  input:hover {
    border-color: rgba(255, 255, 255, 0.2);
    background: rgba(15, 23, 42, 0.8);
  }

  input:focus {
    border-color: #f59e0b;
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15), 0 4px 20px rgba(245, 158, 11, 0.1);
    outline: none;
  }

  .btn-reset {
    width: 100%;
    padding: 18px 28px;
    margin-top: 10px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 4px 6px -1px rgba(217, 119, 6, 0.2),
      0 10px 20px -5px rgba(217, 119, 6, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-reset::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
  }

  .btn-reset:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 
      0 10px 25px -5px rgba(217, 119, 6, 0.5),
      0 8px 10px -6px rgba(217, 119, 6, 0.3);
  }

  .btn-reset:hover::before { left: 100%; }
  .btn-reset:active:not(:disabled) { transform: translateY(0) scale(0.98); }
  .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-secondary {
    width: 100%;
    padding: 14px 24px;
    margin-top: 15px;
    border: none;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    color: #94a3b8;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.2);
  }

  .msg {
    margin-top: 25px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    min-height: 24px;
    padding: 12px;
    border-radius: 12px;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateY(-10px);
  }

  .msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  .msg.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .msg.success {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .msg.loading {
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 25px 0;
    position: relative;
  }

  .divider::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #f59e0b, #d97706);
    border-radius: 3px;
  }

  .loader {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 480px) {
    .card { 
      padding: 40px 25px; 
      border-radius: 24px; 
    }
    h2 { font-size: 24px; }
    .header-icon { width: 60px; height: 60px; }
    .app-header { padding: 8px; }
  }
</style>
</head>
<body>

  <!-- Header con navegación -->
  <header class="app-header">
    <a href="Index.html" class="brand-small">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7"></path>
      </svg>
      ROAD TO
    </a>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goBack()" title="Regresar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
      </button>
      <button class="nav-btn" onclick="goHome()" title="Inicio">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
      </button>
    </div>
  </header>

<div class="card">
  <div class="header-icon">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
    </svg>
  </div>
  
  <h2>Restablecer Contraseña</h2>
  <p class="subtitle">Ingresa tu nueva contraseña</p>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
    </svg>
    <input id="password" type="password" placeholder="Nueva contraseña" minlength="6">
  </div>
  
  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <input id="confirmPassword" type="password" placeholder="Confirmar contraseña" minlength="6">
  </div>

  <button class="btn-reset" id="resetBtn" onclick="resetPassword()">
    Restablecer Contraseña
  </button>
  
  <div class="divider"></div>
  
  <a href="dashboard.html" class="btn-secondary">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
    </svg>
    Volver al inicio de sesión
  </a>

  <div id="msg" class="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Funciones de navegación
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = 'Index.html';
  }
}

function goHome() {
  window.location.href = 'Index.html';
}

function showMessage(text, type = '') {
  const msg = document.getElementById("msg");
  msg.textContent = text;
  msg.className = 'msg show ' + type;
  
  if (!text) {
    msg.classList.remove('show');
  }
}

async function resetPassword() {
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();
  const btn = document.getElementById("resetBtn");

  if (!password || !confirmPassword) {
    showMessage("Completa todos los campos", "error");
    return;
  }

  if (password.length < 6) {
    showMessage("La contraseña debe tener al menos 6 caracteres", "error");
    return;
  }

  if (password !== confirmPassword) {
    showMessage("Las contraseñas no coinciden", "error");
    return;
  }

  showMessage("Actualizando contraseña...", "loading");
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Procesando...';

  try {
    const { error } = await supabaseClient.auth.updateUser({
      password: password
    });

    if (error) {
      showMessage(error.message, "error");
      btn.disabled = false;
      btn.innerHTML = 'Restablecer Contraseña';
      return;
    }

    showMessage("¡Contraseña actualizada! Redirigiendo...", "success");

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 2000);

  } catch (err) {
    console.error("Error:", err);
    showMessage("Error de conexión", "error");
    btn.disabled = false;
    btn.innerHTML = 'Restablecer Contraseña';
  }
}

// Permitir submit con Enter
document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') resetPassword();
});

// Prevenir zoom en double-tap (iOS)
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);
</script>

</body>
</html>
