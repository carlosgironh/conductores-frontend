<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil del Conductor - Road To</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --primary: #3b82f6;
    --accent: #8b5cf6;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    padding-top: calc(80px + var(--safe-top));
    padding-bottom: calc(20px + var(--safe-bottom));
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  /* Header con navegación */
  .app-header {
    position: fixed;
    top: calc(10px + var(--safe-top));
    left: calc(10px + env(safe-area-inset-left));
    right: calc(10px + env(safe-area-inset-right));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    padding: 10px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .brand-small {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 14px;
    color: #f8fafc;
    text-decoration: none;
  }

  .brand-small svg {
    width: 24px;
    height: 24px;
    color: var(--primary);
  }

  .nav-buttons {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  .nav-btn svg {
    width: 20px;
    height: 20px;
  }

  .card {
    max-width: 720px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #contenido {
    background: rgba(15, 23, 42, 0.5);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 25px;
  }

  .campo {
    margin-bottom: 16px;
    font-size: 15px;
    display: flex;
    align-items: flex-start;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .campo:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .campo strong {
    color: #60a5fa;
    width: 140px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .campo span {
    color: #e2e8f0;
    font-weight: 500;
    word-break: break-word;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .status-badge.active {
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }

  .status-badge.pending {
    background: rgba(245, 158, 11, 0.1);
    color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.3);
  }

  .status-badge.inactive {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }

  .fotos-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 30px 0;
  }

  .foto-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }

  .foto-wrapper:active {
    transform: scale(0.95);
  }

  .foto {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .foto-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .documentos-section {
    margin: 30px 0;
    padding: 25px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .documentos-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #60a5fa;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .documentos-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
    border-radius: 2px;
  }

  .documentos-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn-doc {
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-doc:hover {
    background: #6366f1;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    border-color: transparent;
  }

  .btn-doc.aviso-operaciones {
    background: rgba(139, 92, 246, 0.1);
    border-color: rgba(139, 92, 246, 0.3);
    color: #a78bfa;
  }

  .btn-doc.aviso-operaciones:hover {
    background: #8b5cf6;
    color: white;
    box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
  }

  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
  }

  .btn-primary {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
  }

  .btn-secondary {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    color: #e2e8f0;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; 
    top: 0;
    width: 100%; 
    height: 100%;
    background: rgba(10, 15, 25, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    animation: fadeIn 0.3s ease;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: scaleIn 0.3s ease;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 640px) {
    .card {
      padding: 30px 20px;
      border-radius: 24px;
    }
    
    h2 { font-size: 26px; }

    #contenido { padding: 20px; }
    
    .campo {
      flex-direction: column;
      gap: 5px;
    }
    
    .campo strong { width: 100%; }

    .fotos-container { grid-template-columns: 1fr; }

    .documentos-grid { justify-content: center; }

    .app-header { padding: 8px; }
  }
</style>
</head>

<body>

  <!-- Header con navegación -->
  <header class="app-header">
    <a href="home.html" class="brand-small">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7"></path>
      </svg>
      Road To
    </a>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goBack()" title="Regresar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
      </button>
      <button class="nav-btn" onclick="goHome()" title="Inicio">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
      </button>
    </div>
  </header>

  <div class="card">
    <h2>Perfil del Conductor</h2>
    
    <div id="contenido">
      <div class="loading">
        <div class="loading-spinner"></div>
        Cargando datos...
      </div>
    </div>
    
    <div class="fotos-container" id="fotos-container"></div>

    <div class="documentos-section" id="documentos-section" style="display: none;">
      <div class="documentos-title">Documentos</div>
      <div class="documentos-grid" id="documentos-grid"></div>
    </div>

    <div class="btn-group">
      <a href="panel-admin.html" class="btn-primary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
        </svg>
        Volver al Panel
      </a>
      <button class="btn-secondary" onclick="goBack()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Regresar
      </button>
    </div>

  </div>

<div id="modalFoto" class="modal" onclick="cerrarModal()">
  <img id="modalImg" src="" alt="Vista ampliada">
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Funciones de navegación
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = 'home.html';
  }
}

function goHome() {
  window.location.href = 'home.html';
}

async function cargarPerfil() {
  const urlParams = new URLSearchParams(window.location.search);
  const conductorId = urlParams.get('id');
  
  if (!conductorId) {
    document.getElementById("contenido").innerHTML = `
      <div style="text-align: center; padding: 40px; color: #f87171;">
        <p>ID de conductor no especificado</p>
      </div>
    `;
    return;
  }

  try {
    const { data: conductor, error } = await supabaseClient
      .from("conductores")
      .select("*")
      .eq("id", conductorId)
      .single();

    if (error || !conductor) {
      throw new Error('Conductor no encontrado');
    }

    const { data: documentos } = await supabaseClient
      .from("documentos")
      .select("*")
      .eq("conductor_id", conductor.id);

    renderPerfil(conductor, documentos);

  } catch (error) {
    console.error('Error:', error);
    document.getElementById("contenido").innerHTML = `
      <div style="text-align: center; padding: 40px; color: #f87171;">
        <p>Error al cargar el perfil</p>
      </div>
    `;
  }
}

function renderPerfil(conductor, documentos) {
  function docUrl(tipo) {
    const doc = documentos?.find(d => d.tipo === tipo);
    if (!doc) return null;
    return supabaseClient.storage.from("documentos-conductores").getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  let statusClass, statusText;
  if (conductor.estado === 'activo' || conductor.estado === true) {
    statusClass = 'active';
    statusText = 'Activo';
  } else if (conductor.estado === 'pendiente') {
    statusClass = 'pending';
    statusText = 'Pendiente';
  } else {
    statusClass = 'inactive';
    statusText = 'Inactivo';
  }

  const tieneAviso = conductor.tiene_aviso_operaciones === true;
  const avisoUrl = docUrl("AVISO_OPERACIONES");

  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre</strong> <span>${conductor.nombres} ${conductor.apellidos}</span></div>
    <div class="campo"><strong>Cédula</strong> <span>${conductor.cedula}</span></div>
    <div class="campo"><strong>Licencia</strong> <span>${conductor.licencia}</span></div>
    <div class="campo"><strong>Vehículo</strong> <span>${conductor.marca} ${conductor.modelo}</span></div>
    <div class="campo"><strong>Placa</strong> <span>${conductor.placa}</span></div>
    <div class="campo"><strong>Color</strong> <span>${conductor.color}</span></div>
    <div class="campo"><strong>Póliza</strong> <span>${conductor.poliza_numero}</span></div>
    <div class="campo">
      <strong>Aviso Operaciones</strong> 
      <span>${tieneAviso ? 'Sí' : 'No'}</span>
    </div>
    <div class="campo"><strong>Correo</strong> <span>${conductor.email}</span></div>
    <div class="campo"><strong>Teléfono</strong> <span>${conductor.celular}</span></div>
    <div class="campo">
      <strong>Estado</strong> 
      <span class="status-badge ${statusClass}">${statusText}</span>
    </div>
  `;

  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if (fotoVeh) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper" onclick="mostrarModal('${fotoVeh}')">
        <img src="${fotoVeh}" class="foto" alt="Vehículo" loading="lazy">
        <div class="foto-label">Vehículo</div>
      </div>
    `;
  }

  if (fotoCond) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper" onclick="mostrarModal('${fotoCond}')">
        <img src="${fotoCond}" class="foto" alt="Conductor" loading="lazy">
        <div class="foto-label">Conductor</div>
      </div>
    `;
  }

  const docSection = document.getElementById("documentos-section");
  const docGrid = document.getElementById("documentos-grid");
  docGrid.innerHTML = "";

  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula", icon: "📄" },
    { tipo: "LICENCIA", label: "Licencia", icon: "🪪" },
    { tipo: "REGISTRO", label: "Registro", icon: "🚗" },
    { tipo: "POLIZA", label: "Seguro", icon: "🛡️" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización", icon: "✉️" }
  ];

  let tieneDocumentos = false;

  documentosConfig.forEach(doc => {
    const url = docUrl(doc.tipo);
    if (url) {
      tieneDocumentos = true;
      docGrid.innerHTML += `
        <a href="${url}" target="_blank" class="btn-doc">
          ${doc.icon} ${doc.label}
        </a>
      `;
    }
  });

  if (tieneAviso && avisoUrl) {
    tieneDocumentos = true;
    docGrid.innerHTML += `
      <a href="${avisoUrl}" target="_blank" class="btn-doc aviso-operaciones">
        📋 Aviso de Operaciones
      </a>
    `;
  }

  docSection.style.display = tieneDocumentos ? "block" : "none";
}

function mostrarModal(src) {
  const modal = document.getElementById("modalFoto");
  const img = document.getElementById("modalImg");
  img.src = src;
  modal.style.display = "flex";
  document.body.style.overflow = "hidden";
}

function cerrarModal() {
  document.getElementById("modalFoto").style.display = "none";
  document.body.style.overflow = "";
}

document.addEventListener("DOMContentLoaded", cargarPerfil);

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);
</script>

</body>
</html>
