<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - NRDesignCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  
  * { 
    box-sizing: border-box; 
    margin: 0;
    padding: 0;
  }
  
  body { 
    font-family: 'Inter', -apple-system, sans-serif; 
    min-height: 100vh; 
    padding: 40px 20px; 
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    color: #f8fafc; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }
  
  .card { 
    max-width: 1200px; 
    width: 100%; 
    background: rgba(30, 41, 59, 0.4); 
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px); 
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px; 
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px; 
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
  }

  @keyframes cardEntry {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
    transition: left 0.7s;
    pointer-events: none;
    border-radius: 32px;
  }

  .card:hover::before {
    left: 100%;
  }
  
  h2 { 
    text-align: center; 
    font-weight: 800; 
    font-size: 32px; 
    letter-spacing: -0.5px; 
    margin-bottom: 35px;
    background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding: 20px 25px;
    background: rgba(15, 23, 42, 0.5);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    flex-wrap: wrap;
    gap: 15px;
  }

  #correoAdmin {
    font-weight: 600;
    color: #e2e8f0;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #correoAdmin::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
  }

  .header-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-create-admin {
    padding: 12px 24px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-create-admin:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
  }

  .btn-create-admin:active {
    transform: translateY(0) scale(0.98);
  }

  .btn-create-admin svg {
    width: 18px;
    height: 18px;
  }

  .btn-logout {
    padding: 12px 24px;
    border: none;
    border-radius: 14px;
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid rgba(239, 68, 68, 0.2);
    transition: all 0.3s ease;
  }

  .btn-logout:hover {
    background: #ef4444;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
  }

  .btn-logout:active {
    transform: translateY(0) scale(0.98);
  }
  
  table { 
    width: 100%; 
    border-collapse: separate; 
    border-spacing: 0 10px; 
    margin-top: 20px; 
  }
  
  th { 
    text-transform: uppercase; 
    font-size: 11px; 
    font-weight: 700; 
    letter-spacing: 1.5px; 
    color: #94a3b8; 
    padding: 15px; 
    text-align: left; 
  }
  
  td { 
    padding: 18px 15px; 
    background: rgba(15, 23, 42, 0.4); 
    color: #f1f5f9; 
    font-size: 14px; 
    border-top: 1px solid rgba(255, 255, 255, 0.05); 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    transition: all 0.3s ease;
  }
  
  td:first-child { 
    border-left: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 14px 0 0 14px; 
    font-weight: 600;
  }
  
  td:last-child { 
    border-right: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 0 14px 14px 0; 
  }
  
  tr:hover td { 
    background: rgba(255, 255, 255, 0.07); 
    transform: translateX(5px);
  }

  .btn-action {
    padding: 8px 16px; 
    border: none; 
    border-radius: 10px; 
    background: rgba(99, 102, 241, 0.1); 
    color: #818cf8; 
    font-weight: 600; 
    font-size: 12px; 
    cursor: pointer; 
    transition: all 0.3s ease; 
    border: 1px solid rgba(99, 102, 241, 0.2);
    margin-right: 8px;
    margin-bottom: 5px;
    display: inline-block;
  }

  .btn-action:hover { 
    background: #6366f1; 
    color: white; 
    transform: translateY(-2px); 
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); 
  }

  .btn-action:active { 
    transform: scale(0.95); 
  }

  .btn-action.danger {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border-color: rgba(239, 68, 68, 0.2);
  }

  .btn-action.danger:hover {
    background: #ef4444;
    color: white;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
  }

  .btn-action.toggle {
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    border-color: rgba(34, 197, 94, 0.2);
  }

  .btn-action.toggle:hover {
    background: #22c55e;
    color: white;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
  }

  .btn-action.toggle.inactive {
    background: rgba(245, 158, 11, 0.1);
    color: #fbbf24;
    border-color: rgba(245, 158, 11, 0.2);
  }

  .btn-action.toggle.inactive:hover {
    background: #f59e0b;
    color: white;
    box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
  }

  .btn-action.view {
    background: rgba(59, 130, 246, 0.1);
    color: #60a5fa;
    border-color: rgba(59, 130, 246, 0.2);
  }

  .btn-action.view:hover {
    background: #3b82f6;
    color: white;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
  }
  
  .table-container { 
    overflow-x: auto; 
    border-radius: 16px;
  }

  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .status-indicator.active {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
  }

  .status-indicator.inactive {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  .status-indicator.active .status-dot {
    background: #4ade80;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
  }

  .status-indicator.inactive .status-dot {
    background: #f87171;
    animation: none;
  }

  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
    70% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  td .email-cell {
    font-size: 12px;
    color: #94a3b8;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  td .email-cell:hover {
    color: #60a5fa;
    cursor: pointer;
  }

  /* NUEVO: Badge de aviso de operaciones en tabla */
  .aviso-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .aviso-badge.si {
    background: rgba(139, 92, 246, 0.2);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  .aviso-badge.no {
    display: none;
  }
  
  #modalEdit { 
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left:0; 
    top:0; 
    width:100%; 
    height:100%; 
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    justify-content: center; 
    align-items: center;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  #modalEdit .modal-content { 
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 24px; 
    padding: 35px; 
    width: 650px; 
    max-width: 90%; 
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    display: flex; 
    flex-direction: column; 
    max-height: 90vh; 
    overflow-y: auto;
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .btn-close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 10;
  }

  .btn-close-modal:hover {
    background: #ef4444;
    color: white;
    transform: rotate(90deg);
  }

  .btn-close-modal svg {
    width: 20px;
    height: 20px;
  }

  #modalEdit h3 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    margin-top: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    padding-right: 50px;
  }

  #modalEdit h4 {
    font-size: 16px;
    font-weight: 600;
    color: #60a5fa;
    margin: 25px 0 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  #modalEdit input, #modalEdit select { 
    margin-bottom: 15px; 
    padding: 14px 18px; 
    border-radius: 12px; 
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(15, 23, 42, 0.6);
    color: white;
    font-size: 14px; 
    width: 100%;
    font-family: inherit;
    transition: all 0.3s ease;
  }

  #modalEdit input:focus {
    border-color: #6366f1;
    background: rgba(15, 23, 42, 0.8);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    outline: none;
  }

  #modalEdit input[readonly] {
    background: rgba(255, 255, 255, 0.05);
    color: #94a3b8;
    cursor: not-allowed;
  }
  
  #modalEdit .modal-buttons { 
    display: flex; 
    justify-content: flex-end; 
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  #modalEdit .modal-buttons button {
    margin: 0;
  }
  
  #modalEdit label { 
    margin-bottom: 8px; 
    display: block; 
    color: #cbd5e1; 
    font-size: 13px; 
    font-weight: 600; 
  }

  #modalEdit hr {
    border: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 25px 0;
  }
  
  .doc-container { 
    margin-bottom: 15px; 
    position: relative; 
    background: rgba(15, 23, 42, 0.4);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  /* NUEVO: Estilo especial para documento de aviso de operaciones */
  .doc-container.aviso-doc {
    border-color: rgba(139, 92, 246, 0.3);
    background: rgba(139, 92, 246, 0.05);
  }

  .doc-container strong {
    color: #60a5fa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 10px;
  }

  /* NUEVO: Título especial para aviso */
  .doc-container.aviso-doc strong {
    color: #a78bfa;
  }

  .doc-preview {
    margin-top: 10px;
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
  }

  .doc-preview img {
    max-width: 100%;
    max-height: 200px;
    display: block;
    margin: 0 auto;
  }

  .doc-preview iframe {
    width: 100%;
    height: 250px;
    border: none;
  }

  .doc-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(99, 102, 241, 0.15);
    color: #818cf8;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    border: 1px solid rgba(99, 102, 241, 0.2);
  }

  /* NUEVO: Link especial para aviso */
  .doc-container.aviso-doc .doc-link {
    background: rgba(139, 92, 246, 0.15);
    color: #a78bfa;
    border-color: rgba(139, 92, 246, 0.2);
  }

  .doc-link:hover {
    background: #6366f1;
    color: white;
  }

  .doc-container.aviso-doc .doc-link:hover {
    background: #8b5cf6;
    color: white;
  }

  .doc-container button { 
    position: absolute; 
    right: 10px; 
    top: 10px; 
    font-size: 11px; 
    padding: 6px 12px;
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .doc-container button:hover {
    background: #ef4444;
    color: white;
  }

  .no-docs {
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    padding: 20px;
    background: rgba(15, 23, 42, 0.3);
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.1);
  }

  .file-input-group {
    margin-bottom: 15px;
  }

  .file-input-group label {
    display: block;
    margin-bottom: 8px;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
  }

  .file-input-group input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.2);
    background: rgba(15, 23, 42, 0.4);
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .file-input-group input[type="file"]:hover {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
  }

  /* NUEVO: Estilo especial para input de aviso */
  .file-input-group.aviso-group label {
    color: #a78bfa;
  }

  .file-input-group.aviso-group input[type="file"]:hover {
    border-color: #8b5cf6;
    background: rgba(139, 92, 246, 0.1);
  }

  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 16px 24px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    z-index: 2000;
    transform: translateX(400px);
    transition: transform 0.3s ease;
    max-width: 350px;
  }

  .toast.show {
    transform: translateX(0);
  }

  .toast.success {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
  }

  .toast.error {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
  }

  /* NUEVO: Toggle de aviso en modal */
  .aviso-toggle-modal {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 12px;
    border: 1px solid rgba(139, 92, 246, 0.2);
    margin-bottom: 15px;
  }

  .aviso-toggle-modal label {
    color: #a78bfa;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .switch-modal {
    position: relative;
    width: 44px;
    height: 24px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .switch-modal.active {
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
    border-color: rgba(139, 92, 246, 0.5);
  }

  .switch-modal-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
  }

  .switch-modal.active .switch-modal-thumb {
    transform: translateX(20px);
  }

  @media (max-width: 768px) {
    .card {
      padding: 30px 20px;
      border-radius: 24px;
    }

    h2 {
      font-size: 26px;
    }

    .header-bar {
      flex-direction: column;
      text-align: center;
    }

    .header-buttons {
      width: 100%;
      justify-content: center;
    }

    th {
      font-size: 10px;
      padding: 10px 8px;
    }

    td {
      padding: 14px 10px;
      font-size: 13px;
    }

    .btn-action {
      padding: 6px 12px;
      font-size: 11px;
      margin-bottom: 5px;
    }

    td .email-cell {
      max-width: 100px;
    }

    .btn-close-modal {
      top: 15px;
      right: 15px;
      width: 35px;
      height: 35px;
    }

    #modalEdit h3 {
      font-size: 20px;
      padding-right: 40px;
    }

    .toast {
      left: 20px;
      right: 20px;
      max-width: none;
    }
  }
</style>
</head>
<body>

<div class="card">
  <h2>Panel Administrador</h2>
  
  <div class="header-bar">
    <span id="correoAdmin"></span>
    <div class="header-buttons">
      <button class="btn-create-admin" onclick="window.location.href='admin.html'">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
        </svg>
        Crear Admin
      </button>
      <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
  </div>

  <div class="table-container">
    <table id="tabla">
      <thead>
        <tr>
          <th>Estado</th>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Cédula</th>
          <th>Placa</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="modalEdit">
  <div class="modal-content">
    <button class="btn-close-modal" onclick="cerrarModal()" title="Cerrar">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let conductorEditId = null;
let conductorEditActivo = null;
let conductorEditAviso = false; // NUEVO
const emailCache = new Map();

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.classList.add('show');
  setTimeout(() => {

async function verificarAdmin(){
  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;
  if(!user){ window.location.href="dashboard.html"; return; }
  document.getElementById("correoAdmin").textContent = user.email;

  const { data: perfil } = await supabaseClient.from("admins").select("*").eq("email", user.email).single();
  if(!perfil){ alert("Acceso denegado."); window.location.href="dashboard.html"; return; }

  cargarConductores();
}

async function cerrarSesion(){ 
  await supabaseClient.auth.signOut(); 
  window.location.href="dashboard.html"; 
}

async function obtenerEmailDesdeAuth(authUserId) {
  if (!authUserId) return "No registrado";
  
  if (emailCache.has(authUserId)) {
    return emailCache.get(authUserId);
  }

  try {
    const { data, error } = await supabaseClient.rpc('get_user_email', {
      user_id: authUserId
    });
    
    if (error) {
      console.error("Error RPC:", error);
      const { data: conductorData } = await supabaseClient
        .from("conductores")
        .select("email")
        .eq("auth_user_id", authUserId)
        .single();
      
      const email = conductorData?.email || "No disponible";
      emailCache.set(authUserId, email);
      return email;
    }
    
    const email = data || "No disponible";
    emailCache.set(authUserId, email);
    return email;
    
  } catch (e) {
    console.error("Error obteniendo email:", e);
    return "Error al obtener";
  }
}

function obtenerEstadoConductor(c) {
  return c.estado !== false;
}

async function cargarConductores(){
  const { data, error } = await supabaseClient.from("conductores").select("*");
  if(error){ 
    console.error("Error cargando conductores:", error); 
    showToast("Error cargando conductores", "error");
    return; 
  }

  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  for (const c of data) {
    let email = "Cargando...";
    
    if (c.auth_user_id) {
      email = await obtenerEmailDesdeAuth(c.auth_user_id);
    } else {
      email = c.email || "No registrado";
    }

    const tr = document.createElement("tr");
    const isActive = obtenerEstadoConductor(c);
    const tieneAviso = c.tiene_aviso_operaciones === true; // NUEVO
    
    const statusClass = isActive ? 'active' : 'inactive';
    const statusText = isActive ? 'Activo' : 'Inactivo';
    
    tr.innerHTML = `
      <td>
        <span class="status-indicator ${statusClass}">
          <span class="status-dot"></span>
          ${statusText}
        </span>
      </td>
      <td style="font-weight:600;">
        ${c.nombres} ${c.apellidos}
        ${tieneAviso ? '<span class="aviso-badge si" title="Tiene Aviso de Operaciones">📋 Aviso</span>' : ''}
      </td>
      <td>
        <div class="email-cell" title="${email}">${email}</div>
      </td>
      <td>${c.cedula}</td>
      <td style="font-family: monospace; letter-spacing:1px; color: #60a5fa;">${c.placa}</td>
      <td>
        <button class="btn-action view" onclick="abrirModal('${c.id}')">Ver/Editar</button>
        <button class="btn-action toggle ${!isActive ? 'inactive' : ''}" onclick="toggleActivo('${c.id}')">
          ${isActive ? 'Deshabilitar' : 'Habilitar'}
        </button>
        <button class="btn-action danger" onclick="eliminar('${c.id}')">Eliminar</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

// NUEVO: Toggle de aviso en modal
function toggleAvisoModal() {
  const switchEl = document.getElementById('modalAvisoSwitch');
  conductorEditAviso = !conductorEditAviso;
  
  if (conductorEditAviso) {
    switchEl.classList.add('active');
  } else {
    switchEl.classList.remove('active');
  }
}

async function abrirModal(id){
  conductorEditId = id;
  const { data: c, error } = await supabaseClient.from("conductores").select("*").eq("id", id).single();
  
  if(error || !c) {
    showToast("Error cargando conductor", "error");
    return;
  }

  conductorEditActivo = obtenerEstadoConductor(c);
  conductorEditAviso = c.tiene_aviso_operaciones === true; // NUEVO

  let email = "No disponible";
  if (c.auth_user_id) {
    email = await obtenerEmailDesdeAuth(c.auth_user_id);
  } else {
    email = c.email || "No registrado";
  }

  document.getElementById("editEmail").value = email;
  document.getElementById("editNombres").value = c.nombres || "";
  document.getElementById("editApellidos").value = c.apellidos || "";
  document.getElementById("editDireccion").value = c.direccion || "";
  document.getElementById("editCelular").value = c.celular || "";
  document.getElementById("editCedula").value = c.cedula || "";
  document.getElementById("editLicencia").value = c.licencia || "";
  document.getElementById("editPlaca").value = c.placa || "";
  document.getElementById("editModelo").value = c.modelo || "";
  document.getElementById("editMarca").value = c.marca || "";
  document.getElementById("editColor").value = c.color || "";
  document.getElementById("editPoliza").value = c.poliza_numero || "";
  document.getElementById("editMotivo").value = c.motivo_desactivacion || "";

  // NUEVO: Configurar toggle de aviso
  const avisoSwitch = document.getElementById("modalAvisoSwitch");
  if (conductorEditAviso) {
    avisoSwitch.classList.add('active');
  } else {
    avisoSwitch.classList.remove('active');
  }

  const btnToggle = document.getElementById("btnToggleModal");
  btnToggle.textContent = conductorEditActivo ? "Deshabilitar" : "Habilitar";
  btnToggle.className = `btn-action toggle ${!conductorEditActivo ? 'inactive' : ''}`;

  await cargarDocumentos(id);
  
  const modal = document.getElementById("modalEdit");
  modal.style.display = "flex";
  modal.querySelector('.modal-content').scrollTop = 0;
}

async function toggleDesdeModal() {
  if (!conductorEditId) return;
  await toggleActivo(conductorEditId, conductorEditActivo);
}

async function toggleActivo(id, estadoDesdeModal = null){
  console.log("Toggle iniciado - ID:", id);
  
  if (!id) {
    showToast("Error: ID no válido", "error");
    return;
  }

  try {
    let estadoActual;
    
    if (estadoDesdeModal !== null) {
      estadoActual = estadoDesdeModal;
      console.log("Usando estado desde modal:", estadoActual);
    } else {
      console.log("Consultando estado actual en BD...");
      const { data: conductor, error: fetchError } = await supabaseClient
        .from("conductores")
        .select("estado")
        .eq("id", id)
        .single();
      
      if (fetchError) {
        console.error("Error al consultar estado:", fetchError);
        showToast("Error al verificar estado actual", "error");
        return;
      }
      
      estadoActual = obtenerEstadoConductor(conductor);
      console.log("Estado actual en BD:", conductor.estado, "-> interpretado como:", estadoActual);
    }

    let motivo = "";
    if(estadoActual){
      motivo = prompt("Ingrese motivo de desactivación:");
      if(!motivo || motivo.trim() === ""){ 
        showToast("Debe ingresar un motivo para desactivar", "error"); 
        return; 
      }
    }
    
    const nuevoEstado = !estadoActual;
    console.log("Cambiando estado de", estadoActual, "a", nuevoEstado);
    
    const updateData = {
      estado: nuevoEstado,
      motivo_desactivacion: estadoActual ? motivo.trim() : null
    };
    
    console.log("Enviando update:", updateData);
    
    const { data, error } = await supabaseClient
      .from("conductores")
      .update(updateData)
      .eq("id", id)
      .select();
      
    if(error){ 
      console.error("Error en toggle:", error);
      showToast("Error: " + error.message, "error"); 
      return; 
    }
    
    console.log("Actualizado correctamente:", data);
    showToast(estadoActual ? "Conductor deshabilitado" : "Conductor habilitado", "success");
    
    await cargarConductores();
    
    if (conductorEditId === id) {
      conductorEditActivo = nuevoEstado;
      const btnToggle = document.getElementById("btnToggleModal");
      btnToggle.textContent = nuevoEstado ? "Deshabilitar" : "Habilitar";
      btnToggle.className = `btn-action toggle ${!nuevoEstado ? 'inactive' : ''}`;
    }
    
  } catch (err) {
    console.error("Error inesperado en toggle:", err);
    showToast("Error inesperado: " + err.message, "error");
  }
}

async function eliminar(id){
  if(!id) {
    showToast("Error: ID no válido", "error");
    return;
  }

  if(!confirm("¿Seguro de eliminar este conductor permanentemente? Esta acción no se puede deshacer.")) return;
  
  showToast("Eliminando conductor...", "success");
  
  try {
    const { data: docs } = await supabaseClient
      .from("documentos")
      .select("url_archivo")
      .eq("conductor_id", id);
      
    if (docs && docs.length > 0) {
      const filesToRemove = docs
        .filter(d => d.url_archivo)
        .map(d => d.url_archivo);
        
      if (filesToRemove.length > 0) {
        await supabaseClient.storage
          .from("documentos-conductores")
          .remove(filesToRemove);
      }
    }
    
    await supabaseClient.from("documentos").delete().eq("conductor_id", id);
    
    const { error } = await supabaseClient
      .from("conductores")
      .delete()
      .eq("id", id);
    
    if(error){ 
      throw error;
    }
    
    showToast("Conductor eliminado correctamente", "success");
    
    if (conductorEditId === id) {
      cerrarModal();
    }
    
    await cargarConductores();
    
  } catch (error) {
    console.error("Error eliminando:", error);
    showToast("Error al eliminar: " + error.message, "error");
  }
}

async function cargarDocumentos(conductorId) {
  const { data: docs, error } = await supabaseClient
    .from("documentos")
    .select("*")
    .eq("conductor_id", conductorId);
    
  const divDocs = document.getElementById("documentosExistentes");
  divDocs.innerHTML = "";

  if(error || !docs || docs.length === 0){
    divDocs.innerHTML = '<div class="no-docs">No hay documentos cargados</div>';
    return;
  }

  for (const d of docs) {
    const container = document.createElement("div");
    container.className = "doc-container";
    
    // NUEVO: Clase especial para aviso de operaciones
    if (d.tipo === 'AVISO_OPERACIONES') {
      container.classList.add('aviso-doc');
    }

    const title = document.createElement("strong");
    title.textContent = d.tipo.replace(/_/g, ' ');
    container.appendChild(title);

    if(d.url_archivo){
      const { data: signedUrl } = await supabaseClient.storage
        .from("documentos-conductores")
        .createSignedUrl(d.url_archivo, 3600);

      const url = signedUrl?.signedUrl || d.url_archivo;
      const ext = d.url_archivo.split('.').pop().toLowerCase();
      
      const previewDiv = document.createElement("div");
      previewDiv.className = "doc-preview";

      if(["png","jpg","jpeg","gif","webp"].includes(ext)){
        const img = document.createElement("img");
        img.src = url;
        img.alt = d.tipo;
        previewDiv.appendChild(img);
      } else if(ext === "pdf"){
        const iframe = document.createElement("iframe");
        iframe.src = url;
        previewDiv.appendChild(iframe);
      }
      
      if (previewDiv.children.length > 0) {
        container.appendChild(previewDiv);
      }

      const link = document.createElement("a");
      link.href = url;
      link.target = "_blank";
      link.className = "doc-link";
      link.innerHTML = `
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
        Ver / Descargar
      `;
      container.appendChild(link);
    }

    const btnDel = document.createElement("button");
    btnDel.textContent = "Eliminar";
    btnDel.onclick = async () => {
      if(!confirm(`¿Eliminar documento ${d.tipo}?`)) return;
      
      if (d.url_archivo) {
        await supabaseClient.storage
          .from("documentos-conductores")
          .remove([d.url_archivo]);
      }
      
      const { error } = await supabaseClient
        .from("documentos")
        .delete()
        .eq("id", d.id);
        
      if(error){ 
        showToast("Error eliminando: " + error.message, "error"); 
        return; 
      }
      
      await cargarDocumentos(conductorEditId);
      showToast("Documento eliminado", "success");
    };
    container.appendChild(btnDel);
    divDocs.appendChild(container);
  }
}

async function guardarEdicion(){
  if(!conductorEditId) {
    showToast("Error: No hay conductor seleccionado", "error");
    return;
  }

  const campos = {
    nombres: document.getElementById("editNombres").value.trim(),
    apellidos: document.getElementById("editApellidos").value.trim(),
    direccion: document.getElementById("editDireccion").value.trim(),
    celular: document.getElementById("editCelular").value.trim(),
    cedula: document.getElementById("editCedula").value.trim(),
    licencia: document.getElementById("editLicencia").value.trim(),
    placa: document.getElementById("editPlaca").value.trim(),
    modelo: document.getElementById("editModelo").value.trim(),
    marca: document.getElementById("editMarca").value.trim(),
    color: document.getElementById("editColor").value.trim(),
    poliza_numero: document.getElementById("editPoliza").value.trim(),
    tiene_aviso_operaciones: conductorEditAviso // NUEVO
  };
  
  const motivo = document.getElementById("editMotivo").value.trim();
  campos.motivo_desactivacion = motivo || null;
  
  const { error } = await supabaseClient
    .from("conductores")
    .update(campos)
    .eq("id", conductorEditId);
    
  if(error){ 
    showToast("Error al guardar: " + error.message, "error"); 
    return; 
  }
  
  await subirNuevosDocumentos();
  
  showToast("Cambios guardados correctamente", "success");
  cerrarModal();
  await cargarConductores();
}

async function subirNuevosDocumentos() {
  const documentos = [
    { id: 'editCedulaDoc', tipo: 'CEDULA' },
    { id: 'editLicenciaDoc', tipo: 'LICENCIA' },
    { id: 'editRegistroDoc', tipo: 'REGISTRO' },
    { id: 'editPolizaDoc', tipo: 'POLIZA' },
    { id: 'editFotoVehiculo', tipo: 'FOTO_VEHICULO' },
    { id: 'editFotoConductor', tipo: 'FOTO_CONDUCTOR' },
    { id: 'editAuthPropietario', tipo: 'AUTH_PROPIETARIO' },
    { id: 'editAvisoOperaciones', tipo: 'AVISO_OPERACIONES' } // NUEVO
  ];

  for (const doc of documentos) {
    const input = document.getElementById(doc.id);
    if (input && input.files && input.files[0]) {
      const file = input.files[0];
      const path = `${conductorEditId}/${doc.tipo}_${Date.now()}_${file.name}`;
      
      const { error: uploadError } = await supabaseClient.storage
        .from("documentos-conductores")
        .upload(path, file);
        
      if (uploadError) {
        console.error("Error subiendo " + doc.tipo + ":", uploadError);
        continue;
      }
      
      const { data: existing } = await supabaseClient
        .from("documentos")
        .select("id")
        .eq("conductor_id", conductorEditId)
        .eq("tipo", doc.tipo)
        .single();
        
      if (existing) {
        await supabaseClient
          .from("documentos")
          .update({ url_archivo: path })
          .eq("id", existing.id);
      } else {
        await supabaseClient
          .from("documentos")
          .insert([{
            conductor_id: conductorEditId,
            tipo: doc.tipo,
            url_archivo: path
          }]);
      }
    }
  }
}

function cerrarModal(){ 
  conductorEditId = null; 
  conductorEditActivo = null;
  conductorEditAviso = false; // NUEVO
  document.getElementById("modalEdit").style.display = "none"; 
  document.querySelectorAll('#modalEdit input[type="file"]').forEach(input => input.value = '');
  document.getElementById('modalAvisoSwitch').classList.remove('active'); // NUEVO
}

document.getElementById("modalEdit").addEventListener("click", function(e) {
  if(e.target === this) cerrarModal();
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") cerrarModal();
});

verificarAdmin();
