<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - NRDesignCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ===== NO TOCAR ===== */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { box-sizing: border-box; outline: none; }
  body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 40px 20px; min-height: 100vh; background: radial-gradient(circle at 50% 0%, #2c3344 0%, #111317 100%); color: #e2e8f0; display: flex; justify-content: center; align-items: flex-start; }
  .card { max-width: 1000px; width: 100%; background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5); padding: 40px; }
  h2 { text-align: center; font-weight: 700; font-size: 28px; letter-spacing: -1px; margin-bottom: 35px; background: linear-gradient(to bottom, #ff4d4d, #b30000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 20px; }
  th { text-transform: uppercase; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #94a3b8; padding: 15px; text-align: left; }
  td { padding: 15px; background: rgba(255, 255, 255, 0.03); color: #f1f5f9; font-size: 14px; border-top: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
  td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px 0 0 12px; }
  td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0 12px 12px 0; }
  tr:hover td { background: rgba(255, 255, 255, 0.07); transition: background 0.3s ease; }
  button { padding: 8px 16px; border: none; border-radius: 10px; background: rgba(220, 53, 69, 0.1); color: #ff4d4d; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(220, 53, 69, 0.2); margin-right:5px; }
  button:hover { background: #dc3545; color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3); }
  button:active { transform: scale(0.95); }
  .table-container { overflow-x: auto; }
  #modalEdit { display: none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
  #modalEdit .modal-content { background: rgba(30,41,59,0.95); border-radius: 20px; padding: 30px; width: 500px; max-width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 90%; overflow-y: auto; }
  #modalEdit input, #modalEdit select { margin-bottom: 15px; padding: 10px; border-radius: 10px; border: none; font-size: 14px; width: 100%; }
  #modalEdit .modal-buttons { display: flex; justify-content: flex-end; flex-wrap: wrap; }
  #modalEdit .modal-buttons button { margin-left: 10px; margin-top:5px; }
  #modalEdit label { margin-bottom: 5px; display: block; color: #cbd5e1; font-size: 13px; font-weight: 500; }
  .doc-container { margin-bottom: 10px; position: relative; }
  .doc-container button { position: absolute; right: 0; top: 0; font-size: 10px; padding: 3px 6px; background: rgba(255,0,0,0.2); color: #fff; border-radius:5px; }
</style>
</head>
<body>

<div class="card">
  <h2>Panel Administrador</h2>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
    <span id="correoAdmin" style="font-weight:500;"></span>
    <button style="background:#ff4d4d; color:white;" onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>

  <div class="table-container">
    <table id="tabla">
      <thead>
        <tr>
          <th>Nombre Completo</th>
          <th>Correo</th>
          <th>Cédula</th>
          <th>Placa</th>
          <th>Documentos</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="modalEdit">
  <div class="modal-content">
    <h3>Editar Conductor</h3>
    <label>Correo registrado</label><input type="email" id="editEmail" readonly>
    <label>Nombres</label><input type="text" id="editNombres">
    <label>Apellidos</label><input type="text" id="editApellidos">
    <label>Dirección</label><input type="text" id="editDireccion">
    <label>Celular</label><input type="text" id="editCelular">
    <label>Cédula</label><input type="text" id="editCedula">
    <label>Licencia</label><input type="text" id="editLicencia">
    <label>Placa</label><input type="text" id="editPlaca">
    <label>Modelo</label><input type="text" id="editModelo">
    <label>Marca</label><input type="text" id="editMarca">
    <label>Color</label><input type="text" id="editColor">
    <label>Número de póliza</label><input type="text" id="editPoliza">
    <hr>
    <label>Motivo desactivación (opcional)</label>
    <input type="text" id="editMotivo" placeholder="Solo si deshabilita el perfil">
    <hr>
    <h4>Documentos actuales</h4>
    <div id="documentosExistentes" style="margin-bottom:15px;"></div>
    <label>Cédula (doc)</label><input type="file" id="editCedulaDoc">
    <label>Licencia (doc)</label><input type="file" id="editLicenciaDoc">
    <label>Registro Vehicular</label><input type="file" id="editRegistroDoc">
    <label>Póliza</label><input type="file" id="editPolizaDoc">
    <label>Foto Vehículo</label><input type="file" id="editFotoVehiculo">
    <label>Foto Conductor</label><input type="file" id="editFotoConductor">
    <label>Autorización Propietario</label><input type="file" id="editAuthPropietario">
    <div class="modal-buttons">
      <button onclick="cerrarModal()">Cancelar</button>
      <button onclick="guardarEdicion()">Guardar Cambios</button>
      <button onclick="toggleActivo(conductorEditId, false)">Deshabilitar/Habilitar</button>
      <button onclick="eliminar(conductorEditId)">Eliminar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let conductorEditId = null;

// Verificar admin
async function verificarAdmin(){
  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;
  if(!user){ window.location.href="dashboard.html"; return; }
  document.getElementById("correoAdmin").textContent = "Usuario: " + user.email;

  const { data: perfil } = await supabaseClient.from("admins").select("*").eq("email", user.email).single();
  if(!perfil){ alert("Acceso denegado."); window.location.href="dashboard.html"; return; }

  cargarConductores();
}

// Cerrar sesión
async function cerrarSesion(){ await supabaseClient.auth.signOut(); window.location.href="dashboard.html"; }

// Cargar conductores
async function cargarConductores(){
  const { data, error } = await supabaseClient.from("conductores").select("*");
  if(error){ console.error(error); return; }

  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  data.forEach(c => {
    const tr = document.createElement("tr");
    tr.style.opacity = c.activo===false ? 0.5 : 1;

    tr.innerHTML = `
      <td style="font-weight:500;">${c.nombres} ${c.apellidos}</td>
      <td>${c.email || ''}</td>
      <td>${c.cedula}</td>
      <td style="font-family: monospace; letter-spacing:1px;">${c.placa}</td>
      <td><button onclick="abrirModal('${c.id}')">Ver/Editar</button></td>
      <td>
        <button onclick="toggleActivo('${c.id}',${c.activo})">${c.activo? 'Deshabilitar':'Habilitar'}</button>
        <button onclick="eliminar('${c.id}')">Eliminar</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// Abrir modal
async function abrirModal(id){
  conductorEditId = id;
  const { data: c } = await supabaseClient.from("conductores").select("*").eq("id", id).single();
  if(!c) return;

  document.getElementById("editEmail").value = c.email || "";
  document.getElementById("editNombres").value = c.nombres || "";
  document.getElementById("editApellidos").value = c.apellidos || "";
  document.getElementById("editDireccion").value = c.direccion || "";
  document.getElementById("editCelular").value = c.celular || "";
  document.getElementById("editCedula").value = c.cedula || "";
  document.getElementById("editLicencia").value = c.licencia || "";
  document.getElementById("editPlaca").value = c.placa || "";
  document.getElementById("editModelo").value = c.modelo || "";
  document.getElementById("editMarca").value = c.marca || "";
  document.getElementById("editColor").value = c.color || "";
  document.getElementById("editPoliza").value = c.poliza_numero || "";
  document.getElementById("editMotivo").value = c.motivo_desactivacion || "";

  // Cargar documentos
  const { data: docs } = await supabaseClient.from("documentos").select("*").eq("conductor_id", id);
  const divDocs = document.getElementById("documentosExistentes");
  divDocs.innerHTML = "";

  if(docs && docs.length){
    docs.forEach(d => {
      const container = document.createElement("div");
      container.className = "doc-container";
      const title = document.createElement("strong");
      title.textContent = d.tipo;
      container.appendChild(title);

      const link = document.createElement("a");
      link.href = d.url_archivo;
      link.target = "_blank";
      link.textContent = "Abrir documento";
      link.style.display = "block";
      link.style.color = "#ff4d4d";
      link.style.marginTop = "5px";
      container.appendChild(link);

      const btnDel = document.createElement("button");
      btnDel.textContent="Eliminar";
      btnDel.onclick = async () => {
        if(!confirm(`Eliminar documento ${d.tipo}?`)) return;
        const { error } = await supabaseClient.from("documentos").delete().eq("id", d.id);
        if(error){ alert("Error eliminando: "+error.message); return; }
        abrirModal(conductorEditId);
      };
      container.appendChild(btnDel);
      divDocs.appendChild(container);
    });
  } else divDocs.textContent="No hay documentos cargados.";

  document.getElementById("modalEdit").style.display="flex";
}

// Guardar edición
async function guardarEdicion(){
  const campos = {
    nombres: document.getElementById("editNombres").value.trim(),
    apellidos: document.getElementById("editApellidos").value.trim(),
    direccion: document.getElementById("editDireccion").value.trim(),
    celular: document.getElementById("editCelular").value.trim(),
    cedula: document.getElementById("editCedula").value.trim(),
    licencia: document.getElementById("editLicencia").value.trim(),
    placa: document.getElementById("editPlaca").value.trim(),
    modelo: document.getElementById("editModelo").value.trim(),
    marca: document.getElementById("editMarca").value.trim(),
    color: document.getElementById("editColor").value.trim(),
    poliza_numero: document.getElementById("editPoliza").value.trim(),
    motivo_desactivacion: document.getElementById("editMotivo").value.trim()
  };
  const { error } = await supabaseClient.from("conductores").update(campos).eq("id", conductorEditId);
  if(error){ alert("Error al guardar: "+error.message); return; }
  cerrarModal();
  cargarConductores();
}

// Toggle activo/desactivo
async function toggleActivo(id,actual){
  let motivo="";
  if(actual){
    motivo=prompt("Ingrese motivo de desactivación para el conductor:");
    if(!motivo){ alert("Debe ingresar un motivo."); return; }
  }
  const { error } = await supabaseClient.from("conductores").update({activo:!actual, motivo_desactivacion:motivo}).eq("id",id);
  if(error){ alert("Error actualizando estado: "+error.message); return; }
  cargarConductores();
}

// Eliminar
async function eliminar(id){
  if(!confirm("¿Seguro de eliminar este conductor?")) return;
  const { error } = await supabaseClient.from("conductores").delete().eq("id",id);
  if(error){ alert("Error al eliminar: "+error.message); } else { cargarConductores(); }
}

// Cerrar modal
function cerrarModal(){ conductorEditId=null; document.getElementById("modalEdit").style.display="none"; }

verificarAdmin();
</script>
</body>
</html>
