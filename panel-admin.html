<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Administración - Road To</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="color-scheme" content="dark">

<!-- Supabase y QRCode -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-left: env(safe-area-inset-left);
    --safe-right: env(safe-area-inset-right);
    --primary: #3b82f6;
    --accent: #8b5cf6;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 40px 20px;
    padding-top: calc(80px + var(--safe-top));
    padding-bottom: calc(20px + var(--safe-bottom));
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  /* Header con navegación */
  .app-header {
    position: fixed;
    top: calc(10px + var(--safe-top));
    left: calc(10px + var(--safe-left));
    right: calc(10px + var(--safe-right));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    padding: 10px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .brand-small {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 14px;
    color: #f8fafc;
    text-decoration: none;
  }

  .brand-small svg {
    width: 24px;
    height: 24px;
    color: var(--primary);
  }

  .nav-buttons {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    -webkit-touch-callout: none;
    user-select: none;
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  .nav-btn svg {
    width: 20px;
    height: 20px;
  }

  .card {
    max-width: 1200px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(124, 58, 237, 0.1) 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(139, 92, 246, 0.3);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
    animation: iconPulse 3s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2); }
    50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.3); }
  }

  .header-icon svg {
    width: 35px;
    height: 35px;
    color: #a78bfa;
  }

  h2 {
    color: #ffffff;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 15px;
    font-weight: 400;
  }

  /* Stats cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: rgba(15, 23, 42, 0.5);
    border-radius: 20px;
    padding: 25px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.3s ease;
  }

  .stat-card:hover {
    transform: translateY(-5px);
    border-color: rgba(255, 255, 255, 0.15);
  }

  .stat-value {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 5px;
  }

  .stat-card.total .stat-value { color: #60a5fa; }
  .stat-card.active .stat-value { color: #4ade80; }
  .stat-card.pending .stat-value { color: #fbbf24; }
  .stat-card.inactive .stat-value { color: #f87171; }

  .stat-label {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Filtros */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 10px 20px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-touch-callout: none;
    user-select: none;
  }

  .filter-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
  }

  .filter-btn.active {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    border-color: transparent;
  }

  /* Tabla */
  .table-container {
    overflow-x: auto;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.08);
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
  }

  thead {
    background: rgba(255, 255, 255, 0.05);
  }

  th {
    padding: 16px;
    text-align: left;
    font-weight: 600;
    color: #94a3b8;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  td {
    padding: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.3s ease;
  }

  tr:hover td {
    background: rgba(255, 255, 255, 0.03);
  }

  .conductor-name {
    font-weight: 600;
    color: #e2e8f0;
  }

  .conductor-email {
    font-size: 12px;
    color: #64748b;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .conductor-email:hover {
    color: #60a5fa;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .status-badge.active {
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }

  .status-badge.pending {
    background: rgba(245, 158, 11, 0.1);
    color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.3);
  }

  .status-badge.inactive {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }

  .aviso-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 8px;
    background: rgba(139, 92, 246, 0.2);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-touch-callout: none;
    user-select: none;
  }

  .action-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(1.1);
  }

  .action-btn.view:hover { color: #60a5fa; background: rgba(59, 130, 246, 0.15); }
  .action-btn.edit:hover { color: #fbbf24; background: rgba(245, 158, 11, 0.15); }
  .action-btn.qr:hover { color: #a78bfa; background: rgba(139, 92, 246, 0.15); }
  .action-btn.toggle:hover { color: #4ade80; background: rgba(34, 197, 94, 0.15); }
  .action-btn.toggle.inactive:hover { color: #f87171; background: rgba(239, 68, 68, 0.15); }
  .action-btn.delete:hover { color: #f87171; background: rgba(239, 68, 68, 0.15); }

  /* Botones de acción principales */
  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-primary, .btn-secondary, .btn-success, .btn-danger, .btn-warning {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-touch-callout: none;
    user-select: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: #e2e8f0;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .btn-success {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: white;
  }

  .btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
  }

  .btn-danger {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .btn-danger:hover {
    background: rgba(239, 68, 68, 0.2);
  }

  .btn-warning {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
  }

  .btn-warning:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
  }

  /* Modales */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 2000;
    display: none;
    justify-content: center;
    align-items: flex-end;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    animation: fadeIn 0.3s ease;
  }

  .modal-overlay.centered {
    align-items: center;
  }

  .modal-overlay.show {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    max-width: 650px;
    width: 100%;
    max-height: 85vh;
    background: rgba(30, 41, 59, 0.98);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px 24px 0 0;
    padding: 35px 25px calc(35px + var(--safe-bottom));
    box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.8);
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .modal-overlay.centered .modal-content {
    border-radius: 24px;
    max-width: 500px;
    animation: scaleIn 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(100%); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-right: 50px;
  }

  .modal-title {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
  }

  .modal-close:hover {
    background: #ef4444;
    color: white;
    transform: rotate(90deg);
  }

  /* Formularios */
  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s;
    -webkit-appearance: none;
    appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    outline: none;
  }

  .form-group input[readonly] {
    background: rgba(255, 255, 255, 0.05);
    color: #94a3b8;
    cursor: not-allowed;
  }

  .form-group textarea {
    min-height: 80px;
    resize: vertical;
  }

  /* Toggle Aviso */
  .aviso-toggle-modal {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 12px;
    border: 1px solid rgba(139, 92, 246, 0.2);
    margin-bottom: 15px;
  }

  .aviso-toggle-modal label {
    color: #a78bfa;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .switch-modal {
    position: relative;
    width: 44px;
    height: 24px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .switch-modal.active {
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
    border-color: rgba(139, 92, 246, 0.5);
  }

  .switch-modal-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
  }

  .switch-modal.active .switch-modal-thumb {
    transform: translateX(20px);
  }

  /* Documentos */
  .doc-section h4 {
    font-size: 16px;
    font-weight: 600;
    color: #60a5fa;
    margin: 25px 0 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .doc-container {
    margin-bottom: 15px;
    position: relative;
    background: rgba(15, 23, 42, 0.4);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .doc-container.aviso-doc {
    border-color: rgba(139, 92, 246, 0.3);
    background: rgba(139, 92, 246, 0.05);
  }

  .doc-container strong {
    color: #60a5fa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 10px;
  }

  .doc-container.aviso-doc strong {
    color: #a78bfa;
  }

  .doc-preview {
    margin-top: 10px;
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
  }

  .doc-preview img {
    max-width: 100%;
    max-height: 200px;
    display: block;
    margin: 0 auto;
  }

  .doc-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(99, 102, 241, 0.15);
    color: #818cf8;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    border: 1px solid rgba(99, 102, 241, 0.2);
    margin-top: 8px;
  }

  .doc-container.aviso-doc .doc-link {
    background: rgba(139, 92, 246, 0.15);
    color: #a78bfa;
    border-color: rgba(139, 92, 246, 0.2);
  }

  .doc-link:hover {
    background: #6366f1;
    color: white;
  }

  .doc-container.aviso-doc .doc-link:hover {
    background: #8b5cf6;
    color: white;
  }

  .doc-container button {
    position: absolute;
    right: 10px;
    top: 10px;
    font-size: 11px;
    padding: 6px 12px;
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .doc-container button:hover {
    background: #ef4444;
    color: white;
  }

  .no-docs {
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    padding: 20px;
    background: rgba(15, 23, 42, 0.3);
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.1);
  }

  .file-input-group {
    margin-bottom: 15px;
  }

  .file-input-group label {
    display: block;
    margin-bottom: 8px;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
  }

  .file-input-group input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.2);
    background: rgba(15, 23, 42, 0.4);
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .file-input-group input[type="file"]:hover {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
  }

  .file-input-group.aviso-group label {
    color: #a78bfa;
  }

  .file-input-group.aviso-group input[type="file"]:hover {
    border-color: #8b5cf6;
    background: rgba(139, 92, 246, 0.1);
  }

<script>
// Capacitor Detection
const isCapacitor = typeof window !== 'undefined' && window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();

let App, SplashScreen, StatusBar, Keyboard, Network, Dialog, Browser, Haptics, Preferences, Share;

if (isCapacitor) {
  const { Plugins } = window.Capacitor;
  App = Plugins.App;
  SplashScreen = Plugins.SplashScreen;
  StatusBar = Plugins.StatusBar;
  Keyboard = Plugins.Keyboard;
  Network = Plugins.Network;
  Dialog = Plugins.Dialog;
  Browser = Plugins.Browser;
  Haptics = Plugins.Haptics;
  Preferences = Plugins.Preferences;
  Share = Plugins.Share;
  
  if (StatusBar) {
    StatusBar.setStyle({ style: 'Dark' });
    StatusBar.setBackgroundColor({ color: '#0f172a' });
  }
  
  if (App) {
    App.addListener('backButton', ({ canGoBack }) => {
      if (document.getElementById('editModal').classList.contains('show')) {
        closeEditModal();
      } else if (document.getElementById('qrModal').classList.contains('show')) {
        closeQrModal();
      } else if (canGoBack) {
        window.history.back();
      } else {
        App.exitApp();
      }
    });
    
    App.addListener('appStateChange', ({ isActive }) => {
      if (isActive) {
        cargarConductores();
      }
    });
  }
}

const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allConductores = [];
let currentFilter = 'todos';
let conductorEditId = null;
let conductorEditActivo = null;
let conductorEditAviso = false;
const emailCache = new Map();

// Variables para QR
let currentQRConductor = null;
let currentQRDataUrl = null;

// Funciones de utilidad
function showLoading(text = 'Cargando...') {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) {
    overlay.querySelector('.loading-text').textContent = text;
    overlay.classList.add('show');
  }
}

function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) {
    overlay.classList.remove('show');
  }
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.classList.add('show');
  
  if (isCapacitor && Haptics) {
    if (type === 'error') {
      Haptics.impact({ style: 'Heavy' }).catch(() => {});
    } else {
      Haptics.impact({ style: 'Light' }).catch(() => {});
    }
  }
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Navegación
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = 'home.html';
  }
}

function goHome() {
  window.location.href = 'home.html';
}

function goToCreateAdmin() {
  window.location.href = 'admin.html';
}

// Verificación de admin
async function verificarAdmin() {
  showLoading('Verificando acceso...');
  
  try {
    const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
    
    if (userError || !user) {
      window.location.href = "home.html";
      return;
    }

    const { data: adminData, error: adminError } = await supabaseClient
      .from('admins')
      .select('auth_user_id')
      .eq('auth_user_id', user.id)
      .maybeSingle();

    if (!adminData) {
      window.location.href = "perfil.html";
      return;
    }

    await cargarConductores();
    hideLoading();
    
    if (isCapacitor && SplashScreen) {
      SplashScreen.hide();
    }
  } catch (error) {
    console.error('Error verificando admin:', error);
    hideLoading();
    showToast('Error de conexión', 'error');
  }
}

async function obtenerEmailDesdeAuth(authUserId) {
  if (!authUserId) return "No registrado";
  
  if (emailCache.has(authUserId)) {
    return emailCache.get(authUserId);
  }

  try {
    const { data, error } = await supabaseClient.rpc('get_user_email', {
      user_id: authUserId
    });
    
    if (error) {
      const { data: conductorData } = await supabaseClient
        .from("conductores")
        .select("email")
        .eq("auth_user_id", authUserId)
        .single();
      
      const email = conductorData?.email || "No disponible";
      emailCache.set(authUserId, email);
      return email;
    }
    
    const email = data || "No disponible";
    emailCache.set(authUserId, email);
    return email;
    
  } catch (e) {
    return "Error al obtener";
  }
}

function obtenerEstadoConductor(c) {
  if (c.estado === 'activo' || c.estado === true) return 'activo';
  if (c.estado === 'pendiente') return 'pendiente';
  if (c.estado === 'inactivo' || c.estado === false) return 'inactivo';
  return 'pendiente';
}

// Cargar conductores
async function cargarConductores() {
  try {
    const { data: conductores, error } = await supabaseClient
      .from('conductores')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;

    allConductores = conductores || [];
    updateStats();
    renderTable();

  } catch (error) {
    console.error('Error:', error);
    showToast('Error al cargar conductores', 'error');
  }
}

function updateStats() {
  const total = allConductores.length;
  const active = allConductores.filter(c => obtenerEstadoConductor(c) === 'activo').length;
  const pending = allConductores.filter(c => obtenerEstadoConductor(c) === 'pendiente').length;
  const inactive = allConductores.filter(c => obtenerEstadoConductor(c) === 'inactivo').length;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('activeCount').textContent = active;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('inactiveCount').textContent = inactive;
}

async function renderTable() {
  const tbody = document.getElementById('conductoresTable');
  
  let filtered = allConductores;
  if (currentFilter !== 'todos') {
    filtered = allConductores.filter(c => obtenerEstadoConductor(c) === currentFilter);
  }

  if (filtered.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align: center; padding: 40px; color: #64748b;">
          No hay conductores ${currentFilter !== 'todos' ? 'con este filtro' : 'registrados'}
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = '';

  for (const c of filtered) {

async function toggleEstado(id) {
  const conductor = allConductores.find(c => c.id === id);
  if (!conductor) return;
  
  const estadoActual = obtenerEstadoConductor(conductor);
  let nuevoEstado;
  let motivo = null;

  if (estadoActual === 'activo') {
    // Pedir motivo para desactivar
    if (isCapacitor && Dialog) {
      const { value } = await Dialog.prompt({
        title: 'Desactivar Conductor',
        message: 'Ingrese motivo de desactivación:',
        inputPlaceholder: 'Motivo...'
      });
      if (!value || value.trim() === '') {
        showToast('Debe ingresar un motivo para desactivar', 'error');
        return;
      }
      motivo = value.trim();
      nuevoEstado = 'inactivo';
    } else {
      const motivoInput = prompt('Ingrese motivo de desactivación:');
      if (!motivoInput || motivoInput.trim() === '') {
        showToast('Debe ingresar un motivo para desactivar', 'error');
        return;
      }
      motivo = motivoInput.trim();
      nuevoEstado = 'inactivo';
    }
  } else {
    nuevoEstado = 'activo';
  }
  
  try {
    const updateData = {
      estado: nuevoEstado,
      motivo_desactivacion: motivo,
      updated_at: new Date().toISOString()
    };
    
    const { error } = await supabaseClient
      .from('conductores')
      .update(updateData)
      .eq('id', id);

    if (error) throw error;

    showToast(`Estado actualizado a ${nuevoEstado}`, 'ok');
    
    if (conductorEditId === id) {
      conductorEditActivo = nuevoEstado === 'activo';
      const btnToggle = document.getElementById('btnToggleModal');
      if (btnToggle) {
        btnToggle.textContent = nuevoEstado === 'activo' ? 'Deshabilitar' : 'Habilitar';
        btnToggle.className = nuevoEstado === 'activo' ? 'btn-warning' : 'btn-success';
      }
    }
    
    cargarConductores();

  } catch (error) {
    showToast('Error al actualizar estado: ' + error.message, 'error');
  }
}

async function cargarDocumentos(conductorId) {
  try {
    const { data: docs, error } = await supabaseClient
      .from("documentos")
      .select("*")
      .eq("conductor_id", conductorId);
      
    const divDocs = document.getElementById("documentosExistentes");
    if (!divDocs) return;
    
    divDocs.innerHTML = "";

    if (error || !docs || docs.length === 0) {
      divDocs.innerHTML = '<div class="no-docs">No hay documentos cargados</div>';
      return;
    }

    for (const d of docs) {
      const container = document.createElement("div");
      container.className = "doc-container";
      
      if (d.tipo === 'AVISO_OPERACIONES') {
        container.classList.add('aviso-doc');
      }

      const title = document.createElement("strong");
      title.textContent = d.tipo.replace(/_/g, ' ');
      container.appendChild(title);

      if (d.url_archivo) {
        const { data: signedUrl } = await supabaseClient.storage
          .from("documentos-conductores")
          .createSignedUrl(d.url_archivo, 3600);

        const url = signedUrl?.signedUrl || d.url_archivo;
        const ext = d.url_archivo.split('.').pop().toLowerCase();
        
        const previewDiv = document.createElement("div");
        previewDiv.className = "doc-preview";

        if (["png", "jpg", "jpeg", "gif", "webp"].includes(ext)) {
          const img = document.createElement("img");
          img.src = url;
          img.alt = d.tipo;
          img.loading = "lazy";
          previewDiv.appendChild(img);
        }
        
        if (previewDiv.children.length > 0) {
          container.appendChild(previewDiv);
        }

        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.className = "doc-link";
        link.innerHTML = `
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
          </svg>
          Ver / Descargar
        `;
        
        if (isCapacitor && Browser) {
          link.onclick = (e) => {
            e.preventDefault();
            Browser.open({ url: url }).catch(() => {
              window.open(url, '_blank');
            });
          };
        }
        
        container.appendChild(link);
      }

      const btnDel = document.createElement("button");
      btnDel.textContent = "Eliminar";
      btnDel.onclick = async () => {
        let confirmado = false;
        
        if (isCapacitor && Dialog) {
          const { value } = await Dialog.confirm({
            title: 'Eliminar Documento',
            message: `¿Eliminar documento ${d.tipo}?`,
            okButtonTitle: 'Eliminar',
            cancelButtonTitle: 'Cancelar'
          });
          confirmado = value;
        } else {
          confirmado = confirm(`¿Eliminar documento ${d.tipo}?`);
        }
        
        if (!confirmado) return;
        
        if (d.url_archivo) {
          await supabaseClient.storage
            .from("documentos-conductores")
            .remove([d.url_archivo]);
        }
        
        const { error } = await supabaseClient
          .from("documentos")
          .delete()
          .eq("id", d.id);
          
        if (error) { 
          showToast("Error eliminando: " + error.message, "error"); 
          return; 
        }
        
        await cargarDocumentos(conductorEditId);
        showToast("Documento eliminado", "success");
      };
      container.appendChild(btnDel);
      divDocs.appendChild(container);
    }
  } catch (err) {
    console.error("Error cargando documentos:", err);
  }
}

async function subirNuevosDocumentos() {
  const documentos = [
    { id: 'editCedulaDoc', tipo: 'CEDULA' },
    { id: 'editLicenciaDoc', tipo: 'LICENCIA' },
    { id: 'editRegistroDoc', tipo: 'REGISTRO' },
    { id: 'editPolizaDoc', tipo: 'POLIZA' },
    { id: 'editFotoVehiculo', tipo: 'FOTO_VEHICULO' },
    { id: 'editFotoConductor', tipo: 'FOTO_CONDUCTOR' },
    { id: 'editAuthPropietario', tipo: 'AUTH_PROPIETARIO' },
    { id: 'editAvisoOperaciones', tipo: 'AVISO_OPERACIONES' }
  ];

  for (const doc of documentos) {
    const input = document.getElementById(doc.id);
    if (input && input.files && input.files[0]) {
      const file = input.files[0];
      const path = `${conductorEditId}/${doc.tipo}_${Date.now()}_${file.name}`;
      
      const { error: uploadError } = await supabaseClient.storage
        .from("documentos-conductores")
        .upload(path, file);
        
      if (uploadError) {
        console.error("Error subiendo " + doc.tipo + ":", uploadError);
        continue;
      }
      
      const { data: existing } = await supabaseClient
        .from("documentos")
        .select("id")
        .eq("conductor_id", conductorEditId)
        .eq("tipo", doc.tipo)
        .single();
        
      if (existing) {
        await supabaseClient
          .from("documentos")
          .update({ url_archivo: path })
          .eq("id", existing.id);
      } else {
        await supabaseClient
          .from("documentos")
          .insert([{
            conductor_id: conductorEditId,
            tipo: doc.tipo,
            url_archivo: path
          }]);
      }
    }
  }
}

async function deleteConductor(id) {
  let confirmado = false;
  
  if (isCapacitor && Dialog) {
    const { value } = await Dialog.confirm({
      title: 'Eliminar Conductor',
      message: '¿Seguro de eliminar este conductor permanentemente? Esta acción no se puede deshacer.',
      okButtonTitle: 'Eliminar',
      cancelButtonTitle: 'Cancelar'
    });
    confirmado = value;
  } else {
    confirmado = confirm("¿Seguro de eliminar este conductor permanentemente? Esta acción no se puede deshacer.");
  }
  
  if (!confirmado) return;
  
  showLoading("Eliminando...");
  
  try {
    const { data: docs } = await supabaseClient
      .from("documentos")
      .select("url_archivo")
      .eq("conductor_id", id);
      
    if (docs && docs.length > 0) {
      const filesToRemove = docs
        .filter(d => d.url_archivo)
        .map(d => d.url_archivo);
        
      if (filesToRemove.length > 0) {
        await supabaseClient.storage
          .from("documentos-conductores")
          .remove(filesToRemove);
      }
    }
    
    await supabaseClient.from("documentos").delete().eq("conductor_id", id);
    
    const { error } = await supabaseClient
      .from("conductores")
      .delete()
      .eq("id", id);
    
    if (error) throw error;
    
    showToast("Conductor eliminado correctamente", "success");
    await cargarConductores();
    
  } catch (error) {
    console.error("Error eliminando:", error);
    showToast("Error al eliminar: " + error.message, "error");
  } finally {
    hideLoading();
  }
}

// Generar QR
async function generateQR(id) {
  const conductor = allConductores.find(c => c.id === id);
  if (!conductor) return;

  showLoading('Generando QR...');
  
  try {
    const publicUrl = `${window.location.origin}/perfil_publico.html?id=${id}`;
    
    const canvas = document.createElement('canvas');
    await QRCode.toCanvas(canvas, publicUrl, {
      width: 280,
      margin: 2,
      color: { dark: '#1e293b', light: '#ffffff' },
      errorCorrectionLevel: 'H'
    });

    // Intentar agregar logo
    try {
      const ctx = canvas.getContext('2d');
      const logo = new Image();
      logo.crossOrigin = "anonymous";
      logo.src = "logo.png";
      
      await new Promise((resolve) => {
        logo.onload = () => {
          const size = canvas.width * 0.22;
          const x = (canvas.width - size) / 2;
          const y = (canvas.height - size) / 2;
          
          ctx.fillStyle = "white";
          ctx.beginPath();
          ctx.arc(canvas.width/2, canvas.height/2, size/2 + 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.drawImage(logo, x, y, size, size);
          resolve();
        };
        logo.onerror = () => resolve();
        setTimeout(resolve, 1000);
      });
    } catch (e) {
      console.log('No se pudo cargar el logo');
    }

    currentQRConductor = {
      id: conductor.id,
      nombres: conductor.nombres,
      apellidos: conductor.apellidos,
      email: conductor.email,
      url: publicUrl
    };
    currentQRDataUrl = canvas.toDataURL('image/png');

    const qrContainer = document.getElementById('qrContainer');
    qrContainer.innerHTML = '';
    qrContainer.appendChild(canvas);

    const qrInfo = document.getElementById('qrConductorInfo');
    qrInfo.innerHTML = `
      <strong>${conductor.nombres || ''} ${conductor.apellidos || ''}</strong>
      <span style="color: #60a5fa;">${conductor.email || ''}</span>
    `;

    hideLoading();
    
    const modal = document.getElementById('qrModal');
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
    
  } catch (error) {
    hideLoading();
    console.error('Error generando QR:', error);
    showToast('Error al generar QR', 'error');
  }
}

async function sendQRByEmail() {
  if (!currentQRConductor || !currentQRDataUrl) return;
  
  showLoading('Enviando email...');
  
  try {
    // Intentar usar Supabase Edge Function
    const response = await fetch(currentQRDataUrl);
    const blob = await response.blob();
    const file = new File([blob], `QR_${currentQRConductor.nombres}_${currentQRConductor.apellidos}.png`, { type: 'image/png' });
    
    const formData = new FormData();
    formData.append('to', currentQRConductor.email);
    formData.append('subject', 'Tu Código QR de Conductor - Road To');
    formData.append('html', `
      <h2>Hola ${currentQRConductor.nombres} ${currentQRConductor.apellidos}</h2>
      <p>Adjunto encontrarás tu código QR de conductor para <strong>Road To</strong>.</p>
      <p>Este código puede ser escaneado para verificar tu perfil público.</p>
      <br>
      <p>URL de tu perfil: ${currentQRConductor.url}</p>
      <br>
      <p>Saludos,<br>Equipo Road To</p>
    `);
    formData.append('attachment', file);

    const { data, error } = await supabaseClient.functions.invoke('send-email', {
      body: formData
    });
    
    if (error) throw error;
    
    hideLoading();
    showToast('Email enviado correctamente', 'success');
    
  } catch (error) {
    console.error('Error enviando email:', error);
    
    // Fallback: Compartir nativo o mailto
    if (isCapacitor && Share) {
      try {
        await Share.share({
          title: 'Código QR de Conductor',
          text: `Tu código QR de Road To\n\nURL: ${currentQRConductor.url}`,
          files: [currentQRDataUrl],
          dialogTitle: 'Enviar QR'
        });
        hideLoading();
        return;
      } catch (shareError) {
        console.log('Share cancelado');
      }
    }
    
    // Fallback final: mailto
    const subject = encodeURIComponent('Tu Código QR de Conductor - Road To');
    const body = encodeURIComponent(`Hola ${currentQRConductor.nombres} ${currentQRConductor.apellidos},\n\nTu código QR está listo. URL: ${currentQRConductor.url}`);
    
    hideLoading();
    window.open(`mailto:${currentQRConductor.email}?subject=${subject}&body=${body}`, '_blank');
    showToast('Se abrió tu cliente de email', 'success');
  }
}

      title: 'Cerrar Sesión',
      message: '¿Deseas cerrar sesión?',
      okButtonTitle: 'Sí',
      cancelButtonTitle: 'No'
    });
    confirmado = value;
  } else {
    confirmado = confirm('¿Deseas cerrar sesión?');
  }
  
  if (!confirmado) return;
  
  showLoading('Cerrando sesión...');
  await supabaseClient.auth.signOut();
  
  if (isCapacitor && Preferences) {
    await Preferences.clear().catch(() => {});
  }
  
  window.location.href = 'home.html';
}

// Event listeners
document.addEventListener('DOMContentLoaded', () => {
  verificarAdmin();
  
  // Cerrar modales al hacer clic fuera
  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeEditModal();
  });
  
  document.getElementById('qrModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeQrModal();
  });
  
  // Tecla Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeEditModal();
      closeQrModal();
    }
  });
  
  // Network status
  if (isCapacitor && Network) {
    Network.addListener('networkStatusChange', status => {
      if (!status.connected) {
        showToast('Sin conexión a internet', 'error');
      } else {
        showToast('Conexión restaurada', 'success');
        cargarConductores();
      }
    });
  }
});

// Prevenir doble tap zoom en móviles
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);
</script>
