<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingreso - Road To</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1208">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --corp-green: #8ac725;
    --corp-green-dark: #448414;
    --corp-green-lime: #9ad93a;
    --corp-green-light: #b8e85c;
    --corp-gray: #7d7d7d;
    --corp-gray-dark: #4a4a4a;
    --corp-gray-light: #9e9e9e;
    --corp-gray-soft: #cbd5e1;
    --corp-blue: #2563eb;
    --corp-blue-dark: #1e40af;
    --corp-blue-light: #3b82f6;
    --corp-orange: #f97316;
    --corp-orange-light: #fb923c;
    --primary: var(--corp-green);
    --primary-dark: var(--corp-green-dark);
    --accent: var(--corp-green-lime);
    --bg-dark: #0a1208;
    --text-light: #eef8e4;
    --text-muted: #8a9e7d;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    padding-top: calc(80px + var(--safe-top));
    padding-bottom: calc(20px + var(--safe-bottom));
    background: radial-gradient(ellipse at 10% 20%, rgba(138, 199, 37, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 90% 80%, rgba(154, 217, 58, 0.1) 0%, transparent 50%), radial-gradient(circle at 50% 0%, #0a1208 0%, #0a1208 100%);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%), radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }
  .app-header {
    position: fixed;
    top: calc(10px + var(--safe-top));
    left: calc(10px + env(safe-area-inset-left));
    right: calc(10px + env(safe-area-inset-right));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    padding: 10px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .brand-small {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 14px;
    color: var(--corp-orange);
    text-decoration: none;
  }
  .brand-small svg { width: 24px; height: 24px; color: var(--corp-orange-light); }
  .nav-buttons { display: flex; gap: 8px; }
  .nav-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  .nav-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn svg { width: 20px; height: 20px; }
  .card {
    max-width: 420px; width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 40px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
  }
  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .header-icon {
    width: 70px; height: 70px; margin: 0 auto 25px;
    background: linear-gradient(135deg, rgba(138, 199, 37, 0.2) 0%, rgba(68, 132, 20, 0.1) 100%);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(138, 199, 37, 0.3);
    box-shadow: 0 10px 30px rgba(68, 132, 20, 0.2);
    animation: iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(68, 132, 20, 0.2); }
    50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(68, 132, 20, 0.3); }
  }
  .header-icon svg { width: 35px; height: 35px; color: var(--corp-green-light); }
  h2 {
    text-align: center; font-weight: 800; font-size: 32px; letter-spacing: -0.5px; margin-bottom: 35px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .input-group { position: relative; margin-bottom: 20px; }
  .input-icon {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    color: #64748b; transition: color 0.3s; pointer-events: none;
  }
  input {
    width: 100%; padding: 16px 20px 16px 50px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px; color: #ffffff; font-size: 15px; font-family: inherit;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  input::placeholder { color: #64748b; }
  input:hover { border-color: rgba(255, 255, 255, 0.2); background: rgba(15, 23, 42, 0.8); }
  input:focus {
    border-color: var(--corp-green); background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 0 0 4px rgba(138, 199, 37, 0.15), 0 4px 20px rgba(138, 199, 37, 0.1);
    outline: none;
  }
  input:focus + .input-icon { color: var(--corp-green-light); }
  .btn-login {
    width: 100%; padding: 18px 28px; margin-top: 10px; border: none; border-radius: 16px;
    background: linear-gradient(135deg, var(--corp-green) 0%, var(--corp-green-dark) 50%, var(--corp-green-lime) 100%);
    color: white; font-size: 16px; font-weight: 700; font-family: inherit;
    cursor: pointer; position: relative; overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(68, 132, 20, 0.2), 0 10px 20px -5px rgba(68, 132, 20, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-login::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
  }
  .btn-login:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 10px 25px -5px rgba(68, 132, 20, 0.5), 0 8px 10px -6px rgba(68, 132, 20, 0.3); }
  .btn-login:hover::before { left: 100%; }
  .btn-login:active { transform: translateY(0) scale(0.98); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-reset {
    width: 100%; padding: 14px 24px; margin-top: 15px; border: none; border-radius: 14px;
    background: rgba(255, 255, 255, 0.05); color: #94a3b8; font-weight: 600; font-size: 14px;
    font-family: inherit; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px); transition: all 0.3s ease;
  }
  .btn-reset:hover { background: rgba(255, 255, 255, 0.1); color: #ffffff; border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
  .msg {
    margin-top: 25px; text-align: center; font-weight: 600; font-size: 14px;
    min-height: 24px; padding: 12px; border-radius: 12px;
    transition: all 0.3s ease; opacity: 0; transform: translateY(-10px);
  }
  .msg.show { opacity: 1; transform: translateY(0); }
  .msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
  .msg.success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #4ade80; }
  .msg.loading { background: rgba(138, 199, 37, 0.1); border: 1px solid rgba(138, 199, 37, 0.3); color: var(--corp-green); }
  .divider {
    height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 25px 0; position: relative;
  }
  .divider::before {
    content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 40px; height: 3px; background: linear-gradient(90deg, var(--corp-green), var(--corp-green-lime)); border-radius: 3px;
  }
  .complete-profile { display: none; animation: fadeIn 0.4s ease; }
  .complete-profile.show { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .complete-profile h3 { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--corp-green-light); }
  .complete-profile p { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .form-group input { padding: 14px 16px; }
  @media (max-width: 480px) {
    .card { padding: 40px 25px; border-radius: 24px; }
    h2 { font-size: 26px; }
    .header-icon { width: 60px; height: 60px; }
    .app-header { padding: 8px; }
  }
</style>
<base target="_blank">
<base target="_blank">
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="brand-small">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7"></path>
      </svg>
      Road To
    </a>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goBack()" title="Regresar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
      </button>
      <button class="nav-btn" onclick="goHome()" title="Inicio">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
      </button>
    </div>
  </header>

<div class="card" id="mainCard">
  <div id="loginForm">
    <div class="header-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
    </div>
    <h2>Ingreso a Road To</h2>
    <div class="input-group">
      <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
      </svg>
      <input id="email" type="email" placeholder="Correo electrónico" autocomplete="email">
    </div>
    <div class="input-group">
      <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
      </svg>
      <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">Ingresar</button>
    <div class="divider"></div>
    <button class="btn-reset" onclick="recuperar()">¿Olvidaste tu contraseña?</button>
    <div id="msg" class="msg"></div>
  </div>

  <div id="completeProfileForm" class="complete-profile">
    <div class="header-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
    </div>
    <h2>Completar Perfil</h2>
    <p>Es tu primera vez. Completa tus datos para continuar.</p>
    <div class="form-group">
      <label>Nombres</label>
      <input id="cp-nombres" type="text" placeholder="Tu nombre">
    </div>
    <div class="form-group">
      <label>Apellidos</label>
      <input id="cp-apellidos" type="text" placeholder="Tu apellido">
    </div>
    <div class="form-group">
      <label>Celular</label>
      <input id="cp-celular" type="text" placeholder="0999999999">
    </div>
    <button class="btn-login" id="cpBtn" onclick="createPassengerProfile()">Guardar y Continuar</button>
    <button class="btn-reset" onclick="logoutAndReturn()">Cancelar</button>
    <div id="cp-msg" class="msg"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUserId = null;
let currentUserEmail = null;

function goBack() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = 'index.html';
}
function goHome() { window.location.href = 'index.html'; }

function showMessage(text, type = '', targetId = 'msg') {
  const msg = document.getElementById(targetId);
  msg.textContent = text;
  msg.className = 'msg show ' + type;
  if (!text) msg.classList.remove('show');
}

function showLoginForm() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('completeProfileForm').classList.remove('show');
}

function showCompleteProfileForm() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('completeProfileForm').classList.add('show');
}

async function logoutAndReturn() {
  await supabaseClient.auth.signOut();
  showLoginForm();
  showMessage("Ingresa nuevamente para registrarte", "", "msg");
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("loginBtn");

  if(!email || !password){
    showMessage("Completa todos los campos", "error");
    return;
  }

  showMessage("Verificando credenciales...", "loading");
  btn.disabled = true;

  try {
    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password });

    if(authError){
      console.error("[LOGIN] Auth error:", authError);
      if(authError.message?.includes("Invalid login")) {
        showMessage("Correo o contraseña incorrectos", "error");
      } else {
        showMessage("Error: " + authError.message, "error");
      }
      btn.disabled = false;
      return;
    }

    const userId = authData.user.id;
    currentUserId = userId;
    currentUserEmail = email;
    console.log("[LOGIN] Usuario autenticado:", userId);

    // 1. Verificar si es admin
    const { data: adminData } = await supabaseClient
      .from('admins').select('auth_user_id').eq('auth_user_id', userId).maybeSingle();

    if(adminData?.auth_user_id){ 
      showMessage("¡Ingreso exitoso! Redirigiendo...", "success");
      setTimeout(() => window.location.href = "panel-admin.html", 1200);
      return;
    }

    // 2. Verificar si es coordinador
    const { data: coordData } = await supabaseClient
      .from('coordinadores').select('auth_user_id').eq('auth_user_id', userId).maybeSingle();

    if(coordData?.auth_user_id){ 
      showMessage("¡Bienvenido coordinador! Redirigiendo...", "success");
      setTimeout(() => window.location.href = "panel-coordinador.html", 1200);
      return;
    }

    // 3. Verificar si es conductor (CORREGIDO: busca por auth_user_id, no por id)
    const { data: conductorData } = await supabaseClient
      .from('conductores').select('id').eq('auth_user_id', userId).maybeSingle();

    if(conductorData) {
      showMessage("¡Bienvenido conductor! Redirigiendo...", "success");
      setTimeout(() => window.location.href = "panel-viajes.html", 1200);
      return;
    }

    // 4. Verificar si es pasajero
    const { data: pasajeroData } = await supabaseClient
      .from('passengers').select('id, status').eq('id', userId).maybeSingle();

    if(pasajeroData) {
      if(pasajeroData.status === 'banned' || pasajeroData.status === 'inactive') {
        showMessage("Tu cuenta está suspendida. Contacta soporte.", "error");
        await supabaseClient.auth.signOut();
        btn.disabled = false;
        return;
      }
      showMessage("¡Bienvenido! Redirigiendo...", "success");
      setTimeout(() => window.location.href = "reservar-viaje.html", 1200);
      return;
    }

    // 5. NO ESTA EN NINGUNA TABLA -> Mostrar formulario de completar perfil
    console.log("[LOGIN] Usuario no encontrado en tablas. Mostrando formulario de completar perfil.");
    showMessage("Es necesario completar tu perfil", "success");
    showCompleteProfileForm();
    btn.disabled = false;

  } catch (err) {
    console.error("[LOGIN] Error inesperado:", err);
    showMessage("Error de conexión: " + err.message, "error");
    btn.disabled = false;
  }
}

async function createPassengerProfile() {
  const nombres = document.getElementById('cp-nombres').value.trim();
  const apellidos = document.getElementById('cp-apellidos').value.trim();
  const celular = document.getElementById('cp-celular').value.trim();
  const btn = document.getElementById('cpBtn');

  if(!nombres || !apellidos || !celular){
    showMessage("Completa todos los campos obligatorios", "error", "cp-msg");
    return;
  }

  showMessage("Creando tu perfil...", "loading", "cp-msg");
  btn.disabled = true;

  try {
    const { error: insertError } = await supabaseClient
      .from('passengers')
      .insert({ 
        id: currentUserId,
        nombres: nombres,
        apellidos: apellidos,
        celular: celular,
        email: currentUserEmail,
        status: 'active'
      });

    if(insertError) {
      console.error("[LOGIN] Error creando pasajero:", insertError);
      showMessage("Error: " + insertError.message, "error", "cp-msg");
      btn.disabled = false;
      return;
    }

    console.log("[LOGIN] Perfil de pasajero creado exitosamente");
    showMessage("¡Perfil creado! Redirigiendo...", "success", "cp-msg");
    setTimeout(() => window.location.href = "reservar-viaje.html", 1500);

  } catch (err) {
    console.error("[LOGIN] Error inesperado:", err);
    showMessage("Error de conexión: " + err.message, "error", "cp-msg");
    btn.disabled = false;
  }
}

async function recuperar(){
  const email = prompt("Ingresa tu correo electrónico registrado:");
  if(!email) return;
  showMessage("Enviando correo de recuperación...", "loading");
  try {
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/reset-password.html"
    });
    if(error){
      showMessage("Error al enviar el correo: " + error.message, "error");
    } else {
      showMessage("Si el correo existe, recibirás un enlace de recuperación", "success");
    }
  } catch (err) {
    showMessage("Error de conexión", "error");
  }
}

document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, false);
</script>
</body>
</html
