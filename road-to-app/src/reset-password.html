<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restablecer Contraseña - Conductor</title>
<!-- Viewport optimizado para Capacitor -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    /* Safe areas para Capacitor */
    padding: 40px 20px;
    padding-top: max(40px, env(safe-area-inset-top));
    padding-bottom: max(40px, env(safe-area-inset-bottom));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    
    background: 
      radial-gradient(ellipse at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, #0f172a 0%, #1e293b 100%);
    
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow-x: hidden;
    /* Prevenir bounce en iOS */
    overscroll-behavior-y: none;
  }

  /* Partículas flotantes sutiles */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.02) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.02) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  .card {
    max-width: 420px;
    width: 100%;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 40px;
    padding-top: max(50px, env(safe-area-inset-top));
    position: relative;
    z-index: 1;
    overflow: hidden;
    animation: slideUp 0.6s ease;
    touch-action: pan-y;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .success-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 25px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
    animation: scaleIn 0.5s ease 0.3s both;
  }

  @keyframes scaleIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  .success-icon svg {
    width: 40px;
    height: 40px;
    color: white;
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 35px;
    line-height: 1.5;
  }

  .strength-meter {
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    margin-top: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    position: relative;
  }

  .strength-bar {
    height: 100%;
    width: 0;
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .strength-text {
    font-size: 12px;
    margin-top: 5px;
    text-align: right;
    color: #64748b;
  }

  .input-group {
    position: relative;
    margin-bottom: 20px;
  }

  .input-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    transition: color 0.3s;
    pointer-events: none;
  }

  input {
    width: 100%;
    padding: 16px 50px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    color: #ffffff;
    font-size: 16px;
    font-family: inherit;
    transition: all 0.3s ease;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: #10b981;
    background: rgba(15, 23, 42, 0.8);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
    outline: none;
  }

  input:focus + .input-icon { color: #34d399; }

  /* Mejoras táctiles para el toggle de contraseña */
  .password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    border-radius: 8px;
    min-width: 44px;
    min-height: 44px;
    touch-action: manipulation;
  }

  .password-toggle:active {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-50%) scale(0.95);
  }

  .password-toggle:hover { 
    color: #94a3b8; 
    background: rgba(255, 255, 255, 0.05);
  }

  .requirements {
    background: rgba(15, 23, 42, 0.4);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .requirement {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #64748b;
    margin-bottom: 8px;
    transition: all 0.3s;
  }

  .requirement:last-child { margin-bottom: 0; }

  .requirement.met { 
    color: #34d399; 
    transform: translateX(4px);
  }

  .requirement-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .requirement.met .requirement-icon {
    background: #10b981;
    border-color: #10b981;
    color: white;
  }

  button[type="submit"], #updateBtn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    min-height: 44px;
  }

  button[type="submit"]::before, #updateBtn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
  }

  button[type="submit"]:hover:not(:disabled), #updateBtn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
  }

  button[type="submit"]:hover::before, #updateBtn:hover::before {
    left: 100%;
  }

  button[type="submit"]:active:not(:disabled), #updateBtn:active:not(:disabled) {
    transform: translateY(0) scale(0.98);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }

  .msg {
    margin-top: 20px;
    padding: 14px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
  }

  .msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  .msg.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    animation: shake 0.5s;
  }

  .msg.success {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #64748b;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.3s;
    padding: 10px;
    border-radius: 8px;
    touch-action: manipulation;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .back-link:hover { 
    color: #94a3b8; 
    background: rgba(255, 255, 255, 0.05);
  }

  .back-link:active {
    transform: scale(0.98);
  }

  /* Offline indicator */
  .offline-indicator {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    display: none;
    backdrop-filter: blur(10px);
    animation: slideDown 0.3s ease;
  }

  .offline-indicator.show {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(5px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9998;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .loading-overlay.show {
    display: flex;
    opacity: 1;
  }

  .loading-spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #10b981;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 480px) {
    .card { 
      padding: 40px 25px; 
      padding-top: max(40px, env(safe-area-inset-top));
    }
    h2 { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- Offline indicator -->
<div class="offline-indicator" id="offlineIndicator">
  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
  </svg>
  Sin conexión
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<div class="card">
  <div class="success-icon">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
    </svg>
  </div>
  
  <h2>Nueva Contraseña</h2>
  <p class="subtitle">Crea una contraseña segura para proteger tu cuenta</p>

  <form id="passwordForm" onsubmit="event.preventDefault(); updatePassword();">
    <div class="input-group">
      <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
      </svg>
      <input id="newPass" type="password" placeholder="Nueva contraseña" autocomplete="new-password" required minlength="8">
      <button type="button" class="password-toggle" onclick="togglePassword('newPass', this)" aria-label="Mostrar contraseña">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
      </button>
    </div>

    <div class="strength-meter">
      <div class="strength-bar" id="strengthBar"></div>
    </div>
    <div class="strength-text" id="strengthText">Ingresa una contraseña</div>

    <div class="requirements">
      <div class="requirement" id="req-length">
        <span class="requirement-icon">✓</span>
        <span>Mínimo 8 caracteres</span>
      </div>
      <div class="requirement" id="req-number">
        <span class="requirement-icon">✓</span>
        <span>Al menos un número</span>
      </div>
      <div class="requirement" id="req-special">
        <span class="requirement-icon">✓</span>
        <span>Al menos un carácter especial (!@#$%^&*)</span>
      </div>
      <div class="requirement" id="req-match" style="display: none;">
        <span class="requirement-icon">✓</span>
        <span>Las contraseñas coinciden</span>
      </div>
    </div>

    <div class="input-group">
      <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <input id="confirmPass" type="password" placeholder="Confirmar contraseña" autocomplete="new-password" required>
    </div>

    <button type="submit" id="updateBtn">Actualizar Contraseña</button>
  </form>
  
  <div id="msg" class="msg"></div>
  
  <a href="index.html" class="back-link">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
    </svg>
    Volver al inicio de sesión
  </a>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Offline detection
function initConnectivity() {
  const indicator = document.getElementById('offlineIndicator');
  
  function updateStatus() {
    if (navigator.onLine) {
      indicator.classList.remove('show');
    } else {
      indicator.classList.add('show');
      showMessage('Sin conexión a internet', 'error');
    }
  }

  window.addEventListener('online', () => {
    indicator.classList.remove('show');
    showMessage('Conexión restaurada', 'success');
  });
  
  window.addEventListener('offline', () => {
    indicator.classList.add('show');
    showMessage('Sin conexión a internet', 'error');
  });
  
  if (!navigator.onLine) indicator.classList.add('show');
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg = btn.querySelector('svg');
  
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
    btn.setAttribute('aria-label', 'Ocultar contraseña');
  } else {
    input.type = 'password';
    svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
    btn.setAttribute('aria-label', 'Mostrar contraseña');
  }
}

function checkStrength(password) {
  let strength = 0;
  const requirements = {
    length: password.length >= 8,
    number: /\d/.test(password),
    special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
  };

  // Update UI
  document.getElementById('req-length').classList.toggle('met', requirements.length);
  document.getElementById('req-number').classList.toggle('met', requirements.number);
  document.getElementById('req-special').classList.toggle('met', requirements.special);

  // Calculate strength
  if (requirements.length) strength += 33;
  if (requirements.number) strength += 33;
  if (requirements.special) strength += 34;

  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  
  bar.style.width = strength + '%';
  
  if (strength < 33) {
    bar.style.background = '#ef4444';
    text.textContent = 'Contraseña débil';
    text.style.color = '#ef4444';
  } else if (strength < 66) {
    bar.style.background = '#f59e0b';
    text.textContent = 'Contraseña media';
    text.style.color = '#f59e0b';
  } else {
    bar.style.background = '#10b981';
    text.textContent = 'Contraseña fuerte';
    text.style.color = '#10b981';
  }

  return strength === 100;
}

function checkMatch() {
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const matchReq = document.getElementById('req-match');
  
  if (confirmPass) {
    matchReq.style.display = 'flex';
    const matches = newPass === confirmPass && newPass !== '';
    matchReq.classList.toggle('met', matches);
    return matches;
  } else {
    matchReq.style.display = 'none';
    return false;
  }
}

function showMessage(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type + ' show';
  
  // Auto-hide success messages
  if (type === 'success') {
    setTimeout(() => {
      msg.classList.remove('show');
    }, 5000);
  }
}

function setLoading(state) {
  const btn = document.getElementById('updateBtn');
  const overlay = document.getElementById('loadingOverlay');
  
  if (state) {
    btn.disabled = true;
    btn.innerHTML = '<span>Actualizando...</span>';
    overlay.classList.add('show');
  } else {
    btn.disabled = false;
    btn.innerHTML = '<span>Actualizar Contraseña</span>';
    overlay.classList.remove('show');
  }
}

async function updatePassword() {
  // Check online status
  if (!navigator.onLine) {
    showMessage('No hay conexión a internet. Intente más tarde.', 'error');
    return;
  }

  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;

  if (!checkStrength(newPass)) {
    showMessage('La contraseña no cumple con los requisitos mínimos', 'error');
    document.getElementById('newPass').focus();
    return;
  }

  if (newPass !== confirmPass) {
    showMessage('Las contraseñas no coinciden', 'error');
    document.getElementById('confirmPass').focus();
    return;
  }

  setLoading(true);

  try {
    const { error } = await supabaseClient.auth.updateUser({ password: newPass });

    if (error) throw error;

    showMessage('¡Contraseña actualizada correctamente!', 'success');
    
    // Clear form
    document.getElementById('passwordForm').reset();
    document.querySelectorAll('.requirement').forEach(r => r.classList.remove('met'));
    document.getElementById('strengthBar').style.width = '0';
    document.getElementById('strengthText').textContent = 'Ingresa una contraseña';
    document.getElementById('strengthText').style.color = '#64748b';
    document.getElementById('req-match').style.display = 'none';

    // Redirect after delay
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);

  } catch (error) {
    console.error('Error:', error);
    let errorMsg = 'Error al actualizar la contraseña';
    
    if (error.message.includes('session')) {
      errorMsg = 'Sesión expirada. Solicite un nuevo enlace de recuperación.';
    } else if (error.message.includes('weak')) {
      errorMsg = 'La contraseña es demasiado débil.';
    } else {
      errorMsg = error.message;
    }
    
    showMessage(errorMsg, 'error');
  } finally {
    setLoading(false);
  }
}

// Event listeners
document.getElementById('newPass').addEventListener('input', function(e) {
  checkStrength(e.target.value);
  checkMatch();
});

document.getElementById('confirmPass').addEventListener('input', checkMatch);

// Capacitor keyboard handling
if (window.Capacitor) {
  window.addEventListener('keyboardWillShow', () => {
    document.body.style.height = window.innerHeight + 'px';
  });
  
  window.addEventListener('keyboardWillHide', () => {
    document.body.style.height = '';
  });
}

// Prevent double-tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);

// Initialize
document.addEventListener('DOMContentLoaded', async () => {
  initConnectivity();
  
  // Check session
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    showMessage('Sesión expirada o inválida. Solicite un nuevo enlace.', 'error');
    document.getElementById('updateBtn').disabled = true;
    document.getElementById('newPass').disabled = true;
    document.getElementById('confirmPass').disabled = true;
  }
});
</script>
</body>
</html>
