<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa en Vivo — Road To</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#09100d">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Supabase SDK -->
<script src="JS/supabase-bundle.js"></script>

<!-- Leaflet CSS + JS (Open Source, BSD-2) -->
<link rel="stylesheet" href="JS/leaflet/leaflet.css">
<script src="JS/leaflet/leaflet.js"></script>

<!-- Config centralizada -->
<script src="config.js"></script>
<script src="JS/backgroundTracking-bundle.js"></script>
<script src="JS/localNotifications-bundle.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --corp-green: #76b32c;
    --corp-orange: #f77b1d;
    --corp-blue: #2563eb;
    --bg-dark: #09100d;
    --bg-card: rgba(17, 24, 20, 0.92);
    --text-light: #eef6e8;
    --text-muted: #a7b3bb;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
  }

  /* ═══ Header ═══ */
  .map-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: calc(56px + var(--safe-top));
    padding-top: var(--safe-top);
    background: rgba(9, 16, 13, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 16px;
    padding-right: 16px;
    z-index: 1000;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-back {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-light);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-back:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .header-title {
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
    animation: pulse-live 1.5s infinite;
  }

  .live-indicator.active {
    background: #22c55e;
  }

  @keyframes pulse-live {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-light);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 16px;
  }

  .btn-icon:hover {
    background: rgba(255, 255, 255, 0.12);
  }

  /* ═══ Map Container ═══ */
  #map {
    position: fixed;
    top: calc(56px + var(--safe-top));
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
  }

  /* Override Leaflet tiles for dark mode */
  .leaflet-tile-pane {
    filter: brightness(0.85) contrast(1.1) saturate(0.8);
  }

  .leaflet-control-zoom {
    border: none !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4) !important;
  }

  .leaflet-control-zoom a {
    background: rgba(9, 16, 13, 0.92) !important;
    color: var(--text-light) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
  }

  .leaflet-control-zoom a:hover {
    background: rgba(30, 40, 35, 0.95) !important;
  }

  .leaflet-control-attribution {
    background: rgba(9, 16, 13, 0.8) !important;
    color: var(--text-muted) !important;
    font-size: 10px !important;
    padding: 2px 6px !important;
    border-radius: 4px 0 0 0 !important;
  }

  .leaflet-control-attribution a {
    color: var(--corp-green) !important;
  }

  /* ═══ Info Panel (Bottom Sheet) ═══ */
  .info-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(9, 16, 13, 0.95);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px 24px 0 0;
    padding: 16px 20px calc(16px + var(--safe-bottom));
    z-index: 1000;
    transform: translateY(0);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .info-panel.hidden {
    transform: translateY(calc(100% - 60px));
  }

  .waitlist-banner {
    position: fixed;
    top: calc(56px + var(--safe-top));
    left: 0;
    right: 0;
    background: linear-gradient(90deg, var(--corp-orange) 0%, #f9a8d4 100%);
    color: white;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transform: translateY(-100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .waitlist-banner.visible {
    transform: translateY(0);
  }
  .waitlist-banner-content {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .waitlist-banner-pos {
    background: rgba(0,0,0,0.25);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
  }

  .panel-handle {
    width: 40px;
    height: 4px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    margin: 0 auto 16px;
    cursor: pointer;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
  }

  .stat-value.speed { color: var(--corp-orange); }
  .stat-value.distance { color: var(--corp-green); }
  .stat-value.time { color: var(--corp-blue); }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* ═══ Action Buttons ═══ */
  .action-row {
    display: flex;
    gap: 10px;
  }

  .btn-action {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--corp-green), #3f6d12);
    color: white;
    box-shadow: 0 8px 24px rgba(118, 179, 44, 0.3);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(118, 179, 44, 0.4);
  }

  .btn-stop {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white;
    box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
  }

  .btn-stop:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(239, 68, 68, 0.4);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-light);
    flex: 0 0 auto;
    width: 48px;
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  /* ═══ Driver List Panel (Supervisor View) ═══ */
  .driver-list {
    display: none;
    margin-top: 12px;
    max-height: 200px;
    overflow-y: auto;
  }

  .driver-list.show {
    display: block;
  }

  .driver-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .driver-item:hover {
    background: rgba(255, 255, 255, 0.07);
  }

  .driver-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .driver-dot.online { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
  .driver-dot.offline { background: #6b7280; }

  .driver-name {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .driver-speed {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ═══ Toast ═══ */
  .toast {
    position: fixed;
    top: calc(70px + var(--safe-top));
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(9, 16, 13, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-light);
    padding: 12px 24px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ═══ Loading ═══ */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(9, 16, 13, 0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3000;
    gap: 16px;
    transition: opacity 0.3s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(118, 179, 44, 0.2);
    border-top-color: var(--corp-green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ═══ Search Bar ═══ */
  .search-overlay {
    position: fixed;
    top: calc(56px + var(--safe-top) + 10px);
    left: 12px;
    right: 12px;
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .search-row {
    display: flex;
    gap: 6px;
  }

  .search-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(9, 16, 13, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--text-light);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }

  .search-input:focus {
    border-color: var(--corp-green);
  }

  .search-input::placeholder {
    color: #6b7280;
  }

  .search-results {
    background: rgba(9, 16, 13, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    max-height: 220px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  .search-results.show {
    display: block;
  }

  .search-result-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    transition: background 0.15s;
    font-size: 13px;
  }

  .search-result-item:hover {
    background: rgba(255, 255, 255, 0.06);
  }

  .search-result-item:last-child {
    border-bottom: none;
  }

  .search-result-name {
    font-weight: 600;
    color: var(--text-light);
  }

  .search-result-address {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ═══ Route Info Bar ═══ */
  .route-info {
    display: none;
    background: rgba(9, 16, 13, 0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(118, 179, 44, 0.2);
    border-radius: 14px;
    padding: 10px 16px;
    margin-top: 6px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }

  .route-info.show {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .route-info-text {
    font-size: 13px;
  }

  .route-info-text strong {
    color: var(--corp-green);
  }

  .route-clear {
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .route-clear:hover {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border-color: rgba(239, 68, 68, 0.3);
  }

  
  /* ═══ Capacity & Passengers (Driver View) ═══ */
  .capacity-panel {
    display: none;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(118, 179, 44, 0.2);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 14px;
  }
  .capacity-panel.show { display: block; }
  .capacity-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .capacity-title { font-size: 13px; font-weight: 700; color: var(--corp-green); }
  .seats-dots { display: flex; gap: 5px; }
  .seat-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: background 0.3s;
  }
  .seat-dot.ocupado { background: var(--corp-orange); }
  .seat-dot.libre { background: var(--corp-green); }

  .passenger-list {
    display: flex; flex-direction: column; gap: 8px;
    max-height: 180px; overflow-y: auto;
  }
  .passenger-item {
    background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .passenger-info { font-size: 13px; flex: 1; margin-right: 10px; }
  .passenger-name { font-weight: 700; color: var(--text-light); }
  .passenger-route { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .passenger-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-passenger {
    padding: 8px 12px; border-radius: 8px; border: none;
    font-size: 11px; font-weight: 700; cursor: pointer; color: white;
  }
  .btn-abordar { background: var(--corp-blue); }
  .btn-bajar { background: var(--corp-orange); }

  /* ═══ Responsive ═══ */
  @media (max-width: 380px) {
    .stat-value { font-size: 18px; }
    .btn-action { padding: 12px; font-size: 13px; }
    .search-input { padding: 10px 14px; font-size: 13px; }
  }
</style>
<base target="_blank">
</head>
<body>

  <!-- Header -->
  <header class="map-header">
    <div class="header-left">
      <button class="btn-back" onclick="goBack()" title="Volver">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="header-title">
        <div class="live-indicator" id="liveIndicator"></div>
        <span>Mapa en Vivo</span>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="centerOnUser()" title="Mi ubicación">📍</button>
      <button class="btn-icon" onclick="toggleDriverList()" title="Conductores activos" id="btnDriverList">👥</button>
    </div>
  </header>

  <!-- Waitlist Banner -->
  <div class="waitlist-banner" id="waitlistBanner">
    <div class="waitlist-banner-content">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span id="waitlistZoneName">Zona</span>
    </div>
    <div class="waitlist-banner-pos" id="waitlistPosition">Turno #--</div>
  </div>

  <!-- Map -->
  <!-- Search Overlay -->
  <div class="search-overlay">
    <div class="search-row">
      <input type="text" class="search-input" id="searchOrigin" placeholder="📍 Origen (tu ubicación)" autocomplete="off">
    </div>
    <div class="search-row">
      <input type="text" class="search-input" id="searchDestination" placeholder="📌 ¿A dónde vas?" autocomplete="off">
    </div>
    <div class="search-results" id="searchResults"></div>
    <div class="route-info" id="routeInfo">
      <span class="route-info-text" id="routeInfoText"></span>
      <button class="route-clear" onclick="clearRoute()">✕ Limpiar</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom Info Panel -->
  <div class="info-panel" id="infoPanel">
    <div class="panel-handle" onclick="togglePanel()"></div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value speed" id="speedValue">0</div>
        <div class="stat-label">km/h</div>
      </div>
      <div class="stat-card">
        <div class="stat-value distance" id="distanceValue">0.0</div>
        <div class="stat-label">km</div>
      </div>
      <div class="stat-card">
        <div class="stat-value time" id="timeValue">00:00</div>
        <div class="stat-label">tiempo</div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-action btn-start" id="trackBtn" onclick="toggleTracking()">
        ▶ Iniciar Viaje
      </button>
      <button class="btn-action btn-secondary" onclick="shareLocation()" title="Compartir">📤</button>
      <button class="btn-action btn-secondary" onclick="centerOnUser()" title="Centrar">📍</button>
    </div>

    
    <!-- Panel de Capacidad y Pasajeros (solo visible para conductores) -->
    <div class="capacity-panel" id="capacityPanel">
      <div class="capacity-header">
        <div class="capacity-title">🚙 Cupos Disponibles (<span id="capacidadCount">4</span>/4)</div>
        <div class="seats-dots" id="driverSeatsDots">
          <div class="seat-dot libre"></div>
          <div class="seat-dot libre"></div>
          <div class="seat-dot libre"></div>
          <div class="seat-dot libre"></div>
        </div>
      </div>
      <div class="passenger-list" id="activePassengerList">
        <div style="font-size: 12px; color: var(--text-muted); text-align: center;">Sin pasajeros asignados</div>
      </div>
    </div>

    <!-- Lista de conductores activos (solo visible para admin/supervisor) -->
    <div class="driver-list" id="driverList"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando mapa...</div>
  </div>

<script>
  // ═══ CONFIGURACIÓN ═══
  const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.RoadTo?.config || {
    SUPABASE_URL: "https://ugchmuhjzzyofoogprlr.supabase.co",
    SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4"
  };

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ═══ ESTADO GLOBAL ═══
  let map, userMarker, routePolyline;
  let isTracking = false;
  let watchId = null;
  let startTime = null;
  let totalDistance = 0;
  let lastPosition = null;
  let timerInterval = null;
  let driverMarkers = {};
  let realtimeChannel = null;
  let currentUser = null;
  let originCoords = null;
  let destCoords = null;
  let routeLayer = null;
  let originMarker = null;
  let destMarker = null;
  let searchDebounce = null;
  let activeSearchField = null;
  let conductorData = null;
  let userRole = null; // 'conductor', 'admin', 'coordinador'

  // ═══ POSICIÓN POR DEFECTO (Panamá) ═══
  const DEFAULT_LAT = 9.0;
  const DEFAULT_LNG = -79.5;
  const DEFAULT_ZOOM = 13;

  // ═══ GEOFENCE STATE ═══
  let activeZonas = [];
  let notifiedZonas = new Set(); // Para no notificar repetidamente

  // ═══ INICIALIZACIÓN ═══
  document.addEventListener('DOMContentLoaded', async () => {
    initMap();
    await identifyUser();
    await getUserLocation();
    await loadZonas();
    hideLoading();
  });

  async function loadZonas() {
    try {
      const { data, error } = await supabaseClient
        .from('zonas_geofence')
        .select('*')
        .eq('activa', true);
      if (!error && data) {
        activeZonas = data;
        // Dibujar las zonas en el mapa para que el conductor las vea (opcional, pero útil)
        activeZonas.forEach(z => {
          L.circle([z.latitud, z.longitud], {
            color: '#8ac725',
            fillColor: '#8ac725',
            fillOpacity: 0.1,
            radius: z.radio_metros,
            weight: 1
          }).addTo(map);
        });
      }
    } catch (e) {
      console.warn('Error cargando zonas', e);
    }
  }

  function initMap() {
    map = L.map('map', {
      zoomControl: true,
      attributionControl: true,
    }).setView([DEFAULT_LAT, DEFAULT_LNG], DEFAULT_ZOOM);

    // OpenStreetMap tiles (gratuito, sin API key)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
      subdomains: 'abc',
    }).addTo(map);

    // Polyline para ruta recorrida
    routePolyline = L.polyline([], {
      color: '#76b32c',
      weight: 4,
      opacity: 0.85,
      smoothFactor: 1,
    }).addTo(map);
  }

  // ═══ IDENTIFICAR USUARIO ═══
  async function identifyUser() {
    try {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) return;
      currentUser = user;

      // Intentar determinar rol
      const { data: admin } = await supabaseClient
        .from('administradores')
        .select('id')
        .eq('auth_user_id', user.id)
        .maybeSingle();

      if (admin) {
        userRole = 'admin';
        document.getElementById('btnDriverList').style.display = 'flex';
        document.getElementById('trackBtn').style.display = 'none';
        subscribeToDriverLocations();
        return;
      }

      const { data: coord } = await supabaseClient
        .from('coordinadores')
        .select('id')
        .eq('auth_user_id', user.id)
        .maybeSingle();

      if (coord) {
        userRole = 'coordinador';
        document.getElementById('btnDriverList').style.display = 'flex';
        document.getElementById('trackBtn').style.display = 'none';
        subscribeToDriverLocations();
        return;
      }

      const { data: conductor } = await supabaseClient
        .from('conductores')
        .select('id, nombres, apellidos')
        .eq('auth_user_id', user.id)
        .maybeSingle();

      if (conductor) {
        userRole = 'conductor';
        conductorData = conductor;
        document.getElementById('btnDriverList').style.display = 'none';
        initConductorRealtime();
      }
    } catch (e) {
      console.warn('Error identificando usuario:', e);
    }
  }

  // ═══ REALTIME: CONDUCTOR (FASE 3) ═══
  function initConductorRealtime() {
    if (!conductorData) return;
    
    // Escuchar cualquier cambio en lista_espera para recalcular posición
    const canalConductor = supabaseClient.channel(`conductor-waitlist`)
      .on(
        'postgres_changes',
        { event: '*', schema: 'public', table: 'lista_espera' },
        (payload) => {
          // Si nos eliminan de la fila (ej. nos despachan o nos salimos de la zona)
          if (payload.eventType === 'DELETE' && payload.old.conductor_id === conductorData.id) {
            document.getElementById('waitlistBanner').classList.remove('visible');
            showToast('Has salido de la lista de espera.', 'info');
            return;
          }

          // Si estamos en la lista, recalcular posiciones para todos
          if (Array.from(notifiedZonas).length > 0) {
            updateWaitlistUI(Array.from(notifiedZonas)[0]);
          }
        }
      )
      .subscribe();

    // Escuchar UPDATES en la lista_espera para este conductor
    const canalConductorPersonal = supabaseClient.channel(`conductor-${conductorData.id}`)
      .on(
        'postgres_changes',
        { 
          event: 'UPDATE', 
          schema: 'public', 
          table: 'lista_espera',
          filter: `conductor_id=eq.${conductorData.id}` 
        },
        (payload) => {
          if (payload.new.estado === 'aprobado') {
            showToast('✅ ¡Has sido aprobado en la zona!', 'success');
          } else if (payload.new.estado === 'rechazado') {
            showToast('❌ Tu solicitud en la zona fue rechazada.', 'error');
          }
        }
      )

    // Cargar pasajeros activos al iniciar (Capacidad)
    cargarPasajerosActivos();
    
    // Escuchar UPDATES en viajes_reservados
    const canalViajesUpdate = supabaseClient.channel(`viajes-updates-${conductorData.id}`)
      .on(
        'postgres_changes',
        { 
          event: '*', 
          schema: 'public', 
          table: 'viajes_reservados',
          filter: `conductor_asignado_id=eq.${conductorData.id}` 
        },
        (payload) => {
          if (payload.eventType === 'INSERT') {
            mostrarModalViajeAsignado(payload.new);
          }
          cargarPasajerosActivos();
        }
      )
      .subscribe();


    // Escuchar INSERTS en viajes_reservados para este conductor
    const canalViajes = supabaseClient.channel(`viajes-${conductorData.id}`)
      .on(
        'postgres_changes',
        { 
          event: 'INSERT', 
          schema: 'public', 
          table: 'viajes_reservados',
          filter: `conductor_asignado_id=eq.${conductorData.id}` 
        },
        (payload) => {
          const viaje = payload.new;
          mostrarModalViajeAsignado(viaje);
        }
      )
      .subscribe();
  }

  function mostrarModalViajeAsignado(viaje) {
    // Si ya existe el modal, no lo volvemos a crear, mejor inyectar HTML dinámico
    let m = document.getElementById('modalViajeAsignado');
    if (!m) {
      m = document.createElement('div');
      m.id = 'modalViajeAsignado';
      m.className = 'modal-overlay centered';
      m.innerHTML = `
        <div class="modal-content" style="text-align: center; max-width: 90%; background: #0f172a;">
          <div style="font-size: 40px; margin-bottom: 10px;">🚕</div>
          <h2 style="color: white; margin-bottom: 10px;">¡Nuevo Viaje Asignado!</h2>
          <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; text-align: left; margin-bottom: 20px;">
            <p style="margin-bottom: 5px; color: #cbd5e1;"><strong>Pasajero:</strong> <span id="vPasajero" style="color: white;"></span></p>
            <p style="margin-bottom: 5px; color: #cbd5e1;"><strong>Origen:</strong> <span id="vOrigen" style="color: white;"></span></p>
            <p style="margin-bottom: 5px; color: #cbd5e1;"><strong>Destino:</strong> <span id="vDestino" style="color: white;"></span></p>
            <p style="color: #4ade80;"><strong>Tarifa:</strong> $<span id="vTarifa"></span></p>
          </div>
          <button class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 16px; font-weight: bold;" onclick="aceptarViajeModal()">Ir al Viaje</button>
        </div>
      `;
      document.body.appendChild(m);
    }
    
    document.getElementById('vPasajero').innerText = viaje.pasajero_nombre || 'Pasajero';
    document.getElementById('vOrigen').innerText = viaje.origen || 'No especificado';
    document.getElementById('vDestino').innerText = viaje.destino || 'No especificado';
    document.getElementById('vTarifa').innerText = parseFloat(viaje.tarifa || 0).toFixed(2);
    
    m.classList.add('show');
    
    // Reproducir un sonido si fuera posible
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }

  window.aceptarViajeModal = function() {
    const m = document.getElementById('modalViajeAsignado');
    if (m) m.classList.remove('show');
    showToast('Navegando a ubicación...', 'success');
    // Aquí iría la lógica para trazar la ruta en el mapa o abrir Google Maps
  }

  async function updateWaitlistUI(zonaId) {
    if (!conductorData) return;
    try {
      // 1. Obtener toda la lista de espera de la zona actual
      const { data: lista, error } = await supabaseClient
        .from('lista_espera')
        .select(`conductor_id, zonas_geofence!inner(nombre)`)
        .eq('zona_id', zonaId)
        .order('created_at', { ascending: true });
        
      if (error) throw error;

      // 2. Buscar mi posición
      const myIndex = lista.findIndex(item => item.conductor_id === conductorData.id);
      
      const banner = document.getElementById('waitlistBanner');
      if (myIndex !== -1) {
        // Estamos en la fila
        const zonaName = lista[myIndex].zonas_geofence?.nombre || 'la zona';
        document.getElementById('waitlistZoneName').innerText = zonaName;
        document.getElementById('waitlistPosition').innerText = `Turno #${myIndex + 1}`;
        banner.classList.add('visible');
      } else {
        // No estamos en la fila
        banner.classList.remove('visible');
      }
    } catch (err) {
      console.warn('Error actualizando fila:', err);
    }
  }

  // ═══ GEOLOCALIZACIÓN ═══
  async function getUserLocation() {
    if (!navigator.geolocation) {
      showToast('Tu navegador no soporta geolocalización');
      return;
    }

    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 60000,
        });
      });

      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], 15);
      updateUserMarker(latitude, longitude);
    } catch (err) {
      console.warn('No se pudo obtener ubicación:', err.message);
      showToast('Activa el GPS para ver tu ubicación');
    }
  }

  function updateUserMarker(lat, lng) {
    const icon = L.divIcon({
      className: 'user-marker',
      html: `<div style="
        width: 40px; height: 40px;
        background: linear-gradient(135deg, #76b32c, #3f6d12);
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 4px 15px rgba(118, 179, 44, 0.5);
        display: flex; align-items: center; justify-content: center;
      ">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
        </svg>
      </div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20],
    });

    if (userMarker) {
      userMarker.setLatLng([lat, lng]);
    } else {
      userMarker = L.marker([lat, lng], { icon }).addTo(map);
    }
  }

  // ═══ TRACKING ═══
  function toggleTracking() {
    if (isTracking) {
      stopTracking();
    } else {
      startTracking();
    }
  }

  async function startTracking() {
    isTracking = true;
    startTime = Date.now();
    totalDistance = 0;
    lastPosition = null;
    routePolyline.setLatLngs([]);

    const btn = document.getElementById('trackBtn');
    btn.className = 'btn-action btn-stop';
    btn.innerHTML = '⏹ Detener Viaje';
    document.getElementById('liveIndicator').classList.add('active');

    if (window.Capacitor && window.Capacitor.Plugins.RoadToLocation) {
      try {
        const RoadToLocation = window.Capacitor.Plugins.RoadToLocation;
        
        // Listener de actualización nativa
        RoadToLocation.addListener('onLocationUpdate', (loc) => {
          handlePositionUpdate({
            coords: {
              latitude: loc.latitude,
              longitude: loc.longitude,
              accuracy: loc.accuracy,
              speed: loc.speed,
              heading: loc.heading
            }
          });
        });

        // Iniciar servicio nativo
        await RoadToLocation.startTracking();
        showToast('🟢 Viaje iniciado (Modo Nativo 100% Background)');
      } catch (e) {
        console.error("Fallo al iniciar RoadToLocation nativo", e);
        startWebTrackingFallback();
      }
    } else if (window.BackgroundGeolocation) {
      // Fallback a plugin de capacitor antiguo
      try {
        watchId = await window.BackgroundGeolocation.addWatcher(
          { backgroundMessage: "Rastreando ubicación en segundo plano.", backgroundTitle: "Road To Activo", requestPermissions: true, stale: false, distanceFilter: 2 },
          function (location, error) {
            if (error) return console.error(error);
            handlePositionUpdate({ coords: { latitude: location.latitude, longitude: location.longitude, accuracy: location.accuracy, speed: location.speed, heading: location.bearing } });
          }
        );
        showToast('🟢 Viaje iniciado (Modo Capacitor Básico)');
      } catch (e) {
        startWebTrackingFallback();
      }
    } else {
      startWebTrackingFallback();
    }

    timerInterval = setInterval(updateTimer, 1000);

    if (conductorData) {
      supabaseClient.from('tracking_sessions').insert({
        driver_id: conductorData.id, started_at: new Date().toISOString(), status: 'active'
      }).then(({ error }) => {
        if (error) console.warn('Error creando sesión:', error);
      });
    }
  }

  function startWebTrackingFallback() {
    if (!navigator.geolocation) {
      showToast('Geolocalización no disponible');
      return;
    }
    
    // Iniciar watchPosition normal
    watchId = navigator.geolocation.watchPosition(
      (pos) => handlePositionUpdate(pos),
      (err) => {
        console.error('GPS error:', err);
        showToast('Error de GPS: ' + err.message);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 }
    );
    showToast('🟢 Viaje iniciado (Modo Básico)');
  }

  async function stopTracking() {
    isTracking = false;

    if (window.Capacitor && window.Capacitor.Plugins.RoadToLocation) {
      const RoadToLocation = window.Capacitor.Plugins.RoadToLocation;
      await RoadToLocation.stopTracking();
      RoadToLocation.removeAllListeners();
    } else if (window.BackgroundGeolocation && watchId !== null && typeof watchId === 'string') {
      await window.BackgroundGeolocation.removeWatcher({ id: watchId });
      watchId = null;
    } else if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }

    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    const btn = document.getElementById('trackBtn');
    btn.className = 'btn-action btn-start';
    btn.innerHTML = '▶ Iniciar Viaje';
    document.getElementById('liveIndicator').classList.remove('active');

    if (conductorData) {
      supabaseClient.from('tracking_sessions')
        .update({ ended_at: new Date().toISOString(), status: 'completed' })
        .eq('driver_id', conductorData.id)
        .is('ended_at', null)
        .then(({ error }) => {
          if (error) console.warn('Error cerrando sesión:', error);
        });
    }

    showToast('🔴 Viaje finalizado');
  }

  function handlePositionUpdate(pos) {
    const { latitude, longitude, speed, accuracy } = pos.coords;

    // Actualizar marcador y mapa
    updateUserMarker(latitude, longitude);
    map.panTo([latitude, longitude]);

    // Agregar punto a la ruta
    routePolyline.addLatLng([latitude, longitude]);

    // Calcular distancia
    if (lastPosition) {
      const dist = haversineDistance(
        lastPosition[0], lastPosition[1],
        latitude, longitude
      );
      if (dist > 2) { // Ignorar movimientos < 2m (ruido GPS)
        totalDistance += dist;
      }
    }
    lastPosition = [latitude, longitude];

    // Actualizar stats UI
    document.getElementById('distanceValue').textContent = (totalDistance / 1000).toFixed(1);
    if (speed !== null && speed >= 0) {
      document.getElementById('speedValue').textContent = Math.round(speed * 3.6);
    }

    // Enviar ubicación a Supabase
    if (conductorData) {
      supabaseClient.from('driver_locations').insert({
        driver_id: conductorData.id,
        latitude: latitude,
        longitude: longitude,
        accuracy: accuracy,
        speed: speed || 0,
        timestamp: new Date().toISOString(),
        source: 'gps_web',
      }).then(({ error }) => {
        if (error) console.warn('Error guardando ubicación:', error);
      });

      // === COMPROBAR ZONAS GEOFENCE ===
      activeZonas.forEach(zona => {
        // Calcular distancia desde la posición actual hasta el centro de la zona
        const distanceToZone = haversineDistance(latitude, longitude, zona.latitud, zona.longitud);
        
        // Si estamos dentro del radio (y no lo hemos notificado antes)
        if (distanceToZone <= zona.radio_metros && !notifiedZonas.has(zona.id)) {
          notifiedZonas.add(zona.id);
          showToast(`📍 Entraste a la zona: ${zona.nombre}`);
          
          // Notificación Nativa Push (por si la app está en segundo plano)
          if (window.LocalNotifications) {
            window.LocalNotifications.schedule({
              notifications: [
                {
                  title: "Zona Especial Alcanzada",
                  body: `📍 Has entrado a la zona: ${zona.nombre}. Se te añadirá a la lista de espera.`,
                  id: new Date().getTime(),
                  schedule: { at: new Date(Date.now() + 1000) },
                  sound: null,
                  attachments: null,
                  actionTypeId: "",
                  extra: null
                }
              ]
            }).catch(e => console.warn('Error scheduling notification', e));
          }

          // Entrar a la lista de espera
          supabaseClient.from('lista_espera').insert({
            zona_id: zona.id,
            conductor_id: conductorData.id,
            estado: 'esperando'
          }).then(({ error }) => {
            if (error) {
              console.warn('Ya en lista de espera o error:', error);
            } else {
              showToast(`Añadido a lista de espera en ${zona.nombre}`);
            }
          });
        } 
        // Opcional: Si salimos de la zona, remover de lista de espera
        else if (distanceToZone > zona.radio_metros && notifiedZonas.has(zona.id)) {
          notifiedZonas.delete(zona.id);
          // Eliminar de lista de espera
          supabaseClient.from('lista_espera')
            .delete()
            .eq('zona_id', zona.id)
            .eq('conductor_id', conductorData.id)
            .then(() => showToast(`Saliste de la zona: ${zona.nombre}`));
        }
      });
    }
  }

  function updateTimer() {
    if (!startTime) return;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('timeValue').textContent = `${min}:${sec}`;
  }


  // ═══ GESTIÓN DE CAPACIDAD Y PASAJEROS (CONDUCTOR) ═══
  let activePassengersLayer = null;

  async function cargarPasajerosActivos() {
    if (!conductorData || userRole !== 'conductor') return;
    try {
      const { data: viajes, error } = await supabaseClient
        .from('viajes_reservados')
        .select('*')
        .eq('conductor_asignado_id', conductorData.id)
        .in('estado', ['asignado', 'a_bordo']);
        
      if (error) throw error;
      
      const panel = document.getElementById('capacityPanel');
      panel.classList.add('show');
      
      let cuposOcupados = 0;
      let html = '';
      
      if (!viajes || viajes.length === 0) {
        html = '<div style="font-size: 12px; color: var(--text-muted); text-align: center;">Sin pasajeros asignados</div>';
      } else {
        cuposOcupados = viajes.filter(v => v.estado === 'a_bordo').length;
        
        html = viajes.map(v => {
          let actionBtn = '';
          if (v.estado === 'asignado') {
            actionBtn = `<button class="btn-passenger btn-abordar" onclick="cambiarEstadoPasajero('${v.id}', 'a_bordo')">A Bordo</button>`;
          } else if (v.estado === 'a_bordo') {
            actionBtn = `<button class="btn-passenger btn-bajar" onclick="cambiarEstadoPasajero('${v.id}', 'completado')">Finalizar</button>`;
          }
          return `
            <div class="passenger-item">
              <div class="passenger-info">
                <div class="passenger-name">👤 ${v.pasajero_nombre || 'Pasajero'} (${v.estado === 'a_bordo' ? 'En viaje' : 'Esperando'})</div>
                <div class="passenger-route">📍 ${v.origen} <br>🏁 ${v.destino}</div>
              </div>
              <div class="passenger-actions">
                ${actionBtn}
              </div>
            </div>
          `;
        }).join('');
      }
      
      document.getElementById('activePassengerList').innerHTML = html;
      
      // Actualizar visualización de asientos
      const cuposDisponibles = 4 - cuposOcupados;
      document.getElementById('capacidadCount').innerText = cuposDisponibles;
      
      const dots = document.getElementById('driverSeatsDots');
      dots.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        dots.innerHTML += `<div class="seat-dot ${i < cuposOcupados ? 'ocupado' : 'libre'}"></div>`;
      }
      
      // Actualizar en base de datos
      await supabaseClient.from('conductores')
        .update({ capacidad_disponible: cuposDisponibles })
        .eq('id', conductorData.id);
        
      // Trazar rutas de pasajeros en el mapa
      dibujarRutasPasajeros(viajes);
      
    } catch (e) {
      console.warn('Error cargando pasajeros activos:', e);
    }
  }

  async function cambiarEstadoPasajero(viajeId, nuevoEstado) {
    try {
      const { error } = await supabaseClient
        .from('viajes_reservados')
        .update({ estado: nuevoEstado, estado_pasajero: nuevoEstado })
        .eq('id', viajeId);
        
      if (error) throw error;
      showToast(nuevoEstado === 'a_bordo' ? 'Pasajero recogido' : 'Viaje finalizado');

      // Si el pasajero se bajó (completado), liberamos 1 cupo
      if (nuevoEstado === 'completado') {
         const { data: currentConductor } = await supabaseClient.from('conductores').select('cupos_disponibles').eq('id', conductorData.id).single();
         if (currentConductor) {
             const nuevosCupos = Math.min(4, (currentConductor.cupos_disponibles || 0) + 1);
             await supabaseClient.from('conductores').update({ cupos_disponibles: nuevosCupos }).eq('id', conductorData.id);
         }
      }

      // La UI se actualizará automáticamente por el Realtime
    } catch (e) {
      showToast('Error al actualizar: ' + e.message, 'error');
    }
  }

  function dibujarRutasPasajeros(viajes) {
    if (!map) return;
    if (activePassengersLayer) {
      map.removeLayer(activePassengersLayer);
    }
    activePassengersLayer = L.layerGroup().addTo(map);
    
    viajes.forEach(v => {
      if (v.coordenadas_origen && v.coordenadas_destino) {
        // En un caso real usaríamos OSRM aquí también para trazar la ruta en el mapa del conductor
        // Por ahora trazaremos una línea recta y pondremos marcadores para no saturar la API
        
        const cOri = v.coordenadas_origen;
        const cDes = v.coordenadas_destino;
        
        if (v.estado === 'asignado') {
          // Si está asignado, mostrar donde hay que recogerlo
          L.marker([cOri.lat, cOri.lng], {
            icon: L.divIcon({
              html: '<div style="background:#f97316;width:12px;height:12px;border-radius:50%;border:2px solid white;"></div>',
              className: ''
            })
          }).addTo(activePassengersLayer).bindPopup('Recoger a: ' + (v.pasajero_nombre || 'Pasajero'));
        }
        
        // Mostrar siempre donde va a bajar
        L.marker([cDes.lat, cDes.lng], {
          icon: L.divIcon({
            html: '<div style="background:#8ac725;width:12px;height:12px;border-radius:50%;border:2px solid white;"></div>',
            className: ''
          })
        }).addTo(activePassengersLayer).bindPopup('Dejar a: ' + (v.pasajero_nombre || 'Pasajero'));
      }
    });
  }


  // ═══ FÓRMULA HAVERSINE (distancia entre 2 coordenadas) ═══
  function haversineDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // metros
    const toRad = (x) => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ═══ VISTA SUPERVISOR: Conductores en tiempo real ═══
  function subscribeToDriverLocations() {
    // Cargar ubicaciones recientes
    loadActiveDrivers();

    // Suscribirse a cambios en tiempo real
    realtimeChannel = supabaseClient
      .channel('driver-locations-realtime')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'driver_locations',
      }, (payload) => {
        updateDriverOnMap(payload.new);
      })
      .subscribe();
  }

  async function loadActiveDrivers() {
    try {
      // Obtener sesiones activas
      const { data: sessions } = await supabaseClient
        .from('tracking_sessions')
        .select('driver_id')
        .eq('status', 'active');

      if (!sessions || sessions.length === 0) return;

      const driverIds = sessions.map(s => s.driver_id);

      // Obtener última ubicación de cada conductor activo
      for (const driverId of driverIds) {
        const { data: loc } = await supabaseClient
          .from('driver_locations')
          .select('*')
          .eq('driver_id', driverId)
          .order('timestamp', { ascending: false })
          .limit(1)
          .maybeSingle();

        if (loc) {
          updateDriverOnMap(loc);
        }
      }

      // Cargar nombres
      const { data: conductores } = await supabaseClient
        .from('conductores')
        .select('id, nombres, apellidos')
        .in('id', driverIds);

      if (conductores) {
        renderDriverList(conductores);
      }
    } catch (e) {
      console.warn('Error cargando conductores activos:', e);
    }
  }

  function updateDriverOnMap(locationData) {
    const { driver_id, latitude, longitude, speed } = locationData;
    const driverIcon = L.divIcon({
      className: 'driver-marker',
      html: `<div style="
        width: 34px; height: 34px;
        background: linear-gradient(135deg, ${getDriverColor(driver_id)});
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
      ">🚗</div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 17],
    });

    if (driverMarkers[driver_id]) {
      driverMarkers[driver_id].setLatLng([latitude, longitude]);
    } else {
      driverMarkers[driver_id] = L.marker([latitude, longitude], { icon: driverIcon })
        .addTo(map)
        .bindPopup(`Conductor: ${driver_id}<br>Velocidad: ${Math.round((speed || 0) * 3.6)} km/h`);
    }
  }

  function getDriverColor(id) {
    // Genera un color basado en el hash del ID para distinguir conductores
    const colors = [
      '#f97316, #c2410c',
      '#3b82f6, #1d4ed8',
      '#8b5cf6, #6d28d9',
      '#ec4899, #be185d',
      '#14b8a6, #0d9488',
      '#f59e0b, #d97706',
    ];
    const hash = id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    return colors[hash % colors.length];
  }

  function renderDriverList(conductores) {
    const list = document.getElementById('driverList');
    list.innerHTML = conductores.map(c => `
      <div class="driver-item" onclick="focusDriver('${c.id}')">
        <div class="driver-dot online"></div>
        <div class="driver-name">${c.nombres || ''} ${c.apellidos || ''}</div>
        <div class="driver-speed" id="speed-${c.id}">-- km/h</div>
      </div>
    `).join('');
  }

  function focusDriver(driverId) {
    if (driverMarkers[driverId]) {
      const pos = driverMarkers[driverId].getLatLng();
      map.setView(pos, 16);
      driverMarkers[driverId].openPopup();
    }
  }

  // ═══ UI HELPERS ═══
  function goBack() {
    window.history.back();
  }

  function centerOnUser() {
    if (userMarker) {
      map.setView(userMarker.getLatLng(), 16);
    } else {
      getUserLocation();
    }
  }

  function togglePanel() {
    document.getElementById('infoPanel').classList.toggle('hidden');
  }

  function toggleDriverList() {
    document.getElementById('driverList').classList.toggle('show');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }

  // ═══ BÚSQUEDA DE DIRECCIONES (Nominatim — OpenStreetMap, gratis) ═══
  const searchOriginEl = document.getElementById('searchOrigin');
  const searchDestEl = document.getElementById('searchDestination');
  const searchResultsEl = document.getElementById('searchResults');

  searchOriginEl.addEventListener('input', (e) => {
    activeSearchField = 'origin';
    debounceSearch(e.target.value);
  });

  searchDestEl.addEventListener('input', (e) => {
    activeSearchField = 'destination';
    debounceSearch(e.target.value);
  });

  searchOriginEl.addEventListener('focus', () => { activeSearchField = 'origin'; });
  searchDestEl.addEventListener('focus', () => { activeSearchField = 'destination'; });

  // Cerrar resultados al tocar fuera
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-overlay')) {
      searchResultsEl.classList.remove('show');
    }
  });

  function debounceSearch(query) {
    clearTimeout(searchDebounce);
    if (query.length < 3) {
      searchResultsEl.classList.remove('show');
      return;
    }
    searchDebounce = setTimeout(() => searchAddress(query), 400);
  }

  async function searchAddress(query) {
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&countrycodes=pa&accept-language=es`;
      const res = await fetch(url, {
        headers: { 'User-Agent': 'RoadToApp/2.0 (contact@roadto.app)' }
      });
      const results = await res.json();

      if (results.length === 0) {
        searchResultsEl.innerHTML = '<div class="search-result-item"><span class="search-result-name">Sin resultados</span></div>';
      } else {
        searchResultsEl.innerHTML = results.map(r => `
          <div class="search-result-item" onclick="selectSearchResult(${r.lat}, ${r.lon}, '${r.display_name.replace(/'/g, "\\'").substring(0, 80)}')">
            <div class="search-result-name">${r.display_name.split(',')[0]}</div>
            <div class="search-result-address">${r.display_name.split(',').slice(1, 3).join(',')}</div>
          </div>
        `).join('');
      }
      searchResultsEl.classList.add('show');
    } catch (e) {
      console.warn('Error buscando dirección:', e);
    }
  }

  function selectSearchResult(lat, lng, name) {
    searchResultsEl.classList.remove('show');

    const pinIcon = L.divIcon({
      className: 'pin-marker',
      html: `<div style="
        width: 32px; height: 32px;
        background: ${activeSearchField === 'origin' ? 'linear-gradient(135deg, #22c55e, #16a34a)' : 'linear-gradient(135deg, #ef4444, #b91c1c)'};
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        border: 2px solid white;
        box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      "></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
    });

    if (activeSearchField === 'origin') {
      searchOriginEl.value = name;
      originCoords = [lat, lng];
      if (originMarker) map.removeLayer(originMarker);
      originMarker = L.marker([lat, lng], { icon: pinIcon }).addTo(map).bindPopup('Origen: ' + name);
    } else {
      searchDestEl.value = name;
      destCoords = [lat, lng];
      if (destMarker) map.removeLayer(destMarker);
      destMarker = L.marker([lat, lng], { icon: pinIcon }).addTo(map).bindPopup('Destino: ' + name);
    }

    map.setView([lat, lng], 15);

    // Si ambos están definidos, calcular ruta
    if (originCoords && destCoords) {
      calculateRoute(originCoords, destCoords);
    }
  }

  // ═══ CÁLCULO DE RUTAS (OSRM — Open Source, gratis) ═══
  async function calculateRoute(origin, dest) {
    try {
      // OSRM demo server (gratis, para uso no comercial intensivo)
      const url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${dest[1]},${dest[0]}?overview=full&geometries=geojson&steps=true`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.code !== 'Ok' || !data.routes || data.routes.length === 0) {
        showToast('No se pudo calcular la ruta');
        return;
      }

      const route = data.routes[0];
      const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
      currentRouteData = route.geometry; // Guardamos la geometria para Supabase // GeoJSON es [lng,lat]

      // Dibujar ruta en mapa
      if (routeLayer) map.removeLayer(routeLayer);
      routeLayer = L.polyline(coords, {
        color: '#3b82f6',
        weight: 5,
        opacity: 0.8,
        dashArray: null,
        smoothFactor: 1,
      }).addTo(map);

      // Ajustar vista para mostrar toda la ruta
      map.fitBounds(routeLayer.getBounds(), { padding: [60, 60] });

      // Mostrar info de ruta
      const distKm = (route.distance / 1000).toFixed(1);
      const durMin = Math.ceil(route.duration / 60);
      document.getElementById('routeInfoText').innerHTML = `<strong>${distKm} km</strong> · ~${durMin} min`;
      document.getElementById('routeInfo').classList.add('show');

      showToast(`Ruta: ${distKm} km, ~${durMin} min`);
    } catch (e) {
      console.warn('Error calculando ruta OSRM:', e);
      showToast('Error al calcular ruta');
    }
  }

  function clearRoute() {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
    if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
    originCoords = null;
    destCoords = null;
    searchOriginEl.value = '';
    searchDestEl.value = '';
    document.getElementById('routeInfo').classList.remove('show');
    currentRouteData = null;
    showToast('Ruta limpiada');
  }

  // ═══ COMPARTIR UBICACIÓN ═══
  async function shareLocation() {
    if (!lastPosition) {
      showToast('Esperando ubicación GPS...');
      return;
    }

    const [lat, lng] = lastPosition;
    const osmLink = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=16/${lat}/${lng}`;
    const googleLink = `https://www.google.com/maps?q=${lat},${lng}`;
    const text = `📍 Mi ubicación en Road To:\n${googleLink}`;

    // Intentar Web Share API (funciona en móviles)
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Mi ubicación — Road To',
          text: text,
          url: googleLink,
        });
        showToast('Ubicación compartida');
        return;
      } catch (e) {
        if (e.name !== 'AbortError') console.warn('Share failed:', e);
      }
    }

    // Fallback: copiar al portapapeles
    try {
      await navigator.clipboard.writeText(text);
      showToast('📋 Enlace copiado al portapapeles');
    } catch (e) {
      // Último fallback
      prompt('Copia este enlace:', googleLink);
    }
  }
</script>
