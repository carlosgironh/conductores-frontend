<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Perfil - Pasajero | Road To</title>
<meta name="description" content="Perfil del pasajero en la plataforma Road To. Visualiza y gestiona tu información personal.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1208">
<meta name="color-scheme" content="dark">

<script src="JS/supabase-bundle.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-left: env(safe-area-inset-left);
    --safe-right: env(safe-area-inset-right);
    --corp-green: #8ac725;
    --corp-green-dark: #448414;
    --corp-green-lime: #9ad93a;
    --corp-green-light: #b8e85c;
    --corp-gray: #7d7d7d;
    --corp-gray-dark: #4a4a4a;
    --corp-gray-light: #9e9e9e;
    --corp-gray-soft: #cbd5e1;
    --corp-blue: #2563eb;
    --corp-blue-dark: #1e40af;
    --corp-blue-light: #3b82f6;
    --corp-orange: #f97316;
    --corp-orange-light: #fb923c;
    --primary: var(--corp-green);
    --primary-dark: var(--corp-green-dark);
    --accent: var(--corp-green-lime);
    --bg-dark: #0a1208;
    --text-light: #eef8e4;
    --text-muted: #8a9e7d;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 40px 20px;
    padding-top: calc(20px + var(--safe-top));
    padding-bottom: calc(40px + var(--safe-bottom));
    padding-left: max(20px, var(--safe-left));
    padding-right: max(20px, var(--safe-right));
    background:
      radial-gradient(ellipse at 10% 20%, rgba(138, 199, 37, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 50%),
      radial-gradient(circle at top left, #0a1208, #0a1208);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 40% 40%, rgba(255,255,255,0.02) 0%, transparent 1.5%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  /* ─── Card ─────────────────────────────────────────────────── */
  .card {
    max-width: 680px;
    width: 100%;
    background: rgba(10, 18, 8, 0.55);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(138, 199, 37, 0.12);
    border-top: 1px solid rgba(138, 199, 37, 0.25);
    border-radius: 32px;
    box-shadow:
      0 25px 50px -12px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    padding: 50px 45px;
    padding-top: max(50px, var(--safe-top));
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
    touch-action: pan-y;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)   scale(1);    }
  }

  /* ─── Status Banner ──────────────────────────────────────────── */
  .status-banner {
    position: relative;
    margin: calc(-1 * max(50px, var(--safe-top))) -45px 30px -45px;
    padding: 20px 45px;
    padding-top: max(20px, var(--safe-top));
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    animation: slideDown 0.6s ease-out backwards;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0);     }
  }

  .status-banner.active {
    background: linear-gradient(135deg, rgba(138, 199, 37, 0.2) 0%, rgba(68, 132, 20, 0.3) 100%);
    border-bottom: 1px solid rgba(138, 199, 37, 0.3);
    color: var(--corp-green-light);
  }

  .status-banner.pending {
    background: linear-gradient(135deg, rgba(249, 115, 22, 0.2) 0%, rgba(194, 65, 12, 0.3) 100%);
    border-bottom: 1px solid rgba(249, 115, 22, 0.3);
    color: var(--corp-orange-light);
  }

  .status-banner.inactive {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(185, 28, 28, 0.3) 100%);
    border-bottom: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .status-icon { width: 24px; height: 24px; flex-shrink: 0; }
  .status-content { flex: 1; }

  .status-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-message { font-size: 13px; opacity: 0.9; line-height: 1.5; }

  .status-check {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
  }

  .status-banner.active::after {
    content: '';
    position: absolute;
    right: 45px;
    width: 8px;
    height: 8px;
    background: var(--corp-green-light);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
    box-shadow: 0 0 0 0 rgba(184, 232, 92, 0.7);
  }

  @keyframes pulse-dot {
    0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(184, 232, 92, 0.7); }
    70%  { transform: scale(1);    box-shadow: 0 0 0 10px rgba(184, 232, 92, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(184, 232, 92, 0);   }
  }

  /* ─── Avatar ─────────────────────────────────────────────────── */
  .avatar-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }

  .avatar-wrapper {
    position: relative;
    width: 100px;
    height: 100px;
    margin-bottom: 16px;
  }

  .avatar-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--corp-green);
    box-shadow:
      0 0 0 6px rgba(138, 199, 37, 0.15),
      0 10px 30px rgba(0, 0, 0, 0.4);
    cursor: pointer;
    transition: transform 0.3s ease;
    -webkit-user-drag: none;
  }

  .avatar-img:active { transform: scale(0.95); }

  .avatar-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(138, 199, 37, 0.2), rgba(68, 132, 20, 0.3));
    border: 3px solid var(--corp-green);
    box-shadow: 0 0 0 6px rgba(138, 199, 37, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--corp-green-light);
  }

  .avatar-name {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .avatar-email {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ─── Section title ─────────────────────────────────────────── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--corp-green);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: linear-gradient(to bottom, var(--corp-green), var(--corp-green-dark));
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ─── Info block ─────────────────────────────────────────────── */
  .info-block {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .info-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(138, 199, 37, 0.3), transparent);
  }

  .campo {
    margin-bottom: 16px;
    font-size: 15px;
    display: flex;
    align-items: flex-start;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.3s;
  }

  .campo:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .campo strong {
    color: var(--corp-green);
    width: 130px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-top: 3px;
    flex-shrink: 0;
  }

  .campo span {
    color: var(--text-light);
    font-weight: 500;
    word-break: break-word;
  }

  /* ─── Document section ───────────────────────────────────────── */
  .documentos-section {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .documentos-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
  }

  .btn-doc {
    background: rgba(138, 199, 37, 0.08);
    color: var(--corp-green-light);
    border: 1px solid rgba(138, 199, 37, 0.25);
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    touch-action: manipulation;
    min-height: 44px;
  }

  .btn-doc:hover {
    background: var(--corp-green);
    color: #0a1208;
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(138, 199, 37, 0.35);
  }

  .btn-doc:active { transform: scale(0.95); }

  /* ─── Action buttons ─────────────────────────────────────────── */
  .btn-primary {
    width: 100%;
    padding: 16px 28px;
    margin-top: 8px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--corp-green) 0%, var(--corp-green-dark) 100%);
    color: #0a1208;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 4px 6px -1px rgba(138, 199, 37, 0.2),
      0 10px 20px -5px rgba(138, 199, 37, 0.35),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    touch-action: manipulation;
    min-height: 48px;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.6s;
  }

  .btn-primary:hover::before { left: 100%; }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(138, 199, 37, 0.45);
  }

  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    width: 100%;
    padding: 14px 28px;
    margin-top: 12px;
    border: 1.5px solid rgba(138, 199, 37, 0.35);
    border-radius: 16px;
    background: transparent;
    color: var(--corp-green-light);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    touch-action: manipulation;
    min-height: 44px;
  }

  .btn-secondary:hover {
    background: rgba(138, 199, 37, 0.08);
    border-color: rgba(138, 199, 37, 0.6);
  }

  .btn-secondary:active { transform: scale(0.97); }

  /* ─── Quick action cards ─────────────────────────────────────── */
  .quick-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  .action-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 16px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    touch-action: manipulation;
    text-decoration: none;
  }

  .action-card:hover {
    background: rgba(138, 199, 37, 0.06);
    border-color: rgba(138, 199, 37, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
  }

  .action-card:active { transform: scale(0.97); }

  .action-card-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(138, 199, 37, 0.12);
    color: var(--corp-green-light);
    flex-shrink: 0;
  }

  .action-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 2px;
  }

  .action-card-desc {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    line-height: 1.4;
  }

  /* ─── Photo modal ─────────────────────────────────────────────── */
  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(5, 10, 5, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    animation: fadeIn 0.3s ease;
    padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(138, 199, 37, 0.2);
    animation: scaleIn 0.3s ease;
    -webkit-user-drag: none;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1);   }
  }

  /* ─── Loading ─────────────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(138, 199, 37, 0.15);
    border-top-color: var(--corp-green);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Toast ───────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: max(20px, var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(10, 18, 8, 0.95);
    color: var(--text-light);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 199, 37, 0.2);
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ─── Offline indicator ───────────────────────────────────────── */
  .offline-indicator {
    position: fixed;
    top: max(10px, var(--safe-top));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    display: none;
    backdrop-filter: blur(10px);
  }

  .offline-indicator.show { display: flex; align-items: center; gap: 8px; }

  /* ─── Responsive ──────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .card {
      padding: 30px 20px;
      padding-top: max(30px, var(--safe-top));
      border-radius: 24px;
    }

    .status-banner {
      margin: calc(-1 * max(30px, var(--safe-top))) -20px 25px -20px;
      padding: 15px 20px;
      padding-top: max(15px, var(--safe-top));
      flex-direction: column;
      text-align: center;
      gap: 10px;
    }

    .status-banner.active::after { display: none; }

    .avatar-name { font-size: 19px; }

    .campo { flex-direction: column; gap: 4px; }
    .campo strong { width: 100%; }

    .quick-actions { grid-template-columns: 1fr; }

    .info-block, .documentos-section { padding: 18px; }
  }
</style>
<base target="_blank">
</head>
<body>

<div class="offline-indicator" id="offlineIndicator">
  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
  </svg>
  Sin conexión
</div>

<div class="toast" id="toast"></div>

<!-- Main card -->
<div class="card" id="mainCard">

  <!-- Avatar + name (loaded dynamically) -->
  <div class="avatar-section" id="avatarSection">
    <div class="loading">
      <div class="loading-spinner"></div>
      Cargando perfil...
    </div>
  </div>

  <!-- Data fields (loaded dynamically) -->
  <div id="contenido"></div>

  <!-- Documents section (loaded dynamically, hidden until ready) -->
  <div class="documentos-section" id="documentosSection" style="display:none;">
    <div class="section-title">Mis Documentos</div>
    <div class="documentos-grid" id="documentosGrid"></div>
  </div>

  <!-- Quick actions -->
  <div class="quick-actions" id="quickActions" style="display:none;">
    <a class="action-card" href="home.html" id="linkReservar">
      <div class="action-card-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
        </svg>
      </div>
      <div>
        <div class="action-card-title">Reservar Asiento</div>
        <div class="action-card-desc">Ver rutas disponibles</div>
      </div>
    </a>
    <a class="action-card" href="index.html" id="linkInicio">
      <div class="action-card-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
      </div>
      <div>
        <div class="action-card-title">Inicio</div>
        <div class="action-card-desc">Volver a la página principal</div>
      </div>
    </a>
  </div>

  <!-- Action buttons -->
  <div id="actionButtons" style="display:none;">
    <button class="btn-secondary" id="btnCerrarSesion" onclick="cerrarSesion()">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      Cerrar Sesión
    </button>
  </div>

</div><!-- /card -->

<!-- Photo modal -->
<div id="modalFoto" class="modal" onclick="cerrarModal()">
  <img id="modalImg" src="" alt="Vista ampliada">
</div>

<script>
const SUPABASE_URL  = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";
const supabaseClient  = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let perfilCache = null;

/* ── Connectivity ──────────────────────────────────────────────── */
function initConnectivity() {
  const indicator = document.getElementById('offlineIndicator');

  function updateOnlineStatus() {
    if (navigator.onLine) {
      indicator.classList.remove('show');
      showToast('Conexión restaurada');
      if (!perfilCache) cargarPerfil();
    } else {
      indicator.classList.add('show');
      showToast('Modo offline');
    }
  }

  window.addEventListener('online',  updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  if (!navigator.onLine) indicator.classList.add('show');
}

/* ── Toast ─────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Status banner ─────────────────────────────────────────────── */
function renderStatusBanner(estado) {
  const card = document.getElementById('mainCard');
  const existing = card.querySelector('.status-banner');
  if (existing) existing.remove();

  const s = String(estado || '').toLowerCase();
  let html = '';

  if (s === 'active' || s === 'true') {
    html = `
      <div class="status-banner active">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div class="status-content">
          <div class="status-title">Cuenta Activa <span class="status-check">✓ Verificado</span></div>
          <div class="status-message">Tu cuenta está habilitada para realizar reservas.</div>
        </div>
      </div>`;
  } else if (s === 'pending' || s === 'revision') {
    html = `
      <div class="status-banner pending">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div class="status-content">
          <div class="status-title">Verificación Pendiente <span class="status-check">En Revisión</span></div>
          <div class="status-message">Tus documentos están siendo revisados (24 h hábiles).</div>
        </div>
      </div>`;
  } else {
    html = `
      <div class="status-banner inactive">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <div class="status-content">
          <div class="status-title">Cuenta Pendiente <span class="status-check">Por Activar</span></div>
          <div class="status-message">Completa tu registro o contacta soporte para activar tu cuenta.</div>
        </div>
      </div>`;
  }

  // Insert after card opens (before avatarSection)
  const avatarSection = document.getElementById('avatarSection');
  avatarSection.insertAdjacentHTML('beforebegin', html);
}

/* ── Render profile ─────────────────────────────────────────────── */
function renderPerfil(pasajero, user) {
  renderStatusBanner(pasajero.status);

  // ── Avatar ──────────────────────────────────────────────────────
  const avatarSection = document.getElementById('avatarSection');
  const nombreCompleto = `${pasajero.nombres || ''} ${pasajero.apellidos || ''}`.trim();

  // Try to get public URL for profile photo
  let fotoUrl = null;
  if (pasajero.foto_perfil_url) {
    fotoUrl = supabaseClient.storage
      .from('documentos-pasajeros')
      .getPublicUrl(pasajero.foto_perfil_url).data.publicUrl;
  }

  avatarSection.innerHTML = `
    ${fotoUrl
      ? `<div class="avatar-wrapper">
           <img class="avatar-img" src="${fotoUrl}" alt="Foto de perfil"
                onclick="mostrarModal('${fotoUrl}')" loading="lazy">
         </div>`
      : `<div class="avatar-wrapper">
           <div class="avatar-placeholder">
             <svg width="46" height="46" fill="none" stroke="currentColor" viewBox="0 0 24 24">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                 d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
             </svg>
           </div>
         </div>`
    }
    <div class="avatar-name">${nombreCompleto || 'Pasajero'}</div>
    <div class="avatar-email">${user.email}</div>
  `;

  // ── Info fields ─────────────────────────────────────────────────
  const contenido = document.getElementById('contenido');
  contenido.innerHTML = `
    <div class="info-block">
      <div class="section-title">Datos Personales</div>
      <div class="campo"><strong>Nombre</strong><span>${nombreCompleto || '—'}</span></div>
      <div class="campo"><strong>Cédula</strong><span>${pasajero.cedula || '—'}</span></div>
      <div class="campo"><strong>Celular</strong><span>${pasajero.celular || '—'}</span></div>
      <div class="campo"><strong>Dirección</strong><span>${pasajero.direccion || '—'}</span></div>
      <div class="campo"><strong>Correo</strong><span>${user.email}</span></div>
    </div>
  `;

  // ── Documents ───────────────────────────────────────────────────
  const docSection = document.getElementById('documentosSection');
  const docGrid    = document.getElementById('documentosGrid');
  docGrid.innerHTML = '';

  // Check cedula document
  if (pasajero.cedula_url) {
    const url = supabaseClient.storage
      .from('documentos-pasajeros')
      .getPublicUrl(pasajero.cedula_url).data.publicUrl;
    docGrid.innerHTML += `
      <button class="btn-doc" onclick="window.open('${url}', '_blank')">
        📄 Cédula de Identidad
      </button>`;
    docSection.style.display = 'block';
  }

  // ── Quick actions + buttons ─────────────────────────────────────
  document.getElementById('quickActions').style.display = 'grid';
  document.getElementById('actionButtons').style.display = 'block';
}

/* ── Load profile from Supabase ─────────────────────────────────── */
async function cargarPerfil() {
  try {
    // Detectar si admin está viendo perfil de otro pasajero via ?id=
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');

    let user = null;
    let userId = null;

    if (targetId) {
      // Modo admin: ver perfil de pasajero específico
      userId = targetId;
      // Obtener email del pasajero para mostrar
      const { data: pasajeroData } = await supabaseClient
        .from('passengers')
        .select('email')
        .eq('id', targetId)
        .single();
      user = { id: targetId, email: pasajeroData?.email || 'No disponible' };
    } else {
      // Modo pasajero: ver mi propio perfil
      const { data: { user: authUser }, error: userError } = await supabaseClient.auth.getUser();
      if (userError || !authUser) {
        window.location.href = 'index.html';
        return;
      }
      user = authUser;
      userId = authUser.id;
    }

    if (!navigator.onLine && perfilCache) {
      renderPerfil(perfilCache, user);
      return;
    }

    const { data: pasajero, error: pasError } = await supabaseClient
      .from('passengers')
      .select('*')
      .eq('id', userId)
      .single();

    if (pasError || !pasajero) {
      throw new Error('No se encontró el perfil de pasajero');
    }

    perfilCache = pasajero;
    renderPerfil(pasajero, user);

  } catch (err) {
    console.error('Error cargando perfil:', err);

    if (perfilCache) {
      showToast('Error de conexión — mostrando datos guardados');
      return;
    }

    document.getElementById('avatarSection').innerHTML = '';
    document.getElementById('contenido').innerHTML = `
      <div style="text-align:center; padding:40px 20px; color:#f87171;">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px; display:block; opacity:.6">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p style="font-weight:600; margin-bottom:8px;">No se pudo cargar el perfil</p>
        <p style="font-size:13px; color:#8a9e7d; margin-bottom:24px;">${err.message}</p>
        <button onclick="cargarPerfil()" style="
          background: linear-gradient(135deg,#8ac725,#448414);
          color:#0a1208; border:none; border-radius:12px;
          padding:12px 24px; font-weight:700; font-size:14px;
          cursor:pointer; font-family:inherit;">
          Reintentar
        </button>
        <br><br>
        <a href="index.html" style="color:#8a9e7d; font-size:13px;">Volver al inicio</a>
      </div>
    `;
  }
}

/* ── Modal photo viewer ─────────────────────────────────────────── */
function mostrarModal(src) {
  const modal = document.getElementById('modalFoto');
  document.getElementById('modalImg').src = src;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  document.getElementById('modalFoto').style.display = 'none';
  document.body.style.overflow = '';
}

/* ── Sign out ───────────────────────────────────────────────────── */
async function cerrarSesion() {
  const btn = document.getElementById('btnCerrarSesion');
  btn.disabled = true;
  btn.textContent = 'Cerrando sesión...';

  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
}

/* ── Capacitor keyboard ─────────────────────────────────────────── */
if (window.Capacitor) {
  window.addEventListener('keyboardWillShow', () => {
    document.body.style.height = window.innerHeight + 'px';
  });
  window.addEventListener('keyboardWillHide', () => {
    document.body.style.height = '';
  });
}

/* ── Init ───────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initConnectivity();
  cargarPerfil();
});

// Prevent double-tap zoom on mobile
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, false);
</script>

</body>
</html>
