<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a1208">
    <title>Reservar Viaje - Pasajero | Road To</title>
    <script src="JS/supabase-bundle.js"></script>
    <link rel="stylesheet" href="JS/leaflet/leaflet.css">
    <script src="JS/leaflet/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --corp-green: #8ac725;
            --corp-green-dark: #448414;
            --corp-green-lime: #9ad93a;
            --corp-green-light: #b8e85c;
            --corp-orange: #f97316;
            --corp-orange-light: #fb923c;
            --corp-blue: #2563eb;
            --corp-blue-light: #3b82f6;
            --bg-dark: #0a1208;
            --text-light: #eef8e4;
            --text-muted: #8a9e7d;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 10% 20%, rgba(138,199,37,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 90% 80%, rgba(154,217,58,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 0%, #0a1208 0%, #0a1208 100%);
            color: var(--text-light);
            padding-top: calc(70px + var(--safe-top));
            padding-bottom: calc(20px + var(--safe-bottom));
        }

        .app-header {
            position: fixed;
            top: calc(10px + var(--safe-top));
            left: calc(10px + env(safe-area-inset-left));
            right: calc(10px + env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
            padding: 10px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-small {
            display: flex; align-items: center; gap: 8px;
            font-weight: 700; font-size: 14px;
            color: var(--corp-orange); text-decoration: none;
        }
        .brand-small svg { width: 24px; height: 24px; flex-shrink: 0; }
        .nav-buttons { display: flex; gap: 8px; }
        .nav-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        .nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-perfil {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; background: rgba(138,199,37,0.1);
            border: 1px solid rgba(138,199,37,0.2); border-radius: 12px;
            color: var(--corp-green-light); text-decoration: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .nav-perfil svg { width: 18px; height: 18px; flex-shrink: 0; }

        .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

        .page-title {
            font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

        .card {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px; padding: 24px; margin-bottom: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .card-title {
            font-size: 15px; font-weight: 700; margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px; color: var(--text-light);
        }

        .form-group { margin-bottom: 16px; }
        label {
            display: block; margin-bottom: 5px; font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
        }
        input, textarea {
            width: 100%; padding: 13px 16px;
            background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: var(--text-light); font-size: 14px; font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none; border-color: var(--corp-green);
            box-shadow: 0 0 0 3px rgba(138,199,37,0.15);
        }
        input::placeholder, textarea::placeholder { color: var(--text-muted); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 15px 24px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; width: 100%; font-family: inherit; min-height: 48px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--corp-green) 0%, var(--corp-green-dark) 100%);
            color: #0a1208; box-shadow: 0 4px 15px rgba(68,132,20,0.35);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(68,132,20,0.5); }
        .btn-secondary {
            background: rgba(255,255,255,0.07); color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn:active { transform: scale(0.97); }

        .spinner {
            width: 18px; height: 18px; border: 2px solid rgba(10,18,8,0.3);
            border-top-color: #0a1208; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Mapa de Ruta ─────────────────────────────── */
        #route-card { display: none; }
        #route-map {
            width: 100%; height: 260px; border-radius: 14px;
            overflow: hidden; margin-bottom: 16px;
            border: 1px solid rgba(138,199,37,0.2);
        }

        /* Barra de estado del viaje */
        .trip-status-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; border-radius: 12px; margin-bottom: 14px;
            background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.2);
            transition: all 0.5s ease;
        }
        .trip-status-bar.asignado { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
        .trip-status-bar.a_bordo { background: rgba(138,199,37,0.1); border-color: rgba(138,199,37,0.3); }
        .trip-status-icon { font-size: 24px; flex-shrink: 0; }
        .trip-status-text { flex: 1; }
        .trip-status-title { font-weight: 700; font-size: 14px; color: var(--text-light); }
        .trip-status-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* Info del conductor al asignarse */
        .driver-card {
            display: none; padding: 14px; border-radius: 12px;
            background: rgba(138,199,37,0.08); border: 1px solid rgba(138,199,37,0.2);
            margin-bottom: 14px;
        }
        .driver-card.visible { display: block; }
        .driver-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .driver-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--corp-green), var(--corp-green-dark));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: #0a1208; flex-shrink: 0;
        }
        .driver-name { font-weight: 700; font-size: 15px; color: var(--text-light); }
        .driver-plate {
            font-size: 12px; color: var(--text-muted);
            background: rgba(255,255,255,0.08); padding: 2px 8px;
            border-radius: 6px; display: inline-block; margin-top: 2px;
        }
        /* Indicador de cupos */
        .seats-indicator { display: flex; align-items: center; gap: 8px; }
        .seats-label { font-size: 12px; color: var(--text-muted); }
        .seats-dots { display: flex; gap: 5px; }
        .seat-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.3s ease;
        }
        .seat-dot.ocupado { background: var(--corp-orange); }
        .seat-dot.libre { background: var(--corp-green); }

        /* Ruta info chips */
        .route-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .route-chip {
            display: flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 600;
            padding: 5px 10px; border-radius: 8px;
            background: rgba(15,23,42,0.5);
        }
        .chip-distance { color: var(--corp-blue-light); }
        .chip-time { color: var(--corp-orange-light); }

        /* ─── Viajes activos ─────────────────────────────── */
        .mis-viajes { margin-top: 8px; }
        .viaje-item {
            background: rgba(15,23,42,0.5); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 16px; margin-bottom: 10px; transition: all 0.3s ease;
        }
        .viaje-item:hover { border-color: rgba(138,199,37,0.2); transform: translateY(-2px); }
        .viaje-route { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 600; font-size: 13px; flex-wrap: wrap; }
        .origin { color: var(--warning); }
        .arrow { color: var(--text-muted); }
        .destiny { color: var(--success); }
        .viaje-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .conductor-info {
            margin-top: 10px; padding: 10px; font-size: 13px;
            background: rgba(138,199,37,0.08); border: 1px solid rgba(138,199,37,0.15);
            border-radius: 10px;
        }
        .conductor-info strong { color: var(--corp-green-light); }
        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 999px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; margin-top: 6px;
        }
        .badge-pendiente { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
        .badge-asignado { background: rgba(37,99,235,0.15); color: var(--corp-blue-light); border: 1px solid rgba(37,99,235,0.25); }
        .badge-a_bordo { background: rgba(138,199,37,0.15); color: var(--corp-green-light); border: 1px solid rgba(138,199,37,0.25); }
        .badge-completado { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.25); }
        .badge-cancelado { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }

        .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }

        .toast {
            position: fixed; bottom: max(20px, var(--safe-bottom)); left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10,18,8,0.95); color: var(--text-light);
            padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
            z-index: 2000; opacity: 0; transition: all 0.3s ease;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; max-width: 90vw; text-align: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-success { border-color: rgba(16,185,129,0.3); color: #4ade80; }
        .toast-error { border-color: rgba(239,68,68,0.3); color: #f87171; }
        .toast-info { border-color: rgba(37,99,235,0.3); color: var(--corp-blue-light); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(138,199,37,0.2); border-radius: 3px; }

        @media (max-width: 640px) { .card { padding: 18px; } }
    </style>
</head>
<body>
    <header class="app-header">
        <a href="index.html" class="brand-small">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                    </path>
                </svg>

        </div>
    </header>

    <div class="container">
        <h1 class="page-title">🚗 Reservar Viaje</h1>
        <p class="page-subtitle">Solicita tu viaje y te conectaremos con un conductor disponible</p>

        <!-- Formulario de solicitud -->
        <div class="card" id="form-card">
            <div class="card-title">📋 Datos del Viaje</div>
            <form id="form-reserva">
                <div class="form-group">
                    <label for="origen">📍 Origen</label>
                    <input type="text" id="origen" placeholder="Ej: Centro Comercial, Zona 1, Aeropuerto..." required>
                </div>
                <div class="form-group">
                    <label for="destino">🏁 Destino</label>
                    <input type="text" id="destino" placeholder="Ej: Hotel Marriott, Terminal de Buses..." required>
                </div>
                <div class="form-group">
                    <label for="fecha-hora">📅 Fecha y Hora</label>
                    <input type="datetime-local" id="fecha-hora" required>
                </div>
                <div class="form-group">
                    <label for="notas">📝 Notas (opcional)</label>
                    <textarea id="notas" rows="2" placeholder="Equipaje especial, instrucciones de recogida..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-submit">
                    🚀 Solicitar Viaje
                </button>
            </form>
        </div>

        <!-- Tarjeta de Ruta en Mapa (aparece al confirmar el viaje) -->
        <div class="card" id="route-card">
            <div class="card-title">🗺️ Tu Ruta</div>

            <!-- Mapa -->
            <div id="route-map"></div>

            <!-- Chips de distancia y tiempo -->
            <div class="route-chips" id="route-chips"></div>

            <!-- Barra de estado -->
            <div class="trip-status-bar" id="trip-status-bar" style="margin-top: 14px;">
                <div class="trip-status-icon" id="status-icon">⏳</div>
                <div class="trip-status-text">
                    <div class="trip-status-title" id="status-title">Buscando conductor...</div>
                    <div class="trip-status-sub" id="status-sub">Pronto un conductor cercano aceptará tu viaje</div>
                </div>
            </div>

            <!-- Info del conductor (visible al asignarse) -->
            <div class="driver-card" id="driver-card">
                <div class="driver-card-header">
                    <div class="driver-avatar" id="driver-avatar">?</div>
                    <div>
                        <div class="driver-name" id="driver-name">Conductor</div>
                        <div class="driver-plate" id="driver-plate"></div>
                    </div>
                </div>
                <div class="seats-indicator">
                    <span class="seats-label">Cupos en el vehículo:</span>
                    <div class="seats-dots" id="seats-dots">
                        <div class="seat-dot libre"></div>
                        <div class="seat-dot libre"></div>
                        <div class="seat-dot libre"></div>
                        <div class="seat-dot libre"></div>
                    </div>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="cancelarViaje()" id="btn-cancelar" style="margin-top: 4px;">
                Cancelar solicitud
            </button>
        </div>

        <!-- Mis Reservas -->
        <div class="mis-viajes">
            <div class="card">
                <div class="card-title">📜 Mis Reservas</div>
                <div id="lista-mis-viajes">
                    <div class="empty-state">Cargando tus reservas...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let routeMap = null;
        let routeLayer = null;
        let activeViajeId = null;
        let realtimeChannel = null;

        // ── Toast ─────────────────────────────────────────────────────────────
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('es-ES', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function getEstadoBadge(estado) {
            const badges = {
                'pendiente':  '<span class="badge badge-pendiente">⏳ Buscando conductor...</span>',
                'asignado':   '<span class="badge badge-asignado">✅ Conductor asignado</span>',
                'a_bordo':    '<span class="badge badge-a_bordo">🚗 A bordo</span>',
                'completado': '<span class="badge badge-completado">🏁 Completado</span>',
                'cancelado':  '<span class="badge badge-cancelado">❌ Cancelado</span>'
            };
            return badges[estado] || `<span class="badge">${estado}</span>`;
        }

        // ── Geocodificación (texto → coordenadas) ─────────────────────────────
        async function geocodificar(texto) {
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(texto)}&limit=1`;
                const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
                const data = await res.json();
                if (data && data.length > 0) {
                    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                }
            } catch (e) {
                console.warn('Geocodificación fallida:', e);
            }
            return null;
        }

        // ── Ruta OSRM ────────────────────────────────────────────────────────
        async function trazarRuta(origenCoords, destinoCoords) {
            const url = `https://router.project-osrm.org/route/v1/driving/${origenCoords.lng},${origenCoords.lat};${destinoCoords.lng},${destinoCoords.lat}?overview=full&geometries=geojson`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.routes && data.routes.length > 0) {
                    return {
                        geometry: data.routes[0].geometry,
                        distance: (data.routes[0].distance / 1000).toFixed(1), // km
                        duration: Math.ceil(data.routes[0].duration / 60)       // min
                    };
                }
            } catch (e) {
                console.warn('Error trazando ruta:', e);
            }
            return null;
        }

        // ── Inicializar Mapa ─────────────────────────────────────────────────
        async function mostrarMapaRuta(origenTexto, destinoTexto) {
            document.getElementById('route-card').style.display = 'block';

            // Inicializar mapa solo una vez
            if (!routeMap) {
                routeMap = L.map('route-map', { zoomControl: true, attributionControl: false });
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18
                }).addTo(routeMap);
            }

            // Limpiar capas anteriores
            if (routeLayer) { routeMap.removeLayer(routeLayer); routeLayer = null; }

            try {
                const [origenCoords, destinoCoords] = await Promise.all([
                    geocodificar(origenTexto),
                    geocodificar(destinoTexto)
                ]);

                if (!origenCoords || !destinoCoords) {
                    // Sin geocodificación, centrar en posición por defecto
                    routeMap.setView([14.6349, -90.5069], 12);
                    showToast('No se pudo trazar la ruta exacta, verifica las direcciones', 'info');
                    return;
                }

                // Marcadores de origen y destino
                const iconOrigen = L.divIcon({
                    className: '',
                    html: '<div style="background:#f97316;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>',
                    iconSize: [16, 16], iconAnchor: [8, 8]
                });
                const iconDestino = L.divIcon({
                    className: '',
                    html: '<div style="background:#8ac725;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>',
                    iconSize: [16, 16], iconAnchor: [8, 8]
                });

                L.marker([origenCoords.lat, origenCoords.lng], { icon: iconOrigen })
                    .addTo(routeMap).bindPopup(`📍 Origen: ${origenTexto}`);
                L.marker([destinoCoords.lat, destinoCoords.lng], { icon: iconDestino })
                    .addTo(routeMap).bindPopup(`🏁 Destino: ${destinoTexto}`);

                // Trazar ruta
                const ruta = await trazarRuta(origenCoords, destinoCoords);
                if (ruta) {
                    routeLayer = L.geoJSON(ruta.geometry, {
                        style: { color: '#8ac725', weight: 5, opacity: 0.85 }
                    }).addTo(routeMap);

                    routeMap.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });

                    // Chips de distancia y tiempo
                    document.getElementById('route-chips').innerHTML = `
                        <span class="route-chip chip-distance">📏 ${ruta.distance} km</span>
                        <span class="route-chip chip-time">⏱️ ~${ruta.duration} min</span>
                    `;
                } else {
                    routeMap.fitBounds([
                        [origenCoords.lat, origenCoords.lng],
                        [destinoCoords.lat, destinoCoords.lng]
                    ], { padding: [30, 30] });
                }
            } catch (e) {
                console.error('Error en mapa:', e);
            }
        }

        // ── Actualizar estado visual del viaje ───────────────────────────────
        async function actualizarEstadoViaje(viaje) {
            const statusBar = document.getElementById('trip-status-bar');
            const statusIcon = document.getElementById('status-icon');
            const statusTitle = document.getElementById('status-title');
            const statusSub = document.getElementById('status-sub');
            const driverCard = document.getElementById('driver-card');

            switch (viaje.estado) {
                case 'pendiente':
                    statusBar.className = 'trip-status-bar';
                    statusIcon.textContent = '⏳';
                    statusTitle.textContent = 'Buscando conductor...';
                    statusSub.textContent = 'Pronto un conductor cercano aceptará tu viaje';
                    break;
                case 'asignado':
                    statusBar.className = 'trip-status-bar asignado';
                    statusIcon.textContent = '✅';
                    statusTitle.textContent = '¡Conductor en camino!';
                    statusSub.textContent = 'Tu conductor está de camino a recogerte';
                    // Cargar info del conductor
                    if (viaje.conductor_asignado_id) {
                        await cargarInfoConductorEnMapa(viaje.conductor_asignado_id);
                    }
                    break;
                case 'a_bordo':
                    statusBar.className = 'trip-status-bar a_bordo';
                    statusIcon.textContent = '🚗';
                    statusTitle.textContent = '¡Vas a bordo!';
                    statusSub.textContent = 'Disfruta tu viaje. Te avisamos al llegar.';
                    break;
                case 'completado':
                    statusBar.className = 'trip-status-bar asignado';
                    statusIcon.textContent = '🏁';
                    statusTitle.textContent = '¡Llegaste! Viaje completado.';
                    statusSub.textContent = 'Gracias por usar Road To.';
                    document.getElementById('btn-cancelar').style.display = 'none';
                    break;
            }
        }

        async function cargarInfoConductorEnMapa(conductorId) {
            try {
                const { data, error } = await supabaseClient
                    .from('conductores')
                    .select('nombres, apellidos, vehiculo_marca, vehiculo_modelo, placa, capacidad_disponible')
                    .eq('id', conductorId)
                    .maybeSingle();

                if (error || !data) return;

                const nombre = `${data.nombres || ''} ${data.apellidos || ''}`.trim() || 'Conductor';
                const placa = data.placa || 'Sin placa';
                const vehiculo = `${data.vehiculo_marca || ''} ${data.vehiculo_modelo || ''}`.trim();
                const cuposOcupados = 4 - (data.capacidad_disponible ?? 4);

                document.getElementById('driver-avatar').textContent = nombre.charAt(0).toUpperCase();
                document.getElementById('driver-name').textContent = nombre;
                document.getElementById('driver-plate').textContent = `${vehiculo} · ${placa}`;

                // Indicador de cupos
                const dots = document.getElementById('seats-dots');
                dots.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    const dot = document.createElement('div');
                    dot.className = `seat-dot ${i < cuposOcupados ? 'ocupado' : 'libre'}`;
                    dots.appendChild(dot);
                }

                document.getElementById('driver-card').classList.add('visible');
            } catch (e) {
                console.warn('Error cargando conductor:', e);
            }
        }

        // ── Cancelar Viaje ───────────────────────────────────────────────────
        async function cancelarViaje() {
            if (!activeViajeId) return;
            if (!confirm('¿Seguro que deseas cancelar este viaje?')) return;
            try {
                await supabaseClient.from('viajes_reservados')
                    .update({ estado: 'cancelado', estado_pasajero: 'cancelado' })
                    .eq('id', activeViajeId);
                document.getElementById('route-card').style.display = 'none';
                document.getElementById('form-card').style.display = 'block';
                activeViajeId = null;
                showToast('Viaje cancelado', 'info');
                await cargarMisViajes();
            } catch (e) {
                showToast('Error al cancelar: ' + e.message, 'error');
            }
        }

        // ── Formulario de Solicitud ──────────────────────────────────────────
        document.getElementById('form-reserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Solicitando...';

            try {
                const origen = document.getElementById('origen').value.trim();
                const destino = document.getElementById('destino').value.trim();
                const fechaHora = document.getElementById('fecha-hora').value;

                if (!origen || !destino || !fechaHora) throw new Error('Completa todos los campos obligatorios');

                // Geocodificar destino para guardarlo
                const destinoCoords = await geocodificar(destino);

                const insertData = {
                    pasajero_id: currentUser.id,
                    origen,
                    destino,
                    fecha_hora: fechaHora,
                    estado: 'pendiente',
                    estado_pasajero: 'en_espera',
                    coordenadas_destino: destinoCoords ? { lat: destinoCoords.lat, lng: destinoCoords.lng } : null
                };

                const { data: viaje, error: insertError } = await supabaseClient
                    .from('viajes_reservados')
                    .insert(insertData)
                    .select()
                    .single();

                if (insertError) throw insertError;

                activeViajeId = viaje.id;

                // Mostrar mapa de ruta
                document.getElementById('form-card').style.display = 'none';
                await mostrarMapaRuta(origen, destino);
                await actualizarEstadoViaje(viaje);
                iniciarRealtimeViaje(viaje.id);

                showToast('¡Viaje solicitado! Buscando conductor... 🚗');
                await cargarMisViajes();

            } catch (err) {
                console.error('Error:', err);
                showToast(err.message || 'Error al crear la reserva', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Solicitar Viaje';
            }
        });

        // ── Realtime: escuchar cambios en el viaje activo ────────────────────
        function iniciarRealtimeViaje(viajeId) {
            if (realtimeChannel) {
                supabaseClient.removeChannel(realtimeChannel);
            }
            realtimeChannel = supabaseClient
                .channel(`viaje-pasajero-${viajeId}`)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'viajes_reservados',
                    filter: `id=eq.${viajeId}`
                }, async (payload) => {
                    const nuevoEstado = payload.new?.estado;
                    await actualizarEstadoViaje(payload.new);
                    await cargarMisViajes();

                    if (nuevoEstado === 'asignado') {
                        showToast('🎉 ¡Un conductor ha aceptado tu viaje!');
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    } else if (nuevoEstado === 'a_bordo') {
                        showToast('🚗 ¡Estás a bordo! Buen viaje.');
                    }
                })
                .subscribe();
        }

        // ── Mis Reservas ─────────────────────────────────────────────────────
        async function getConductorInfo(conductorId) {
            if (!conductorId) return null;
            try {
                const { data } = await supabaseClient
                    .from('conductores')
                    .select('nombres, apellidos, celular, vehiculo_marca, vehiculo_modelo, placa, capacidad_disponible')
                    .eq('id', conductorId)
                    .maybeSingle();
                if (!data) return null;
                return {
                    nombre: `${data.nombres || ''} ${data.apellidos || ''}`.trim() || 'Sin nombre',
                    telefono: data.celular || 'No disponible',
                    vehiculo: `${data.vehiculo_marca || ''} ${data.vehiculo_modelo || ''}`.trim(),
                    placa: data.placa || '',
                    cupos: data.capacidad_disponible ?? 4
                };
            } catch (e) { return null; }
        }

        async function cargarMisViajes() {
            const container = document.getElementById('lista-mis-viajes');
            try {
                const { data: viajes, error } = await supabaseClient
                    .from('viajes_reservados')
                    .select('*')
                    .eq('pasajero_id', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (error) throw error;

                if (!viajes || viajes.length === 0) {
                    container.innerHTML = `<div class="empty-state"><p>No tienes reservas activas</p><p style="font-size:12px;margin-top:6px">Completa el formulario para solicitar tu primer viaje</p></div>`;
                    return;
                }

                const viajesDetalle = await Promise.all(
                    viajes.map(async (viaje) => {
                        const conductor = await getConductorInfo(viaje.conductor_asignado_id);
                        return { ...viaje, conductor };
                    })
                );

                container.innerHTML = viajesDetalle.map(v => `
                    <div class="viaje-item">
                        <div class="viaje-route">
                            <span class="origin">📍 ${v.origen}</span>
                            <span class="arrow">→</span>
                            <span class="destiny">🏁 ${v.destino}</span>
                        </div>
                        <div class="viaje-meta">
                            📅 ${formatDate(v.fecha_hora)} · ${getEstadoBadge(v.estado)}
                        </div>
                        ${v.conductor ? `
                            <div class="conductor-info">
                                <strong>👤 Conductor:</strong> ${v.conductor.nombre}<br>
                                <strong>🚗 Vehículo:</strong> ${v.conductor.vehiculo} (${v.conductor.placa})<br>
                                <strong>📞 Teléfono:</strong> ${v.conductor.telefono}<br>
                                <strong>💺 Cupos disp.:</strong> ${v.conductor.cupos}/4
                            </div>
                        ` : ''}
                    </div>
                `).join('');

            } catch (err) {
                console.error('Error cargando viajes:', err);
                container.innerHTML = `<div class="empty-state">Error al cargar reservas: ${err.message}</div>`;
            }
        }

        // ── Realtime general para mis reservas ───────────────────────────────
        function iniciarRealtime() {
            supabaseClient
                .channel('mis-reservas-pasajero')
                .on('postgres_changes', {
                    event: '*', schema: 'public', table: 'viajes_reservados',
                    filter: `pasajero_id=eq.${currentUser.id}`
                }, () => { cargarMisViajes(); })
                .subscribe();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'dashboard.html';
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'dashboard.html'; return; }
            currentUser = session.user;

            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('fecha-hora').min = now.toISOString().slice(0, 16);

            await cargarMisViajes();
            iniciarRealtime();
        }

        init();
    </script>
</body>
</html>
