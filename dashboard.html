<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingreso Usuario</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:16px;
  max-width:450px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  color:#0d6efd;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn-login{
  background:linear-gradient(135deg,#0d6efd,#0b5ed7);
  color:white;
}

.btn-login:hover{
  transform:translateY(-2px);
}

.btn-reset{
  background:#ffc107;
  color:white;
}

.msg{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
  <h2>Ingreso Usuario</h2>

  <input id="email" type="email" placeholder="Correo electrónico">
  <input id="password" type="password" placeholder="Contraseña">

  <button class="btn-login" onclick="login()">Ingresar</button>
  <button class="btn-reset" onclick="recuperar()">Olvidé mi contraseña</button>

  <div id="msg" class="msg"></div>
</div>

<script>

const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if(!email || !password){
    msg.innerText="Completa todos los campos ❌";
    return;
  }

  msg.innerText="Verificando...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    msg.innerText="Correo o contraseña incorrectos ❌";
    return;
  }

  msg.innerText="Ingreso exitoso ✅";

  setTimeout(()=>{
    window.location.href="panel-usuario.html";
  },800);
}

async function recuperar(){

  const email = prompt("Ingresa tu correo electrónico:");
  if(!email) return;

  const msg = document.getElementById("msg");

  msg.innerText="Enviando correo de recuperación...";

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email,{
    redirectTo: window.location.origin + "/reset-password.html"
  });

  if(error){
    msg.innerText="Error enviando correo ❌";
  }else{
    msg.innerText="Si el correo existe, se envió enlace ✅";
  }
}

</script>
</body>
</html>
