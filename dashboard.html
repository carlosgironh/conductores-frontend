<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingreso Usuario - NRDesignCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 20px;
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  .card {
    max-width: 420px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 40px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
    transition: left 0.7s;
    pointer-events: none;
    border-radius: 32px;
  }

  .card:hover::before { left: 100%; }

  .header-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 25px;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(79, 70, 229, 0.1) 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(99, 102, 241, 0.3);
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
    animation: iconPulse 3s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2); }
    50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(79, 70, 229, 0.3); }
  }

  .header-icon svg {
    width: 35px;
    height: 35px;
    color: #818cf8;
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    margin-bottom: 35px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .input-group {
    position: relative;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 16px 20px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    color: #ffffff;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  input::placeholder { color: #64748b; }

  input:hover {
    border-color: rgba(255, 255, 255, 0.2);
    background: rgba(15, 23, 42, 0.8);
  }

  input:focus {
    border-color: #6366f1;
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), 0 4px 20px rgba(99, 102, 241, 0.1);
    outline: none;
  }

  .btn-login {
    width: 100%;
    padding: 18px 28px;
    margin-top: 10px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #4338ca 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 10px 20px -5px rgba(79, 70, 229, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-login::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
  }

  .btn-login:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.5), 0 8px 10px -6px rgba(79, 70, 229, 0.3);
  }

  .btn-login:hover::before { left: 100%; }
  .btn-login:active { transform: translateY(0) scale(0.98); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-reset {
    width: 100%;
    padding: 14px 24px;
    margin-top: 15px;
    border: none;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    color: #94a3b8;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .btn-reset:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-1px);
  }

  .msg {
    margin-top: 25px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    min-height: 24px;
    padding: 12px;
    border-radius: 12px;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateY(-10px);
  }

  .msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  .msg.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .msg.success {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .msg.loading {
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.3);
    color: #818cf8;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 25px 0;
    position: relative;
  }

  .divider::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 3px;
  }

  @media (max-width: 480px) {
    .card { padding: 40px 25px; border-radius: 24px; }
    h2 { font-size: 26px; }
    .header-icon { width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header-icon">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
    </svg>
  </div>
  
  <h2>Ingreso Usuario</h2>

  <div class="input-group">
    <input id="email" type="email" placeholder="Correo electrónico" autocomplete="email">
  </div>
  
  <div class="input-group">
    <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="login()">Ingresar</button>
  
  <div class="divider"></div>
  
  <button class="btn-reset" onclick="recuperar()">¿Olvidaste tu contraseña?</button>

  <div id="msg" class="msg"></div>
</div>

<script>
// Configuración - Eliminar espacios en blanco al final de las URLs
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showMessage(text, type = '') {
  const msg = document.getElementById("msg");
  msg.textContent = text;
  msg.className = 'msg show ' + type;
  
  if (!text) {
    msg.classList.remove('show');
  }
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("loginBtn");

  if(!email || !password){
    showMessage("Completa todos los campos", "error");
    return;
  }

  showMessage("Verificando credenciales...", "loading");
  btn.disabled = true;

  try {
    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ 
      email, 
      password 
    });

    if(authError){
      showMessage("Correo o contraseña incorrectos", "error");
      btn.disabled = false;
      return;
    }

    // Verificar si es admin - Usando solo auth_user_id (sin role)
    const { data: adminData, error: adminError } = await supabaseClient
      .from('admins')
      .select('auth_user_id')
      .eq('auth_user_id', authData.user.id)
      .maybeSingle(); // Cambiado a maybeSingle para manejar mejor el caso de no encontrado

    // Manejo de errores específico
    if(adminError){
      console.error("Error en consulta admin:", adminError);
      
      // Si el error es de permisos o tabla no existe, intentar sin filtro
      if(adminError.code === 'PGRST104' || adminError.code === '42P01' || adminError.code === '42501') {
        console.log("Posible problema de permisos o tabla, continuando como usuario normal");
        showMessage("¡Ingreso exitoso! Redirigiendo...", "success");
        
        setTimeout(() => {
          window.location.href = "perfil.html";
        }, 1200);
        return;
      }
      
      // Otros errores graves
      if(adminError.code !== 'PGRST116') { // PGRST116 = no encontrado (esto es normal)
        showMessage("Error verificando permisos: " + adminError.message, "error");
        btn.disabled = false;
        return;
      }
    }

    showMessage("¡Ingreso exitoso! Redirigiendo...", "success");

    setTimeout(() => {
      if(adminData && adminData.auth_user_id){ 
        window.location.href = "panel-admin.html";
      } else {
        window.location.href = "perfil.html";
      }
    }, 1200);

  } catch (err) {
    console.error("Error inesperado:", err);
    showMessage("Error de conexión: " + err.message, "error");
    btn.disabled = false;
  }
}

async function recuperar(){
  const email = prompt("Ingresa tu correo electrónico registrado:");
  if(!email) return;

  showMessage("Enviando correo de recuperación...", "loading");

  try {
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/reset-password.html"
    });

    if(error){
      showMessage("Error al enviar el correo: " + error.message, "error");
    } else {
      showMessage("Si el correo existe, recibirás un enlace de recuperación", "success");
    }
  } catch (err) {
    showMessage("Error de conexión", "error");
  }
}

// Permitir login con Enter
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
