<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Conductores</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* 1. Tipografía Apple Moderna */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * {
    box-sizing: border-box;
    outline: none;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 40px 20px; /* Padding extra para que no se pegue a los bordes al hacer scroll */
    min-height: 100vh;
    /* Fondo Midnight (Azul Noche Profundo) */
    background: radial-gradient(circle at top left, #2b3242, #111317);
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Alineado arriba para permitir scroll */
  }

  /* 2. Tarjeta con Efecto Cristal (Glassmorphism) */
  .card {
    max-width: 600px; /* Un poco más estrecha para elegancia */
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    padding: 40px;
    margin: auto;
  }

  h2 {
    text-align: center;
    color: #f1f5f9;
    font-weight: 600;
    font-size: 26px;
    margin-bottom: 30px;
    letter-spacing: -0.5px;
  }

  /* 3. Estilos de Inputs (Texto) */
  form input[type="text"],
  form input[type="email"],
  form input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    margin-top: 8px;
    margin-bottom: 16px; /* Espacio automático entre inputs */
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.2); /* Input oscuro */
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 15px;
    transition: all 0.2s ease;
  }

  form input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    background: rgba(0, 0, 0, 0.4);
  }

  /* 4. Estilos de Inputs (Archivos) - Truco CSS */
  form input[type="file"] {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    border: 1px dashed rgba(255, 255, 255, 0.2);
    color: #94a3b8;
    cursor: pointer;
  }

  /* Estiliza el botón interno de "Seleccionar archivo" */
  form input[type="file"]::file-selector-button {
    margin-right: 15px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 12px;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    transition: background .2s ease-in-out;
    font-weight: 500;
  }

  form input[type="file"]::file-selector-button:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #cbd5e1; /* Gris claro para etiquetas */
    margin-left: 4px; /* Alineación visual sutil */
  }

  /* Separador */
  hr {
    border: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 30px 0;
  }

  /* 5. Botón Principal */
  button[type="submit"] {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 30px;
    width: 100%;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    transition: all 0.2s ease;
  }

  button:hover:not(:disabled) {
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
  }

  button:disabled {
    background: #475569;
    color: #94a3b8;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* Mensajes de Estado */
  #mensaje {
    margin-top: 20px;
    font-weight: 500;
    text-align: center;
    min-height: 24px;
  }
  .error { color: #ff6b6b; }
  .ok { color: #4ade80; }
  .busy { color: #60a5fa; }

  /* Loader Animado */
  .loader {
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top: 3px solid white;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    animation: spin 1s linear infinite;
    display: inline-block;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }
</style>
</head>

<body>

<div class="card">
<h2>Registro de Conductores</h2>

<form id="formConductor">

<label>Correo</label>
<input id="email" type="email" required>

<label>Contraseña</label>
<input id="password" type="password" required minlength="6">

<hr>

<label>Nombres</label>
<input id="nombres" type="text" required>

<label>Apellidos</label>
<input id="apellidos" type="text" required>

<label>Dirección</label>
<input id="direccion" type="text" required>

<label>Celular</label>
<input id="celular" type="text" required>

<label>Cédula</label>
<input id="cedula" type="text" required>

<label>Licencia</label>
<input id="licencia" type="text" required>

<label>Placa</label>
<input id="placa" type="text" required>

<label>Modelo</label>
<input id="modelo" type="text" required>

<label>Marca</label>
<input id="marca" type="text" required>

<label>Color</label>
<input id="color" type="text" required>

<label>Número de póliza</label>
<input id="poliza_numero" type="text" required>

<hr>

<label>Cédula (doc o imagen)</label>
<input type="file" id="cedula_doc" required>

<label>Licencia (doc o imagen)</label>
<input type="file" id="licencia_doc" required>

<label>Registro Vehicular</label>
<input type="file" id="registro_doc" required>

<label>Póliza</label>
<input type="file" id="poliza_doc" required>

<label>Foto Vehículo</label>
<input type="file" id="foto_vehiculo" required>

<label>Foto Conductor</label>
<input type="file" id="foto_conductor" required>

<label>Autorización del propietario</label>
<input type="file" id="auth_propietario" required>

<button type="submit" id="btnRegistrar">Registrar</button>
<div id="mensaje"></div>

</form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("formConductor");
const mensaje = document.getElementById("mensaje");
const btn = document.getElementById("btnRegistrar");

function showMessage(text, type=""){
  mensaje.textContent = text;
  mensaje.className = type;
}

function setLoading(state){
  btn.disabled = state;
  btn.innerHTML = state
    ? '<span class="loader"></span>Procesando...'
    : 'Registrar';
}

async function subirDocumento(conductorId, tipo, inputId){
  const file = document.getElementById(inputId).files[0];
  const path = `${conductorId}/${tipo}_${Date.now()}_${file.name}`;

  const { error: uploadError } = await supabase.storage
    .from("documentos-conductores")
    .upload(path, file);

  if(uploadError) throw uploadError;

  const { error: dbError } = await supabase
    .from("documentos")
    .insert([{
      conductor_id: conductorId,
      tipo: tipo,
      url_archivo: path
    }]);

  if(dbError) throw dbError;
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();
  setLoading(true);
  showMessage("Registrando...", "busy");

  try{

    // 1️⃣ Crear usuario
    const { error: signUpError } = await supabase.auth.signUp({
      email: email.value,
      password: password.value
    });

    if(signUpError) throw signUpError;

    // 2️⃣ Login automático
    const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({
      email: email.value,
      password: password.value
    });

    if(loginError) throw loginError;

    const authUserId = loginData.user.id;

    // 3️⃣ Insertar conductor
    const { data: conductorData, error: conductorError } = await supabase
      .from("conductores")
      .insert([{
        auth_user_id: authUserId,
        nombres: nombres.value,
        apellidos: apellidos.value,
        direccion: direccion.value,
        celular: celular.value,
        cedula: cedula.value,
        licencia: licencia.value,
        placa: placa.value,
        modelo: modelo.value,
        marca: marca.value,
        color: color.value,
        poliza_numero: poliza_numero.value
      }])
      .select()
      .single();

    if(conductorError) throw conductorError;

    const conductorId = conductorData.id;

    // 4️⃣ Subir documentos
    await subirDocumento(conductorId,"CEDULA","cedula_doc");
    await subirDocumento(conductorId,"LICENCIA","licencia_doc");
    await subirDocumento(conductorId,"REGISTRO","registro_doc");
    await subirDocumento(conductorId,"POLIZA","poliza_doc");
    await subirDocumento(conductorId,"FOTO_VEHICULO","foto_vehiculo");
    await subirDocumento(conductorId,"FOTO_CONDUCTOR","foto_conductor");
    await subirDocumento(conductorId,"AUTH_PROPIETARIO","auth_propietario");

    showMessage("Registro exitoso ✅", "ok");

    setTimeout(() => {
      window.location.href = "perfil.html";
    }, 1500);

  }catch(error){
    console.error(error);
    showMessage(error.message, "error");
  }

  setLoading(false);
});

});
</script>

</body>
</html>
