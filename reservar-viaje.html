<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a1208">
    <title>Reservar Viaje - Pasajero | Road To</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --corp-green: #8ac725;
            --corp-green-dark: #448414;
            --corp-green-lime: #9ad93a;
            --corp-green-light: #b8e85c;
            --corp-gray: #7d7d7d;
            --corp-gray-dark: #4a4a4a;
            --corp-gray-light: #9e9e9e;
            --corp-gray-soft: #cbd5e1;
            --corp-blue: #2563eb;
            --corp-blue-dark: #1e40af;
            --corp-blue-light: #3b82f6;
            --corp-orange: #f97316;
            --corp-orange-light: #fb923c;
            --primary: var(--corp-green);
            --primary-dark: var(--corp-green-dark);
            --accent: var(--corp-green-lime);
            --bg-dark: #0a1208;
            --text-light: #eef8e4;
            --text-muted: #8a9e7d;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 10% 20%, rgba(138,199,37,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 90% 80%, rgba(154,217,58,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 0%, #0a1208 0%, #0a1208 100%);
            color: var(--text-light);
            padding-top: calc(70px + var(--safe-top));
            padding-bottom: calc(20px + var(--safe-bottom));
        }

        .app-header {
            position: fixed;
            top: calc(10px + var(--safe-top));
            left: calc(10px + env(safe-area-inset-left));
            right: calc(10px + env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            padding: 10px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-small {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 14px;
            color: var(--corp-orange);
            text-decoration: none;
        }

        .brand-small svg { width: 24px; height: 24px; color: var(--corp-orange-light); }

        .nav-buttons { display: flex; gap: 8px; }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn svg { width: 20px; height: 20px; }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: var(--text-light);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--corp-green);
            box-shadow: 0 0 0 4px rgba(138, 199, 37, 0.15), 0 4px 20px rgba(138, 199, 37, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        input::placeholder, textarea::placeholder { color: var(--text-muted); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 28px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
            min-height: 48px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--corp-green) 0%, var(--corp-green-dark) 100%);
            color: #0a1208;
            box-shadow: 0 4px 15px rgba(68, 132, 20, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(68, 132, 20, 0.5);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn:active { transform: scale(0.97); }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #0a1208;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .mis-viajes { margin-top: 8px; }

        .viaje-item {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .viaje-item:hover {
            border-color: rgba(138, 199, 37, 0.2);
            transform: translateY(-2px);
        }

        .viaje-route {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .origin { color: var(--warning); }
        .arrow { color: var(--text-muted); }
        .destiny { color: var(--success); }

        .viaje-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .badge-pendiente { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
        .badge-asignado { background: rgba(37,99,235,0.15); color: var(--corp-blue-light); border: 1px solid rgba(37,99,235,0.25); }
        .badge-completado { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.25); }

        .conductor-info {
            margin-top: 12px;
            padding: 12px;
            background: rgba(138, 199, 37, 0.08);
            border: 1px solid rgba(138, 199, 37, 0.15);
            border-radius: 10px;
            font-size: 13px;
        }

        .conductor-info strong { color: var(--corp-green-light); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: max(20px, var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10, 18, 8, 0.95);
            color: var(--text-light);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-success { border-color: rgba(16, 185, 129, 0.3); color: #4ade80; }
        .toast-error { border-color: rgba(239, 68, 68, 0.3); color: #f87171; }

        .nav-perfil {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(138, 199, 37, 0.1);
            border: 1px solid rgba(138, 199, 37, 0.2);
            border-radius: 12px;
            color: var(--corp-green-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-perfil:hover {
            background: rgba(138, 199, 37, 0.2);
            transform: translateY(-1px);
        }

        .nav-perfil svg { width: 18px; height: 18px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(138,199,37,0.2); border-radius: 3px; }

        @media (max-width: 640px) {
            .card { padding: 20px; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <header class="app-header">
        <a href="index.html" class="brand-small">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7"></path>
            </svg>
            Road To
        </a>
        <div class="nav-buttons">
            <a class="nav-perfil" href="perfil-pasajero.html">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Mi Perfil
            </a>
            <button class="nav-btn" onclick="logout()" title="Cerrar sesión">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">🚗 Reservar un Viaje</h1>
        <p class="page-subtitle">Solicita tu viaje y te conectaremos con un conductor</p>

        <div class="card">
            <div class="card-title">📋 Datos del Viaje</div>

            <form id="form-reserva">
                <div class="form-group">
                    <label for="origen">📍 Origen</label>
                    <input type="text" id="origen" placeholder="Ej: Centro Comercial, Zona 1, Aeropuerto..." required>
                </div>

                <div class="form-group">
                    <label for="destino">🏁 Destino</label>
                    <input type="text" id="destino" placeholder="Ej: Hotel Marriott, Terminal de Buses..." required>
                </div>

                <div class="form-group">
                    <label for="fecha-hora">📅 Fecha y Hora</label>
                    <input type="datetime-local" id="fecha-hora" required>
                </div>

                <div class="form-group">
                    <label for="notas">📝 Notas adicionales (opcional)</label>
                    <textarea id="notas" rows="3" placeholder="Número de pasajeros, equipaje especial, etc."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" id="btn-submit">
                    🚀 Solicitar Viaje
                </button>
            </form>
        </div>

        <div class="mis-viajes">
            <div class="card">
                <div class="card-title">📜 Mis Reservas</div>
                <div id="lista-mis-viajes">
                    <div class="empty-state">Cargando tus reservas...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";
        const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/asignar-conductor`;

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('es-ES', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function getEstadoBadge(estado) {
            const badges = {
                'pendiente': '<span class="badge badge-pendiente">⏳ Buscando conductor...</span>',
                'asignado': '<span class="badge badge-asignado">✅ Conductor asignado</span>',
                'completado': '<span class="badge badge-completado">🏁 Completado</span>'
            };
            return badges[estado] || estado;
        }

        // Obtener info del conductor por ID
        async function getConductorInfo(conductorId) {
            if (!conductorId) return null;
            try {
                const { data, error } = await supabaseClient
                    .from('conductores')
                    .select('nombres, apellidos, celular, nombre')
                    .eq('id', conductorId)
                    .maybeSingle();
                
                if (error || !data) return null;
                
                return {
                    nombre: data.nombre || `${data.nombres || ''} ${data.apellidos || ''}`.trim() || 'Sin nombre',
                    telefono: data.celular || 'No disponible'
                };
            } catch (e) {
                return null;
            }
        }

        document.getElementById('form-reserva').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Solicitando...';

            try {
                const origen = document.getElementById('origen').value.trim();
                const destino = document.getElementById('destino').value.trim();
                const fechaHora = document.getElementById('fecha-hora').value;
                const notas = document.getElementById('notas').value.trim();

                if (!origen || !destino || !fechaHora) {
                    throw new Error('Completa todos los campos obligatorios');
                }

                const { data: viaje, error: insertError } = await supabaseClient
                    .from('viajes_reservados')
                    .insert({
                        pasajero_id: currentUser.id,
                        origen,
                        destino,
                        fecha_hora: fechaHora,
                        notas: notas || null,
                        estado: 'pendiente'
                    })
                    .select()
                    .single();

                if (insertError) throw insertError;

                // Llamar a la Edge Function para notificar conductores
                try {
                    const session = await supabaseClient.auth.getSession();
                    const response = await fetch(EDGE_FUNCTION_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${session.data.session?.access_token}`
                        },
                        body: JSON.stringify({
                            action: 'buscar_candidatos',
                            viaje_id: viaje.id
                        })
                    });

                    const result = await response.json();
                    console.log('Notificación a conductores:', result);
                    
                    if (!response.ok) {
                        console.warn('Edge Function warning:', result.error || 'Unknown error');
                        // No lanzar error, el viaje ya se creó
                    }
                } catch (edgeErr) {
                    console.warn('Edge Function no disponible:', edgeErr);
                    // No bloquear, el viaje ya está creado
                }

                showToast('¡Viaje solicitado! Buscando conductor... 🚗');
                document.getElementById('form-reserva').reset();
                await cargarMisViajes();

            } catch (err) {
                console.error('Error:', err);
                showToast(err.message || 'Error al crear la reserva', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Solicitar Viaje';
            }
        });

        async function cargarMisViajes() {
            const container = document.getElementById('lista-mis-viajes');

            try {
                // Consulta simple sin JOIN
                const { data: viajes, error } = await supabaseClient
                    .from('viajes_reservados')
                    .select('*')
                    .eq('pasajero_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!viajes || viajes.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>No tienes reservas activas</p>
                            <p style="font-size: 13px; margin-top: 6px;">Completa el formulario para solicitar tu primer viaje</p>
                        </div>`;
                    return;
                }

                // Obtener info de conductores en paralelo
                const viajesConductor = await Promise.all(
                    viajes.map(async (viaje) => {
                        const conductor = await getConductorInfo(viaje.conductor_asignado_id);
                        return { ...viaje, conductor };
                    })
                );

                container.innerHTML = viajesConductor.map(v => `
                    <div class="viaje-item">
                        <div class="viaje-route">
                            <span class="origin">📍 ${v.origen}</span>
                            <span class="arrow">→</span>
                            <span class="destiny">🏁 ${v.destino}</span>
                        </div>
                        <div class="viaje-meta">
                            📅 ${formatDate(v.fecha_hora)} · ${getEstadoBadge(v.estado)}
                        </div>
                        ${v.conductor ? `
                            <div class="conductor-info">
                                <strong>👤 Conductor:</strong> ${v.conductor.nombre}<br>
                                <strong>📞 Teléfono:</strong> ${v.conductor.telefono}
                            </div>
                        ` : ''}
                    </div>
                `).join('');

            } catch (err) {
                console.error('Error cargando viajes:', err);
                container.innerHTML = `<div class="empty-state">Error al cargar reservas: ${err.message}</div>`;
            }
        }

        function iniciarRealtime() {
            supabaseClient
                .channel('mis-reservas-pasajero')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'viajes_reservados',
                    filter: `pasajero_id=eq.${currentUser.id}`
                }, (payload) => {
                    console.log('Cambio en mi reserva:', payload);
                    cargarMisViajes();

                    if (payload.new?.estado === 'asignado' && payload.old?.estado === 'pendiente') {
                        showToast('🎉 ¡Un conductor ha aceptado tu viaje!');
                    }
                })
                .subscribe();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'dashboard.html';
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (!session) {
                window.location.href = 'dashboard.html';
                return;
            }

            currentUser = session.user;

            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('fecha-hora').min = now.toISOString().slice(0, 16);

            await cargarMisViajes();
            iniciarRealtime();
        }

        init();
    </script>
</body>
</html>
