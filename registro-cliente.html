<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Pasajeros</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    min-height: 100vh;
    padding: 20px;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    overflow-x: hidden;
  }

  .card {
    max-width: 700px;
    margin: auto;
  }

  .header { text-align: center; margin-bottom: var(--sp-xl); }
  .header-icon {
    width: 64px; height: 64px; margin: 0 auto var(--sp-md);
    background: rgba(37, 99, 235, 0.12);
    border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(37, 99, 235, 0.18);
  }
  .header-icon svg { width: 32px; height: 32px; color: var(--color-blue-primary); }

  h2 { font-size: var(--font-size-3xl); margin-bottom: 0.25rem; }
  .subtitle { color: var(--text-secondary); font-size: var(--font-size-md); }

  .form-section { margin-bottom: var(--sp-xl); animation: fadeInUp 0.5s ease-out backwards; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-md); }
  @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }

  .form-group.full-width { grid-column: 1 / -1; }

  .file-input-wrapper { margin-bottom: var(--sp-md); }
  .file-input-label {
    display: flex; align-items: center; gap: var(--sp-sm);
    padding: var(--sp-md);
    border-radius: var(--radius-md);
    background: var(--bg-input);
    border: 1px dashed var(--border-light);
    color: var(--text-secondary);
    transition: all var(--transition-base);
    cursor: pointer;
  }
  .file-input-wrapper:hover .file-input-label,
  .file-input-wrapper:focus-within .file-input-label {
    background: rgba(15, 23, 42, 0.88);
    border-color: var(--color-blue-primary);
    color: var(--text-light);
  }
  .file-input-wrapper.has-file .file-input-label {
    border-style: solid;
    border-color: var(--color-green-primary);
    background: rgba(118, 179, 44, 0.12);
    color: var(--color-green-light);
  }

  .file-icon { width: 24px; height: 24px; flex-shrink: 0; }
  .file-text { display: flex; flex-direction: column; gap: 3px; }
  .file-name { font-weight: var(--font-weight-semibold); color: var(--text-light); }
  .file-hint { font-size: var(--font-size-xs); color: var(--text-tertiary); }

  .upload-progress { position: fixed; top: 0; left: 0; width: 0; height: 3px; background: var(--color-orange-primary); z-index: 1000; transition: width 0.3s; box-shadow: 0 0 10px rgba(247, 123, 29, 0.25); }

  #mensaje {
    margin-top: var(--sp-md);
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--sp-md);
    gap: var(--sp-sm);
    border-radius: var(--radius-md);
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #mensaje.show { opacity: 1; transform: translateY(0); }
  #mensaje.error { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.24); color: #fda4a4; }
  #mensaje.ok { background: rgba(118, 179, 44, 0.12); border: 1px solid rgba(118, 179, 44, 0.24); color: var(--color-green-light); }
  #mensaje.busy { background: rgba(37, 99, 235, 0.12); border: 1px solid rgba(37, 99, 235, 0.24); color: var(--color-blue-light); }

  .loader { width: 20px; height: 20px; border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  button[type="submit"] { width: 100%; }
  .btn-back { width: 100%; justify-content: center; }
</style>
</head>
<body>

  <div class="upload-progress" id="progressBar"></div>

  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
      </div>
      <h2>Registro de Pasajeros</h2>
      <p class="subtitle">Complete todos los campos para registrarse en la plataforma</p>
    </div>

    <form id="formPasajero">
      
      <!-- Sección: Cuenta -->
      <div class="form-section">
        <div class="section-title">Información de Cuenta</div>
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Correo Electrónico</label>
            <input id="email" type="email" placeholder="pasajero@email.com" required>
          </div>
          <div class="form-group full-width">
            <label>Contraseña</label>
            <input id="password" type="password" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Sección: Personal -->
      <div class="form-section">
        <div class="section-title">Datos Personales</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombres</label>
            <input id="nombres" type="text" placeholder="Juan" required>
          </div>
          <div class="form-group">
            <label>Apellidos</label>
            <input id="apellidos" type="text" placeholder="Pérez" required>
          </div>
          <div class="form-group full-width">
            <label>Dirección</label>
            <input id="direccion" type="text" placeholder="Av. Principal #123" required>
          </div>
          <div class="form-group">
            <label>Celular</label>
            <input id="celular" type="text" placeholder="0999999999" required>
          </div>
          <div class="form-group">
            <label>Cédula</label>
            <input id="cedula" type="text" placeholder="1234567890" required>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Sección: Documentos -->
      <div class="form-section">
        <div class="section-title">Documentos Requeridos</div>
        
        <div class="file-input-wrapper">
          <input type="file" id="cedula_doc" accept=".pdf,.jpg,.jpeg,.png" required>
          <div class="file-input-label">
            <svg class="file-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <div class="file-text">
              <span class="file-name">Cédula de Identidad</span>
              <span class="file-hint">PDF, JPG o PNG</span>
            </div>
          </div>
        </div>

        <div class="file-input-wrapper">
          <input type="file" id="foto_perfil" accept=".jpg,.jpeg,.png" required>
          <div class="file-input-label">
            <svg class="file-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <div class="file-text">
              <span class="file-name">Foto de Perfil</span>
              <span class="file-hint">JPG o PNG</span>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" id="btnRegistrar" class="btn btn-register">
        <span>Completar Registro</span>
      </button>
      <a href="index.html" class="btn btn-secondary btn-back">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Regresar al inicio
      </a>
      
      <div id="mensaje"></div>

    </form>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Z5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("formPasajero");
const mensaje = document.getElementById("mensaje");
const btn = document.getElementById("btnRegistrar");
const progressBar = document.getElementById("progressBar");

// Manejar visualización de archivos seleccionados
document.querySelectorAll('input[type="file"]').forEach(input => {
  input.addEventListener('change', function() {
    const wrapper = this.closest('.file-input-wrapper');
    const label = wrapper.querySelector('.file-name');
    const hint = wrapper.querySelector('.file-hint');
    
    if (this.files && this.files[0]) {
      wrapper.classList.add('has-file');
      label.textContent = this.files[0].name;
      hint.textContent = 'Archivo seleccionado ✓';
      wrapper.classList.remove('required');
    } else {
      wrapper.classList.remove('has-file');
      if (this.id === 'cedula_doc') {
        label.textContent = 'Cédula de Identidad';
        hint.textContent = 'PDF, JPG o PNG';
      } else if (this.id === 'foto_perfil') {
        label.textContent = 'Foto de Perfil';
        hint.textContent = 'JPG o PNG';
      }
    }
  });
});

function showMessage(text, type=""){
  mensaje.textContent = text;
  mensaje.className = type + ' show';
  setTimeout(() => {
    mensaje.classList.remove('show');
  }, 5000);
}

function setLoading(state){
  btn.disabled = state;
  if (state) {
    btn.innerHTML = '<div class="loader"></div><span>Procesando...</span>';
    progressBar.style.width = '30%';
  } else {
    btn.innerHTML = '<span>Completar Registro</span>';
    progressBar.style.width = '0%';
  }
}

function updateProgress(percent) {
  progressBar.style.width = percent + '%';
}

// Función para convertir archivo a Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// FUNCIÓN PRINCIPAL: Enviar datos a la Edge Function
async function processRegistration() {
  setLoading(true);
  showMessage("Preparando datos de registro...", "busy");
  updateProgress(10);

  try {
    // Preparar datos del pasajero (estructura que espera la Edge Function)
    const pasajeroData = {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      nombres: document.getElementById('nombres').value,
      apellidos: document.getElementById('apellidos').value,
      direccion: document.getElementById('direccion').value,
      celular: document.getElementById('celular').value,
      cedula: document.getElementById('cedula').value
    };

    updateProgress(20);

    // Preparar archivos para enviar (convertir a base64)
    const archivos = {};
    const archivosObligatorios = [
      { id: 'cedula_doc', nombre: 'cedula' },
      { id: 'foto_perfil', nombre: 'foto_perfil' }
    ];

    showMessage("Codificando archivos...", "busy");

    for (const archivo of archivosObligatorios) {
      const fileInput = document.getElementById(archivo.id);
      if (fileInput.files[0]) {
        archivos[archivo.nombre] = await fileToBase64(fileInput.files[0]);
      }
    }

    updateProgress(40);
    showMessage("Enviando datos al servidor...", "busy");

    // Preparar el body de la petición
    const requestBody = {
      pasajero: pasajeroData,
      archivos: archivos
    };

    // Enviar usando fetch nativo (mismo patrón que conductores)
    const functionUrl = `${SUPABASE_URL}/functions/v1/nuevo-registro-pasajero`;
    
    console.log('Enviando request a:', functionUrl);
    console.log('Body keys:', Object.keys(requestBody));
    console.log('Archivos:', Object.keys(archivos));

    const response = await fetch(functionUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY
      },
      body: JSON.stringify(requestBody)
    });

    updateProgress(70);

    let data;
    const responseText = await response.text();
    
    console.log('Response status:', response.status);
    console.log('Response text (primeros 500 chars):', responseText.substring(0, 500));

    try {
      data = JSON.parse(responseText);
    } catch (e) {
      console.error('Error parseando JSON:', e);
      throw new Error('Respuesta inválida del servidor: ' + responseText.substring(0, 200));
    }

    if (!response.ok) {
      throw new Error(data.error || data.message || `Error del servidor: ${response.status}`);
    }

    if (!data.success) {
      throw new Error(data.error || 'Error desconocido en el registro');
    }

    updateProgress(100);
    showMessage(`¡Registro exitoso! ID: ${data.passengerId?.substring(0, 8)}... Redirigiendo...`, "ok");

    // Establecer sesión si la función la devuelve
    if (data.session) {
      const { error: sessionError } = await supabase.auth.setSession({
        access_token: data.session.access_token,
        refresh_token: data.session.refresh_token
      });
      
      if (sessionError) {
        console.error('Error estableciendo sesión:', sessionError);
      } else {
        console.log('Sesión establecida correctamente');
      }
    }

    setTimeout(() => {
      window.location.href = "perfil-pasajero.html";
    }, 2000);

  } catch(error) {
    console.error('Error completo:', error);
    
    let errorMessage = error.message || "Error en el registro. Intente nuevamente.";
    
    if (error.message?.includes('400')) {
      errorMessage = "Error en los datos enviados. Verifique toda la información.";
    } else if (error.message?.includes('401')) {
      errorMessage = "Error de autenticación. Contacte soporte técnico.";
    } else if (error.message?.includes('403')) {
      errorMessage = "No tiene permisos para realizar esta acción.";
    } else if (error.message?.includes('422')) {
      errorMessage = "Datos inválidos. Verifique el formato de los archivos.";
    } else if (error.message?.includes('CORS')) {
      errorMessage = "Error de configuración del servidor. Contacte soporte.";
    } else if (error.message?.includes('fetch') || error.message?.includes('network')) {
      errorMessage = "Error de conexión. Verifique su internet.";
    }
    
    showMessage(errorMessage, "error");
    progressBar.style.width = '0%';
  }

  setLoading(false);
}

// Manejar submit del formulario
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  await processRegistration();
});

// Detectar teclado virtual en móviles (optimización Capacitor)
if (window.Capacitor) {
  window.addEventListener('keyboardWillShow', () => {
    document.body.style.position = 'fixed';
    document.body.style.width = '100%';
  });
  
  window.addEventListener('keyboardWillHide', () => {
    document.body.style.position = '';
    document.body.style.width = '';
  });
}

});
</script>

</body>
</html>
