<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Pasajeros</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* Estilos específicos del formulario de registro - Base en theme.css */
  body {
    background: radial-gradient(ellipse at 10% 20%, rgba(37, 99, 235, 0.08) 0%, transparent 50%), 
                radial-gradient(circle at top left, #0f172a, #0a1208);
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .card {
    max-width: 640px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .header { text-align: center; margin-bottom: 24px; }
  .header-icon { 
    width: 64px; 
    height: 64px; 
    margin: 0 auto 10px; 
    background: linear-gradient(135deg, rgba(37, 99, 235, 0.12) 0%, rgba(247, 123, 29, 0.06) 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  h2 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .subtitle { color: #94a3b8; font-size: 14px; }

  .form-section { margin-bottom: 18px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #60a5fa; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
  }

  label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; }
  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: #fff;
  }

  input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
    outline: none;
    border-color: var(--color-green-primary);
    background: rgba(118, 179, 44, 0.08);
    box-shadow: 0 0 0 3px rgba(118, 179, 44, 0.12);
  }

  button[type="submit"] {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #2563eb 0%, #f97316 100%);
    color: white;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 200ms ease;
  }

  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
  }

  .btn-back {
    display: inline-flex;
    gap: 8px;
    padding: 10px 14px;
    margin-top: 12px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: #cbd5e1;
    border-radius: 10px;
    text-decoration: none;
    cursor: pointer;
    transition: all 200ms ease;
  }

  .btn-back:hover {
    border-color: var(--color-green-primary);
    color: var(--color-green-primary);
  }

  #mensaje {
    margin-top: 14px;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 600;
    color: var(--color-green-primary);
  }

  #mensaje.error { color: #ff6b6b; }
  #mensaje.ok { color: var(--color-green-primary); }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="36" height="36"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      </div>
      <h2>Registro de Pasajeros</h2>
      <p class="subtitle">Crea tu cuenta como pasajero para reservar asientos y gestionar tus viajes.</p>
    </div>

    <form id="formPasajero">
      <div class="form-section">
        <div class="section-title">Datos Personales</div>
        <div class="form-grid">
          <div>
            <label for="nombres">Nombre</label>
            <input id="nombres" type="text" placeholder="Juan" required>
          </div>
          <div>
            <label for="apellidos">Apellido</label>
            <input id="apellidos" type="text" placeholder="Pérez" required>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-grid">
          <div style="grid-column:1 / -1;">
            <label for="email">Correo Electrónico</label>
            <input id="email" type="email" placeholder="tu@email.com" required>
          </div>
          <div>
            <label for="cedula">Número de Cédula</label>
            <input id="cedula" type="text" placeholder="1234567890" required>
          </div>
          <div>
            <label for="whatsapp">WhatsApp</label>
            <input id="whatsapp" type="text" placeholder="+1 234 567 890" required>
          </div>
        </div>
      </div>

      <button type="submit" id="btnRegistrar">Crear cuenta</button>
      <a href="index.html" class="btn-back">Regresar al inicio</a>
      <div id="mensaje"></div>
    </form>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Z5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";
  const supabase = window.supabase?.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  const form = document.getElementById('formPasajero');
  const mensaje = document.getElementById('mensaje');
  const btn = document.getElementById('btnRegistrar');

  function showMessage(text, type=''){
    mensaje.textContent = text;
    mensaje.className = type;
    setTimeout(()=>{ mensaje.className=''; },5000);
  }

  function setLoading(state){ btn.disabled = state; if(state) btn.textContent = 'Procesando...'; else btn.textContent = 'Crear cuenta'; }

  async function processRegistration(){
    try{
      setLoading(true); showMessage('Preparando registro...','');
      const pasajero = {
        email: document.getElementById('email').value,
        nombres: document.getElementById('nombres').value,
        apellidos: document.getElementById('apellidos').value,
        cedula: document.getElementById('cedula').value,
        whatsapp: document.getElementById('whatsapp').value
      };

      const requestBody = { pasajero };
      const functionUrl = `${SUPABASE_URL}/functions/v1/nuevo-registro-pasajero`;

      const response = await fetch(functionUrl, { method:'POST', headers:{ 'Content-Type':'application/json', 'apikey': SUPABASE_ANON_KEY }, body: JSON.stringify(requestBody) });
      const text = await response.text();
      let data = {};
      try{ data = JSON.parse(text); }catch(e){ throw new Error('Respuesta inválida del servidor'); }
      if(!response.ok || !data.success) throw new Error(data.error || 'Error en el registro');

      showMessage('¡Registro exitoso! Redirigiendo...', 'ok');
      setTimeout(()=> window.location.href = 'perfil_publico.html', 1300);
    }catch(err){ console.error(err); showMessage(err.message || 'Error en el registro','error'); }
    finally{ setLoading(false); }
  }

  form.addEventListener('submit', (e)=>{ e.preventDefault(); processRegistration(); });
});
</script>
</body>
</html>
