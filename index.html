<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido a Road To</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#09100d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Capacitor 7 -->
  <script type="module">
    import { SplashScreen } from '@capacitor/splash-screen';
    import { StatusBar } from '@capacitor/status-bar';
    import { App } from '@capacitor/app';
    import { Preferences } from '@capacitor/preferences';

    window.CapacitorPlugins = { SplashScreen, StatusBar, App, Preferences };
  </script>

  <link rel="stylesheet" href="theme.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      /* ─── Safe areas ─── */
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);

      /* ─── Colores corporativos ─── */
      /* Verde (del logo) */
      --corp-green: #76b32c;
      --corp-green-dark: #3f6d12;
      --corp-green-lime: #b8d958;
      --corp-green-light: #d8e693;

      /* Gris (carretera del logo) */
      --corp-gray: #8f959d;
      --corp-gray-dark: #4f555c;
      --corp-gray-light: #c1c8d0;
      --corp-gray-dim: #6e767f;

      /* Azul (corporativo nuevo) */
      --corp-blue: #2563eb;
      --corp-blue-dark: #1f3f91;
      --corp-blue-light: #5b8bf4;
      --corp-blue-soft: #7faeff;

      /* Naranja (corporativo nuevo) */
      --corp-orange: #f77b1d;
      --corp-orange-dark: #c25d11;
      --corp-orange-light: #ff9d52;
      --corp-orange-soft: #fcd1a2;

      /* ─── Derivados UI ─── */
      --bg-dark: #09100d;
      --bg-card: rgba(17, 24, 20, 0.92);
      --bg-elevated: rgba(24, 30, 26, 0.96);
      --text-light: #eef6e8;
      --text-muted: #a7b3bb;
      --text-dim: #7f8a91;
      --border-muted: rgba(255, 255, 255, 0.08);

      --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top center, rgba(118, 179, 44, 0.12), transparent 20%),
        radial-gradient(circle at 82% 18%, rgba(37, 99, 235, 0.10), transparent 24%),
        radial-gradient(circle at 20% 78%, rgba(247, 123, 29, 0.08), transparent 28%),
        linear-gradient(180deg, #0f1814 0%, #09100d 35%, #07100c 100%);
      color: var(--text-light);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ─── Fondo animado ─── */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 14% 16%, rgba(118, 179, 44, 0.16) 0%, transparent 42%),
        radial-gradient(ellipse at 86% 24%, rgba(37, 99, 235, 0.10) 0%, transparent 38%),
        radial-gradient(ellipse at 50% 84%, rgba(247, 123, 29, 0.08) 0%, transparent 38%),
        radial-gradient(circle at 50% 0%, rgba(9, 16, 13, 0.95) 0%, rgba(7, 12, 10, 1) 100%);
      background-blend-mode: screen;
      opacity: 0.93;
      z-index: -2;
    }

    /* ═══════════════════════════════════════════════
       CARRETERA CON FORMA DE ARCO / CURVA
       ═══════════════════════════════════════════════ */
    .road-container {
      position: fixed;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 140%;
      height: 350px;
      z-index: -1;
      opacity: 0;
      animation: fadeInRoad 1.5s ease forwards 0.5s;
      pointer-events: none;
    }

    @keyframes fadeInRoad {
      to { opacity: 1; }
    }

    /* Carretera principal con forma de arco */
    .road {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      background: linear-gradient(to top,
        rgba(72, 74, 81, 0.80) 0%,
        rgba(94, 99, 108, 0.40) 35%,
        transparent 100%
      );
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      border-top: 3px solid rgba(145, 150, 158, 0.24);
      box-shadow:
        0 -10px 40px rgba(0, 0, 0, 0.25),
        inset 0 20px 60px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    /* Líneas de carretera con movimiento horizontal (parallax) */
    .road-lines {
      position: absolute;
      top: 30%;
      left: 0;
      width: 200%;
      height: 4px;
      background: repeating-linear-gradient(
        to right,
        rgba(193, 200, 208, 0.80) 0px,
        rgba(193, 200, 208, 0.80) 40px,
        transparent 40px,
        transparent 80px
      );
      animation: moveLines 3s linear infinite;
    }

    .road-lines:nth-child(2) {
      top: 50%;
      animation: moveLines 2s linear infinite;
      opacity: 0.55;
    }

    .road-lines:nth-child(3) {
      top: 70%;
      animation: moveLines 2.5s linear infinite;
      opacity: 0.35;
    }

    @keyframes moveLines {
      from { transform: translateX(0); }
      to { transform: translateX(-80px); }
    }

    /* Bordes de carretera curvos */
    .road-edge-left,
    .road-edge-right {
      position: absolute;
      top: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to top,
        rgba(37, 99, 235, 0.40) 0%,
        rgba(118, 179, 44, 0.20) 50%,
        transparent 100%
      );
    }

    .road-edge-left {
      left: 25%;
      border-radius: 2px;
    }

    .road-edge-right {
      right: 25%;
      border-radius: 2px;
    }

    /* ─── Partículas flotantes ─── */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      animation: float-particle 15s infinite;
    }

    /* Partículas en colores corporativos */
    .particle:nth-child(1) { left: 10%; background: rgba(118, 179, 44, 0.42); box-shadow: 0 0 10px rgba(118, 179, 44, 0.18); animation-delay: 0s; animation-duration: 12s; }
    .particle:nth-child(2) { left: 25%; background: rgba(37, 99, 235, 0.32); box-shadow: 0 0 10px rgba(37, 99, 235, 0.16); animation-delay: 1s; animation-duration: 15s; }
    .particle:nth-child(3) { left: 40%; background: rgba(247, 123, 29, 0.30); box-shadow: 0 0 10px rgba(247, 123, 29, 0.14); animation-delay: 2s; animation-duration: 10s; }
    .particle:nth-child(4) { left: 55%; background: rgba(158, 158, 158, 0.28); box-shadow: 0 0 10px rgba(158, 158, 158, 0.14); animation-delay: 0.5s; animation-duration: 18s; }
    .particle:nth-child(5) { left: 70%; background: rgba(118, 179, 44, 0.32); box-shadow: 0 0 10px rgba(118, 179, 44, 0.14); animation-delay: 3s; animation-duration: 14s; }
    .particle:nth-child(6) { left: 85%; background: rgba(37, 99, 235, 0.32); box-shadow: 0 0 10px rgba(37, 99, 235, 0.14); animation-delay: 1.5s; animation-duration: 16s; }
    .particle:nth-child(7) { left: 15%; background: rgba(247, 123, 29, 0.28); box-shadow: 0 0 10px rgba(247, 123, 29, 0.12); animation-delay: 2.5s; animation-duration: 11s; }
    .particle:nth-child(8) { left: 45%; background: rgba(158, 158, 158, 0.24); box-shadow: 0 0 10px rgba(158, 158, 158, 0.12); animation-delay: 0.8s; animation-duration: 13s; }
    .particle:nth-child(9) { left: 60%; background: rgba(118, 179, 44, 0.28); box-shadow: 0 0 10px rgba(118, 179, 44, 0.14); animation-delay: 3.5s; animation-duration: 17s; }
    .particle:nth-child(10) { left: 90%; background: rgba(37, 99, 235, 0.28); box-shadow: 0 0 10px rgba(37, 99, 235, 0.12); animation-delay: 4s; animation-duration: 19s; }

    @keyframes float-particle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }

    /* ─── Contenedor principal ─── */
    .welcome-container {
      position: relative;
      text-align: center;
      z-index: 1;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .welcome-container::before {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: min(100%, 620px);
      height: min(100%, 480px);
      background:
        radial-gradient(circle at 50% 30%, rgba(247, 123, 29, 0.12), transparent 42%),
        radial-gradient(circle at 50% 70%, rgba(37, 99, 235, 0.08), transparent 38%);
      filter: blur(30px);
      opacity: 0.5;
      pointer-events: none;
      z-index: -1;
    }

    /* ─── Botón de acción ─── */
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 32px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, var(--corp-orange-dark), var(--corp-orange));
      color: #ffffff;
      box-shadow: 0 16px 40px rgba(249, 115, 22, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 40px;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 1.8s;
    }

    .action-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 50px rgba(249, 115, 22, 0.4);
    }

    /* Ocultar el botón en el index */
    .welcome-container .action-button {
      display: none !important;
    }

    /* ═══════════════════════════════════════════════
       LOGO - 4 ANILLOS CORPORATIVOS
       ═══════════════════════════════════════════════ */
    .logo-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 0 0 48px;
    }

    /* Glow multicolor sutil */
    .logo-wrapper::before {
      content: '';
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(247, 123, 29, 0.10) 0%,
        rgba(37, 99, 235, 0.08) 30%,
        rgba(118, 179, 44, 0.08) 55%,
        transparent 70%
      );
      filter: blur(20px);
      opacity: 0.9;
      z-index: -1;
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* 4 Anillos orbitales en colores corporativos */
    .logo-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border: 2.5px solid transparent;
      border-top-color: var(--corp-green);
      border-right-color: var(--corp-green-lime);
      border-radius: 50%;
      animation: spin-ring 3.5s linear infinite;
    }

    .logo-ring:nth-child(2) {
      width: 88%;
      height: 88%;
      border-top-color: var(--corp-blue);
      border-right-color: var(--corp-blue-light);
      animation: spin-ring-reverse 3s linear infinite;
    }

    .logo-ring:nth-child(3) {
      width: 76%;
      height: 76%;
      border-top-color: var(--corp-orange);
      border-right-color: var(--corp-orange-light);
      animation: spin-ring 2.5s linear infinite;
    }

    .logo-ring:nth-child(4) {
      width: 64%;
      height: 64%;
      border-top-color: var(--corp-gray-light);
      border-right-color: var(--corp-gray);
      animation: spin-ring-reverse 2s linear infinite;
    }

    @keyframes spin-ring {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes spin-ring-reverse {
      from { transform: translate(-50%, -50%) rotate(360deg); }
      to { transform: translate(-50%, -50%) rotate(0deg); }
    }

    /* Contenedor del logo */
    .logo-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 68%;
      height: 68%;
      background: radial-gradient(circle at 30% 30%,
        rgba(20, 35, 12, 0.6) 0%,
        rgba(10, 18, 8, 0.85) 100%
      );
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(125, 125, 125, 0.15);
      box-shadow:
        0 0 30px rgba(0, 0, 0, 0.4),
        inset 0 0 20px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .logo-inner img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      filter: none;
      transform: scale(1);
      transition: transform 0.3s ease;
    }

    .logo-wrapper:hover .logo-inner img {
      transform: scale(1.05);
    }

    /* ─── Texto Road To - NARANJA ─── */
    .brand-text {
      margin-bottom: 20px;
    }

    .brand-name {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--corp-orange);
      text-shadow: 0 0 18px rgba(247, 123, 29, 0.18);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards 0.3s;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    .brand-tagline {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted);
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards 0.6s;
    }

    /* ─── Barra de progreso ─── */
    .progress-container {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin: 40px auto;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.9s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--corp-orange-dark), var(--corp-orange), var(--corp-green), var(--corp-blue));
      background-size: 300% 100%;
      border-radius: 2px;
      animation: loading 2.5s ease-in-out forwards 1s, gradient-shift 3s linear infinite;
    }

    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* ─── Texto de carga ─── */
    .loading-text {
      font-size: 14px;
      color: rgba(158, 158, 158, 0.9);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 1.2s;
    }

    .loading-text::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* ─── Versión ─── */
    .version {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(158, 158, 158, 0.85);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 1.5s;
    }

    /* ─── Responsive ─── */
    @media (max-width: 380px) {
      .logo-wrapper { width: 180px; height: 180px; }
      .brand-name { font-size: 36px; letter-spacing: 6px; }
      .brand-tagline { font-size: 14px; letter-spacing: 3px; }
    }

    /* ─── Modo claro ─── */
    
  </style>
<base target="_blank">
</head>
<body>

  <div class="bg-gradient"></div>

  <!-- Carretera con forma de arco / curva -->
  <div class="road-container">
    <div class="road">
      <div class="road-lines"></div>
      <div class="road-lines"></div>
      <div class="road-lines"></div>
      <div class="road-edge-left"></div>
      <div class="road-edge-right"></div>
    </div>
  </div>

  <!-- Partículas corporativas -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Contenido principal -->
  <div class="welcome-container">
    <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <div class="logo-ring"></div>
      <div class="logo-ring"></div>
      <div class="logo-ring"></div>
      <div class="logo-inner">
        <img src="logo.png" alt="Road To Logo">
      </div>
    </div>

    <div class="brand-text">
      <h1 class="brand-name">Road To</h1>
      <p class="brand-tagline">Tu camino, tu destino</p>
    </div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <p class="loading-text">Cargando</p>

    <a href="empresa.html" class="action-button">Entrar a la plataforma</a>
    
    <a href="app-debug.apk" download="RoadTo-App.apk" class="action-button" style="margin-top: 15px; background: rgba(34, 197, 94, 0.15); border: 1px solid var(--corp-green); color: var(--corp-green); display: flex; align-items: center; justify-content: center; gap: 8px;">
      <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M17.6,9.26l1.79-3.1a.3.3,0,0,0-.11-.41.31.31,0,0,0-.41.11L17,8.92A11.75,11.75,0,0,0,12,7.74a11.53,11.53,0,0,0-5,1.18L5.13,5.86A.31.31,0,0,0,4.72,5.75a.3.3,0,0,0-.11.41l1.79,3.1A11.73,11.73,0,0,0,2,19H22A11.72,11.72,0,0,0,17.6,9.26ZM8,15.74a1.26,1.26,0,1,1,1.26-1.26A1.26,1.26,0,0,1,8,15.74Zm8,0A1.26,1.26,0,1,1,17.26,14.48,1.26,1.26,0,0,1,16,15.74Z"/>
      </svg>
      Descargar App
    </a>
  </div>

  <div class="version">v2.0.0</div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      if (window.CapacitorPlugins?.SplashScreen) {
        await window.CapacitorPlugins.SplashScreen.hide();
      }

      if (window.CapacitorPlugins?.StatusBar) {
        await window.CapacitorPlugins.StatusBar.setStyle({ style: 'Dark' });
        await window.CapacitorPlugins.StatusBar.setBackgroundColor({ color: '#09100d' });
      }

      await checkFirstLaunch();
      await checkSavedSession();

      setTimeout(() => {
        window.location.href = 'empresa.html';
      }, 3500);
    });

    async function checkFirstLaunch() {
      try {
        if (window.CapacitorPlugins?.Preferences) {
          const { value } = await window.CapacitorPlugins.Preferences.get({ key: 'firstLaunch' });
          if (!value) {
            await window.CapacitorPlugins.Preferences.set({ key: 'firstLaunch', value: 'false' });
          }
        }
      } catch (e) {
        console.log('First launch check skipped');
      }
    }

    async function checkSavedSession() {
      try {
        if (window.CapacitorPlugins?.Preferences) {
          const { value: savedEmail } = await window.CapacitorPlugins.Preferences.get({ key: 'savedEmail' });
          if (savedEmail) {
            const qs = window.location.search || '';
            window.location.replace('dashboard.html' + qs);
            return;
          }
        }

        const token = localStorage.getItem('authToken') || localStorage.getItem('savedEmail');
        if (token) {
          const qs = window.location.search || '';
          window.location.replace('dashboard.html' + qs);
          return;
        }
      } catch (e) {
        console.warn('checkSavedSession failed', e);
      }
    }

    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>

</body>
</html>
