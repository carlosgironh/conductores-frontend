<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página Principal NRDesignCorp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
    }
    .card img {
      width: 150px;
      margin-bottom: 20px;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
    }
    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      background-color: #0d6efd;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="logo.png" alt="NRDesignCorp Logo">
  <h2>Bienvenido a NRDesignCorp</h2>
  <button onclick="window.location.href='N-Reg.html'">Registro</button>
  <button onclick="window.location.href='dashboard.html'">Iniciar Sesión</button>
</div>

</body>
</html>
