<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido a Road To</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1208">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Capacitor 7 -->
  <script type="module">
    import { SplashScreen } from '@capacitor/splash-screen';
    import { StatusBar } from '@capacitor/status-bar';
    import { App } from '@capacitor/app';
    import { Preferences } from '@capacitor/preferences';

    window.CapacitorPlugins = { SplashScreen, StatusBar, App, Preferences };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      /* ─── Safe areas ─── */
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);

      /* ─── Paleta exacta del logo ─── */
      --logo-green: #8ac725;
      --logo-green-dark: #448414;
      --logo-green-lime: #9ad93a;
      --logo-green-light: #b8e85c;
      --road-gray: #7d7d7d;
      --road-dark: #4a4a4a;
      --road-light: #9e9e9e;

      /* ─── Derivados para UI ─── */
      --primary: var(--logo-green);
      --primary-dark: var(--logo-green-dark);
      --accent: var(--logo-green-lime);
      --highlight: var(--logo-green-light);
      --success: #5a9e1c;

      /* ─── Fondos ─── */
      --bg-dark: #0a1208;
      --bg-card: rgba(12, 20, 10, 0.92);
      --bg-overlay: rgba(68, 132, 20, 0.08);

      /* ─── Textos ─── */
      --text-light: #eef8e4;
      --text-muted: #8a9e7d;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      background: 
        radial-gradient(circle at top center, rgba(138, 199, 37, 0.12), transparent 20%),
        radial-gradient(circle at 28% 8%, rgba(154, 217, 58, 0.06), transparent 30%),
        linear-gradient(180deg, #0c1a0a 0%, #0a1208 30%, #081008 100%);
      color: var(--text-light);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ─── Fondo animado ─── */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 18% 18%, rgba(138, 199, 37, 0.22) 0%, transparent 40%),
        radial-gradient(ellipse at 82% 82%, rgba(154, 217, 58, 0.16) 0%, transparent 40%),
        radial-gradient(circle at 50% 0%, rgba(10, 18, 8, 0.98) 0%, rgba(8, 16, 8, 1) 100%);
      background-blend-mode: screen;
      filter: saturate(1.15);
      opacity: 0.95;
      z-index: -2;
    }

    /* ─── Efecto de carretera ─── */
    .road-container {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 60%;
      perspective: 1000px;
      z-index: -1;
      opacity: 0;
      animation: fadeInRoad 1.5s ease forwards 0.5s;
    }

    @keyframes fadeInRoad {
      to { opacity: 1; }
    }

    .road {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) rotateX(60deg);
      width: 200px;
      height: 100%;
      background: linear-gradient(to bottom, 
        transparent 0%,
        rgba(74, 74, 74, 0.15) 18%,
        rgba(125, 125, 125, 0.35) 48%,
        rgba(74, 74, 74, 0.18) 100%
      );
      box-shadow: inset 0 0 60px rgba(10, 18, 8, 0.4);
      transform-origin: bottom center;
    }

    .road-lines {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(158, 158, 158, 0.9) 0px,
        rgba(158, 158, 158, 0.9) 32px,
        transparent 32px,
        transparent 64px
      );
      animation: moveLines 2s linear infinite;
      box-shadow: 
        -60px 0 0 rgba(138, 199, 37, 0.18),
        60px 0 0 rgba(138, 199, 37, 0.18);
    }

    @keyframes moveLines {
      from { background-position: 0 0; }
      to { background-position: 0 80px; }
    }

    /* ─── Partículas flotantes ─── */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(138, 199, 37, 0.6);
      box-shadow: 0 0 12px rgba(138, 199, 37, 0.35);
      border-radius: 50%;
      animation: float-particle 15s infinite;
    }

    .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 1s; animation-duration: 15s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 2s; animation-duration: 10s; }
    .particle:nth-child(4) { left: 40%; animation-delay: 0.5s; animation-duration: 18s; }
    .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 14s; }
    .particle:nth-child(6) { left: 60%; animation-delay: 1.5s; animation-duration: 16s; }
    .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; animation-duration: 11s; }
    .particle:nth-child(8) { left: 80%; animation-delay: 0.8s; animation-duration: 13s; }
    .particle:nth-child(9) { left: 90%; animation-delay: 3.5s; animation-duration: 17s; }
    .particle:nth-child(10) { left: 5%; animation-delay: 4s; animation-duration: 19s; }

    @keyframes float-particle {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }

    /* ─── Contenedor principal ─── */
    .welcome-container {
      position: relative;
      text-align: center;
      z-index: 1;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .welcome-container::before {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: min(100%, 620px);
      height: min(100%, 480px);
      background: radial-gradient(circle at 50% 30%, rgba(154, 217, 58, 0.14), transparent 42%),
                  radial-gradient(circle at 50% 70%, rgba(184, 232, 92, 0.08), transparent 38%);
      filter: blur(30px);
      opacity: 0.5;
      pointer-events: none;
      z-index: -1;
    }

    /* ─── Botón de acción ─── */
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 32px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, var(--logo-green-dark), var(--logo-green));
      color: #ffffff;
      box-shadow: 0 16px 40px rgba(138, 199, 37, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 40px;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 1.8s;
    }

    .action-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 50px rgba(138, 199, 37, 0.4);
    }

    /* Ocultar el botón en el index */
    .welcome-container .action-button {
      display: none !important;
    }

    /* ═══════════════════════════════════════════════
       LOGO REDISEÑADO - respeta transparencia
       ═══════════════════════════════════════════════ */
    .logo-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 0 0 48px;
    }

    /* Glow sutil difuso - NO un círculo sólido */
    .logo-wrapper::before {
      content: '';
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle, 
        rgba(138, 199, 37, 0.15) 0%, 
        rgba(154, 217, 58, 0.08) 40%, 
        transparent 70%
      );
      filter: blur(20px);
      opacity: 0.8;
      z-index: -1;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { 
        opacity: 0.6; 
        transform: scale(1);
      }
      50% { 
        opacity: 1; 
        transform: scale(1.05);
      }
    }

    /* Anillos orbitales sutiles - transparencia baja */
    .logo-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border: 2px solid transparent;
      border-top-color: rgba(138, 199, 37, 0.4);
      border-right-color: rgba(154, 217, 58, 0.3);
      border-radius: 50%;
      animation: spin-ring 4s linear infinite;
    }

    .logo-ring:nth-child(2) {
      width: 88%;
      height: 88%;
      border-top-color: rgba(154, 217, 58, 0.3);
      border-right-color: rgba(68, 132, 20, 0.35);
      animation: spin-ring-reverse 3.5s linear infinite;
    }

    .logo-ring:nth-child(3) {
      width: 76%;
      height: 76%;
      border-top-color: rgba(68, 132, 20, 0.3);
      border-right-color: rgba(138, 199, 37, 0.4);
      animation: spin-ring 3s linear infinite;
    }

    @keyframes spin-ring {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes spin-ring-reverse {
      from { transform: translate(-50%, -50%) rotate(360deg); }
      to { transform: translate(-50%, -50%) rotate(0deg); }
    }

    /* Contenedor del logo: fondo oscuro semi-transparente */
    .logo-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 68%;
      height: 68%;
      background: radial-gradient(circle at 30% 30%, 
        rgba(20, 35, 12, 0.6) 0%, 
        rgba(10, 18, 8, 0.85) 100%
      );
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(125, 125, 125, 0.15);
      box-shadow: 
        0 0 30px rgba(0, 0, 0, 0.4),
        inset 0 0 20px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    /* Logo más grande y sin filtros que alteren colores */
    .logo-inner img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      filter: none;
      transform: scale(1);
      transition: transform 0.3s ease;
    }

    .logo-wrapper:hover .logo-inner img {
      transform: scale(1.05);
    }

    /* ─── Texto Road To ─── */
    .brand-text {
      margin-bottom: 20px;
    }

    .brand-name {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #eef8e4 0%, var(--logo-green-lime) 45%, var(--logo-green) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards 0.3s, shimmer 3s linear infinite 1s;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    .brand-tagline {
      font-size: 16px;
      font-weight: 500;
      color: var(--highlight);
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards 0.6s;
    }

    /* ─── Barra de progreso ─── */
    .progress-container {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin: 40px auto;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.9s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--logo-green-dark), var(--logo-green), var(--road-gray));
      background-size: 200% 100%;
      border-radius: 2px;
      animation: loading 2.5s ease-in-out forwards 1s, gradient-shift 2s linear infinite;
    }

    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* ─── Texto de carga ─── */
    .loading-text {
      font-size: 14px;
      color: rgba(184, 232, 92, 0.9);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 1.2s;
    }

    .loading-text::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* ─── Versión ─── */
    .version {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(184, 232, 92, 0.85);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 1.5s;
    }

    /* ─── Responsive ─── */
    @media (max-width: 380px) {
      .logo-wrapper {
        width: 180px;
        height: 180px;
      }
      .brand-name {
        font-size: 36px;
        letter-spacing: 6px;
      }
      .brand-tagline {
        font-size: 14px;
        letter-spacing: 3px;
      }
    }

    /* ─── Modo claro ─── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-dark: #f5faf2;
      }
      body {
        background: 
          radial-gradient(circle at top center, rgba(138, 199, 37, 0.1), transparent 20%),
          radial-gradient(circle at 28% 8%, rgba(154, 217, 58, 0.05), transparent 30%),
          linear-gradient(180deg, #f0f7ec 0%, #eef5ea 30%, #e8f0e4 100%);
      }
      .bg-gradient {
        background: 
          radial-gradient(ellipse at 20% 20%, rgba(138, 199, 37, 0.1) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(154, 217, 58, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 50% 0%, #f8fbf5 0%, #eef7e8 100%);
      }
      .brand-name {
        background: linear-gradient(135deg, #1a2e14 0%, #5a8e3a 50%, #1a2e14 100%);
        background-size: 200% auto;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .brand-tagline {
        color: #6a8a5a;
      }
      .loading-text {
        color: #7a9a6a;
      }
      .version {
        color: #8aaa7a;
      }
      .particle {
        background: rgba(138, 199, 37, 0.15);
      }
      .road {
        background: linear-gradient(to bottom, 
          transparent 0%,
          rgba(74, 74, 74, 0.08) 18%,
          rgba(125, 125, 125, 0.2) 48%,
          rgba(74, 74, 74, 0.1) 100%
        );
      }
      .logo-inner {
        background: radial-gradient(circle at 30% 30%, 
          rgba(240, 247, 236, 0.7) 0%, 
          rgba(232, 240, 228, 0.9) 100%
        );
        border: 1px solid rgba(125, 125, 125, 0.2);
        box-shadow: 
          0 0 30px rgba(0, 0, 0, 0.1),
          inset 0 0 20px rgba(0, 0, 0, 0.05);
      }
      .logo-wrapper::before {
        background: radial-gradient(circle, 
          rgba(138, 199, 37, 0.1) 0%, 
          rgba(154, 217, 58, 0.05) 40%, 
          transparent 70%
        );
      }
    }
  </style>
<base target="_blank">
</head>
<body>

  <div class="bg-gradient"></div>

  <!-- Efecto de carretera -->
  <div class="road-container">
    <div class="road">
      <div class="road-lines"></div>
    </div>
  </div>

  <!-- Partículas -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Contenido principal -->
  <div class="welcome-container">
    <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <div class="logo-ring"></div>
      <div class="logo-ring"></div>
      <div class="logo-inner">
        <img src="logo.png" alt="Road To Logo">
      </div>
    </div>

    <div class="brand-text">
      <h1 class="brand-name">Road To</h1>
      <p class="brand-tagline">Tu camino, tu destino</p>
    </div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <p class="loading-text">Cargando</p>

    <a href="web-empresa.html" class="action-button">Entrar a la plataforma</a>
  </div>

  <div class="version">v2.0.0</div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      if (window.CapacitorPlugins?.SplashScreen) {
        await window.CapacitorPlugins.SplashScreen.hide();
      }

      if (window.CapacitorPlugins?.StatusBar) {
        await window.CapacitorPlugins.StatusBar.setStyle({ style: 'Dark' });
        await window.CapacitorPlugins.StatusBar.setBackgroundColor({ color: '#0a1208' });
      }

      await checkFirstLaunch();
      await checkSavedSession();

      setTimeout(() => {
        window.location.href = 'web-empresa.html';
      }, 3500);
    });

    async function checkFirstLaunch() {
      try {
        if (window.CapacitorPlugins?.Preferences) {
          const { value } = await window.CapacitorPlugins.Preferences.get({ key: 'firstLaunch' });
          if (!value) {
            await window.CapacitorPlugins.Preferences.set({ key: 'firstLaunch', value: 'false' });
          }
        }
      } catch (e) {
        console.log('First launch check skipped');
      }
    }

    async function checkSavedSession() {
      try {
        if (window.CapacitorPlugins?.Preferences) {
          const { value: savedEmail } = await window.CapacitorPlugins.Preferences.get({ key: 'savedEmail' });
          if (savedEmail) {
            const qs = window.location.search || '';
            window.location.replace('dashboard.html' + qs);
            return;
          }
        }

        const token = localStorage.getItem('authToken') || localStorage.getItem('savedEmail');
        if (token) {
          const qs = window.location.search || '';
          window.location.replace('dashboard.html' + qs);
          return;
        }
      } catch (e) {
        console.warn('checkSavedSession failed', e);
      }
    }

    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>

</body>
</html>
