<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página Principal NRDesignCorp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Tipografía moderna 'Inter' */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      outline: none;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* FONDO: Degradado radial profundo */
      background: radial-gradient(circle at 50% 0%, #2c3344 0%, #111317 100%);
      color: #e2e8f0;
      overflow: hidden;
    }

    /* AREA A MEJORAR: La tarjeta y el entorno del logo */
    .card {
      max-width: 400px;
      width: 100%;
      background: rgba(30, 41, 59, 0.45); /* Color más profundo */
      backdrop-filter: blur(25px);      /* Difuminado de cristal */
      -webkit-backdrop-filter: blur(25px);
      
      /* Borde de cristal con brillo superior */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top: 1px solid rgba(255, 255, 255, 0.2); 
      
      border-radius: 35px; /* Bordes más curvos estilo Apple */
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      
      padding: 50px 35px;
      text-align: center;
      position: relative;
    }

    /* Contenedor especial para el logo */
    .logo-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: rgba(255, 255, 255, 0.03); /* Fondo casi invisible */
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    .card img {
      width: 85px; /* Un poco más pequeño para que respire dentro del círculo */
      height: auto;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
    }

    h2 {
      margin-bottom: 35px;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -1px;
      background: linear-gradient(to bottom, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* BOTONES REESTILIZADOS */
    button {
      display: block;
      width: 100%;
      margin: 18px 0;
      padding: 18px;
      border: none;
      border-radius: 20px; /* Botones más redondeados */
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Registro - Degradado azul vibrante */
    button:nth-of-type(1) {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
    }

    button:nth-of-type(1):hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(37, 99, 235, 0.5);
      filter: brightness(1.1);
    }

    /* Iniciar Sesión - Estilo Vidrio Esmerilado (Frosted Glass) */
    button:nth-of-type(2) {
      background: rgba(255, 255, 255, 0.07);
      color: #cbd5e1;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    button:nth-of-type(2):hover {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    button:active {
      transform: scale(0.96);
    }

  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrapper">
    <img src="logo.png" alt="NRDesignCorp Logo">
  </div>
  
  <h2>Bienvenido a<br>NRDesignCorp</h2>
  
  <button onclick="window.location.href='N-Reg.html'">Registro</button>
  <button onclick="window.location.href='dashboard.html'">Iniciar Sesión</button>
</div>

</body>
</html>
