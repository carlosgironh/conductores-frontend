<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página Principal NRDesignCorp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      
      /* Fondo dinámico con múltiples capas */
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
      color: #f8fafc;
      overflow: hidden;
      position: relative;
    }

    /* Efecto de partículas sutiles en el fondo */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%),
        radial-gradient(circle at 40% 40%, rgba(255,255,255,0.02) 0%, transparent 1.5%);
      background-size: 100px 100px;
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }

    /* Tarjeta principal con efecto 3D */
    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      
      border-radius: 32px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 1px 1px rgba(255, 255, 255, 0.05) inset;
      
      padding: 50px 40px;
      text-align: center;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    }

    @keyframes cardEntry {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Brillo dinámico en la tarjeta */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.05),
        transparent
      );
      transition: left 0.7s;
      pointer-events: none;
      border-radius: 32px;
    }

    .card:hover::before {
      left: 100%;
    }

    /* Contenedor del logo con efecto de halo */
    .logo-wrapper {
      width: 130px;
      height: 130px;
      margin: 0 auto 35px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-wrapper::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, rgba(59, 130, 246, 0.3), transparent);
      animation: rotate 4s linear infinite;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .card:hover .logo-wrapper::before {
      opacity: 1;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    .logo-inner {
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        inset 0 0 30px rgba(255, 255, 255, 0.05),
        0 10px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover .logo-inner {
      transform: scale(1.05);
      box-shadow: 
        inset 0 0 30px rgba(255, 255, 255, 0.08),
        0 15px 50px rgba(0, 0, 0, 0.4);
    }

    /* Efecto de brillo en el logo */
    .logo-inner::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover .logo-inner::after {
      opacity: 1;
    }

    .card img {
      width: 70px;
      height: auto;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
      transition: transform 0.3s;
      z-index: 1;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    /* Tipografía mejorada */
    h2 {
      margin-bottom: 40px;
      font-weight: 800;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShine 3s ease-in-out infinite alternate;
    }

    @keyframes textShine {
      from { filter: brightness(1); }
      to { filter: brightness(1.1); }
    }

    h2 span {
      display: block;
      font-weight: 600;
      font-size: 0.9em;
      margin-top: 5px;
      opacity: 0.9;
    }

    /* Contenedor de botones con espaciado mejorado */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Estilo base de botones mejorado */
    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      font-family: inherit;
    }

    /* Botón de Registro - Estilo premium */
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
      color: white;
      box-shadow: 
        0 4px 6px -1px rgba(37, 99, 235, 0.2),
        0 10px 20px -5px rgba(37, 99, 235, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s;
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 
        0 10px 25px -5px rgba(37, 99, 235, 0.5),
        0 8px 10px -6px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    /* Botón de Iniciar Sesión - Estilo vidrio mejorado */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .btn-secondary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 
        0 10px 25px -5px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .btn-secondary:hover::before {
      opacity: 1;
    }

    .btn-secondary:active {
      transform: translateY(0) scale(0.98);
    }

    /* Iconos en los botones */
    .icon {
      width: 20px;
      height: 20px;
      opacity: 0.8;
      transition: transform 0.3s;
    }

    button:hover .icon {
      transform: translateX(3px);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 40px 30px;
        border-radius: 28px;
      }
      
      h2 {
        font-size: 26px;
      }
      
      .logo-wrapper {
        width: 110px;
        height: 110px;
      }
    }

    /* Efecto de partículas flotantes adicionales */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat 15s infinite;
    }

    .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { top: 60%; left: 90%; animation-delay: 5s; }
    .particle:nth-child(3) { top: 80%; left: 20%; animation-delay: 10s; }

    @keyframes particleFloat {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      50% { transform: translateY(-100px) translateX(50px); }
    }
  </style>
</head>
<body>

  <!-- Partículas decorativas -->
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="card">
    <div class="logo-wrapper">
      <div class="logo-inner">
        <img src="logo.png" alt="NRDesignCorp Logo">
      </div>
    </div>
    
    <h2>Bienvenido a<br><span>NRDesignCorp</span></h2>
    
    <div class="button-group">
      <button class="btn-primary" onclick="window.location.href='N-Reg.html'">
        Crear Cuenta
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
        </svg>
      </button>
      
      <button class="btn-secondary" onclick="window.location.href='dashboard.html'">
        Iniciar Sesión
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
        </svg>
      </button>
    </div>
  </div>

</body>
</html>
