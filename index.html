<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Conductores</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}
.card{
  max-width:720px;
  margin:auto;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  padding:25px;
}
h2{
  text-align:center;
  color:#0d6efd;
  margin-bottom:20px;
}
form input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}
button{
  background:#0d6efd;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:20px;
  width:100%;
  font-size:16px;
}
button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}
#mensaje{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}
.error{ color:#b00020; }
.ok{ color:green; }
.busy{ color:#0b5ed7; }
.loader{
  border:3px solid #f3f3f3;
  border-top:3px solid white;
  border-radius:50%;
  width:14px;
  height:14px;
  animation: spin 1s linear infinite;
  display:inline-block;
  margin-right:8px;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
<h2>Registro de Conductores</h2>

<form id="formConductor">

<label>Correo</label>
<input id="email" type="email" required>

<label>Contraseña</label>
<input id="password" type="password" required minlength="6">

<hr>

<label>Nombres</label>
<input id="nombres" type="text" required>

<label>Apellidos</label>
<input id="apellidos" type="text" required>

<label>Dirección</label>
<input id="direccion" type="text" required>

<label>Celular</label>
<input id="celular" type="text" required>

<label>Cédula</label>
<input id="cedula" type="text" required>

<label>Licencia</label>
<input id="licencia" type="text" required>

<label>Placa</label>
<input id="placa" type="text" required>

<label>Modelo</label>
<input id="modelo" type="text" required>

<label>Marca</label>
<input id="marca" type="text" required>

<label>Color</label>
<input id="color" type="text" required>

<label>Número de póliza</label>
<input id="poliza_numero" type="text" required>

<hr>

<label>Cédula (doc o imagen)</label>
<input type="file" id="cedula_doc" required>

<label>Licencia (doc o imagen)</label>
<input type="file" id="licencia_doc" required>

<label>Registro Vehicular</label>
<input type="file" id="registro_doc" required>

<label>Póliza</label>
<input type="file" id="poliza_doc" required>

<label>Foto Vehículo</label>
<input type="file" id="foto_vehiculo" required>

<label>Foto Conductor</label>
<input type="file" id="foto_conductor" required>

<label>Autorización del propietario</label>
<input type="file" id="auth_propietario" required>

<button type="submit" id="btnRegistrar">Registrar</button>
<div id="mensaje"></div>

</form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("formConductor");
const mensaje = document.getElementById("mensaje");
const btn = document.getElementById("btnRegistrar");

function showMessage(text, type=""){
  mensaje.textContent = text;
  mensaje.className = type;
}

function setLoading(state){
  btn.disabled = state;
  btn.innerHTML = state
    ? '<span class="loader"></span>Procesando...'
    : 'Registrar';
}

async function subirDocumento(conductorId, tipo, inputId){
  const file = document.getElementById(inputId).files[0];
  const path = `${conductorId}/${tipo}_${Date.now()}_${file.name}`;

  const { error: uploadError } = await supabase.storage
    .from("documentos-conductores")
    .upload(path, file);

  if(uploadError) throw uploadError;

  const { error: dbError } = await supabase
    .from("documentos")
    .insert([{
      conductor_id: conductorId,
      tipo: tipo,
      url_archivo: path
    }]);

  if(dbError) throw dbError;
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();
  setLoading(true);
  showMessage("Registrando...", "busy");

  try{

    // 1️⃣ Crear usuario
    const { error: signUpError } = await supabase.auth.signUp({
      email: email.value,
      password: password.value
    });

    if(signUpError) throw signUpError;

    // 2️⃣ Login automático
    const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({
      email: email.value,
      password: password.value
    });

    if(loginError) throw loginError;

    const authUserId = loginData.user.id;

    // 3️⃣ Insertar conductor
    const { data: conductorData, error: conductorError } = await supabase
      .from("conductores")
      .insert([{
        auth_user_id: authUserId,
        nombres: nombres.value,
        apellidos: apellidos.value,
        direccion: direccion.value,
        celular: celular.value,
        cedula: cedula.value,
        licencia: licencia.value,
        placa: placa.value,
        modelo: modelo.value,
        marca: marca.value,
        color: color.value,
        poliza_numero: poliza_numero.value
      }])
      .select()
      .single();

    if(conductorError) throw conductorError;

    const conductorId = conductorData.id;

    // 4️⃣ Subir documentos
    await subirDocumento(conductorId,"CEDULA","cedula_doc");
    await subirDocumento(conductorId,"LICENCIA","licencia_doc");
    await subirDocumento(conductorId,"REGISTRO","registro_doc");
    await subirDocumento(conductorId,"POLIZA","poliza_doc");
    await subirDocumento(conductorId,"FOTO_VEHICULO","foto_vehiculo");
    await subirDocumento(conductorId,"FOTO_CONDUCTOR","foto_conductor");
    await subirDocumento(conductorId,"AUTH_PROPIETARIO","auth_propietario");

    showMessage("Registro exitoso ✅", "ok");

    setTimeout(() => {
      window.location.href = "perfil.html";
    }, 1500);

  }catch(error){
    console.error(error);
    showMessage(error.message, "error");
  }

  setLoading(false);
});

});
</script>

</body>
</html>
