<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restablecer Contraseña - NRDesignCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 20px;
    background: 
      radial-gradient(ellipse at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, #0f172a 0%, #1e293b 100%);
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    max-width: 420px;
    width: 100%;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 40px;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.6s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .success-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 25px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
    animation: scaleIn 0.5s ease 0.3s both;
  }

  @keyframes scaleIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  .success-icon svg {
    width: 40px;
    height: 40px;
    color: white;
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 35px;
    line-height: 1.5;
  }

  .strength-meter {
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    margin-top: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    position: relative;
  }

  .strength-bar {
    height: 100%;
    width: 0;
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .strength-text {
    font-size: 12px;
    margin-top: 5px;
    text-align: right;
    color: #64748b;
  }

  .input-group {
    position: relative;
    margin-bottom: 20px;
  }

  .input-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    transition: color 0.3s;
  }

  input {
    width: 100%;
    padding: 16px 20px 16px 50px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    color: #ffffff;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.3s ease;
  }

  input:focus {
    border-color: #10b981;
    background: rgba(15, 23, 42, 0.8);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
    outline: none;
  }

  input:focus + .input-icon { color: #34d399; }

  .password-toggle {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.3s;
  }

  .password-toggle:hover { color: #94a3b8; }

  .requirements {
    background: rgba(15, 23, 42, 0.4);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .requirement {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #64748b;
    margin-bottom: 8px;
    transition: color 0.3s;
  }

  .requirement:last-child { margin-bottom: 0; }

  .requirement.met { color: #34d399; }

  .requirement-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.3s;
  }

  .requirement.met .requirement-icon {
    background: #10b981;
    border-color: #10b981;
    color: white;
  }

  button {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .msg {
    margin-top: 20px;
    padding: 14px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  .msg.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    display: block;
    animation: shake 0.5s;
  }

  .msg.success {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
    display: block;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #64748b;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s;
  }

  .back-link:hover { color: #94a3b8; }

  @media (max-width: 480px) {
    .card { padding: 40px 25px; }
    h2 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="success-icon">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
    </svg>
  </div>
  
  <h2>Nueva Contraseña</h2>
  <p class="subtitle">Crea una contraseña segura para proteger tu cuenta</p>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
    </svg>
    <input id="newPass" type="password" placeholder="Nueva contraseña" autocomplete="new-password">
    <button class="password-toggle" onclick="togglePassword('newPass', this)" type="button">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
      </svg>
    </button>
  </div>

  <div class="strength-meter">
    <div class="strength-bar" id="strengthBar"></div>
  </div>
  <div class="strength-text" id="strengthText">Ingresa una contraseña</div>

  <div class="requirements">
    <div class="requirement" id="req-length">
      <span class="requirement-icon">✓</span>
      <span>Mínimo 8 caracteres</span>
    </div>
    <div class="requirement" id="req-number">
      <span class="requirement-icon">✓</span>
      <span>Al menos un número</span>
    </div>
    <div class="requirement" id="req-special">
      <span class="requirement-icon">✓</span>
      <span>Al menos un carácter especial (!@#$%^&*)</span>
    </div>
    <div class="requirement" id="req-match" style="display: none;">
      <span class="requirement-icon">✓</span>
      <span>Las contraseñas coinciden</span>
    </div>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <input id="confirmPass" type="password" placeholder="Confirmar contraseña" autocomplete="new-password">
  </div>

  <button id="updateBtn" onclick="updatePassword()">Actualizar Contraseña</button>
  
  <div id="msg" class="msg"></div>
  
  <a href="index.html" class="back-link">← Volver al inicio de sesión</a>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg = btn.querySelector('svg');
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
  } else {
    input.type = 'password';
    svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
  }
}

function checkStrength(password) {
  let strength = 0;
  const requirements = {
    length: password.length >= 8,
    number: /\d/.test(password),
    special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
  };

  // Update UI
  document.getElementById('req-length').classList.toggle('met', requirements.length);
  document.getElementById('req-number').classList.toggle('met', requirements.number);
  document.getElementById('req-special').classList.toggle('met', requirements.special);

  // Calculate strength
  if (requirements.length) strength += 33;
  if (requirements.number) strength += 33;
  if (requirements.special) strength += 34;

  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  
  bar.style.width = strength + '%';
  
  if (strength < 33) {
    bar.style.background = '#ef4444';
    text.textContent = 'Contraseña débil';
    text.style.color = '#ef4444';
  } else if (strength < 66) {
    bar.style.background = '#f59e0b';
    text.textContent = 'Contraseña media';
    text.style.color = '#f59e0b';
  } else {
    bar.style.background = '#10b981';
    text.textContent = 'Contraseña fuerte';
    text.style.color = '#10b981';
  }

  return strength === 100;
}

document.getElementById('newPass').addEventListener('input', function(e) {
  checkStrength(e.target.value);
  checkMatch();
});

document.getElementById('confirmPass').addEventListener('input', checkMatch);

function checkMatch() {
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const matchReq = document.getElementById('req-match');
  
  if (confirmPass) {
    matchReq.style.display = 'flex';
    const matches = newPass === confirmPass && newPass !== '';
    matchReq.classList.toggle('met', matches);
    return matches;
  } else {
    matchReq.style.display = 'none';
    return false;
  }
}

function showMessage(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
}

async function updatePassword() {
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const btn = document.getElementById('updateBtn');

  if (!checkStrength(newPass)) {
    showMessage('La contraseña no cumple con los requisitos mínimos', 'error');
    return;
  }

  if (newPass !== confirmPass) {
    showMessage('Las contraseñas no coinciden', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Actualizando...';

  const { error } = await supabaseClient.auth.updateUser({ password: newPass });

  if (error) {
    showMessage('Error: ' + error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Actualizar Contraseña';
  } else {
    showMessage('¡Contraseña actualizada! Redirigiendo...', 'success');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  }
}

// Verificar sesión al cargar
window.addEventListener('load', async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    showMessage('Sesión expirada. Solicita un nuevo enlace.', 'error');
    document.getElementById('updateBtn').disabled = true;
  }
});
</script>
</body>
</html>
