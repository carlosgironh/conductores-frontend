<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restablecer Contraseña</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:20px;
}
.card{
  max-width:450px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h2{ text-align:center; color:#0d6efd; }
input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  background:#198754;
  color:white;
  cursor:pointer;
}
.msg{ margin-top:15px; text-align:center; font-weight:bold; }
</style>
</head>
<body>

<div class="card">
  <h2>Nueva Contraseña</h2>
  <input id="newPass" type="password" placeholder="Nueva contraseña (mínimo 6)">
  <button onclick="updatePassword()">Actualizar</button>
  <div id="msg" class="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function updatePassword(){

  const newPass = document.getElementById("newPass").value.trim();
  const msg = document.getElementById("msg");

  if(newPass.length < 6){
    msg.innerText="Mínimo 6 caracteres ❌";
    return;
  }

  msg.innerText="Actualizando...";

  const { error } = await supabaseClient.auth.updateUser({
    password: newPass
  });

  if(error){
    msg.innerText="Error actualizando contraseña ❌";
  }else{
    msg.innerText="Contraseña actualizada ✅";
    setTimeout(()=> window.location.href="dashboard.html",1500);
  }
}
</script>

</body>
</html>
