<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registro Conductor - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background: #3ecf8e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #36b37a; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Supabase Edge Function Test</h1>
        <p>Presiona el botón para probar la función <code>registro-conductor</code></p>
        <button onclick="testServiceRole()">EJECUTAR TEST SERVICE ROLE</button>
    </div>

    <script>
        // 1. CONFIGURACIÓN - Reemplaza con tus credenciales
        const SUPABASE_URL = 'TU_PROYECTO_URL';
        const SUPABASE_ANON_KEY = 'TU_ANON_KEY';

        const supabase = collections.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. TU SCRIPT DE TEST
        async function testServiceRole() {
            console.log('🔍 Testeando registro-conductor...');
            
            try {
                const { data, error } = await supabase.functions.invoke('registro-conductor', {
                    body: {
                        email: 'test_' + Date.now() + '@correo.com',
                        password: '123456',
                        datosConductor: {
                            nombres: 'Test',
                            apellidos: 'Usuario',
                            direccion: 'Test',
                            celular: '0999999999',
                            cedula: '1234567890',
                            licencia: 'B',
                            placa: 'TEST-001',
                            modelo: '2023',
                            marca: 'Toyota',
                            color: 'Blanco',
                            poliza_numero: 'POL-123'
                        },
                        esPropietario: true,
                        documentosMetadata: []
                    }
                });
                
                console.log('Respuesta:', data);
                
                if (error) {
                    console.error('❌ Error:', error);
                    if (error.message?.includes('row-level security') || error.message?.includes('RLS')) {
                        alert('❌ NO USA SERVICE ROLE - Error RLS detectado');
                    } else {
                        alert('⚠️ Error: ' + error.message);
                    }
                } else if (data?.conductorId) {
                    alert('✅ USA SERVICE ROLE - Funciona correctamente\nConductor ID: ' + data.conductorId);
                } else {
                    alert('ℹ️ Respuesta inesperada: ' + JSON.stringify(data));
                }
                
            } catch (err) {
                console.error('Error fetch:', err);
                alert('❌ Error de conexión: ' + err.message);
            }
        }
    </script>
</body>
</html>
