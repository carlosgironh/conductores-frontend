<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Perfil - Conductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    
    /* Fondo dinámico premium */
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
  }

  /* Partículas flotantes */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  /* Tarjeta principal */
  .card {
    max-width: 720px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
  }

  @keyframes cardEntry {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* BANNER DE ESTADO */
  .status-banner {
    position: relative;
    margin: -50px -45px 30px -45px;
    padding: 20px 45px;
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    animation: slideDown 0.6s ease-out backwards;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .status-banner.active {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(21, 128, 61, 0.3) 100%);
    border-bottom: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .status-banner.inactive {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(185, 28, 28, 0.3) 100%);
    border-bottom: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .status-banner.pending {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(180, 83, 9, 0.3) 100%);
    border-bottom: 1px solid rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .status-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .status-content {
    flex: 1;
  }

  .status-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-message {
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.5;
  }

  /* Indicador de estado tipo check */
  .status-check {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
  }

  .status-banner.active .status-check {
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
  }

  .status-banner.inactive .status-check {
    background: rgba(239, 68, 68, 0.2);
    color: #f87171;
  }

  .status-banner.pending .status-check {
    background: rgba(245, 158, 11, 0.2);
    color: #fbbf24;
  }

  /* Animación de pulso para estado activo */
  .status-banner.active::after {
    content: '';
    position: absolute;
    right: 45px;
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
  }

  @keyframes pulse-dot {
    0% {
      transform: scale(0.95);
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
    }
    70% {
      transform: scale(1);
      box-shadow: 0 0 0 10px rgba(74, 222, 128, 0);
    }
    100% {
      transform: scale(0.95);
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
    }
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Contenido de datos */
  #contenido {
    background: rgba(15, 23, 42, 0.5);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 25px;
    position: relative;
    overflow: hidden;
  }

  #contenido::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
  }

  .campo {
    margin-bottom: 16px;
    font-size: 15px;
    display: flex;
    align-items: flex-start;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.3s;
  }

  .campo:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .campo:hover {
    background: rgba(255, 255, 255, 0.02);
    margin: 0 -30px;
    padding: 0 30px 16px 30px;
    border-radius: 8px;
  }

  .campo strong {
    color: #60a5fa;
    width: 140px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .campo span {
    color: #e2e8f0;
    font-weight: 500;
  }

  /* Contenedor de Fotos */
  .fotos-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 30px 0;
  }

  @media (max-width: 640px) {
    .fotos-container {
      grid-template-columns: 1fr;
    }
  }

  .foto-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }

  .foto-wrapper:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .foto {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .foto-wrapper:hover .foto {
    transform: scale(1.05);
  }

  .foto-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* BOTÓN ACTUALIZAR DATOS - NUEVO */
  .btn-update {
    width: 100%;
    padding: 16px 28px;
    margin-top: 25px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
    color: white;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 4px 6px -1px rgba(245, 158, 11, 0.2),
      0 10px 20px -5px rgba(245, 158, 11, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-update::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
  }

  .btn-update:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 
      0 10px 25px -5px rgba(245, 158, 11, 0.5),
      0 8px 10px -6px rgba(245, 158, 11, 0.3);
  }

  .btn-update:hover::before {
    left: 100%;
  }

  .btn-update:active {
    transform: translateY(0) scale(0.98);
  }

  .btn-update svg {
    width: 20px;
    height: 20px;
  }

  /* Sección QR */
  #qr-container {
    text-align: center;
    margin-top: 40px;
    padding-top: 35px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
  }

  #qr-container::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #6366f1, transparent);
  }

  #qr {
    background: white;
    padding: 20px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    margin-bottom: 25px;
    display: inline-block;
  }

  button {
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #4338ca 100%);
    color: white;
    border: none;
    padding: 16px 32px;
    border-radius: 16px;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 
      0 4px 6px -1px rgba(79, 70, 229, 0.2),
      0 10px 20px -5px rgba(79, 70, 229, 0.4);
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
  }

  button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 
      0 10px 25px -5px rgba(79, 70, 229, 0.5),
      0 8px 10px -6px rgba(79, 70, 229, 0.3);
  }

  button:hover::before {
    left: 100%;
  }

  button:active {
    transform: translateY(0) scale(0.98);
  }

  /* Modal de Fotos */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; 
    top: 0;
    width: 100%; 
    height: 100%;
    background: rgba(10, 15, 25, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: scaleIn 0.3s ease;
  }

  @keyframes scaleIn {
    from { 
      opacity: 0;
      transform: scale(0.9);
    }
    to { 
      opacity: 1;
      transform: scale(1);
    }
  }

  /* Responsive */
  @media(max-width: 640px){
    .card {
      padding: 30px 25px;
      border-radius: 24px;
    }
    
    .status-banner {
      margin: -30px -25px 25px -25px;
      padding: 15px 25px;
      flex-direction: column;
      text-align: center;
      gap: 10px;
    }
    
    .status-banner.active::after {
      display: none;
    }
    
    h2 {
      font-size: 26px;
    }
    
    #contenido {
      padding: 20px;
    }
    
    .campo {
      flex-direction: column;
      gap: 5px;
    }
    
    .campo strong {
      width: 100%;
    }
    
    .campo:hover {
      margin: 0 -20px;
      padding: 0 20px 16px 20px;
    }
  }

  /* Estado de carga */
  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>

<body>

<div class="card" id="mainCard">
  <!-- El banner de estado se insertará aquí dinámicamente -->
  
  <h2>Mi Perfil de Conductor</h2>
  
  <div id="contenido">
    <div class="loading">
      <div class="loading-spinner"></div>
      Cargando datos de sesión...

  <div class="fotos-container" id="fotos-container"></div>

  <!-- BOTÓN ACTUALIZAR DATOS - NUEVO -->

    Actualizar Datos

</div>

<div id="modalFoto" class="modal" onclick="this.style.display='none'">
  <img id="modalImg" src="">
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Función para renderizar el banner de estado
function renderStatusBanner(estado, motivoDeshabilitado = '') {
  const card = document.getElementById('mainCard');
  const existingBanner = document.querySelector('.status-banner');
  
  // Eliminar banner existente si hay
  if (existingBanner) {
    existingBanner.remove();
  }
  
  let bannerHTML = '';
  
  if (estado === 'activo' || estado === true || estado === 'true') {
    bannerHTML = `
      <div class="status-banner active">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Cuenta Verificada
            <span class="status-check">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
              </svg>
              Activo
            </span>
          </div>
          <div class="status-message">Su cuenta está completamente habilitada y puede recibir servicios.</div>
        </div>
      </div>
    `;
  } else if (estado === 'pendiente' || estado === 'revision') {
    bannerHTML = `
      <div class="status-banner pending">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Verificación Pendiente
            <span class="status-check">En Revisión</span>
          </div>
          <div class="status-message">Su documentación está siendo revisada por nuestro equipo. Esto puede tomar hasta 24 horas hábiles.</div>
        </div>
      </div>
    `;
  } else {
    // Inactivo, deshabilitado, rechazado, etc.
    bannerHTML = `
      <div class="status-banner inactive">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Cuenta Deshabilitada
            <span class="status-check">Inactivo</span>
          </div>
          <div class="status-message">
            ${motivoDeshabilitado || 'Su cuenta ha sido temporalmente deshabilitada. Contacte soporte para más información.'}
          </div>
        </div>
      </div>
    `;
  }
  
  // Insertar al inicio de la card
  card.insertAdjacentHTML('afterbegin', bannerHTML);
}

async function cargarPerfil(){
  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  // 1. Buscar conductor
  const { data: conductor, error } = await supabaseClient
    .from("conductores")
    .select("*")
    .eq("auth_user_id", user.id)
    .single();

  if(error || !conductor){
    document.getElementById("contenido").innerHTML = `
      <div style="text-align: center; padding: 40px; color: #f87171;">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 15px; opacity: 0.5;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p>No se encontró el perfil vinculado a esta cuenta.</p>
      </div>
    `;
    return;
  }

  // 2. Renderizar banner de estado según el campo 'estado'
  // Asumiendo que tienes campos: 'estado' (boolean/texto) y opcionalmente 'motivo_deshabilitado'
  renderStatusBanner(conductor.estado, conductor.motivo_deshabilitado || conductor.motivo_inactivo);

  // 3. Traer documentos (fotos)
  const { data: documentos } = await supabaseClient
    .from("documentos")
    .select("*")
    .eq("conductor_id", conductor.id);

  function docUrl(tipo){
    const doc = documentos?.find(d => d.tipo === tipo);
    if(!doc) return null;
    return supabaseClient.storage.from("documentos-conductores").getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  // 4. Renderizar Datos
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre Completo</strong> <span>${conductor.nombres} ${conductor.apellidos}</span></div>
    <div class="campo"><strong>Cédula</strong> <span>${conductor.cedula}</span></div>
    <div class="campo"><strong>Licencia</strong> <span>${conductor.licencia}</span></div>
    <div class="campo"><strong>Vehículo</strong> <span>${conductor.marca} ${conductor.modelo}</span></div>
    <div class="campo"><strong>Placa</strong> <span>${conductor.placa}</span></div>
    <div class="campo"><strong>Color</strong> <span>${conductor.color}</span></div>
    <div class="campo"><strong>Póliza</strong> <span>${conductor.poliza_numero}</span></div>
    <div class="campo"><strong>Correo</strong> <span>${user.email}</span></div>
    <div class="campo"><strong>Teléfono</strong> <span>${conductor.celular}</span></div>
  `;

  // 5. Renderizar Fotos Interactuables
  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if(fotoVeh) {
    const wrapper = document.createElement("div");
    wrapper.className = "foto-wrapper";
    wrapper.innerHTML = `
      <img src="${fotoVeh}" class="foto" onclick="mostrarModal('${fotoVeh}')" alt="Vehículo">
      <div class="foto-label">Vehículo</div>
    `;
    fotosCont.appendChild(wrapper);
  }

  if(fotoCond) {
    const wrapper = document.createElement("div");
    wrapper.className = "foto-wrapper";
    wrapper.innerHTML = `
      <img src="${fotoCond}" class="foto" onclick="mostrarModal('${fotoCond}')" alt="Conductor">
      <div class="foto-label">Conductor</div>
    `;
    fotosCont.appendChild(wrapper);
  }

  // 6. QR con enlace público dinámico
  const publicUrl = `${window.location.origin}/perfil_publico.html?id=${conductor.id}`;
  const canvas = document.getElementById("qr");

  await QRCode.toCanvas(canvas, publicUrl, {
    width: 220,
    margin: 2,
    color: { dark: '#1e293b', light: '#ffffff' },
    errorCorrectionLevel: 'H'
  });

  // Logo en el centro del QR
  const ctx = canvas.getContext("2d");
  const logo = new Image();
  logo.src = "logo.png"; 

  logo.onload = () => {
    const size = canvas.width * 0.22;
    const x = (canvas.width - size) / 2;
    const y = (canvas.height - size) / 2;
    
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, size/2 + 8, 0, Math.PI * 2);
    ctx.fill();
    
    // Borde blanco para el logo
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.stroke();
    
    ctx.drawImage(logo, x, y, size, size);
  };
  
  logo.onerror = () => {
    // Si no hay logo, no pasa nada
    console.log('Logo no encontrado, QR generado sin logo');
  };
}

function mostrarModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modalFoto").style.display = "flex";
}

function descargarQR(){
  const canvas = document.getElementById("qr");
  const link = document.createElement("a");
  link.download = "mi_credencial_qr.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

cargarPerfil();
</script>
