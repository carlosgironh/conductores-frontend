<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil del Conductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
/* === TU MISMO CSS (sin cambios visuales) === */
body{
  font-family: 'Arial', sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}
.card{
  max-width:720px;
  margin:auto;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  padding:25px;
}
h2{
  text-align:center;
  color:#0d6efd;
  margin-bottom:20px;
}
.campo{ margin-bottom:12px; font-size:16px; }
.campo strong{ color:#333; }

.fotos-container{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  margin:15px 0;
}
.foto{
  width:48%;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition: transform 0.2s;
}
.foto:hover{ transform: scale(1.05); }

#qr-container{
  text-align:center;
  margin-top:25px;
}
#qr{
  background:white;
  padding:10px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}
button{
  margin-top:15px;
  background:#0d6efd;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
button:hover{ background:#0b5ed7; }

.modal{
  display:none;
  position:fixed;
  z-index:999;
  left:0; top:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
@media(max-width:480px){
  .card{ padding:15px; }
  .foto{ width:100%; }
}
</style>
</head>

<body>

<div class="card">
  <h2>Perfil del Conductor</h2>
  <div id="contenido">Cargando perfil...</div>
  <div class="fotos-container" id="fotos-container"></div>

  <div id="qr-container">
    <canvas id="qr"></canvas><br>
    <button onclick="descargarQR()">Descargar QR</button>
  </div>
</div>

<div id="modalFoto" class="modal" onclick="this.style.display='none'">
  <img id="modalImg" src="">
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "TU_ANON_KEY_AQUI";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPerfil(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    alert("No hay sesión activa");
    window.location.href = "index.html";
    return;
  }

  // 1️⃣ Buscar conductor por auth_user_id
  const { data: conductor, error } = await supabaseClient
    .from("conductores")
    .select("*")
    .eq("auth_user_id", user.id)
    .single();

  if(error || !conductor){
    document.getElementById("contenido").innerText="No se encontró perfil";
    return;
  }

  // 2️⃣ Traer documentos
  const { data: documentos } = await supabaseClient
    .from("documentos")
    .select("*")
    .eq("conductor_id", conductor.id);

  function docUrl(tipo){
    const doc = documentos.find(d => d.tipo === tipo);
    if(!doc) return null;

    return supabaseClient
      .storage
      .from("documentos-conductores")
      .getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  // 3️⃣ Mostrar datos
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre:</strong> ${conductor.nombres} ${conductor.apellidos}</div>
    <div class="campo"><strong>Cédula:</strong> ${conductor.cedula}</div>
    <div class="campo"><strong>Licencia:</strong> ${conductor.licencia}</div>
    <div class="campo"><strong>Vehículo:</strong> ${conductor.marca} ${conductor.modelo}</div>
    <div class="campo"><strong>Placa:</strong> ${conductor.placa}</div>
    <div class="campo"><strong>Color:</strong> ${conductor.color}</div>
    <div class="campo"><strong>Póliza:</strong> ${conductor.poliza_numero}</div>
  `;

  // 4️⃣ Mostrar fotos
  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if(fotoVeh){
    const img = document.createElement("img");
    img.src = fotoVeh;
    img.className = "foto";
    img.onclick = ()=> mostrarModal(fotoVeh);
    fotosCont.appendChild(img);
  }

  if(fotoCond){
    const img = document.createElement("img");
    img.src = fotoCond;
    img.className = "foto";
    img.onclick = ()=> mostrarModal(fotoCond);
    fotosCont.appendChild(img);
  }

  // 5️⃣ Generar QR con enlace público
  const publicUrl = `${window.location.origin}/perfil_publico.html?id=${conductor.id}`;

  const canvas = document.getElementById("qr");

await QRCode.toCanvas(canvas, publicUrl, {
  width: 220,
  errorCorrectionLevel: 'H'
});

// Dibujar logo en el centro
const ctx = canvas.getContext("2d");
const logo = new Image();
logo.src = "logo.png"; // debe estar en la misma carpeta

logo.onload = () => {
  const size = canvas.width * 0.22; // tamaño del logo
  const x = (canvas.width - size) / 2;
  const y = (canvas.height - size) / 2;
  ctx.drawImage(logo, x, y, size, size);
};
}

function mostrarModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modalFoto").style.display="flex";
}

function descargarQR(){
  const canvas = document.getElementById("qr");
  const link = document.createElement("a");
  link.download="perfil_qr.png";
  link.href = canvas.toDataURL();
  link.click();
}

cargarPerfil();
</script>

</body>
</html>
