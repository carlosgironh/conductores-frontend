<html lang="es">
<head>

<title>Verificación de Conductor - Road To</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --corp-green: #8ac725;
    --corp-green-dark: #448414;
    --corp-green-lime: #9ad93a;
    --corp-green-light: #b8e85c;
    --corp-gray: #7d7d7d;
    --corp-gray-dark: #4a4a4a;
    --corp-gray-light: #9e9e9e;
    --corp-gray-soft: #cbd5e1;
    --corp-blue: #2563eb;
    --corp-blue-dark: #1e40af;
    --corp-blue-light: #3b82f6;
    --corp-orange: #f97316;
    --corp-orange-light: #fb923c;
    --primary: var(--corp-green);
    --primary-dark: var(--corp-green-dark);
    --accent: var(--corp-green-lime);
    --bg-dark: #0a1208;
    --text-light: #eef8e4;
    --text-muted: #8a9e7d;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 30px 20px;
    padding-top: calc(30px + var(--safe-top));
    padding-bottom: calc(30px + var(--safe-bottom));
    background:
      radial-gradient(ellipse at 10% 20%, rgba(138, 199, 37, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(154, 217, 58, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #0a1208 0%, #0a1208 100%);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
  }

  .card {
    max-width: 680px;
    width: 100%;
    background: rgba(30, 41, 59, 0.5);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    padding: 40px 35px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .public-header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 25px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .public-header .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 18px;
    color: var(--corp-orange);
    margin-bottom: 12px;
  }

  .public-header .logo svg {
    width: 28px;
    height: 28px;
    color: var(--corp-orange-light);
  }

  .public-header p {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
  }

  .coverage-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 18px 24px;
    margin-bottom: 28px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(234, 88, 12, 0.25) 0%, rgba(154, 52, 18, 0.2) 100%);
    border: 2px solid rgba(251, 146, 60, 0.5);
    position: relative;
    overflow: hidden;
    animation: bannerGlow 3s ease-in-out infinite;
  }

  .coverage-banner::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 3s infinite;
  }

  @keyframes bannerGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.3), inset 0 0 20px rgba(234, 88, 12, 0.05); }
    50% { box-shadow: 0 0 30px 6px rgba(234, 88, 12, 0.25), inset 0 0 30px rgba(234, 88, 12, 0.1); }
  }

  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  .coverage-banner .banner-icon {
    width: 32px;
    height: 32px;
    color: #fb923c;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .coverage-banner .banner-text {
    font-size: 16px;
    font-weight: 800;
    color: #ffedd5;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
    line-height: 1.4;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .coverage-banner .banner-text .highlight {
    color: #fdba74;
    font-weight: 900;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #fdba74 0%, #fb923c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
  }

  .status-hero {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .status-hero.active {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(21, 128, 61, 0.1) 100%);
    border-color: rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .status-hero.inactive {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(185, 28, 28, 0.1) 100%);
    border-color: rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .status-hero.pending {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(180, 83, 9, 0.1) 100%);
    border-color: rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .status-icon-wrap {
    width: 50px;
    height: 50px;
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .status-icon-wrap svg { width: 26px; height: 26px; }

  .status-info h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .status-info p {
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.4;
  }

  /* ===== ESTADO DE PAGO ===== */
  .payment-status-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    animation: slideDown 0.6s ease-out backwards;
  }

  .payment-status-banner.paid {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(21, 128, 61, 0.05) 100%);
    border-color: rgba(34, 197, 94, 0.2);
    color: #4ade80;
  }

  .payment-status-banner.pending {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(180, 83, 9, 0.1) 100%);
    border-color: rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .payment-status-banner.overdue {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(185, 28, 28, 0.1) 100%);
    border-color: rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .payment-status-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .payment-status-info h4 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .payment-status-info p {
    font-size: 12px;

  h2 {

    font-weight: 800;
    font-size: 28px;

    margin-bottom: 25px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .fotos-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 25px;

  .foto-wrapper {

    border-radius: 20px;
    overflow: hidden;

    background: rgba(15, 23, 42, 0.4);

    transition: all 0.3s ease;

  .foto-wrapper:hover {
    transform: scale(1.02);
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  }

  .foto {

    object-fit: cover;
    display: block;
  }

  .foto-label {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    padding: 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;

  #contenido {
    background: rgba(15, 23, 42, 0.5);
    padding: 25px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 25px;
  }

  .campo {
    margin-bottom: 14px;
    font-size: 15px;
    display: flex;
    align-items: flex-start;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .campo:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .campo strong {
    color: #60a5fa;
    width: 150px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .campo span {
    color: #e2e8f0;
    font-weight: 500;
    word-break: break-word;
    flex: 1;
  }

  .aviso-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(139, 92, 246, 0.2);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  /* ===== VISTA PREVIA DE DOCUMENTOS ===== */
  .documentos-section {
    margin: 25px 0;
    padding: 25px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .documentos-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #60a5fa;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .documentos-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
    border-radius: 2px;
  }

  .documentos-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px; 
  }

  .doc-preview {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.3s ease;
    cursor: pointer;
    aspect-ratio: 3/4;
  }

  .doc-preview:hover {
    border-color: rgba(99, 102, 241, 0.4);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  .doc-preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .doc-preview-pdf {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(185, 28, 28, 0.05) 100%);
    gap: 8px;
    padding: 20px;
    text-align: center;
  }

  .doc-preview-pdf svg {
    width: 40px;
    height: 40px;
    color: #f87171;
  }

  .doc-preview-pdf span {
    font-size: 11px;
    font-weight: 600;
    color: #f87171;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .doc-preview-label {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    padding: 10px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .doc-preview-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .doc-preview:hover .doc-preview-overlay {
    opacity: 1;
  }

  .doc-preview-overlay span {
    background: rgba(99, 102, 241, 0.9);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .doc-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 30px;
    color: #64748b;
    font-size: 14px;
  }

  .btn-doc {
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-doc:hover { background: #6366f1; color: white; transform: translateY(-2px); border-color: transparent; }

  .btn-doc.aviso-operaciones {
    background: rgba(139, 92, 246, 0.1);
    border-color: rgba(139, 92, 246, 0.3);
    color: #a78bfa;
  }

  .btn-doc.aviso-operaciones:hover { background: #8b5cf6; color: white; }

  .error-box {
    text-align: center;
    padding: 40px 20px;
    color: #f87171;
  }

  .error-box h3 { font-size: 20px; margin-bottom: 10px; }
  .error-box p { color: #94a3b8; font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-public {
    text-align: center;
    margin-top: 30px;
    padding-top: 25px;
    border-top: 1px solid rgba(255,255,255,0.06);
    color: #64748b;
    font-size: 12px;
  }

  /* ===== MODAL VISTA PREVIA ===== */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(10, 15, 25, 0.95);
    backdrop-filter: blur(20px);
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    animation: fadeIn 0.3s ease;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal img, .modal iframe {
    max-width: 90%;
    max-height: 85%;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: scaleIn 0.3s ease;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.1);
  }

  @media (max-width: 640px) {
    .card { padding: 30px 20px; border-radius: 24px; }

    .fotos-container { grid-template-columns: 1fr; }
    .campo { flex-direction: column; gap: 5px; }
    .campo strong { width: 100%; }
    .status-hero { flex-direction: column; text-align: center; }

  }
</style>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPerfil() {
  const urlParams = new URLSearchParams(window.location.search);
  const conductorId = urlParams.get('id');

  if (!conductorId) {
    mostrarError("ID no especificado", "No se proporcionó un identificador de conductor válido en la URL.");
    return;
  }

  try {
    const { data: conductor, error } = await supabaseClient
      .from("conductores")
      .select("*")
      .eq("id", conductorId)
      .single();

    if (error) {
      if (error.code === 'PGRST116' || error.message?.includes('permission') || error.message?.includes('JWT') || error.message?.includes('auth')) {
        throw new Error('RLS_BLOCK');
      }
      throw error;
    }

    if (!conductor) {
      throw new Error('NOT_FOUND');
    }

    const { data: documentos, error: docError } = await supabaseClient
      .from("documentos")
      .select("*")
      .eq("conductor_id", conductor.id);

    console.log('[PUBLICO] Documentos DB cargados:', documentos);
    console.log('[PUBLICO] Error documentos:', docError);

    // Cargar estado de pago desde tabla pagos
    const { data: pagos } = await supabaseClient
      .from("pagos")
      .select("*")
      .eq("conductor_id", conductor.id)
      .order("created_at", { ascending: false })
      .limit(1);

    await renderPerfil(conductor, documentos, pagos);

  } catch (error) {
    console.error('Error:', error);

    if (error.message === 'RLS_BLOCK' || error.code === 'PGRST116' || error.message?.includes('permission')) {
      mostrarError(
        "Acceso restringido",
        "Este perfil requiere configuración de permisos públicos en la base de datos. El administrador debe habilitar la lectura anónima (RLS) para la tabla de conductores y documentos."
      );
    } else if (error.message === 'NOT_FOUND') {
      mostrarError("Conductor no encontrado", "No existe un conductor registrado con el ID proporcionado.");
    } else {
      mostrarError("Error al cargar", "No se pudieron obtener los datos del conductor. Verifica tu conexión e intenta de nuevo.");
    }
  }
}

function mostrarError(titulo, mensaje) {
  document.getElementById("contenido").innerHTML = `
    <div class="error-box">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-bottom: 16px; opacity: 0.8;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <h3>${titulo}</h3>
      <p>${mensaje}</p>
    </div>
  `;
  document.getElementById("fotos-container").style.display = 'none';
  document.getElementById("documentos-section").style.display = 'none';
  document.getElementById("statusHero").style.display = 'none';
  document.getElementById("paymentStatus").style.display = 'none';
}

async function listarDocumentosBucket(conductorId) {
  try {
    const { data: files, error } = await supabaseClient
      .storage
      .from("documentos-conductores")
      .list(conductorId, { limit: 100 });
    if (error || !files || files.length === 0) {
      console.log('[PUBLICO] Bucket list empty or error:', error?.message);
      return [];
    }
    console.log('[PUBLICO] Bucket files found:', files.map(f => f.name));

    const tipoMap = {
      'cedula': 'CEDULA',
      'licencia': 'LICENCIA',
      'registro': 'REGISTRO',
      'poliza': 'POLIZA',
      'foto_conductor': 'FOTO_CONDUCTOR',
      'foto_vehiculo': 'FOTO_VEHICULO',
      'aviso_operaciones': 'AVISO_OPERACIONES',
      'auth_propietario': 'AUTH_PROPIETARIO'
    };

    return files.map(f => {
      const lowerName = f.name.toLowerCase();
      let tipo = null;
      for (const prefix in tipoMap) {
        if (lowerName.startsWith(prefix + '_') || lowerName.startsWith(prefix + '.')) {
          tipo = tipoMap[prefix];
          break;
        }
      }
      return {
        tipo: tipo || 'OTRO',
        url_archivo: conductorId + '/' + f.name,
        name: f.name
      };
    }).filter(d => d.tipo !== 'OTRO');
  } catch (e) {
    console.error('[PUBLICO] Error listing bucket:', e);
    return [];
  }
}

async function docUrl(tipo, documentos) {
  const doc = documentos?.find(d => d.tipo === tipo);
  if (!doc) return null;
  try {
    const { data: signedUrl, error } = await supabaseClient
      .storage
      .from("documentos-conductores")
      .createSignedUrl(doc.url_archivo, 3600);
    if (error) {
      console.error(`[PUBLICO] Error signedUrl ${tipo}:`, error.message);
      return null;
    }
    console.log(`[PUBLICO] Doc ${tipo}: resolvedUrl=OK path=${doc.url_archivo}`);
    return signedUrl.signedUrl;
  } catch (e) {
    console.error(`[PUBLICO] Exception signedUrl ${tipo}:`, e);
    return null;
  }
}

async function renderPerfil(conductor, documentosDB, pagos) {
  console.log('[PUBLICO] renderPerfil called, documentosDB count:', documentosDB?.length || 0);

  // Fallback: if table is empty, read directly from bucket
  let documentos = documentosDB;
  if (!documentos || documentos.length === 0) {
    console.log('[PUBLICO] Table empty, trying bucket fallback...');
    documentos = await listarDocumentosBucket(conductor.id);
    console.log('[PUBLICO] Bucket fallback result:', documentos);
  }

  // Pre-resolve all document URLs
  const urls = {};
  const tipos = ["CEDULA", "LICENCIA", "REGISTRO", "POLIZA", "AUTH_PROPIETARIO", "FOTO_VEHICULO", "FOTO_CONDUCTOR", "AVISO_OPERACIONES"];
  for (const tipo of tipos) {
    urls[tipo] = await docUrl(tipo, documentos);
  }

  // ===== ESTADO DE PAGO =====
  const ultimoPago = pagos && pagos.length > 0 ? pagos[0] : null;
  const ahora = new Date();
  let paymentHTML = '';

  if (ultimoPago && ultimoPago.estado === 'pagado') {
    const fechaVenc = ultimoPago.fecha_vencimiento ? new Date(ultimoPago.fecha_vencimiento) : null;
    if (fechaVenc && fechaVenc > ahora) {
      const diasRestantes = Math.ceil((fechaVenc - ahora) / (1000 * 60 * 60 * 24));
      paymentHTML = `
        <div class="payment-status-banner paid">
          <div class="payment-status-icon">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <div class="payment-status-info">
            <h4>Pago al día</h4>
            <p>Suscripción activa. Vence en ${diasRestantes} día${diasRestantes !== 1 ? 's' : ''}.</p>
          </div>
        </div>
      `;
    } else {
      paymentHTML = `
        <div class="payment-status-banner overdue">
          <div class="payment-status-icon">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <div class="payment-status-info">
            <h4>Suscripción vencida</h4>
            <p>El pago anterior ha expirado. Se requiere renovación.</p>
          </div>
        </div>
      `;
    }
  } else if (ultimoPago && ultimoPago.estado === 'pendiente') {
    paymentHTML = `
      <div class="payment-status-banner pending">
        <div class="payment-status-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <div class="payment-status-info">
          <h4>Pago pendiente</h4>
          <p>El conductor tiene un pago en proceso de verificación.</p>
        </div>
      </div>
    `;
  } else {
    paymentHTML = `
      <div class="payment-status-banner overdue">
        <div class="payment-status-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        </div>
        <div class="payment-status-info">
          <h4>Pago pendiente</h4>
          <p>Este conductor no ha realizado el pago de suscripción.</p>
        </div>
      </div>
    `;
  }
  document.getElementById("paymentStatus").innerHTML = paymentHTML;

  // ===== ESTADO DEL CONDUCTOR =====
  let statusClass, statusTitle, statusMsg;
  const estado = String(conductor.estado).toLowerCase();

  if (estado === 'activo' || estado === 'true') {
    statusClass = 'active';
    statusTitle = 'Conductor Verificado';
    statusMsg = 'Este conductor se encuentra activo y habilitado para operar.';
  } else if (estado === 'pendiente') {
    statusClass = 'pending';
    statusTitle = 'Verificación Pendiente';
    statusMsg = 'La documentación de este conductor está en proceso de revisión.';
  } else {
    statusClass = 'inactive';
    statusTitle = 'Conductor Inactivo';
    statusMsg = 'Este conductor no se encuentra habilitado para operar.';
  }

  document.getElementById("statusHero").innerHTML = `
    <div class="status-hero ${statusClass}">
      <div class="status-icon-wrap">
        ${statusClass === 'active' ? 
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` :
          statusClass === 'pending' ?
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` :
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
        }
      </div>
      <div class="status-info">
        <h3>${statusTitle}</h3>
        <p>${statusMsg}</p>
      </div>
    </div>
  `;

  const tieneAviso = conductor.tiene_aviso_operaciones === true;
  const avisoUrl = urls['AVISO_OPERACIONES'];

  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre completo</strong> <span>${conductor.nombres || ''} ${conductor.apellidos || ''}</span></div>
    <div class="campo"><strong>Cédula</strong> <span>${conductor.cedula || '—'}</span></div>
    <div class="campo"><strong>Licencia</strong> <span>${conductor.licencia || '—'}</span></div>
    <div class="campo"><strong>Vehículo</strong> <span>${conductor.marca || ''} ${conductor.modelo || ''}</span></div>
    <div class="campo"><strong>Placa</strong> <span>${conductor.placa || '—'}</span></div>
    <div class="campo"><strong>Color</strong> <span>${conductor.color || '—'}</span></div>
    <div class="campo"><strong>N° Póliza</strong> <span>${conductor.poliza_numero || '—'}</span></div>
    <div class="campo">
      <strong>Aviso de Operaciones</strong>
      <span>${tieneAviso ? '<span class="aviso-badge">✓ Registrado</span>' : '<span style="color:#94a3b8">No registrado</span>'}</span>
    </div>
  `;

  // ===== FOTOS CON VISTA PREVIA =====
  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = urls['FOTO_VEHICULO'];
  const fotoCond = urls['FOTO_CONDUCTOR'];

  if (fotoVeh) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper" onclick="mostrarModal('${fotoVeh}', 'img')">
        <img src="${fotoVeh}" class="foto" alt="Vehículo" loading="lazy">
        <div class="foto-label">Vehículo</div>
      </div>
    `;
  }
  if (fotoCond) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper" onclick="mostrarModal('${fotoCond}', 'img')">
        <img src="${fotoCond}" class="foto" alt="Conductor" loading="lazy">
        <div class="foto-label">Conductor</div>
      </div>
    `;
  }

  // ===== DOCUMENTOS CON VISTA PREVIA =====
  const docSection = document.getElementById("documentos-section");
  const docGrid = document.getElementById("documentos-grid");
  docGrid.innerHTML = "";

  console.log('[PUBLICO] Renderizando documentos. Total:', documentos?.length || 0);
  console.log('[PUBLICO] Documentos:', documentos);

  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula", icon: "📄" },
    { tipo: "LICENCIA", label: "Licencia", icon: "🪪" },
    { tipo: "REGISTRO", label: "Registro Vehicular", icon: "🚗" },
    { tipo: "POLIZA", label: "Póliza de Seguro", icon: "🛡️" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización Propietario", icon: "✉️" }
  ];

  let tieneDocumentos = false;

  documentosConfig.forEach(doc => {
    const url = urls[doc.tipo];
    console.log(`[PUBLICO] Doc ${doc.tipo}:`, url ? 'ENCONTRADO' : 'NO ENCONTRADO');
    if (url) {
      tieneDocumentos = true;
      const isPdf = url.toLowerCase().endsWith('.pdf');
      if (isPdf) {
        docGrid.innerHTML += `
          <div class="doc-preview" onclick="mostrarModal('${url}', 'pdf')">
            <div class="doc-preview-pdf">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
              <span>PDF</span>
            </div>
            <div class="doc-preview-label">${doc.label}</div>
            <div class="doc-preview-overlay"><span>Ver documento</span></div>
          </div>
        `;
      } else {
        docGrid.innerHTML += `
          <div class="doc-preview" onclick="mostrarModal('${url}', 'img')">
            <img src="${url}" class="doc-preview-img" alt="${doc.label}" loading="lazy">
            <div class="doc-preview-label">${doc.label}</div>
            <div class="doc-preview-overlay"><span>Ver documento</span></div>
          </div>
        `;
      }
    }
  });

  if (tieneAviso && avisoUrl) {
    tieneDocumentos = true;
    const isPdf = avisoUrl.toLowerCase().endsWith('.pdf');
    if (isPdf) {
      docGrid.innerHTML += `
        <div class="doc-preview" onclick="mostrarModal('${avisoUrl}', 'pdf')">
          <div class="doc-preview-pdf">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <span>PDF</span>
          </div>
          <div class="doc-preview-label">Aviso de Operaciones</div>
          <div class="doc-preview-overlay"><span>Ver documento</span></div>
        </div>
      `;
    } else {
      docGrid.innerHTML += `
        <div class="doc-preview" onclick="mostrarModal('${avisoUrl}', 'img')">
          <img src="${avisoUrl}" class="doc-preview-img" alt="Aviso de Operaciones" loading="lazy">
          <div class="doc-preview-label">Aviso de Operaciones</div>
          <div class="doc-preview-overlay"><span>Ver documento</span></div>
        </div>
      `;
    }
  }

  console.log('[PUBLICO] tieneDocumentos:', tieneDocumentos);

  if (tieneDocumentos) {
    docSection.style.display = "block";
  } else {
    docSection.style.display = "block";
    docGrid.innerHTML = `
      <div class="doc-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-bottom: 12px; opacity: 0.5;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <p>No hay documentos registrados</p>
      </div>
    `;
  }
}

function mostrarModal(src, type) {
  const modal = document.getElementById("modalPreview");
  const img = document.getElementById("modalImg");
  const pdf = document.getElementById("modalPdf");

  if (type === 'pdf') {
    img.style.display = 'none';
    pdf.style.display = 'block';
    pdf.src = src;
  } else {
    pdf.style.display = 'none';
    img.style.display = 'block';
    img.src = src;
  }

  modal.style.display = "flex";
  document.body.style.overflow = "hidden";
}

function cerrarModal() {
  document.getElementById("modalPreview").style.display = "none";
  document.body.style.overflow = "";
}

document.addEventListener("DOMContentLoaded", cargarPerfil);
</script>
