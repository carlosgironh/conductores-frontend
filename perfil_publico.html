<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación de Conductor - Road To</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1208">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --corp-green: #8ac725;
    --corp-green-dark: #448414;
    --corp-green-lime: #9ad93a;
    --corp-green-light: #b8e85c;
    --corp-blue: #2563eb;
    --corp-blue-dark: #1e40af;
    --corp-blue-light: #3b82f6;
    --corp-orange: #f97316;
    --corp-orange-light: #fb923c;
    --primary: var(--corp-green);
    --primary-dark: var(--corp-green-dark);
    --accent: var(--corp-green-lime);
    --bg-dark: #0a1208;
    --text-light: #eef8e4;
    --text-muted: #8a9e7d;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 30px 20px;
    padding-top: calc(30px + var(--safe-top));
    padding-bottom: calc(30px + var(--safe-bottom));
    background:
      radial-gradient(ellipse at 10% 20%, rgba(138, 199, 37, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(154, 217, 58, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #0a1208 0%, #0a1208 100%);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
  }

  .card {
    max-width: 680px;
    width: 100%;
    background: rgba(30, 41, 59, 0.5);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    padding: 40px 35px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .public-header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 25px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .public-header .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 18px;
    color: #f8fafc;
    margin-bottom: 12px;
  }

  .public-header .logo svg {
    width: 28px;
    height: 28px;
    color: #3b82f6;
  }

  .public-header p {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
  }

  .status-hero {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .status-hero.active {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(21, 128, 61, 0.1) 100%);
    border-color: rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .status-hero.inactive {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(185, 28, 28, 0.1) 100%);
    border-color: rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .status-hero.pending {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(180, 83, 9, 0.1) 100%);
    border-color: rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .status-icon-wrap {
    width: 50px;
    height: 50px;
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .status-icon-wrap svg { width: 26px; height: 26px; }

  .status-info h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .status-info p {
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.4;
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 25px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .fotos-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 25px;
  }

  .foto-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    background: rgba(15, 23, 42, 0.4);
  }

  .foto {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
  }

  .foto-label {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    padding: 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #contenido {
    background: rgba(15, 23, 42, 0.5);
    padding: 25px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 25px;
  }

  .campo {
    margin-bottom: 14px;
    font-size: 15px;
    display: flex;
    align-items: flex-start;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .campo:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .campo strong {
    color: #60a5fa;
    width: 150px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .campo span {
    color: #e2e8f0;
    font-weight: 500;
    word-break: break-word;
    flex: 1;
  }

  .aviso-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(139, 92, 246, 0.2);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  .documentos-section {
    margin: 25px 0;
    padding: 25px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .documentos-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #60a5fa;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .documentos-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
    border-radius: 2px;
  }

  .documentos-grid { display: flex; flex-wrap: wrap; gap: 10px; }

  .btn-doc {
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-doc:hover { background: #6366f1; color: white; transform: translateY(-2px); border-color: transparent; }

  .btn-doc.aviso-operaciones {
    background: rgba(139, 92, 246, 0.1);
    border-color: rgba(139, 92, 246, 0.3);
    color: #a78bfa;
  }

  .btn-doc.aviso-operaciones:hover { background: #8b5cf6; color: white; }

  .error-box {
    text-align: center;
    padding: 40px 20px;
    color: #f87171;
  }

  .error-box h3 { font-size: 20px; margin-bottom: 10px; }
  .error-box p { color: #94a3b8; font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-public {
    text-align: center;
    margin-top: 30px;
    padding-top: 25px;
    border-top: 1px solid rgba(255,255,255,0.06);
    color: #64748b;
    font-size: 12px;
  }

  @media (max-width: 640px) {
    .card { padding: 30px 20px; border-radius: 24px; }
    h2 { font-size: 24px; }
    .fotos-container { grid-template-columns: 1fr; }
    .campo { flex-direction: column; gap: 5px; }
    .campo strong { width: 100%; }
    .status-hero { flex-direction: column; text-align: center; }
  }
</style>
</head>

<body>

<div class="card">
  <div class="public-header">
    <div class="logo">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7"></path>
      </svg>
      Road To
    </div>
    <p>Perfil de verificación de conductor</p>
  </div>

  <div id="statusHero"></div>

  <div id="contenido">
    <div class="loading">
      <div class="loading-spinner"></div>
      Cargando datos del conductor...
    </div>
  </div>

  <div class="fotos-container" id="fotos-container"></div>

  <div class="documentos-section" id="documentos-section" style="display: none;">
    <div class="documentos-title">Documentos de Verificación</div>
    <div class="documentos-grid" id="documentos-grid"></div>
  </div>

  <div class="footer-public">
    © Road To — Perfil público de verificación.<br>
    Si tienes dudas sobre este conductor, contacta soporte.
  </div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPerfil() {
  const urlParams = new URLSearchParams(window.location.search);
  const conductorId = urlParams.get('id');

  if (!conductorId) {
    mostrarError("ID no especificado", "No se proporcionó un identificador de conductor válido en la URL.");
    return;
  }

  try {
    // Intentar cargar sin autenticación (requiere RLS público en Supabase)
    const { data: conductor, error } = await supabaseClient
      .from("conductores")
      .select("*")
      .eq("id", conductorId)
      .single();

    if (error) {
      // Detectar específicamente error de permisos/RLS
      if (error.code === 'PGRST116' || error.message?.includes('permission') || error.message?.includes('JWT') || error.message?.includes('auth')) {
        throw new Error('RLS_BLOCK');
      }
      throw error;
    }

    if (!conductor) {
      throw new Error('NOT_FOUND');
    }

    const { data: documentos } = await supabaseClient
      .from("documentos")
      .select("*")
      .eq("conductor_id", conductor.id);

    renderPerfil(conductor, documentos);

  } catch (error) {
    console.error('Error:', error);

    if (error.message === 'RLS_BLOCK' || error.code === 'PGRST116' || error.message?.includes('permission')) {
      mostrarError(
        "Acceso restringido",
        "Este perfil requiere configuración de permisos públicos en la base de datos. El administrador debe habilitar la lectura anónima (RLS) para la tabla de conductores y documentos."
      );
    } else if (error.message === 'NOT_FOUND') {
      mostrarError("Conductor no encontrado", "No existe un conductor registrado con el ID proporcionado.");
    } else {
      mostrarError("Error al cargar", "No se pudieron obtener los datos del conductor. Verifica tu conexión e intenta de nuevo.");
    }
  }
}

function mostrarError(titulo, mensaje) {
  document.getElementById("contenido").innerHTML = `
    <div class="error-box">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-bottom: 16px; opacity: 0.8;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <h3>${titulo}</h3>
      <p>${mensaje}</p>
    </div>
  `;
  document.getElementById("fotos-container").style.display = 'none';
  document.getElementById("documentos-section").style.display = 'none';
  document.getElementById("statusHero").style.display = 'none';
}

function renderPerfil(conductor, documentos) {
  function docUrl(tipo) {
    const doc = documentos?.find(d => d.tipo === tipo);
    if (!doc) return null;
    return supabaseClient.storage.from("documentos-conductores").getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  // Determinar estado
  let statusClass, statusTitle, statusMsg;
  const estado = String(conductor.estado).toLowerCase();

  if (estado === 'activo' || estado === 'true') {
    statusClass = 'active';
    statusTitle = 'Conductor Verificado';
    statusMsg = 'Este conductor se encuentra activo y habilitado para operar.';
  } else if (estado === 'pendiente') {
    statusClass = 'pending';
    statusTitle = 'Verificación Pendiente';
    statusMsg = 'La documentación de este conductor está en proceso de revisión.';
  } else {
    statusClass = 'inactive';
    statusTitle = 'Conductor Inactivo';
    statusMsg = 'Este conductor no se encuentra habilitado para operar.';
  }

  // Render status hero
  document.getElementById("statusHero").innerHTML = `
    <div class="status-hero ${statusClass}">
      <div class="status-icon-wrap">
        ${statusClass === 'active' ? 
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` :
          statusClass === 'pending' ?
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` :
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
        }
      </div>
      <div class="status-info">
        <h3>${statusTitle}</h3>
        <p>${statusMsg}</p>
      </div>
    </div>
  `;

  const tieneAviso = conductor.tiene_aviso_operaciones === true;
  const avisoUrl = docUrl("AVISO_OPERACIONES");

  // Render datos
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre completo</strong> <span>${conductor.nombres || ''} ${conductor.apellidos || ''}</span></div>
    <div class="campo"><strong>Cédula</strong> <span>${conductor.cedula || '—'}</span></div>
    <div class="campo"><strong>Licencia</strong> <span>${conductor.licencia || '—'}</span></div>
    <div class="campo"><strong>Vehículo</strong> <span>${conductor.marca || ''} ${conductor.modelo || ''}</span></div>
    <div class="campo"><strong>Placa</strong> <span>${conductor.placa || '—'}</span></div>
    <div class="campo"><strong>Color</strong> <span>${conductor.color || '—'}</span></div>
    <div class="campo"><strong>N° Póliza</strong> <span>${conductor.poliza_numero || '—'}</span></div>
    <div class="campo">
      <strong>Aviso de Operaciones</strong>
      <span>${tieneAviso ? '<span class="aviso-badge">✓ Registrado</span>' : '<span style="color:#94a3b8">No registrado</span>'}</span>
    </div>
  `;

  // Fotos
  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if (fotoVeh) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper">
        <img src="${fotoVeh}" class="foto" alt="Vehículo" loading="lazy">
        <div class="foto-label">Vehículo</div>
      </div>
    `;
  }
  if (fotoCond) {
    fotosCont.innerHTML += `
      <div class="foto-wrapper">
        <img src="${fotoCond}" class="foto" alt="Conductor" loading="lazy">
        <div class="foto-label">Conductor</div>
      </div>
    `;
  }

  // Documentos
  const docSection = document.getElementById("documentos-section");
  const docGrid = document.getElementById("documentos-grid");
  docGrid.innerHTML = "";

  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula", icon: "📄" },
    { tipo: "LICENCIA", label: "Licencia", icon: "🪪" },
    { tipo: "REGISTRO", label: "Registro Vehicular", icon: "🚗" },
    { tipo: "POLIZA", label: "Póliza de Seguro", icon: "🛡️" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización Propietario", icon: "✉️" }
  ];

  let tieneDocumentos = false;

  documentosConfig.forEach(doc => {
    const url = docUrl(doc.tipo);
    if (url) {
      tieneDocumentos = true;
      docGrid.innerHTML += `
        <a href="${url}" target="_blank" class="btn-doc">
          ${doc.icon} ${doc.label}
        </a>
      `;
    }
  });

  if (tieneAviso && avisoUrl) {
    tieneDocumentos = true;
    docGrid.innerHTML += `
      <a href="${avisoUrl}" target="_blank" class="btn-doc aviso-operaciones">
        📋 Aviso de Operaciones
      </a>
    `;
  }

  docSection.style.display = tieneDocumentos ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", cargarPerfil);
</script>

</body>
</html>
