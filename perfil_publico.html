<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil Público del Conductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  /* 1. Tipografía y Base */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; outline: none; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 0%, #2c3344 0%, #111317 100%);
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /* 2. Tarjeta Perfil */
  .card {
    max-width: 720px;
    width: 100%;
    background: rgba(30, 41, 59, 0.45);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    padding: 40px;
    margin-bottom: 50px;
  }

  h2 {
    text-align: center;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -1px;
    margin-bottom: 30px;
    background: linear-gradient(to bottom, #ffffff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* 3. Datos del Perfil */
  #contenido {
    background: rgba(15, 23, 42, 0.3);
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    margin-bottom: 25px;
  }

  .campo {
    margin-bottom: 10px;
    font-size: 15px;
    display: flex;
    justify-content: flex-start;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 8px;
  }

  .campo strong {
    color: #6366f1;
    width: 120px;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-top: 3px;
  }

  /* 4. Fotos con Efecto Pro */
  .fotos-container {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 25px 0;
  }

  .foto {
    width: calc(50% - 10px);
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
  }

  .foto:hover {
    transform: scale(1.03);
    border-color: #6366f1;
  }

  /* 5. Botones de Documentos */
  #documentos {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .btn-doc {
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px 20px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.25s ease;
    backdrop-filter: blur(10px);
  }

  .btn-doc:hover {
    background: #6366f1;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    border-color: transparent;
  }

  /* 6. QR Container */
  #qr-container {
    margin-top: 40px;
    padding: 25px;
    background: rgba(255, 255, 255, 0.95); /* Fondo blanco para el QR */
    border-radius: 24px;
    display: inline-block;
    width: auto;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  #qr-container::after {
    content: "ESCANEAR PARA VALIDAR";
    display: block;
    margin-top: 10px;
    color: #1e293b;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
  }

  @media(max-width:480px){
    .foto { width: 100%; }
    .card { padding: 25px; }
    .campo { flex-direction: column; }
    .campo strong { margin-bottom: 4px; }
  }
</style>
</head>

<body>

<div class="card">
  <h2>Perfil del Conductor</h2>
  
  <div id="contenido">Cargando perfil seguro...</div>
  
  <div class="fotos-container" id="fotos-container"></div>
  
  <div id="documentos"></div>
  
  <div style="text-align: center;">
    <div id="qr-container"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPerfilPublico(){
  const params = new URLSearchParams(window.location.search);
  const conductorId = params.get("id");

  if(!conductorId){
    document.getElementById("contenido").innerText="Error: ID de perfil ausente.";
    return;
  }

  const { data: conductor, error } = await supabaseClient
    .from("conductores")
    .select("*")
    .eq("id", conductorId)
    .single();

  if(error || !conductor){
    document.getElementById("contenido").innerText="Perfil no encontrado en la base de datos.";
    return;
  }

  const { data: documentos } = await supabaseClient
    .from("documentos")
    .select("*")
    .eq("conductor_id", conductor.id);

  const listaDocs = documentos || [];

  function docUrl(tipo){
    const doc = listaDocs.find(d => d.tipo === tipo);
    if(!doc) return null;
    return supabaseClient.storage.from("documentos-conductores").getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  // Renderizar Datos
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre</strong> ${conductor.nombres} ${conductor.apellidos}</div>
    <div class="campo"><strong>Cédula</strong> ${conductor.cedula}</div>
    <div class="campo"><strong>Licencia</strong> ${conductor.licencia}</div>
    <div class="campo"><strong>Vehículo</strong> ${conductor.marca} ${conductor.modelo}</div>
    <div class="campo"><strong>Placa</strong> ${conductor.placa}</div>
    <div class="campo"><strong>Color</strong> ${conductor.color}</div>
    <div class="campo"><strong>Póliza</strong> ${conductor.poliza_numero}</div>
  `;

  // Renderizar Fotos
  const fotosCont = document.getElementById("fotos-container");
  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if(fotoCond){
    const img = document.createElement("img");
    img.src = fotoCond;
    img.className = "foto";
    img.alt = "Foto Conductor";
    fotosCont.appendChild(img);
  }

  if(fotoVeh){
    const img = document.createElement("img");
    img.src = fotoVeh;
    img.className = "foto";
    img.alt = "Foto Vehículo";
    fotosCont.appendChild(img);
  }

  // Botones Documentos
  const docsDiv = document.getElementById("documentos");
  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula" },
    { tipo: "LICENCIA", label: "Licencia" },
    { tipo: "REGISTRO", label: "Registro" },
    { tipo: "POLIZA", label: "Seguro" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización" }
  ];

  documentosConfig.forEach(doc => {
    const url = docUrl(doc.tipo);
    if(url){
      const btn = document.createElement("button");
      btn.className = "btn-doc";
      btn.innerText = doc.label;
      btn.onclick = () => window.open(url, "_blank");
      docsDiv.appendChild(btn);
    }
  });

  // Generación de QR con Branding
  const qrContainer = document.getElementById("qr-container");
  const canvas = document.createElement("canvas");
  qrContainer.appendChild(canvas);

  const currentUrl = window.location.href;

  QRCode.toCanvas(canvas, currentUrl, {
    width: 200,
    margin: 0,
    color: {
      dark: '#1e293b',
      light: '#ffffff'
    },
    errorCorrectionLevel: 'H'
  }, function (error) {
    if (error) console.error(error);
    
    // Inserción de Logo en QR
    const ctx = canvas.getContext("2d");
    const logo = new Image();
    logo.src = "logo.png"; // Asegúrate de que este archivo exista en tu servidor

    logo.onload = function() {
      const qrSize = canvas.width;
      const logoSize = qrSize * 0.22;
      const x = (qrSize - logoSize) / 2;
      const y = (qrSize - logoSize) / 2;

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(qrSize/2, qrSize/2, logoSize/2 + 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.drawImage(logo, x, y, logoSize, logoSize);
    };
  });
}

cargarPerfilPublico();
</script>

</body>
</html>
