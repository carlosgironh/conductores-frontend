<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil Público del Conductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { 
    box-sizing: border-box; 
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    
    /* Fondo dinámico premium */
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
    
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow-x: hidden;
  }

  /* Partículas flotantes */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 2%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 2%);
    background-size: 150px 150px;
    animation: float 25s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }

  /* Tarjeta principal */
  .card {
    max-width: 720px;
    width: 100%;
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 32px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    padding: 50px 45px;
    margin-bottom: 50px;
    position: relative;
    z-index: 1;
    animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    overflow: hidden;
  }

  @keyframes cardEntry {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* BANNER DE ESTADO */
  .status-banner {
    position: relative;
    margin: -50px -45px 30px -45px;
    padding: 20px 45px;
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    animation: slideDown 0.6s ease-out backwards;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .status-banner.active {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(21, 128, 61, 0.3) 100%);
    border-bottom: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
  }

  .status-banner.inactive {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(185, 28, 28, 0.3) 100%);
    border-bottom: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
  }

  .status-banner.pending {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(180, 83, 9, 0.3) 100%);
    border-bottom: 1px solid rgba(245, 158, 11, 0.3);
    color: #fbbf24;
  }

  .status-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .status-content {
    flex: 1;
  }

  .status-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-message {
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.5;
  }

  /* Indicador de estado tipo check */
  .status-check {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
  }

  .status-banner.active .status-check {
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
  }

  .status-banner.inactive .status-check {
    background: rgba(239, 68, 68, 0.2);
    color: #f87171;
  }

  .status-banner.pending .status-check {
    background: rgba(245, 158, 11, 0.2);
    color: #fbbf24;
  }

  /* Animación de pulso para estado activo */
  .status-banner.active::after {
    content: '';
    position: absolute;
    right: 45px;
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
  }

  @keyframes pulse-dot {
    0% {
      transform: scale(0.95);
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
    }
    70% {
      transform: scale(1);
      box-shadow: 0 0 0 10px rgba(74, 222, 128, 0);
    }
    100% {
      transform: scale(0.95);
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
    }
  }

  h2 {
    text-align: center;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Contenido de datos */
  #contenido {
    background: rgba(15, 23, 42, 0.5);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 25px;
    position: relative;
    overflow: hidden;
  }

  #contenido::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
  }

  .campo {
    margin-bottom: 16px;
    font-size: 15px;
    display: flex;
    align-items: flex-start;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.3s;
  }

  .campo:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .campo:hover {
    background: rgba(255, 255, 255, 0.02);
    margin: 0 -30px;
    padding: 0 30px 16px 30px;
    border-radius: 8px;
  }

  .campo strong {
    color: #60a5fa;
    width: 140px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .campo span {
    color: #e2e8f0;
    font-weight: 500;
  }

  /* Contenedor de Fotos */
  .fotos-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 30px 0;
  }

  @media (max-width: 640px) {
    .fotos-container {
      grid-template-columns: 1fr;
    }
  }

  .foto-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }

  .foto-wrapper:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .foto {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .foto-wrapper:hover .foto {
    transform: scale(1.05);
  }

  .foto-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Botones de Documentos */
  #documentos {
    margin-top: 35px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .btn-doc {
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 14px 24px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .btn-doc::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.6s;
  }

  .btn-doc:hover {
    background: #6366f1;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    border-color: transparent;
  }

  .btn-doc:hover::before {
    left: 100%;
  }

  .btn-doc:active {
    transform: translateY(0) scale(0.98);
  }

  /* QR Container */
  #qr-container {
    margin-top: 40px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 24px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    position: relative;
    border: 1px solid rgba(0,0,0,0.05);
  }

  #qr-container::after {
    content: "ESCANEAR PARA VALIDAR";
    display: block;
    margin-top: 15px;
    color: #1e293b;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
  }

  /* Mensaje de error */
  .error-message {
    text-align: center;
    padding: 40px;
    color: #f87171;
  }

  .error-message svg {
    width: 48px;
    height: 48px;
    margin: 0 auto 15px;
    opacity: 0.5;
  }

  /* Responsive */
  @media(max-width: 640px){
    .card {
      padding: 30px 25px;
      border-radius: 24px;
    }
    
    .status-banner {
      margin: -30px -25px 25px -25px;
      padding: 15px 25px;
      flex-direction: column;
      text-align: center;
      gap: 10px;
    }
    
    .status-banner.active::after {
      display: none;
    }
    
    h2 {
      font-size: 26px;
    }
    
    #contenido {
      padding: 20px;
    }
    
    .campo {
      flex-direction: column;
      gap: 5px;
    }
    
    .campo strong {
      width: 100%;
    }
    
    .campo:hover {
      margin: 0 -20px;
      padding: 0 20px 16px 20px;
    }

    #qr-container {
      padding: 20px;
    }
  }

  /* Estado de carga */
  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>

<body>

<div class="card" id="mainCard">
  <!-- El banner de estado se insertará aquí dinámicamente -->
  
  <h2>Perfil del Conductor</h2>
  
  <div id="contenido">
    <div class="loading">
      <div class="loading-spinner"></div>
      Cargando perfil seguro...
    </div>
  </div>
  
  <div class="fotos-container" id="fotos-container"></div>
  
  <div id="documentos"></div>
  
  <div style="text-align: center;">
    <div id="qr-container"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Función para renderizar el banner de estado
function renderStatusBanner(estado, motivoDeshabilitado = '') {
  const card = document.getElementById('mainCard');
  const existingBanner = document.querySelector('.status-banner');
  
  // Eliminar banner existente si hay
  if (existingBanner) {
    existingBanner.remove();
  }
  
  let bannerHTML = '';
  
  if (estado === 'activo' || estado === true || estado === 'true') {
    bannerHTML = `
      <div class="status-banner active">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Conductor Verificado
            <span class="status-check">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
              </svg>
              Activo
            </span>
          </div>
          <div class="status-message">Este conductor está habilitado y autorizado para prestar servicios.</div>
        </div>
      </div>
    `;
  } else if (estado === 'pendiente' || estado === 'revision') {
    bannerHTML = `
      <div class="status-banner pending">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Verificación Pendiente
            <span class="status-check">En Revisión</span>
          </div>
          <div class="status-message">Este perfil está pendiente de verificación por parte del equipo administrativo.</div>
        </div>
      </div>
    `;
  } else {
    // Inactivo, deshabilitado, rechazado, etc.
    bannerHTML = `
      <div class="status-banner inactive">
        <svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <div class="status-content">
          <div class="status-title">
            Conductor No Disponible
            <span class="status-check">Inactivo</span>
          </div>
          <div class="status-message">
            ${motivoDeshabilitado || 'Este conductor no está disponible actualmente para prestar servicios.'}
          </div>
        </div>
      </div>
    `;
  }
  
  // Insertar al inicio de la card
  card.insertAdjacentHTML('afterbegin', bannerHTML);
}

async function cargarPerfilPublico(){
  const params = new URLSearchParams(window.location.search);
  const conductorId = params.get("id");

  if(!conductorId){
    document.getElementById("contenido").innerHTML = `
      <div class="error-message">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p>Error: ID de perfil ausente.</p>
      </div>
    `;
    return;
  }

  const { data: conductor, error } = await supabaseClient
    .from("conductores")
    .select("*")
    .eq("id", conductorId)
    .single();

  if(error || !conductor){
    document.getElementById("contenido").innerHTML = `
      <div class="error-message">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p>Perfil no encontrado en la base de datos.</p>
      </div>
    `;
    return;
  }

  // Renderizar banner de estado según el campo 'estado'
  renderStatusBanner(conductor.estado, conductor.motivo_deshabilitado || conductor.motivo_inactivo);

  const { data: documentos } = await supabaseClient
    .from("documentos")
    .select("*")
    .eq("conductor_id", conductor.id);

  const listaDocs = documentos || [];

  function docUrl(tipo){
    const doc = listaDocs.find(d => d.tipo === tipo);
    if(!doc) return null;
    return supabaseClient.storage.from("documentos-conductores").getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  // Renderizar Datos
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre Completo</strong> <span>${conductor.nombres} ${conductor.apellidos}</span></div>
    <div class="campo"><strong>Cédula</strong> <span>${conductor.cedula}</span></div>
    <div class="campo"><strong>Licencia</strong> <span>${conductor.licencia}</span></div>
    <div class="campo"><strong>Vehículo</strong> <span>${conductor.marca} ${conductor.modelo}</span></div>
    <div class="campo"><strong>Placa</strong> <span>${conductor.placa}</span></div>
    <div class="campo"><strong>Color</strong> <span>${conductor.color}</span></div>
    <div class="campo"><strong>Póliza</strong> <span>${conductor.poliza_numero}</span></div>
  `;

  // Renderizar Fotos con wrapper y etiquetas
  const fotosCont = document.getElementById("fotos-container");
  fotosCont.innerHTML = "";

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if(fotoCond){
    const wrapper = document.createElement("div");
    wrapper.className = "foto-wrapper";
    wrapper.innerHTML = `
      <img src="${fotoCond}" class="foto" alt="Foto Conductor">
      <div class="foto-label">Conductor</div>
    `;
    fotosCont.appendChild(wrapper);
  }

  if(fotoVeh){
    const wrapper = document.createElement("div");
    wrapper.className = "foto-wrapper";
    wrapper.innerHTML = `
      <img src="${fotoVeh}" class="foto" alt="Foto Vehículo">
      <div class="foto-label">Vehículo</div>
    `;
    fotosCont.appendChild(wrapper);
  }

  // Botones Documentos
  const docsDiv = document.getElementById("documentos");
  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula" },
    { tipo: "LICENCIA", label: "Licencia" },
    { tipo: "REGISTRO", label: "Registro" },
    { tipo: "POLIZA", label: "Seguro" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización" }
  ];

  documentosConfig.forEach(doc => {
    const url = docUrl(doc.tipo);
    if(url){
      const btn = document.createElement("button");
      btn.className = "btn-doc";
      btn.innerText = doc.label;
      btn.onclick = () => window.open(url, "_blank");
      docsDiv.appendChild(btn);
    }
  });

  // Generación de QR con Branding
  const qrContainer = document.getElementById("qr-container");
  const canvas = document.createElement("canvas");
  qrContainer.appendChild(canvas);

  const currentUrl = window.location.href;

  QRCode.toCanvas(canvas, currentUrl, {
    width: 220,
    margin: 2,
    color: {
      dark: '#1e293b',
      light: '#ffffff'
    },
    errorCorrectionLevel: 'H'
  }, function (error) {
    if (error) console.error(error);
    
    // Inserción de Logo en QR
    const ctx = canvas.getContext("2d");
    const logo = new Image();
    logo.src = "logo.png";

    logo.onload = function() {
      const qrSize = canvas.width;
      const logoSize = qrSize * 0.22;
      const x = (qrSize - logoSize) / 2;
      const y = (qrSize - logoSize) / 2;

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(qrSize/2, qrSize/2, logoSize/2 + 8, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.strokeStyle = "white";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.drawImage(logo, x, y, logoSize, logoSize);
    };
    
    logo.onerror = () => {
      console.log('Logo no encontrado, QR generado sin logo');
    };
  });
}

cargarPerfilPublico();
</script>

</body>
</html>
