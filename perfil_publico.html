<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil Público del Conductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.card{
  max-width:720px;
  margin:auto;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  padding:25px;
}

h2{
  text-align:center;
  color:#0d6efd;
  margin-bottom:20px;
}

.campo{
  margin-bottom:12px;
  font-size:16px;
}

.fotos-container{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  margin:15px 0;
}

.foto{
  width:48%;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#documentos{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

/* BOTONES MODERNOS */
.btn-doc{
  background: linear-gradient(135deg, #0d6efd, #0b5ed7);
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:30px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:all 0.25s ease;
  box-shadow:0 4px 10px rgba(13,110,253,0.3);
}

.btn-doc:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(13,110,253,0.4);
}

.btn-doc:active{
  transform:scale(0.98);
}

#qr-container{
  margin-top:30px;
  text-align:center;
}

@media(max-width:480px){
  .foto{ width:100%; }
}
</style>
</head>

<body>

<div class="card">
  <h2>Perfil del Conductor</h2>
  <div id="contenido">Cargando perfil...</div>
  <div class="fotos-container" id="fotos-container"></div>
  <div id="documentos"></div>
  <div id="qr-container"></div>
</div>

<script>

const SUPABASE_URL = "https://ugchmuhjzzyofoogprlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2htdWhqenp5b2Zvb2dwcmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODUyNDQsImV4cCI6MjA4NTY2MTI0NH0.kB4ZjPhfP29JL6apWFKrXfW-AwnsCKHfmVsBUVjPsX4";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPerfilPublico(){

  const params = new URLSearchParams(window.location.search);
  const conductorId = params.get("id");

  if(!conductorId){
    document.getElementById("contenido").innerText="Perfil no encontrado";
    return;
  }

  const { data: conductor, error } = await supabaseClient
    .from("conductores")
    .select("*")
    .eq("id", conductorId)
    .single();

  if(error || !conductor){
    document.getElementById("contenido").innerText="Perfil no encontrado";
    return;
  }

  const { data: documentos } = await supabaseClient
    .from("documentos")
    .select("*")
    .eq("conductor_id", conductor.id);

  const listaDocs = documentos || [];

  function docUrl(tipo){
    const doc = listaDocs.find(d => d.tipo === tipo);
    if(!doc) return null;

    return supabaseClient
      .storage
      .from("documentos-conductores")
      .getPublicUrl(doc.url_archivo).data.publicUrl;
  }

  // DATOS
  document.getElementById("contenido").innerHTML = `
    <div class="campo"><strong>Nombre:</strong> ${conductor.nombres} ${conductor.apellidos}</div>
    <div class="campo"><strong>Cédula:</strong> ${conductor.cedula}</div>
    <div class="campo"><strong>Licencia:</strong> ${conductor.licencia}</div>
    <div class="campo"><strong>Vehículo:</strong> ${conductor.marca} ${conductor.modelo}</div>
    <div class="campo"><strong>Placa:</strong> ${conductor.placa}</div>
    <div class="campo"><strong>Color:</strong> ${conductor.color}</div>
    <div class="campo"><strong>Póliza:</strong> ${conductor.poliza_numero}</div>
  `;

  // FOTOS
  const fotosCont = document.getElementById("fotos-container");

  const fotoVeh = docUrl("FOTO_VEHICULO");
  const fotoCond = docUrl("FOTO_CONDUCTOR");

  if(fotoCond){
    const img = document.createElement("img");
    img.src = fotoCond;
    img.className = "foto";
    fotosCont.appendChild(img);
  }

  if(fotoVeh){
    const img = document.createElement("img");
    img.src = fotoVeh;
    img.className = "foto";
    fotosCont.appendChild(img);
  }

  // BOTONES DOCUMENTOS
  const docsDiv = document.getElementById("documentos");

  const documentosConfig = [
    { tipo: "CEDULA", label: "Cédula de Identidad" },
    { tipo: "LICENCIA", label: "Licencia de Conducir" },
    { tipo: "REGISTRO", label: "Registro del Vehículo" },
    { tipo: "POLIZA", label: "Póliza de Seguro" },
    { tipo: "AUTH_PROPIETARIO", label: "Autorización del Propietario" }
  ];

  documentosConfig.forEach(doc => {
    const url = docUrl(doc.tipo);
    if(url){
      const btn = document.createElement("button");
      btn.className = "btn-doc";
      btn.innerText = doc.label;
      btn.onclick = () => window.open(url, "_blank");
      docsDiv.appendChild(btn);
    }
  });

  // QR
  const qrContainer = document.getElementById("qr-container");
  const canvas = document.createElement("canvas");
  qrContainer.appendChild(canvas);

  const currentUrl = window.location.href;

  QRCode.toCanvas(canvas, currentUrl, {
    width: 220,
    errorCorrectionLevel: 'H'
  }, function (error) {

    if (error) console.error(error);

    const ctx = canvas.getContext("2d");

    const logo = new Image();
    logo.src = "logo.png";

    logo.onload = function() {

      const qrSize = canvas.width;
      const logoSize = qrSize * 0.25;

      const x = (qrSize - logoSize) / 2;
      const y = (qrSize - logoSize) / 2;

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(qrSize/2, qrSize/2, logoSize/2 + 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.drawImage(logo, x, y, logoSize, logoSize);
    };

  });

}

cargarPerfilPublico();
</script>

</body>
</html>
